<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f3ef">
<title>TOEIC OG 題庫練習系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f3ef; --cd: #ffffff; --p: #2a7c76; --pl: #e8f5f3;
  --ac: #c4873b; --acl: #fdf3e7; --ok: #2e8b57; --okl: #edf7f0;
  --ng: #c9463d; --ngl: #fdf0ef;
  --tx: #1a1a1a; --tm: #777; --bd: #e2dfd8;
  --fn: 'DM Sans','Noto Sans TC',sans-serif;
  color-scheme: light;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg); color:var(--tx); font-family:var(--fn); min-height:100vh; }
button { font-family:var(--fn); }
.card { background:var(--cd); border-radius:14px; padding:22px 24px; border:1px solid var(--bd); box-shadow:0 1px 4px rgba(0,0,0,0.04); }
.btn { padding:10px 20px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.2s; border:1.5px solid var(--bd); background:var(--cd); color:var(--tx); }
.btn:hover { border-color:var(--p); }
.btn.active { border-color:var(--p); background:var(--p); color:#fff; }
.btn.accent { border-color:var(--ac); background:var(--ac); color:#fff; }
.container { max-width:760px; margin:0 auto; padding:28px 20px 48px; }
.narrow { max-width:560px; }
.grid4 { display:grid; grid-template-columns:repeat(auto-fit, minmax(155px, 1fr)); gap:14px; }
.grid-card { cursor:pointer; text-align:center; transition:all 0.2s; }
.grid-card:hover { border-color:var(--p); transform:translateY(-3px); box-shadow:0 4px 16px rgba(0,0,0,0.08); }
.tag-badge { font-size:12px; font-weight:600; color:#fff; background:var(--p); padding:3px 10px; border-radius:5px; display:inline-block; }
.progress-bar { height:3px; background:var(--bd); border-radius:2px; overflow:hidden; margin-bottom:20px; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--p),var(--ac)); border-radius:2px; transition:width 0.3s; }
.option-btn { display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:8px; border:1.5px solid var(--bd); background:var(--cd); cursor:pointer; text-align:left; font-family:var(--fn); font-size:15px; color:var(--tx); transition:all 0.15s; line-height:1.5; width:100%; }
.option-btn:hover:not(.locked) { border-color:var(--p); background:var(--pl); }
.option-btn.selected { background:var(--pl); border-color:var(--p); }
.option-btn.correct { background:var(--okl); border-color:var(--ok); color:var(--ok); }
.option-btn.wrong { background:var(--ngl); border-color:var(--ng); color:var(--ng); }
.option-circle { display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:50%; flex-shrink:0; font-size:12px; font-weight:700; border:1.5px solid var(--bd); color:var(--tm); }
.option-circle.sel { background:var(--p); color:#fff; border-color:var(--p); }
.option-circle.ok { background:var(--ok); color:#fff; border-color:var(--ok); }
.clickable-word { cursor:pointer; border-bottom:1px dotted rgba(42,124,118,0.3); transition:color 0.15s; }
.clickable-word:hover { color:var(--p); }
.explanation { margin-top:18px; padding:18px; border-radius:10px; }
.explanation.ok { background:var(--okl); border:1px solid rgba(46,139,87,0.2); }
.explanation.ng { background:var(--acl); border:1px solid rgba(196,135,59,0.25); }
.trans-block { margin-top:8px; padding:10px 14px; background:var(--pl); border-radius:8px; font-size:13px; line-height:1.8; color:var(--tm); white-space:pre-wrap; border-left:3px solid var(--p); }
.stat-bar { height:6px; background:var(--bd); border-radius:3px; overflow:hidden; }
.stat-fill { height:100%; border-radius:3px; transition:width 0.5s; }
.review-row { display:flex; align-items:center; gap:10px; padding:8px 0; }
.review-icon { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; }
.popup { position:fixed; z-index:9999; background:#fff; border:1px solid var(--bd); border-radius:10px; padding:14px 18px; max-width:270px; box-shadow:0 8px 32px rgba(0,0,0,0.12); color:var(--tx); }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation:fadeIn 0.25s ease-out; }
.info-card { background:linear-gradient(135deg,#f0f7f6,#faf8f5); border-color:rgba(42,124,118,0.2); }
@media(max-width:480px) { .container{padding:16px 14px 40px} .card{padding:18px 16px} h1{font-size:26px!important} }
</style>
</head>

    <div style="font-size:22px;font-weight:700;color:var(--p)">載入題庫中...</div>
  </div>
</div>

function decompressData(b64){const bin=atob(b64);const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return new Response(new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'))).text();}

function LS(k,v){try{localStorage.setItem('toeic_'+k,JSON.stringify(v))}catch{}}
function LG(k){try{const v=localStorage.getItem('toeic_'+k);return v?JSON.parse(v):null}catch{return null}}
function startT(){if(!S.timerOn)return;S.tr=true;ti=setInterval(()=>{S.ts++;const el=document.getElementById('timer');if(el)el.textContent='⏱ '+fT(S.ts)},1000)}
function stopT(){S.tr=false;clearInterval(ti)}
function resetT(){stopT();S.ts=0}
function fT(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function h(tag,attrs,...ch){const el=document.createElement(tag);if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==='style'&&typeof v==='object')Object.assign(el.style,v);else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);else if(k==='className')el.className=v;else if(k==='innerHTML')el.innerHTML=v;else el.setAttribute(k,v)});ch.flat().forEach(c=>{if(c!=null)el.appendChild(typeof c==='string'?document.createTextNode(c):c)});return el}
function renderCT(text,container){container.innerHTML='';(text||'').split(/(\s+|[^a-zA-Z\'-]+)/).forEach(seg=>{if(/^[a-zA-Z\'-]{2,}$/.test(seg)){const sp=document.createElement('span');sp.className='clickable-word';sp.textContent=seg;sp.dataset.w=seg;sp.addEventListener('click',e=>{e.stopPropagation();showWP(seg,e.clientX,e.clientY)});container.appendChild(sp)}else{container.appendChild(document.createTextNode(seg))}})}
function showWP(w,x,y){closeWP();const p=h('div',{className:'popup fade-in',style:{left:Math.min(x,window.innerWidth-280)+'px',top:Math.min(y+12,window.innerHeight-160)+'px'}},h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}},h('span',{style:{fontSize:'18px',fontWeight:'700',color:'var(--p)'}},w),h('button',{style:{background:'none',border:'none',color:'#aaa',fontSize:'16px',cursor:'pointer',padding:'0'},onClick:closeWP},'✕')),h('div',{style:{fontSize:'13px',color:'var(--tm)',lineHeight:'1.6'}},'單字查詢功能將在 AI 模組啟用後提供翻譯、詞性與例句。'));p.id='wp';document.body.appendChild(p);S.wp=w}
function closeWP(){const e=document.getElementById('wp');if(e)e.remove();S.wp=null}
document.addEventListener('click',e=>{if(S.wp&&!e.target.closest('#wp')&&!e.target.classList.contains('clickable-word'))closeWP()});

function render(){const app=document.getElementById('app');app.innerHTML='';app.className='container'+(['setup','stats','review'].includes(S.view)?' narrow':'');switch(S.view){case'home':rHome(app);break;case'setup':rSetup(app);break;case'practice':rPrac(app);break;case'review':rRev(app);break;case'stats':rStat(app);break;case'vocab':rVoc(app);break}}

function rHome(app){
const tc={};QS.forEach(q=>{tc[q.g]=(tc[q.g]||0)+1});
app.appendChild(h('div',{style:{textAlign:'center',marginBottom:'40px'}},
h('div',{style:{fontSize:'12px',letterSpacing:'6px',color:'var(--p)',fontWeight:'600',marginBottom:'6px'}},'TOEIC READING · PART 5'),
h('h1',{style:{fontSize:'32px',fontWeight:'800',margin:'0 0 8px'}},'OG 題庫練習系統'),
h('p',{style:{color:'var(--tm)',fontSize:'14px',margin:'0'}},`共 ${QS.length} 題 · 文法與單字 · 詞性變化 · 連接詞/介系詞`)));
const grid=h('div',{className:'grid4',style:{marginBottom:'28px'}});
[{i:'📝',t:'開始練習',d:'自選題型題數',a:()=>{S.view='setup';render()}},{i:'🔄',t:'錯題重練',d:`${S.wrong.size} 題待加強`,a:()=>startP('w')},{i:'📊',t:'學習統計',d:'正確率趨勢',a:()=>{S.view='stats';render()}},{i:'🔤',t:'單字測驗',d:'隨機詞彙',a:startVQ}].forEach(x=>{grid.appendChild(h('div',{className:'card grid-card',onClick:x.a},h('div',{style:{fontSize:'30px',marginBottom:'8px'}},x.i),h('div',{style:{fontSize:'15px',fontWeight:'700',marginBottom:'3px'}},x.t),h('div',{style:{fontSize:'12px',color:'var(--tm)'}},x.d)))});

const info=h('div',{className:'card info-card'});

const tags=h('div',{style:{display:'flex',gap:'12px',flexWrap:'wrap',fontSize:'13px',color:'var(--tm)'}});
Object.entries(tc).forEach(([t,c])=>{tags.appendChild(h('span',{style:{background:'var(--pl)',padding:'4px 12px',borderRadius:'6px',border:'1px solid rgba(42,124,118,0.15)'}},`${t}：${c} 題`))});
info.appendChild(tags);
if(S.hist.length>0){const tot=S.hist.reduce((a,h)=>a+h.qs.length,0);info.appendChild(h('div',{style:{marginTop:'10px',fontSize:'12px',color:'var(--ac)'}},`⚡ 已完成 ${S.hist.length} 次練習 · ${tot} 題`))}
app.appendChild(info)}

ts.appendChild(tb);card.appendChild(ts);

ls.appendChild(lb);card.appendChild(ls);

function startP(mode,tags){
let pool=[...QS];
if(mode==='w'){pool=pool.filter(q=>S.wrong.has(q.i));if(!pool.length){alert('目前沒有錯題！');return}}
else if(mode==='t'&&tags&&tags.length)pool=pool.filter(q=>tags.includes(q.g));
const sh=shuffle(pool);S.pqs=S.limit>0?sh.slice(0,S.limit):sh;
S.ci=0;S.ans={};S.show=false;S.showT=false;S.pMode=mode;resetT();if(S.timerOn)startT();S.view='practice';render()}

function rPrac(app){
const cq=S.pqs[S.ci];if(!cq)return;const tot=S.pqs.length,pct=((S.ci+1)/tot)*100,ma=S.ans[cq.i]||null;
const bar=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px',padding:'10px 16px',background:'var(--cd)',borderRadius:'10px',border:'1px solid var(--bd)',flexWrap:'wrap',gap:'8px'}});
bar.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'12px'}},h('span',{className:'tag-badge'},cq.g||'Part 5'),h('span',{style:{fontSize:'13px',color:'var(--tm)'}},`${S.ci+1}/${tot}`),h('span',{style:{fontSize:'12px',color:'var(--tm)'}},`#${cq.i}`)));
const br=h('div',{style:{display:'flex',alignItems:'center',gap:'10px'}});
if(S.timerOn)br.appendChild(h('span',{id:'timer',style:{fontSize:'18px',fontWeight:'700',color:'var(--ac)',fontVariantNumeric:'tabular-nums'}},'⏱ '+fT(S.ts)));
br.appendChild(h('button',{className:'btn',style:{padding:'5px 12px',fontSize:'12px',color:'var(--ng)',borderColor:'var(--ng)'},onClick:finP},'結束'));
bar.appendChild(br);app.appendChild(bar);
const pg=h('div',{className:'progress-bar'});pg.appendChild(h('div',{className:'progress-fill',style:{width:pct+'%'}}));app.appendChild(pg);
const card=h('div',{className:'card fade-in'});
const qd=h('div',{style:{marginBottom:'22px',fontSize:'16px',fontWeight:'500',lineHeight:'1.9'}});renderCT(cq.q,qd);card.appendChild(qd);
const od=h('div',{style:{display:'flex',flexDirection:'column',gap:'8px',marginBottom:'22px'}});
Object.entries(cq.o).forEach(([k,v])=>{let cls='option-btn',cc='option-circle';if(S.show){cls+=' locked';if(k===cq.a){cls+=' correct';cc+=' ok'}else if(k===ma&&k!==cq.a)cls+=' wrong'}else if(k===ma){cls+=' selected';cc+=' sel'}
od.appendChild(h('button',{className:cls,onClick:()=>{if(S.show)return;S.ans[cq.i]=k;render()}},h('span',{className:cc},k),h('span',{},v)))});
card.appendChild(od);
const ad=h('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap'}});
if(!S.show){ad.appendChild(h('button',{style:{flex:'1',padding:'12px',borderRadius:'8px',border:'none',background:ma?'var(--p)':'#ccc',color:ma?'#fff':'#999',fontSize:'15px',fontWeight:'700',cursor:ma?'pointer':'not-allowed',fontFamily:'var(--fn)'},onClick:()=>{if(ma){S.show=true;render()}}},'確認答案'))}
else{if(S.ci>0)ad.appendChild(h('button',{className:'btn',onClick:()=>{S.ci--;S.show=false;S.showT=false;render()}},'←'));
ad.appendChild(h('button',{style:{flex:'1',padding:'12px',borderRadius:'8px',border:'none',background:'var(--p)',color:'#fff',fontSize:'15px',fontWeight:'700',cursor:'pointer',fontFamily:'var(--fn)'},onClick:()=>{if(S.ci<tot-1){S.ci++;S.show=false;S.showT=false;render()}else finP()}},S.ci<tot-1?'下一題 →':'查看結果'))}
card.appendChild(ad);
if(S.show){const ic=ma===cq.a;const ex=h('div',{className:'explanation '+(ic?'ok':'ng')});
ex.appendChild(h('div',{style:{fontSize:'14px',fontWeight:'700',color:ic?'var(--ok)':'var(--ac)',marginBottom:'8px'}},ic?'✅ 正確！':`❌ 正確答案：(${cq.a}) ${cq.o[cq.a]}`));
if(cq.t){const td=h('div',{style:{marginBottom:'10px'}});td.appendChild(h('button',{className:'btn',style:{padding:'4px 10px',fontSize:'12px'},onClick:()=>{S.showT=!S.showT;render()}},S.showT?'隱藏翻譯':'📝 顯示翻譯'));if(S.showT)td.appendChild(h('div',{className:'trans-block'},cq.t));ex.appendChild(td)}
if(cq.e)ex.appendChild(h('div',{style:{fontSize:'14px',lineHeight:'1.8',whiteSpace:'pre-wrap'}},cq.e));card.appendChild(ex)}
app.appendChild(card)}

function finP(){stopT();const res={d:new Date().toISOString(),tm:S.ts,m:S.pMode,qs:S.pqs.map(q=>({id:q.i,tag:q.g,u:S.ans[q.i]||null,c:S.ans[q.i]===q.a}))};S.hist.push(res);LS('hist',S.hist);res.qs.forEach(r=>{if(!r.c&&r.u)S.wrong.add(r.id);else if(r.c)S.wrong.delete(r.id)});LS('wrong',[...S.wrong]);S.view='review';render()}

function rRev(app){
const lr=S.hist[S.hist.length-1];if(!lr)return;const cor=lr.qs.filter(q=>q.c).length,tot=lr.qs.length,pct=Math.round((cor/tot)*100);
const bt={};lr.qs.forEach(q=>{if(!bt[q.tag])bt[q.tag]={c:0,t:0};bt[q.tag].t++;if(q.c)bt[q.tag].c++});
const top=h('div',{className:'card',style:{textAlign:'center',marginBottom:'20px'}});
top.appendChild(h('div',{style:{fontSize:'13px',color:'var(--tm)',marginBottom:'6px'}},'測驗結果'));
top.appendChild(h('div',{style:{fontSize:'52px',fontWeight:'800',color:pct>=80?'var(--ok)':pct>=60?'var(--ac)':'var(--ng)'}},pct+'%'));
top.appendChild(h('div',{style:{fontSize:'14px',color:'var(--tm)',marginBottom:'14px'}},`${cor}/${tot} 正確`+(lr.tm>0?` · ${Math.floor(lr.tm/60)}分${lr.tm%60}秒`:'')));
const tr=h('div',{style:{display:'flex',justifyContent:'center',gap:'14px',flexWrap:'wrap'}});
Object.entries(bt).forEach(([t,s])=>{tr.appendChild(h('div',{style:{padding:'6px 14px',background:'var(--pl)',borderRadius:'6px',fontSize:'13px'}},h('div',{style:{fontWeight:'600',color:'var(--p)'}},t),h('div',{style:{color:'var(--tm)'}},`${s.c}/${s.t}`)))});
top.appendChild(tr);app.appendChild(top);
const det=h('div',{className:'card'});det.appendChild(h('div',{style:{fontSize:'14px',fontWeight:'700',marginBottom:'14px'}},'逐題檢視'));
const list=h('div',{style:{maxHeight:'400px',overflowY:'auto'}});
lr.qs.forEach((q,i)=>{const row=h('div',{className:'review-row',style:{borderBottom:i<tot-1?'1px solid var(--bd)':'none'}});
row.appendChild(h('span',{className:'review-icon',style:{background:q.c?'var(--okl)':'var(--ngl)',color:q.c?'var(--ok)':'var(--ng)'}},q.c?'✓':'✗'));
row.appendChild(h('span',{style:{fontSize:'12px',color:'var(--tm)',flex:'1'}},`#${q.id}`));
const a=h('span',{style:{fontSize:'12px'}});a.appendChild(h('b',{style:{color:q.c?'var(--ok)':'var(--ng)'}},q.u||'—'));
if(!q.c){const f=QS.find(x=>x.i===q.id);a.appendChild(h('span',{style:{color:'var(--ok)',marginLeft:'6px'}},`→ ${f?f.a:'?'}`))}
row.appendChild(a);list.appendChild(row)});det.appendChild(list);app.appendChild(det);
const btns=h('div',{style:{display:'flex',gap:'10px',marginTop:'20px'}});
btns.appendChild(h('button',{className:'btn',style:{flex:'1'},onClick:()=>{S.view='home';render()}},'返回首頁'));
btns.appendChild(h('button',{className:'btn active',style:{flex:'1'},onClick:()=>{S.view='setup';render()}},'再練一次'));
app.appendChild(btns)}

function rStat(app){
app.appendChild(h('button',{className:'btn',style:{marginBottom:'20px',padding:'6px 14px',fontSize:'13px'},onClick:()=>{S.view='home';render()}},'← 返回'));
if(!S.hist.length){const e=h('div',{className:'card',style:{textAlign:'center',padding:'48px'}});e.appendChild(h('div',{style:{fontSize:'44px',marginBottom:'12px'}},'📊'));e.appendChild(h('div',{style:{fontSize:'17px',fontWeight:'700',marginBottom:'6px'}},'尚無統計資料'));e.appendChild(h('div',{style:{fontSize:'13px',color:'var(--tm)'}},'完成練習後即可查看'));app.appendChild(e);return}
const all=S.hist.flatMap(h=>h.qs),cor=all.filter(q=>q.c).length;
const bt={};all.forEach(q=>{if(!bt[q.tag])bt[q.tag]={c:0,t:0};bt[q.tag].t++;if(q.c)bt[q.tag].c++});
const top=h('div',{className:'card',style:{textAlign:'center',marginBottom:'16px'}});
top.appendChild(h('div',{style:{fontSize:'13px',color:'var(--tm)',marginBottom:'4px'}},'整體正確率'));
top.appendChild(h('div',{style:{fontSize:'48px',fontWeight:'800',color:'var(--p)'}},Math.round((cor/all.length)*100)+'%'));
top.appendChild(h('div',{style:{fontSize:'13px',color:'var(--tm)'}},`${S.hist.length} 次練習 · ${all.length} 題`));app.appendChild(top);
const tc=h('div',{className:'card'});tc.appendChild(h('div',{style:{fontSize:'14px',fontWeight:'700',marginBottom:'14px'}},'各類正確率'));
Object.entries(bt).forEach(([t,s])=>{const p=Math.round((s.c/s.t)*100);const row=h('div',{style:{marginBottom:'14px'}});
const hd=h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'13px',marginBottom:'5px'}});hd.appendChild(h('span',{style:{fontWeight:'600'}},t));hd.appendChild(h('span',{style:{color:'var(--tm)'}},`${p}% (${s.c}/${s.t})`));row.appendChild(hd);
const bar=h('div',{className:'stat-bar'});bar.appendChild(h('div',{className:'stat-fill',style:{width:p+'%',background:p>=80?'var(--ok)':p>=60?'var(--ac)':'var(--ng)'}}));row.appendChild(bar);tc.appendChild(row)});app.appendChild(tc);
const wc=h('div',{className:'card',style:{marginTop:'16px'}});wc.appendChild(h('div',{style:{fontSize:'14px',fontWeight:'700',marginBottom:'6px'}},'待加強'));
wc.appendChild(h('div',{style:{fontSize:'13px',color:'var(--tm)'}},S.wrong.size>0?`共 ${S.wrong.size} 題曾答錯`:'沒有錯題 🎉'));
if(S.wrong.size>0)wc.appendChild(h('button',{className:'btn accent',style:{marginTop:'10px'},onClick:()=>startP('w')},'🔄 錯題重練'));app.appendChild(wc)}

function startVQ(){if(QS.length<4)return;const pool=shuffle(QS).slice(0,30);const q=pool[0];const opts=[q.o.A,q.o.B,q.o.C,q.o.D].filter(Boolean);if(opts.length<4){startVQ();return}S.vq={stem:q.q.slice(0,100),opts:shuffle(opts),cor:q.o[q.a],id:q.i};S.va=null;S.view='vocab';render()}

function rVoc(app){if(!S.vq)return;
const hd=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px'}});
hd.appendChild(h('button',{className:'btn',style:{padding:'6px 14px',fontSize:'13px'},onClick:()=>{S.view='home';render()}},'← 返回'));
if(S.vs.t>0)hd.appendChild(h('div',{style:{fontSize:'13px',color:'var(--tm)'}},`${S.vs.c}/${S.vs.t} 正確`));app.appendChild(hd);
const card=h('div',{className:'card'});
card.appendChild(h('div',{style:{fontSize:'14px',fontWeight:'600',color:'var(--p)',marginBottom:'4px'}},'單字測驗'));
card.appendChild(h('div',{style:{fontSize:'12px',color:'var(--tm)',marginBottom:'20px'}},'選出最適合的答案'));
card.appendChild(h('div',{style:{fontSize:'14px',lineHeight:'1.8',marginBottom:'20px',padding:'12px 16px',background:'var(--pl)',borderRadius:'8px',borderLeft:'3px solid var(--p)'}},S.vq.stem+'...'));
const od=h('div',{style:{display:'flex',flexDirection:'column',gap:'8px',marginBottom:'18px'}});
S.vq.opts.forEach(o=>{let cls='option-btn';if(S.va!==null){cls+=' locked';if(o===S.vq.cor)cls+=' correct';else if(o===S.va&&o!==S.vq.cor)cls+=' wrong'}
od.appendChild(h('button',{className:cls,onClick:()=>{if(S.va!==null)return;S.va=o;S.vs.t++;if(o===S.vq.cor)S.vs.c++;render()}},o))});card.appendChild(od);
if(S.va!==null)card.appendChild(h('button',{style:{width:'100%',padding:'12px',borderRadius:'8px',border:'none',background:'var(--p)',color:'#fff',fontSize:'15px',fontWeight:'700',cursor:'pointer',fontFamily:'var(--fn)'},onClick:startVQ},'下一題'));
app.appendChild(card)}

async function init(){try{const hi=LG('hist');if(hi)S.hist=hi;const w=LG('wrong');if(w)S.wrong=new Set(w);const json=await decompressData(QS_B64);QS=JSON.parse(json);console.log('Loaded '+QS.length+' questions');render()}catch(err){document.getElementById('app').innerHTML='<div style="text-align:center;padding:60px 20px"><div style="font-size:48px;margin-bottom:16px">⚠️</div><div style="font-size:18px;font-weight:700;color:var(--ng);margin-bottom:8px">載入失敗</div><div style="font-size:14px;color:var(--tm)">'+err.message+'</div></div>'}}
init();
</script>
