<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TOEIC OG 題庫練習系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f1a; --cd: #1a1a2e; --p: #5CB8B2; --pd: #3d8a85;
  --ac: #E8B86D; --ok: #4ADE80; --ng: #F87171;
  --tx: #e0e0e0; --tm: #888; --bd: #2a2a45;
  --fn: 'Outfit','Noto Sans TC',sans-serif;
  color-scheme: dark;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--tx); font-family: var(--fn); min-height: 100vh; }
button { font-family: var(--fn); }
.card { background: var(--cd); border-radius: 14px; padding: 22px 24px; border: 1px solid var(--bd); box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
.btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: 1.5px solid var(--bd); background: var(--cd); color: var(--tx); }
.btn:hover { border-color: var(--p); }
.btn.active { border-color: var(--p); background: var(--p); color: #0f0f1a; }
.btn.accent { border-color: var(--ac); background: var(--ac); color: #0f0f1a; }
.container { max-width: 760px; margin: 0 auto; padding: 28px 20px 48px; }
.narrow { max-width: 560px; }
.grid4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 14px; }
.grid-card { cursor: pointer; text-align: center; transition: all 0.2s; }
.grid-card:hover { border-color: var(--p); transform: translateY(-3px); }
.tag-badge { font-size: 12px; font-weight: 600; color: #0f0f1a; background: var(--p); padding: 3px 10px; border-radius: 5px; display: inline-block; }
.progress-bar { height: 3px; background: var(--bd); border-radius: 2px; overflow: hidden; margin-bottom: 20px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--p), var(--ac)); border-radius: 2px; transition: width 0.3s; }
.option-btn { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 8px; border: 1.5px solid var(--bd); background: var(--cd); cursor: pointer; text-align: left; font-family: var(--fn); font-size: 15px; color: var(--tx); transition: all 0.15s; line-height: 1.5; width: 100%; }
.option-btn:hover:not(.locked) { border-color: var(--p); }
.option-btn.selected { background: rgba(92,184,178,0.1); border-color: var(--p); }
.option-btn.correct { background: rgba(74,222,128,0.1); border-color: var(--ok); color: var(--ok); }
.option-btn.wrong { background: rgba(248,113,113,0.1); border-color: var(--ng); color: var(--ng); }
.option-circle { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; font-size: 12px; font-weight: 700; border: 1.5px solid var(--bd); color: var(--tm); }
.option-circle.sel { background: var(--p); color: #0f0f1a; border-color: var(--p); }
.option-circle.ok { background: var(--ok); color: #0f0f1a; border-color: var(--ok); }
.clickable-word { cursor: pointer; border-bottom: 1px dotted rgba(92,184,178,0.25); transition: color 0.15s; }
.clickable-word:hover { color: var(--p); }
.explanation { margin-top: 18px; padding: 18px; border-radius: 10px; }
.explanation.ok { background: rgba(74,222,128,0.06); border: 1px solid rgba(74,222,128,0.2); }
.explanation.ng { background: rgba(232,184,109,0.06); border: 1px solid rgba(232,184,109,0.2); }
.trans-block { margin-top: 8px; padding: 10px 14px; background: rgba(92,184,178,0.05); border-radius: 8px; font-size: 13px; line-height: 1.8; color: var(--tm); white-space: pre-wrap; border-left: 3px solid var(--p); }
.stat-bar { height: 6px; background: var(--bd); border-radius: 3px; overflow: hidden; }
.stat-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.review-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
.review-icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
.popup { position: fixed; z-index: 9999; background: #1a1a2e; border: 1px solid rgba(92,184,178,0.4); border-radius: 10px; padding: 14px 18px; max-width: 270px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); color: #e0e0e0; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.25s ease-out; }
@media (max-width: 480px) {
  .container { padding: 16px 14px 40px; }
  .card { padding: 18px 16px; }
  h1 { font-size: 26px !important; }
}
</style>
</head>

function decompressData(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const ds = new DecompressionStream('gzip');
  const reader = new Response(new Blob([bytes]).stream().pipeThrough(ds)).text();
  return reader;
}

// ═══ App State ═══
let QS = [];
let state = {
  view: 'home', selTags: [], limit: 30, timerOn: false,
  pqs: [], ci: 0, ans: {}, show: false, showT: false, pMode: 'n',
  hist: [], wrong: new Set(), timerSec: 0, timerRunning: false,
  vq: null, va: null, vs: { c: 0, t: 0 },
  wp: null
};
let timerInterval = null;

function LS(key, val) { try { localStorage.setItem('toeic_' + key, JSON.stringify(val)); } catch {} }
function LG(key) { try { const v = localStorage.getItem('toeic_' + key); return v ? JSON.parse(v) : null; } catch { return null; } }

// ═══ Timer ═══
function startTimer() { if (!state.timerOn) return; state.timerRunning = true; timerInterval = setInterval(() => { state.timerSec++; updateTimerDisplay(); }, 1000); }
function stopTimer() { state.timerRunning = false; clearInterval(timerInterval); }
function resetTimer() { stopTimer(); state.timerSec = 0; }
function fmtTime(s) { return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0'); }
function updateTimerDisplay() { const el = document.getElementById('timer'); if (el) el.textContent = '⏱ ' + fmtTime(state.timerSec); }

// ═══ Shuffle ═══
function shuffle(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

// ═══ Render Helpers ═══
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'className') el.className = v;
    else if (k === 'innerHTML') el.innerHTML = v;
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => { if (c != null) el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
  return el;
}

function renderClickableText(text, container) {
  container.innerHTML = '';
  (text || '').split(/(\s+|[^a-zA-Z\'-]+)/).forEach(seg => {
    if (/^[a-zA-Z\'-]{2,}$/.test(seg)) {
      const sp = document.createElement('span');
      sp.className = 'clickable-word';
      sp.textContent = seg;
      sp.dataset.w = seg;
      sp.addEventListener('click', (e) => {
        e.stopPropagation();
        showWordPopup(seg, e.clientX, e.clientY);
      });
      container.appendChild(sp);
    } else {
      container.appendChild(document.createTextNode(seg));
    }
  });
}

function showWordPopup(word, x, y) {
  closeWordPopup();
  const popup = h('div', { className: 'popup fade-in', style: {
    left: Math.min(x, window.innerWidth - 280) + 'px',
    top: Math.min(y + 12, window.innerHeight - 160) + 'px'
  }},
    h('div', { style: { display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'6px' }},
      h('span', { style: { fontSize:'18px', fontWeight:'700', color:'var(--p)' }}, word),
      h('button', { style: { background:'none', border:'none', color:'#666', fontSize:'16px', cursor:'pointer', padding:'0' }, onClick: closeWordPopup }, '✕')
    ),
    h('div', { style: { fontSize:'13px', color:'#999', lineHeight:'1.6' }}, '單字查詢功能將在 AI 模組啟用後提供翻譯、詞性與例句。')
  );
  popup.id = 'word-popup';
  document.body.appendChild(popup);
  state.wp = word;
}

function closeWordPopup() {
  const existing = document.getElementById('word-popup');
  if (existing) existing.remove();
  state.wp = null;
}

document.addEventListener('click', (e) => {
  if (state.wp && !e.target.closest('#word-popup') && !e.target.classList.contains('clickable-word')) closeWordPopup();
});

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  app.className = 'container' + ((['setup','stats','review'].includes(state.view)) ? ' narrow' : '');
  
  switch(state.view) {
    case 'home': renderHome(app); break;
    case 'setup': renderSetup(app); break;
    case 'practice': renderPractice(app); break;
    case 'review': renderReview(app); break;
    case 'stats': renderStats(app); break;
    case 'vocab': renderVocab(app); break;
  }
}

function startPractice(mode, tags) {
  let pool = [...QS];
  if (mode === 'w') { pool = pool.filter(q => state.wrong.has(q.i)); if (!pool.length) { alert('目前沒有錯題！'); return; } }
  else if (mode === 't' && tags && tags.length) pool = pool.filter(q => tags.includes(q.g));
  const sh = shuffle(pool);
  state.pqs = state.limit > 0 ? sh.slice(0, state.limit) : sh;
  state.ci = 0; state.ans = {}; state.show = false; state.showT = false; state.pMode = mode;
  resetTimer(); if (state.timerOn) startTimer();
  state.view = 'practice'; render();
}

function renderPractice(app) {
  const cq = state.pqs[state.ci];
  if (!cq) return;
  const tot = state.pqs.length, pct = ((state.ci+1)/tot)*100;
  const ma = state.ans[cq.i] || null;
  
  // Top bar
  const bar = h('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'16px', padding:'10px 16px', background:'var(--cd)', borderRadius:'10px', border:'1px solid var(--bd)', flexWrap:'wrap', gap:'8px' }});
  bar.appendChild(h('div', { style:{ display:'flex', alignItems:'center', gap:'12px' }},
    h('span', { className:'tag-badge' }, cq.g || 'Part 5'),
    h('span', { style:{ fontSize:'13px', color:'var(--tm)' }}, `${state.ci+1}/${tot}`),
    h('span', { style:{ fontSize:'12px', color:'var(--tm)' }}, `#${cq.i}`)
  ));
  const barR = h('div', { style:{ display:'flex', alignItems:'center', gap:'10px' }});
  if (state.timerOn) barR.appendChild(h('span', { id:'timer', style:{ fontSize:'18px', fontWeight:'700', color:'var(--ac)', fontVariantNumeric:'tabular-nums' }}, '⏱ ' + fmtTime(state.timerSec)));
  barR.appendChild(h('button', { className:'btn', style:{ padding:'5px 12px', fontSize:'12px', color:'var(--ng)', borderColor:'var(--ng)' }, onClick: finishPractice }, '結束'));
  bar.appendChild(barR);
  app.appendChild(bar);
  
  // Progress
  const prog = h('div', { className:'progress-bar' });
  prog.appendChild(h('div', { className:'progress-fill', style:{ width: pct+'%' }}));
  app.appendChild(prog);
  
  // Question card
  const card = h('div', { className:'card fade-in' });
  
  // Question text
  const qDiv = h('div', { style:{ marginBottom:'22px', fontSize:'16px', fontWeight:'500', lineHeight:'1.9' }});
  renderClickableText(cq.q, qDiv);
  card.appendChild(qDiv);
  
  // Options
  const optDiv = h('div', { style:{ display:'flex', flexDirection:'column', gap:'8px', marginBottom:'22px' }});
  Object.entries(cq.o).forEach(([k, v]) => {
    let cls = 'option-btn';
    let circleCls = 'option-circle';
    if (state.show) {
      cls += ' locked';
      if (k === cq.a) { cls += ' correct'; circleCls += ' ok'; }
      else if (k === ma && k !== cq.a) { cls += ' wrong'; }
    } else if (k === ma) { cls += ' selected'; circleCls += ' sel'; }
    
    const btn = h('button', { className: cls, onClick: () => {
      if (state.show) return;
      state.ans[cq.i] = k; render();
    }}, h('span', { className: circleCls }, k), h('span', {}, v));
    optDiv.appendChild(btn);
  });
  card.appendChild(optDiv);
  
  // Action buttons
  const actDiv = h('div', { style:{ display:'flex', gap:'8px', flexWrap:'wrap' }});
  if (!state.show) {
    actDiv.appendChild(h('button', {
      style: { flex:'1', padding:'12px', borderRadius:'8px', border:'none', background: ma ? 'var(--p)' : '#333', color: ma ? '#0f0f1a' : '#666', fontSize:'15px', fontWeight:'700', cursor: ma ? 'pointer' : 'not-allowed', fontFamily:'var(--fn)' },
      onClick: () => { if (ma) { state.show = true; render(); } }
    }, '確認答案'));
  } else {
    if (state.ci > 0) actDiv.appendChild(h('button', { className:'btn', onClick: () => { state.ci--; state.show=false; state.showT=false; render(); }}, '←'));
    actDiv.appendChild(h('button', {
      style: { flex:'1', padding:'12px', borderRadius:'8px', border:'none', background:'var(--p)', color:'#0f0f1a', fontSize:'15px', fontWeight:'700', cursor:'pointer', fontFamily:'var(--fn)' },
      onClick: () => { if (state.ci < tot-1) { state.ci++; state.show=false; state.showT=false; render(); } else finishPractice(); }
    }, state.ci < tot-1 ? '下一題 →' : '查看結果'));
  }
  card.appendChild(actDiv);
  
  // Explanation
  if (state.show) {
    const isCorrect = ma === cq.a;
    const expl = h('div', { className: 'explanation ' + (isCorrect ? 'ok' : 'ng') });
    expl.appendChild(h('div', { style:{ fontSize:'14px', fontWeight:'700', color: isCorrect ? 'var(--ok)' : 'var(--ac)', marginBottom:'8px' }},
      isCorrect ? '✅ 正確！' : `❌ 正確答案：(${cq.a}) ${cq.o[cq.a]}`));
    
    if (cq.t) {
      const transDiv = h('div', { style:{ marginBottom:'10px' }});
      transDiv.appendChild(h('button', { className:'btn', style:{ padding:'4px 10px', fontSize:'12px' }, onClick: () => { state.showT = !state.showT; render(); }},
        state.showT ? '隱藏翻譯' : '📝 顯示翻譯'));
      if (state.showT) {
        transDiv.appendChild(h('div', { className:'trans-block' }, cq.t));
      }
      expl.appendChild(transDiv);
    }
    if (cq.e) {
      expl.appendChild(h('div', { style:{ fontSize:'14px', lineHeight:'1.8', whiteSpace:'pre-wrap' }}, cq.e));
    }
    card.appendChild(expl);
  }
  
  app.appendChild(card);
}

function finishPractice() {
  stopTimer();
  const res = { d: new Date().toISOString(), tm: state.timerSec, m: state.pMode,
    qs: state.pqs.map(q => ({ id: q.i, tag: q.g, u: state.ans[q.i]||null, c: state.ans[q.i]===q.a }))
  };
  state.hist.push(res);
  LS('hist', state.hist);
  res.qs.forEach(r => { if (!r.c && r.u) state.wrong.add(r.id); else if (r.c) state.wrong.delete(r.id); });
  LS('wrong', [...state.wrong]);
  state.view = 'review'; render();
}

function renderReview(app) {
  const lr = state.hist[state.hist.length - 1];
  if (!lr) return;
  const cor = lr.qs.filter(q=>q.c).length, tot = lr.qs.length, pct = Math.round((cor/tot)*100);
  const bt = {}; lr.qs.forEach(q => { if(!bt[q.tag]) bt[q.tag]={c:0,t:0}; bt[q.tag].t++; if(q.c) bt[q.tag].c++; });
  
  const top = h('div', { className:'card', style:{ textAlign:'center', marginBottom:'20px' }});
  top.appendChild(h('div', { style:{ fontSize:'13px', color:'var(--tm)', marginBottom:'6px' }}, '測驗結果'));
  top.appendChild(h('div', { style:{ fontSize:'52px', fontWeight:'800', color: pct>=80?'var(--ok)':pct>=60?'var(--ac)':'var(--ng)' }}, pct+'%'));
  top.appendChild(h('div', { style:{ fontSize:'14px', color:'var(--tm)', marginBottom:'14px' }}, `${cor}/${tot} 正確` + (lr.tm>0 ? ` · ${Math.floor(lr.tm/60)}分${lr.tm%60}秒` : '')));
  const tagRow = h('div', { style:{ display:'flex', justifyContent:'center', gap:'14px', flexWrap:'wrap' }});
  Object.entries(bt).forEach(([t,s]) => {
    tagRow.appendChild(h('div', { style:{ padding:'6px 14px', background:'rgba(92,184,178,0.08)', borderRadius:'6px', fontSize:'13px' }},
      h('div', { style:{ fontWeight:'600', color:'var(--p)' }}, t),
      h('div', { style:{ color:'var(--tm)' }}, `${s.c}/${s.t}`)
    ));
  });
  top.appendChild(tagRow);
  app.appendChild(top);
  
  const detail = h('div', { className:'card' });
  detail.appendChild(h('div', { style:{ fontSize:'14px', fontWeight:'700', marginBottom:'14px' }}, '逐題檢視'));
  const list = h('div', { style:{ maxHeight:'400px', overflowY:'auto' }});
  lr.qs.forEach((q,i) => {
    const row = h('div', { className:'review-row', style:{ borderBottom: i<tot-1?'1px solid var(--bd)':'none' }});
    row.appendChild(h('span', { className:'review-icon', style:{ background: q.c?'rgba(74,222,128,0.15)':'rgba(248,113,113,0.15)', color: q.c?'var(--ok)':'var(--ng)' }}, q.c?'✓':'✗'));
    row.appendChild(h('span', { style:{ fontSize:'12px', color:'var(--tm)', flex:'1' }}, `#${q.id}`));
    const ans = h('span', { style:{ fontSize:'12px' }});
    ans.appendChild(h('b', { style:{ color: q.c?'var(--ok)':'var(--ng)' }}, q.u||'—'));
    if (!q.c) { const found = QS.find(x=>x.i===q.id); ans.appendChild(h('span', { style:{ color:'var(--ok)', marginLeft:'6px' }}, `→ ${found?found.a:'?'}`)); }
    row.appendChild(ans);
    list.appendChild(row);
  });
  detail.appendChild(list);
  app.appendChild(detail);
  
  const btns = h('div', { style:{ display:'flex', gap:'10px', marginTop:'20px' }});
  btns.appendChild(h('button', { className:'btn', style:{ flex:'1' }, onClick:()=>{ state.view='home'; render(); }}, '返回首頁'));
  btns.appendChild(h('button', { className:'btn active', style:{ flex:'1' }, onClick:()=>{ state.view='setup'; render(); }}, '再練一次'));
  app.appendChild(btns);
}

function renderStats(app) {
  app.appendChild(h('button', { className:'btn', style:{ marginBottom:'20px', padding:'6px 14px', fontSize:'13px' }, onClick:()=>{ state.view='home'; render(); }}, '← 返回'));
  
  if (!state.hist.length) {
    const empty = h('div', { className:'card', style:{ textAlign:'center', padding:'48px' }});
    empty.appendChild(h('div', { style:{ fontSize:'44px', marginBottom:'12px' }}, '📊'));
    empty.appendChild(h('div', { style:{ fontSize:'17px', fontWeight:'700', marginBottom:'6px' }}, '尚無統計資料'));
    empty.appendChild(h('div', { style:{ fontSize:'13px', color:'var(--tm)' }}, '完成練習後即可查看'));
    app.appendChild(empty); return;
  }
  
  const all = state.hist.flatMap(h=>h.qs), cor = all.filter(q=>q.c).length;
  const bt = {}; all.forEach(q => { if(!bt[q.tag]) bt[q.tag]={c:0,t:0}; bt[q.tag].t++; if(q.c) bt[q.tag].c++; });
  
  const top = h('div', { className:'card', style:{ textAlign:'center', marginBottom:'16px' }});
  top.appendChild(h('div', { style:{ fontSize:'13px', color:'var(--tm)', marginBottom:'4px' }}, '整體正確率'));
  top.appendChild(h('div', { style:{ fontSize:'48px', fontWeight:'800', color:'var(--p)' }}, Math.round((cor/all.length)*100)+'%'));
  top.appendChild(h('div', { style:{ fontSize:'13px', color:'var(--tm)' }}, `${state.hist.length} 次練習 · ${all.length} 題`));
  app.appendChild(top);
  
  const tagCard = h('div', { className:'card' });
  tagCard.appendChild(h('div', { style:{ fontSize:'14px', fontWeight:'700', marginBottom:'14px' }}, '各類正確率'));
  Object.entries(bt).forEach(([t,s]) => {
    const p = Math.round((s.c/s.t)*100);
    const row = h('div', { style:{ marginBottom:'14px' }});
    const header = h('div', { style:{ display:'flex', justifyContent:'space-between', fontSize:'13px', marginBottom:'5px' }});
    header.appendChild(h('span', { style:{ fontWeight:'600' }}, t));
    header.appendChild(h('span', { style:{ color:'var(--tm)' }}, `${p}% (${s.c}/${s.t})`));
    row.appendChild(header);
    const bar = h('div', { className:'stat-bar' });
    bar.appendChild(h('div', { className:'stat-fill', style:{ width:p+'%', background: p>=80?'var(--ok)':p>=60?'var(--ac)':'var(--ng)' }}));
    row.appendChild(bar);
    tagCard.appendChild(row);
  });
  app.appendChild(tagCard);
  
  const wrongCard = h('div', { className:'card', style:{ marginTop:'16px' }});
  wrongCard.appendChild(h('div', { style:{ fontSize:'14px', fontWeight:'700', marginBottom:'6px' }}, '待加強'));
  wrongCard.appendChild(h('div', { style:{ fontSize:'13px', color:'var(--tm)' }}, state.wrong.size > 0 ? `共 ${state.wrong.size} 題曾答錯` : '沒有錯題 🎉'));
  if (state.wrong.size > 0) wrongCard.appendChild(h('button', { className:'btn accent', style:{ marginTop:'10px' }, onClick:()=>startPractice('w') }, '🔄 錯題重練'));
  app.appendChild(wrongCard);
}

function startVocabQuiz() {
  if (QS.length < 4) return;
  const pool = shuffle(QS).slice(0, 30);
  const q = pool[0];
  const opts = [q.o.A, q.o.B, q.o.C, q.o.D].filter(Boolean);
  if (opts.length < 4) { startVocabQuiz(); return; }
  state.vq = { stem: q.q.slice(0, 100), opts: shuffle(opts), cor: q.o[q.a], id: q.i };
  state.va = null; state.view = 'vocab'; render();
}

function renderVocab(app) {
  if (!state.vq) return;
  const hdr = h('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px' }});
  hdr.appendChild(h('button', { className:'btn', style:{ padding:'6px 14px', fontSize:'13px' }, onClick:()=>{ state.view='home'; render(); }}, '← 返回'));
  if (state.vs.t > 0) hdr.appendChild(h('div', { style:{ fontSize:'13px', color:'var(--tm)' }}, `${state.vs.c}/${state.vs.t} 正確`));
  app.appendChild(hdr);
  
  const card = h('div', { className:'card' });
  card.appendChild(h('div', { style:{ fontSize:'14px', fontWeight:'600', color:'var(--p)', marginBottom:'4px' }}, '單字測驗'));
  card.appendChild(h('div', { style:{ fontSize:'12px', color:'var(--tm)', marginBottom:'20px' }}, '選出最適合的答案'));
  card.appendChild(h('div', { style:{ fontSize:'14px', lineHeight:'1.8', marginBottom:'20px', padding:'12px 16px', background:'rgba(92,184,178,0.05)', borderRadius:'8px', borderLeft:'3px solid var(--p)' }}, state.vq.stem + '...'));
  
  const optDiv = h('div', { style:{ display:'flex', flexDirection:'column', gap:'8px', marginBottom:'18px' }});
  state.vq.opts.forEach(o => {
    let cls = 'option-btn';
    if (state.va !== null) {
      cls += ' locked';
      if (o === state.vq.cor) cls += ' correct';
      else if (o === state.va && o !== state.vq.cor) cls += ' wrong';
    }
    optDiv.appendChild(h('button', { className: cls, onClick: () => {
      if (state.va !== null) return;
      state.va = o;
      state.vs.t++; if (o === state.vq.cor) state.vs.c++;
      render();
    }}, o));
  });
  card.appendChild(optDiv);
  
  if (state.va !== null) {
    card.appendChild(h('button', {
      style:{ width:'100%', padding:'12px', borderRadius:'8px', border:'none', background:'var(--p)', color:'#0f0f1a', fontSize:'15px', fontWeight:'700', cursor:'pointer', fontFamily:'var(--fn)' },
      onClick: startVocabQuiz
    }, '下一題'));
  }
  app.appendChild(card);
}

// ═══ INIT ═══
async function init() {
  try {
    // Load history from localStorage
    const h = LG('hist'); if (h) state.hist = h;
    const w = LG('wrong'); if (w) state.wrong = new Set(w);
    
    // Decompress embedded questions
    const json = await decompressData(QS_B64);
    const raw = JSON.parse(json);
    QS = raw.map(q => ({ i:q.i, g:q.g, q:q.q, o:q.o, a:q.a, e:q.e, t:q.t }));
    console.log('Loaded ' + QS.length + ' questions');
    render();
  } catch (err) {
    document.getElementById('app').innerHTML = '<div style="text-align:center;padding:60px 20px"><div style="font-size:48px;margin-bottom:16px">⚠️</div><div style="font-size:18px;font-weight:700;color:var(--ng);margin-bottom:8px">載入失敗</div><div style="font-size:14px;color:var(--tm)">' + err.message + '</div></div>';
  }
}

init();
</script>
