<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f3ef">
<title>TOEIC OG 題庫練習系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f3ef;
  --cd: #ffffff;
  --p: #2a7c76;
  --pd: #1f5e59;
  --pl: #e8f5f3;
  --ac: #c4873b;
  --acl: #fdf3e7;
  --ok: #2e8b57;
  --okl: #edf7f0;
  --ng: #c9463d;
  --ngl: #fdf0ef;
  --tx: #1a1a1a;
  --tm: #777;
  --bd: #e2dfd8;
  --fn: 'DM Sans','Noto Sans TC',sans-serif;
  color-scheme: light;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:var(--fn);min-height:100vh;overflow-x:hidden}
button,select,input{font-family:var(--fn)}
a{color:inherit;text-decoration:none}

/* Layout */
.container{max-width:780px;margin:0 auto;padding:28px 20px 60px}
.narrow{max-width:560px;margin:0 auto}
.wide{max-width:1000px;margin:0 auto;padding:28px 20px 60px}

/* Cards */
.card{background:var(--cd);border-radius:14px;padding:22px 24px;border:1px solid var(--bd);box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card-hover{cursor:pointer;transition:all .2s}
.card-hover:hover{border-color:var(--p);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.08)}

/* Buttons */
.btn{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid var(--bd);background:var(--cd);color:var(--tx);display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--p);color:var(--p)}
.btn.primary{border-color:var(--p);background:var(--p);color:#fff}
.btn.primary:hover{background:var(--pd);border-color:var(--pd)}
.btn.accent{border-color:var(--ac);background:var(--ac);color:#fff}
.btn.accent:hover{filter:brightness(1.05)}
.btn.danger{border-color:var(--ng);background:var(--ng);color:#fff}
.btn.sm{padding:6px 14px;font-size:13px}
.btn.lg{padding:13px 28px;font-size:16px;border-radius:10px}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* Nav */
#nav{position:sticky;top:0;z-index:100;background:rgba(245,243,239,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:0 20px}
.nav-inner{max-width:780px;margin:0 auto;display:flex;align-items:center;gap:4px;height:52px;overflow-x:auto;scrollbar-width:none}
.nav-inner::-webkit-scrollbar{display:none}
.nav-tab{padding:6px 14px;border-radius:7px;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;background:none;border:none;color:var(--tm)}
.nav-tab:hover{color:var(--tx);background:var(--bd)}
.nav-tab.active{color:var(--p);background:var(--pl);font-weight:600}
.nav-logo{font-size:15px;font-weight:800;color:var(--p);margin-right:8px;white-space:nowrap;letter-spacing:-.3px}

/* Progress bar */
.progress-bar{height:3px;background:var(--bd);border-radius:2px;overflow:hidden;margin-bottom:20px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--ac));border-radius:2px;transition:width .4s}

/* Option buttons */
.option-btn{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:9px;border:1.5px solid var(--bd);background:var(--cd);cursor:pointer;text-align:left;font-size:15px;color:var(--tx);transition:all .15s;line-height:1.5;width:100%}
.option-btn:hover:not(.locked){border-color:var(--p);background:var(--pl)}
.option-btn.selected{background:var(--pl);border-color:var(--p)}
.option-btn.correct{background:var(--okl);border-color:var(--ok);color:var(--ok)}
.option-btn.wrong{background:var(--ngl);border-color:var(--ng);color:var(--ng)}
.option-btn.locked{cursor:default}
.option-circle{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;flex-shrink:0;font-size:12px;font-weight:700;border:1.5px solid var(--bd);color:var(--tm);transition:all .15s}
.option-circle.sel{background:var(--p);color:#fff;border-color:var(--p)}
.option-circle.ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.option-circle.ng{background:var(--ng);color:#fff;border-color:var(--ng)}

/* Tag badges */
.badge{font-size:11px;font-weight:700;color:#fff;background:var(--p);padding:2px 8px;border-radius:4px;display:inline-block;letter-spacing:.3px}
.badge.ac{background:var(--ac)}
.badge.ok{background:var(--ok)}
.badge.ng{background:var(--ng)}
.badge.gray{background:var(--tm)}

/* Word popup */
.word-popup{position:fixed;z-index:9999;background:#fff;border:1px solid var(--bd);border-radius:10px;padding:14px 18px;max-width:280px;box-shadow:0 8px 32px rgba(0,0,0,.12);color:var(--tx);animation:fadeIn .2s ease-out;pointer-events:none}
.word-popup .word-head{font-size:16px;font-weight:700;color:var(--p);margin-bottom:4px}
.word-popup .word-pos{font-size:11px;color:var(--tm);font-style:italic;margin-bottom:6px}
.word-popup .word-def{font-size:13px;line-height:1.6;margin-bottom:6px}
.word-popup .word-ex{font-size:12px;color:var(--tm);line-height:1.5;padding:6px 10px;background:var(--pl);border-radius:6px;border-left:2px solid var(--p)}

/* Clickable words */
.cw{cursor:pointer;border-bottom:1px dotted rgba(42,124,118,.35);transition:color .1s}
.cw:hover{color:var(--p)}

/* Explanation block */
.explanation{margin-top:16px;padding:16px;border-radius:10px}
.explanation.ok{background:var(--okl);border:1px solid rgba(46,139,87,.2)}
.explanation.ng{background:var(--acl);border:1px solid rgba(196,135,59,.25)}
.trans-block{margin-top:8px;padding:10px 14px;background:var(--pl);border-radius:8px;font-size:13px;line-height:1.8;color:#555;white-space:pre-wrap;border-left:3px solid var(--p)}

/* Stats bars */
.stat-bar{height:6px;background:var(--bd);border-radius:3px;overflow:hidden}
.stat-fill{height:100%;border-radius:3px;transition:width .6s}

/* Grids */
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}
.modal{background:var(--cd);border-radius:16px;padding:28px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px;color:var(--p)}

/* Import/Export UI */
.drop-zone{border:2px dashed var(--bd);border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg)}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--p);background:var(--pl)}

/* Part 6/7 split layout */
.split-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
.split-left{position:sticky;top:72px;max-height:calc(100vh - 90px);overflow-y:auto;padding-right:4px}
.passage-text{font-size:15px;line-height:1.85;color:#333}

/* Vocab quiz */
.vocab-card{perspective:600px}
.vocab-inner{position:relative;width:100%;transform-style:preserve-3d;transition:transform .5s}
.vocab-inner.flipped{transform:rotateY(180deg)}
.vocab-front,.vocab-back{backface-visibility:hidden;border-radius:12px;padding:32px;text-align:center}
.vocab-front{background:var(--cd);border:1px solid var(--bd)}
.vocab-back{background:var(--pl);border:1px solid rgba(42,124,118,.25);position:absolute;inset:0;transform:rotateY(180deg)}

/* Timer */
.timer{font-size:13px;font-weight:600;color:var(--tm);padding:4px 12px;border-radius:6px;background:var(--bg);border:1px solid var(--bd)}
.timer.warn{color:var(--ac);border-color:var(--ac);background:var(--acl)}
.timer.danger{color:var(--ng);border-color:var(--ng);background:var(--ngl)}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.fade-in{animation:fadeIn .25s ease-out}
.slide-in{animation:slideIn .25s ease-out}

/* Misc */
.divider{height:1px;background:var(--bd);margin:20px 0}
.empty-state{text-align:center;padding:60px 20px;color:var(--tm)}
.empty-icon{font-size:48px;margin-bottom:16px}
.chip-group{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:5px 12px;border-radius:20px;border:1.5px solid var(--bd);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;background:var(--cd);color:var(--tm)}
.chip:hover{border-color:var(--p);color:var(--p)}
.chip.active{border-color:var(--p);background:var(--p);color:#fff}
input[type=number],select{padding:8px 12px;border-radius:8px;border:1.5px solid var(--bd);background:var(--cd);color:var(--tx);font-size:14px;outline:none;transition:border-color .15s;width:100%}
input[type=number]:focus,select:focus{border-color:var(--p)}
textarea{padding:12px;border-radius:8px;border:1.5px solid var(--bd);background:var(--cd);color:var(--tx);font-size:14px;outline:none;resize:vertical;width:100%;transition:border-color .15s}
textarea:focus{border-color:var(--p)}
label{font-size:13px;font-weight:600;color:var(--tm);margin-bottom:4px;display:block}
.form-row{margin-bottom:14px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;z-index:9998;animation:fadeIn .25s;pointer-events:none}

/* Responsive */
@media(max-width:640px){
  .container{padding:16px 14px 56px}
  .wide{padding:16px 14px 56px}
  .card{padding:16px}
  .split-layout{grid-template-columns:1fr}
  .split-left{position:relative;top:0;max-height:none}
  h1{font-size:26px!important}
  .grid3{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}
}
@media(max-width:400px){
  .grid4{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<!-- Nav -->
<nav id="nav">
  <div class="nav-inner">
    <span class="nav-logo">📚 TOEIC OG</span>
    <button class="nav-tab active" onclick="showPage('home')" id="tab-home">首頁</button>
    <button class="nav-tab" onclick="showPage('browse')" id="tab-browse">題庫</button>
    <button class="nav-tab" onclick="showPage('practice')" id="tab-practice">練習</button>
    <button class="nav-tab" onclick="showPage('mistakes')" id="tab-mistakes">錯題</button>
    <button class="nav-tab" onclick="showPage('vocab')" id="tab-vocab">單字</button>
    <button class="nav-tab" onclick="showPage('stats')" id="tab-stats">統計</button>
    <button class="nav-tab" onclick="showPage('import')" id="tab-import">匯入</button>
  </div>
</nav>

<!-- Word popup -->
<div id="wordPopup" class="word-popup" style="display:none"></div>

<!-- Toast -->
<div id="toast" class="toast" style="display:none"></div>

<!-- Modal container -->
<div id="modalOverlay" class="modal-overlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
</div>

<!-- Pages -->
<div id="page-home"></div>
<div id="page-browse" style="display:none"></div>
<div id="page-practice" style="display:none"></div>
<div id="page-quiz" style="display:none"></div>
<div id="page-mistakes" style="display:none"></div>
<div id="page-vocab" style="display:none"></div>
<div id="page-stats" style="display:none"></div>
<div id="page-import" style="display:none"></div>

<script>
// ============================================================
// DATA STORE
// ============================================================
const DB_KEY = 'toeic_og_db';
let DB = loadDB();

function loadDB() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e){}
  return {
    questions: [],     // Array of question objects
    mistakes: {},      // { qid: { count, lastWrong, history[] } }
    history: [],       // [ { date, part, total, correct, qids[] } ]
    vocabSeen: {},     // { word: { def, pos, ex, seenCount, lastSeen } }
    settings: { timerDefault: true }
  };
}

function saveDB() {
  try { localStorage.setItem(DB_KEY, JSON.stringify(DB)); } catch(e) {
    showToast('⚠️ 儲存失敗，localStorage 空間可能已滿');
  }
}

// ============================================================
// QUESTION SCHEMA
// {
//   id: "og1_p5_001",          // unique id
//   book: 1,                   // OG book number (1-19)
//   part: 5,                   // 5, 6, or 7
//   qNum: 101,                 // question number in test
//   groupId: null,             // for P6/P7: shared passage group id
//   passage: null,             // P6/P7: article text (only on first q of group)
//   passageTitle: null,        // optional passage title
//   stem: "...",               // question stem text
//   options: ["A)...","B)...","C)...","D)..."],
//   answer: "A",               // correct answer letter
//   explanation: "...",        // Chinese explanation
//   translation: "...",        // Chinese translation of stem/passage excerpt
//   tags: ["文法","時態"],      // optional tags
//   baby: false,               // baby-friendly flag
//   addedAt: "2025-01-01"
// }
// ============================================================

// Helpers
function genId() { return 'q_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }

function getQuestion(id) { return DB.questions.find(q => q.id === id); }

function getGroups(part) {
  // Returns passages with their questions for P6/P7
  const questions = DB.questions.filter(q => q.part === part);
  const groups = {};
  questions.forEach(q => {
    const key = q.groupId || q.id;
    if (!groups[key]) groups[key] = { groupId: key, passage: q.passage, passageTitle: q.passageTitle, book: q.book, questions: [] };
    groups[key].questions.push(q);
  });
  return Object.values(groups).sort((a,b) => a.questions[0].qNum - b.questions[0].qNum);
}

function recordMistake(qid) {
  if (!DB.mistakes[qid]) DB.mistakes[qid] = { count: 0, lastWrong: null, history: [] };
  DB.mistakes[qid].count++;
  DB.mistakes[qid].lastWrong = new Date().toISOString();
  DB.mistakes[qid].history.push(new Date().toISOString());
  saveDB();
}

function removeMistake(qid) {
  delete DB.mistakes[qid];
  saveDB();
}

function addVocab(word, def, pos, ex) {
  if (!DB.vocabSeen[word]) DB.vocabSeen[word] = { def:'', pos:'', ex:'', seenCount:0, lastSeen:null };
  if (def) DB.vocabSeen[word].def = def;
  if (pos) DB.vocabSeen[word].pos = pos;
  if (ex) DB.vocabSeen[word].ex = ex;
  DB.vocabSeen[word].seenCount++;
  DB.vocabSeen[word].lastSeen = new Date().toISOString();
  saveDB();
}

// ============================================================
// PAGE ROUTING
// ============================================================
let currentPage = 'home';

function showPage(page) {
  document.querySelectorAll('[id^="page-"]').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('page-' + page);
  if (el) el.style.display = 'block';
  const tab = document.getElementById('tab-' + page);
  if (tab) tab.classList.add('active');
  currentPage = page;
  window.scrollTo(0, 0);

  switch(page) {
    case 'home': renderHome(); break;
    case 'browse': renderBrowse(); break;
    case 'practice': renderPractice(); break;
    case 'mistakes': renderMistakes(); break;
    case 'vocab': renderVocab(); break;
    case 'stats': renderStats(); break;
    case 'import': renderImport(); break;
  }
}

// ============================================================
// HOME PAGE
// ============================================================
function renderHome() {
  const el = document.getElementById('page-home');
  const total = DB.questions.length;
  const books = [...new Set(DB.questions.map(q => q.book))].length;
  const mistakeCount = Object.keys(DB.mistakes).length;
  const vocabCount = Object.keys(DB.vocabSeen).length;
  const recentHistory = DB.history.slice(-7);
  const avgAcc = recentHistory.length ? Math.round(recentHistory.reduce((s,h) => s + h.correct/h.total, 0) / recentHistory.length * 100) : null;

  const partCounts = [5,6,7].map(p => ({
    part: p,
    count: DB.questions.filter(q => q.part === p).length
  }));

  el.innerHTML = `
  <div class="container">
    <div style="margin-bottom:28px">
      <h1 style="font-size:30px;font-weight:800;letter-spacing:-.5px;color:var(--p)">TOEIC OG 練習系統</h1>
      <p style="color:var(--tm);margin-top:4px;font-size:14px">Official Guide 閱讀題庫練習平台</p>
    </div>

    <!-- Stats row -->
    <div class="grid4" style="margin-bottom:20px">
      ${statCard('📖','題目數',total,'道')}
      ${statCard('📚','已載入',books,'回')}
      ${statCard('❌','錯題',mistakeCount,'道')}
      ${statCard('📝','單字',vocabCount,'個')}
    </div>

    ${avgAcc !== null ? `
    <div class="card" style="margin-bottom:20px;background:linear-gradient(135deg,#f0f7f6,#faf8f5);border-color:rgba(42,124,118,.2)">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:13px;color:var(--tm);font-weight:600">近7次平均正確率</div>
          <div style="font-size:32px;font-weight:800;color:var(--p);margin-top:2px">${avgAcc}%</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:13px;color:var(--tm)">練習次數</div>
          <div style="font-size:20px;font-weight:700;color:var(--tx)">${DB.history.length}</div>
        </div>
      </div>
    </div>` : ''}

    <!-- Part quick access -->
    <h2 style="font-size:16px;font-weight:700;margin-bottom:12px">按 Part 練習</h2>
    <div class="grid3" style="margin-bottom:24px">
      ${[5,6,7].map(p => {
        const c = partCounts.find(x => x.part === p);
        const disabled = c.count === 0;
        return `
        <div class="card card-hover ${disabled?'':''}\" onclick="${disabled?'':'startPractice('+p+')'}" style="${disabled?'opacity:.55;cursor:default':''}">
          <div style="font-size:22px;margin-bottom:8px">${p===5?'📝':p===6?'📄':'📰'}</div>
          <div style="font-weight:700;font-size:15px">Part ${p}</div>
          <div style="font-size:12px;color:var(--tm);margin-top:2px">${p===5?'句子填空':p===6?'段落填空':'閱讀理解'}</div>
          <div style="margin-top:10px">
            <span class="badge ${c.count>0?'':'gray'}">${c.count} 題</span>
            ${disabled?'<span style="font-size:11px;color:var(--tm);margin-left:6px">尚未載入</span>':''}
          </div>
        </div>`
      }).join('')}
    </div>

    <!-- Quick actions -->
    <h2 style="font-size:16px;font-weight:700;margin-bottom:12px">快速操作</h2>
    <div class="grid2" style="margin-bottom:24px">
      <button class="card card-hover" style="text-align:left;border:none" onclick="showPage('practice')">
        <div style="font-size:20px;margin-bottom:6px">🎯</div>
        <div style="font-weight:700">自訂練習</div>
        <div style="font-size:12px;color:var(--tm);margin-top:2px">選回數、Part、題數</div>
      </button>
      <button class="card card-hover" style="text-align:left;border:none" onclick="startMistakeReview()">
        <div style="font-size:20px;margin-bottom:6px">🔁</div>
        <div style="font-weight:700">錯題重練</div>
        <div style="font-size:12px;color:var(--tm);margin-top:2px">${mistakeCount} 道待複習</div>
      </button>
      <button class="card card-hover" style="text-align:left;border:none" onclick="showPage('vocab')">
        <div style="font-size:20px;margin-bottom:6px">🧠</div>
        <div style="font-weight:700">單字測驗</div>
        <div style="font-size:12px;color:var(--tm);margin-top:2px">${vocabCount} 個已記錄</div>
      </button>
      <button class="card card-hover" style="text-align:left;border:none" onclick="showPage('import')">
        <div style="font-size:20px;margin-bottom:6px">📥</div>
        <div style="font-weight:700">匯入題目</div>
        <div style="font-size:12px;color:var(--tm);margin-top:2px">JSON 格式匯入</div>
      </button>
    </div>

    ${total === 0 ? `
    <div class="card" style="text-align:center;padding:40px;border-style:dashed;border-color:var(--p);background:var(--pl)">
      <div style="font-size:36px;margin-bottom:12px">🚀</div>
      <div style="font-weight:700;font-size:16px;color:var(--p)">開始使用</div>
      <div style="font-size:14px;color:var(--tm);margin:8px 0 16px">先匯入題目，才能開始練習</div>
      <button class="btn primary" onclick="showPage('import')">前往匯入 →</button>
    </div>` : ''}
  </div>`;
}

function statCard(icon, label, val, unit) {
  return `
  <div class="card" style="text-align:center;padding:16px">
    <div style="font-size:24px;margin-bottom:4px">${icon}</div>
    <div style="font-size:24px;font-weight:800;color:var(--p)">${val}</div>
    <div style="font-size:11px;color:var(--tm);font-weight:600">${label} ${unit}</div>
  </div>`;
}

// BROWSE PAGE

let browseFilters = { part: 0, book: 0 };

function renderBrowse() {
  const el = document.getElementById('page-browse');
  const books = [...new Set(DB.questions.map(q => q.book))].sort((a,b)=>a-b);

  el.innerHTML = `
  <div class="container">
    <h1 style="font-size:22px;font-weight:800;margin-bottom:20px">題庫瀏覽</h1>

    <!-- Filters -->
    <div class="card" style="margin-bottom:20px">
      <div style="margin-bottom:10px">
        <label>Part</label>
        <div class="chip-group" id="browsePartChips">
          <div class="chip active" onclick="setBrowseFilter('part',0,this)">全部</div>
          ${[5,6,7].map(p=>`<div class="chip" onclick="setBrowseFilter('part',${p},this)">Part ${p}</div>`).join('')}
        </div>
      </div>
      <div>
        <label>回數</label>
        <div class="chip-group" id="browseBookChips">
          <div class="chip active" onclick="setBrowseFilter('book',0,this)">全部</div>
          ${books.map(b=>`<div class="chip" onclick="setBrowseFilter('book',${b},this)">OG${b}</div>`).join('')}
        </div>
      </div>
    </div>

    <div id="browseList"></div>
  </div>`;
  renderBrowseList();
}

function setBrowseFilter(key, val, el) {
  browseFilters[key] = val;
  el.closest('.chip-group').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderBrowseList();
}

function renderBrowseList() {
  let qs = DB.questions;
  if (browseFilters.part) qs = qs.filter(q => q.part === browseFilters.part);
  if (browseFilters.book) qs = qs.filter(q => q.book === browseFilters.book);

  const el = document.getElementById('browseList');
  if (!qs.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p>找不到符合條件的題目</p></div>`;
    return;
  }

  // Group by part
  const byPart = {};
  qs.forEach(q => {
    if (!byPart[q.part]) byPart[q.part] = [];
    byPart[q.part].push(q);
  });

  el.innerHTML = Object.entries(byPart).sort(([a],[b])=>a-b).map(([part, questions]) => `
    <div style="margin-bottom:24px">
      <h2 style="font-size:15px;font-weight:700;margin-bottom:12px;color:var(--tm)">Part ${part} · ${questions.length} 題</h2>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${questions.map(q => {
          const hasMistake = !!DB.mistakes[q.id];
          return `
          <div class="card card-hover" onclick="previewQuestion('${q.id}')" style="padding:14px 16px">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span class="badge">OG${q.book}</span>
              <span class="badge ac">P${q.part}</span>
              <span style="font-size:12px;color:var(--tm)">Q${q.qNum}</span>
              ${hasMistake ? `<span class="badge ng">錯題 ×${DB.mistakes[q.id].count}</span>` : ''}
              ${q.tags?.map(t=>`<span style="font-size:11px;color:var(--tm);background:var(--bg);padding:1px 6px;border-radius:3px">${t}</span>`).join('')||''}
            </div>
            <div style="margin-top:8px;font-size:14px;color:var(--tx);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">
              ${q.stem}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('');
}

function previewQuestion(id) {
  const q = getQuestion(id);
  if (!q) return;
  const hasMistake = !!DB.mistakes[id];
  showModal(`
    <div class="modal-title">題目預覽 · OG${q.book} P${q.part} Q${q.qNum}</div>
    ${q.passage ? `<div style="background:var(--bg);padding:12px;border-radius:8px;font-size:13px;line-height:1.7;margin-bottom:14px;color:#444;max-height:200px;overflow-y:auto">${q.passage}</div>` : ''}
    <p style="font-size:15px;line-height:1.6;margin-bottom:14px">${q.stem}</p>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px">
      ${q.options.map((opt,i) => {
        const letter = 'ABCD'[i];
        const isAns = letter === q.answer;
        return `<div style="padding:8px 12px;border-radius:7px;font-size:14px;background:${isAns?'var(--okl)':'var(--bg)'};border:1px solid ${isAns?'var(--ok)':'var(--bd)'};color:${isAns?'var(--ok)':'var(--tx)'}">
          <strong>${letter})</strong> ${opt.replace(/^[A-D]\)\s*/,'')}
        </div>`;
      }).join('')}
    </div>
    ${q.explanation ? `<div class="explanation ok"><strong>解析：</strong> ${q.explanation}</div>` : ''}
    ${q.translation ? `<div class="trans-block">${q.translation}</div>` : ''}
    <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap">
      <button class="btn sm primary" onclick="closeModal();startSingleQ('${id}')">練習此題</button>
      ${hasMistake ? `<button class="btn sm danger" onclick="removeMistake('${id}');closeModal();renderBrowse()">移出錯題</button>` : ''}
      <button class="btn sm" onclick="closeModal()">關閉</button>
    </div>
  `);
}

// ============================================================
// PRACTICE SETUP PAGE
// ============================================================
let practiceConfig = { parts: [5], books: [], count: 20, timer: true, mistakeOnly: false };

function renderPractice() {
  const el = document.getElementById('page-practice');
  const books = [...new Set(DB.questions.map(q => q.book))].sort((a,b)=>a-b);
  const total = DB.questions.length;

  el.innerHTML = `
  <div class="container narrow">
    <h1 style="font-size:22px;font-weight:800;margin-bottom:20px">自訂練習</h1>

    <div class="card" style="margin-bottom:16px">
      <div class="form-row">
        <label>Part（可多選）</label>
        <div class="chip-group">
          ${[5,6,7].map(p=>`
            <div class="chip ${practiceConfig.parts.includes(p)?'active':''}" onclick="togglePart(${p},this)">Part ${p}</div>
          `).join('')}
        </div>
      </div>
      <div class="form-row">
        <label>回數（不選則全部）</label>
        <div class="chip-group" style="max-height:100px;overflow-y:auto">
          ${books.map(b=>`
            <div class="chip ${practiceConfig.books.includes(b)?'active':''}" onclick="toggleBook(${b},this)">OG${b}</div>
          `).join('')}
          ${books.length===0?'<span style="font-size:13px;color:var(--tm)">尚未匯入任何回數</span>':''}
        </div>
      </div>
      <div class="form-row">
        <label>題數上限</label>
        <input type="number" id="countInput" min="1" max="${Math.max(total,1)}" value="${practiceConfig.count}" onchange="practiceConfig.count=+this.value" style="max-width:120px">
      </div>
      <div class="form-row" style="display:flex;align-items:center;gap:10px">
        <label style="margin:0">計時模式</label>
        <div class="chip-group">
          <div class="chip ${practiceConfig.timer?'active':''}" onclick="practiceConfig.timer=true;renderPractice()">計時</div>
          <div class="chip ${!practiceConfig.timer?'active':''}" onclick="practiceConfig.timer=false;renderPractice()">不計時</div>
        </div>
      </div>
    </div>

    <div id="practicePreview" style="margin-bottom:16px"></div>

    <button class="btn primary lg" style="width:100%" onclick="startPracticeFromConfig()">
      開始練習 →
    </button>
    <button class="btn" style="width:100%;margin-top:8px" onclick="startMistakeReview()">
      錯題練習 (${Object.keys(DB.mistakes).length} 題)
    </button>
  </div>`;
  updatePracticePreview();
}

function togglePart(p, el) {
  const idx = practiceConfig.parts.indexOf(p);
  if (idx > -1) { if (practiceConfig.parts.length > 1) practiceConfig.parts.splice(idx,1); }
  else practiceConfig.parts.push(p);
  el.classList.toggle('active', practiceConfig.parts.includes(p));
  updatePracticePreview();
}

function toggleBook(b, el) {
  const idx = practiceConfig.books.indexOf(b);
  if (idx > -1) practiceConfig.books.splice(idx,1);
  else practiceConfig.books.push(b);
  el.classList.toggle('active', practiceConfig.books.includes(b));
  updatePracticePreview();
}

function updatePracticePreview() {
  let qs = DB.questions.filter(q => practiceConfig.parts.includes(q.part));
  if (practiceConfig.books.length) qs = qs.filter(q => practiceConfig.books.includes(q.book));
  const count = Math.min(qs.length, practiceConfig.count || qs.length);
  const el = document.getElementById('practicePreview');
  if (el) el.innerHTML = `<div class="card" style="background:var(--pl);border-color:rgba(42,124,118,.2);padding:12px 16px;font-size:13px;color:var(--p);font-weight:600">
    預計出題：${count} 道（題庫符合：${qs.length} 道）
  </div>`;
}

function startPractice(part) {
  practiceConfig.parts = [part];
  practiceConfig.books = [];
  practiceConfig.count = part === 5 ? 30 : 20;
  startPracticeFromConfig();
}

function startPracticeFromConfig() {
  let qs = DB.questions.filter(q => practiceConfig.parts.includes(q.part));
  if (practiceConfig.books.length) qs = qs.filter(q => practiceConfig.books.includes(q.book));
  if (!qs.length) { showToast('沒有符合條件的題目'); return; }
  // Shuffle and limit
  qs = shuffle(qs).slice(0, practiceConfig.count || qs.length);
  startQuiz(qs, practiceConfig.timer);
}

function startMistakeReview() {
  const mistakeIds = Object.keys(DB.mistakes);
  if (!mistakeIds.length) { showToast('目前沒有錯題'); return; }
  const qs = mistakeIds.map(id => getQuestion(id)).filter(Boolean);
  startQuiz(shuffle(qs), practiceConfig.timer);
}

function startSingleQ(id) {
  const q = getQuestion(id);
  if (q) startQuiz([q], false);
}

// ============================================================
// QUIZ ENGINE
// ============================================================
let quizState = {
  questions: [],
  current: 0,
  answers: {},   // { qid: 'A'|null }
  startTime: null,
  timerInterval: null,
  elapsed: 0,
  useTimer: true
};

function startQuiz(questions, useTimer = true) {
  quizState = {
    questions,
    current: 0,
    answers: {},
    startTime: Date.now(),
    timerInterval: null,
    elapsed: 0,
    useTimer
  };
  questions.forEach(q => quizState.answers[q.id] = null);

  // Navigate to quiz page (no nav tab)
  document.querySelectorAll('[id^="page-"]').forEach(el => el.style.display = 'none');
  document.getElementById('page-quiz').style.display = 'block';
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  window.scrollTo(0,0);

  if (useTimer) {
    quizState.timerInterval = setInterval(() => {
      quizState.elapsed++;
      updateTimer();
    }, 1000);
  }

  renderQuizQuestion();
}

function renderQuizQuestion() {
  const q = quizState.questions[quizState.current];
  const total = quizState.questions.length;
  const current = quizState.current;
  const answered = quizState.answers[q.id];
  const progress = ((current + (answered?1:0)) / total) * 100;

  const el = document.getElementById('page-quiz');

  // Determine if this is a P6/P7 group question
  const isPassage = q.part >= 6 && q.passage;
  const groupQs = q.groupId ? quizState.questions.filter(x => x.groupId === q.groupId) : [];

  const questionHTML = `
    <!-- Progress -->
    <div style="max-width:780px;margin:0 auto;padding:0 20px">
      <div class="progress-bar" style="margin-top:16px;margin-bottom:0">
        <div class="progress-fill" style="width:${progress}%"></div>
      </div>
    </div>

    <div class="${isPassage ? 'wide' : 'container narrow'} fade-in">
      <!-- Header -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:8px">
          <button class="btn sm" onclick="confirmExitQuiz()">← 離開</button>
          <span style="font-size:13px;color:var(--tm);font-weight:600">${current+1} / ${total}</span>
          <span class="badge">OG${q.book} P${q.part}</span>
        </div>
        <div id="timerDisplay" class="timer" style="${quizState.useTimer?'':'display:none'}">0:00</div>
      </div>

      ${isPassage ? renderPassageLayout(q, groupQs, answered) : renderSingleQuestion(q, answered)}

      <!-- Navigation -->
      <div style="display:flex;gap:8px;margin-top:20px;flex-wrap:wrap">
        ${current > 0 ? `<button class="btn" onclick="quizNav(-1)">← 上一題</button>` : ''}
        ${answered !== null ? `
          ${current < total-1 ? `<button class="btn primary" onclick="quizNav(1)">下一題 →</button>` : `<button class="btn primary" onclick="finishQuiz()">完成練習 ✓</button>`}
        ` : ''}
        ${current === total-1 && answered !== null ? '' : ''}
      </div>
    </div>`;

  el.innerHTML = questionHTML;
  makeClickableWords();
  updateTimer();
}

function renderSingleQuestion(q, answered) {
  return `
    <div class="card">
      <p class="passage-text" id="qStem" style="margin-bottom:20px;font-size:16px;line-height:1.7">${q.stem}</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${q.options.map((opt, i) => {
          const letter = 'ABCD'[i];
          let cls = '';
          if (answered !== null) {
            cls = 'locked';
            if (letter === q.answer) cls += ' correct';
            else if (letter === answered) cls += ' wrong';
          } else if (answered === letter) cls = 'selected';
          return `<button class="option-btn ${cls}" onclick="selectAnswer('${q.id}','${letter}')">
            <span class="option-circle ${answered!==null?(letter===q.answer?'ok':letter===answered?'ng':''):(answered===letter?'sel':'')}">${letter}</span>
            <span>${opt.replace(/^[A-D]\)\s*/,'')}</span>
          </button>`;
        }).join('')}
      </div>
      ${answered !== null ? renderExplanation(q, answered) : ''}
    </div>`;
}

function renderPassageLayout(q, groupQs, answered) {
  // Find the passage from the group (first q that has it)
  const passageQ = groupQs.find(x => x.passage) || q;
  return `
    <div class="split-layout">
      <div class="split-left">
        <div class="card">
          ${passageQ.passageTitle ? `<div style="font-weight:700;font-size:14px;color:var(--p);margin-bottom:10px">${passageQ.passageTitle}</div>` : ''}
          <div class="passage-text" id="passageText">${passageQ.passage}</div>
        </div>
      </div>
      <div>
        ${renderSingleQuestion(q, answered)}
        ${groupQs.length > 1 ? `
        <div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap">
          ${groupQs.map((gq, i) => {
            const isCur = gq.id === q.id;
            const isAns = quizState.answers[gq.id] !== null;
            return `<button class="chip ${isCur?'active':''}" onclick="jumpToGroupQ('${gq.id}')">${i+1}${isAns?'✓':''}</button>`;
          }).join('')}
        </div>` : ''}
      </div>
    </div>`;
}

function renderExplanation(q, chosen) {
  const correct = chosen === q.answer;
  return `
    <div class="explanation ${correct?'ok':'ng'}">
      <div style="font-weight:700;margin-bottom:4px">${correct?'✅ 正確！':'❌ 答錯了'} 正確答案：${q.answer}</div>
      ${q.explanation ? `<p style="font-size:14px;line-height:1.6;margin-top:6px">${q.explanation}</p>` : ''}
    </div>
    ${q.translation ? `<div class="trans-block">${q.translation}</div>` : ''}`;
}

function selectAnswer(qid, letter) {
  if (quizState.answers[qid] !== null) return;
  quizState.answers[qid] = letter;
  const q = getQuestion(qid);
  if (q && letter !== q.answer) recordMistake(qid);
  renderQuizQuestion();
}

function quizNav(dir) {
  quizState.current = Math.max(0, Math.min(quizState.questions.length - 1, quizState.current + dir));
  window.scrollTo(0,0);
  renderQuizQuestion();
}

function jumpToGroupQ(qid) {
  const idx = quizState.questions.findIndex(q => q.id === qid);
  if (idx > -1) { quizState.current = idx; window.scrollTo(0,0); renderQuizQuestion(); }
}

function updateTimer() {
  const el = document.getElementById('timerDisplay');
  if (!el || !quizState.useTimer) return;
  const s = quizState.elapsed;
  const m = Math.floor(s/60);
  const ss = String(s%60).padStart(2,'0');
  el.textContent = `${m}:${ss}`;
  el.className = 'timer' + (s > 1800 ? ' danger' : s > 900 ? ' warn' : '');
}

function finishQuiz() {
  clearInterval(quizState.timerInterval);
  const qs = quizState.questions;
  const total = qs.length;
  const correct = qs.filter(q => quizState.answers[q.id] === q.answer).length;
  const acc = Math.round(correct/total*100);

  // Save history
  DB.history.push({
    date: new Date().toISOString(),
    part: [...new Set(qs.map(q=>q.part))],
    total, correct,
    elapsed: quizState.elapsed,
    qids: qs.map(q=>q.id)
  });
  saveDB();

  // Show results
  const el = document.getElementById('page-quiz');
  const partBreakdown = [5,6,7].map(p => {
    const pqs = qs.filter(q=>q.part===p);
    if (!pqs.length) return '';
    const pc = pqs.filter(q=>quizState.answers[q.id]===q.answer).length;
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd)">
      <span style="font-size:14px">Part ${p}</span>
      <span style="font-weight:600">${pc}/${pqs.length} (${Math.round(pc/pqs.length*100)}%)</span>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="container narrow fade-in">
      <div class="card" style="text-align:center;padding:40px 24px;margin-bottom:20px">
        <div style="font-size:56px;margin-bottom:16px">${acc>=80?'🎉':acc>=60?'💪':'📖'}</div>
        <div style="font-size:48px;font-weight:800;color:var(--p)">${acc}%</div>
        <div style="font-size:16px;color:var(--tm);margin-top:4px">答對 ${correct} / ${total} 題</div>
        ${quizState.useTimer ? `<div style="margin-top:8px;font-size:13px;color:var(--tm)">⏱ ${Math.floor(quizState.elapsed/60)}分${quizState.elapsed%60}秒</div>` : ''}
      </div>

      ${partBreakdown ? `<div class="card" style="margin-bottom:20px"><div style="font-weight:700;margin-bottom:4px">各 Part 成績</div>${partBreakdown}</div>` : ''}

      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn primary" onclick="reviewWrongAnswers()">檢討錯題</button>
        <button class="btn" onclick="showPage('practice')">再練一次</button>
        <button class="btn" onclick="showPage('home')">回首頁</button>
      </div>
    </div>`;
}

function reviewWrongAnswers() {
  const qs = quizState.questions;
  const wrongQs = qs.filter(q => quizState.answers[q.id] !== null && quizState.answers[q.id] !== q.answer);
  if (!wrongQs.length) { showToast('全部答對了！'); return; }

  const el = document.getElementById('page-quiz');
  el.innerHTML = `
    <div class="container narrow">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
        <button class="btn sm" onclick="showPage('home')">← 首頁</button>
        <h2 style="font-size:18px;font-weight:700">錯題檢討（${wrongQs.length} 題）</h2>
      </div>
      ${wrongQs.map(q => `
        <div class="card fade-in" style="margin-bottom:16px">
          <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
            <span class="badge">OG${q.book}</span>
            <span class="badge ac">P${q.part}</span>
            <span class="badge ng">答錯</span>
          </div>
          <p style="font-size:15px;line-height:1.7;margin-bottom:12px">${q.stem}</p>
          <div style="display:flex;flex-direction:column;gap:6px">
            ${q.options.map((opt,i) => {
              const letter = 'ABCD'[i];
              const isAns = letter === q.answer;
              const wasChosen = letter === quizState.answers[q.id];
              return `<div style="padding:8px 12px;border-radius:7px;font-size:14px;
                background:${isAns?'var(--okl)':wasChosen?'var(--ngl)':'var(--bg)'};
                border:1px solid ${isAns?'var(--ok)':wasChosen?'var(--ng)':'var(--bd)'};
                color:${isAns?'var(--ok)':wasChosen?'var(--ng)':'var(--tm)'}">
                <strong>${letter})</strong> ${opt.replace(/^[A-D]\)\s*/,'')}
                ${isAns?' ✓':''}${wasChosen?' ✗':''}
              </div>`;
            }).join('')}
          </div>
          ${q.explanation ? `<div class="explanation ok" style="margin-top:10px"><strong>解析：</strong>${q.explanation}</div>` : ''}
          ${q.translation ? `<div class="trans-block">${q.translation}</div>` : ''}
        </div>
      `).join('')}
      <button class="btn primary" onclick="showPage('home')">回首頁</button>
    </div>`;
  window.scrollTo(0,0);
}

function confirmExitQuiz() {
  showModal(`
    <div class="modal-title">確定離開？</div>
    <p style="color:var(--tm);font-size:14px;margin-bottom:20px">目前進度將不會儲存</p>
    <div style="display:flex;gap:8px">
      <button class="btn danger" onclick="exitQuiz()">確定離開</button>
      <button class="btn" onclick="closeModal()">繼續作答</button>
    </div>
  `);
}

function exitQuiz() {
  clearInterval(quizState.timerInterval);
  closeModal();
  showPage('home');
}

// ============================================================
// MISTAKES PAGE
// ============================================================
function renderMistakes() {
  const el = document.getElementById('page-mistakes');
  const mistakeIds = Object.keys(DB.mistakes);

function removeVocab(word) {
  delete DB.vocabSeen[word];

function startVocabQuiz() {
  const words = Object.entries(DB.vocabSeen).filter(([,d]) => d.def);
  if (words.length < 2) { showToast('需要至少 2 個有定義的單字才能測驗'); return; }
  const shuffled = shuffle(words);
  vocabQuizState = { words: shuffled, current: 0, correct: 0, total: shuffled.length, flipped: false };
  renderVocabQuiz();
}

function renderVocabQuiz() {
  const el = document.getElementById('page-vocab');
  const { words, current, correct, total } = vocabQuizState;

  if (current >= total) {
    el.innerHTML = `
    <div class="container narrow" style="text-align:center;padding-top:40px">
      <div class="card" style="padding:40px">
        <div style="font-size:48px;margin-bottom:12px">${correct/total>=0.8?'🌟':'💪'}</div>
        <div style="font-size:40px;font-weight:800;color:var(--p)">${Math.round(correct/total*100)}%</div>
        <div style="color:var(--tm);margin-top:4px">答對 ${correct} / ${total}</div>
        <div style="display:flex;gap:8px;margin-top:24px;justify-content:center;flex-wrap:wrap">
          <button class="btn primary" onclick="startVocabQuiz()">再測一次</button>
          <button class="btn" onclick="renderVocab()">回單字本</button>
        </div>
      </div>
    </div>`;
    return;
  }

  const [word, data] = words[current];
  const progress = (current / total) * 100;

  el.innerHTML = `
  <div class="container narrow">
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <button class="btn sm" onclick="renderVocab()">← 退出</button>
      <span style="font-size:13px;color:var(--tm)">${current+1} / ${total} · 答對 ${correct}</span>
    </div>

    <div class="vocab-card" style="margin-bottom:24px;cursor:pointer" onclick="flipVocabCard()">
      <div class="vocab-inner ${vocabQuizState.flipped?'flipped':''}">
        <div class="vocab-front" style="min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center">
          <div style="font-size:28px;font-weight:800;color:var(--p);margin-bottom:8px">${word}</div>
          ${data.pos ? `<div style="font-size:13px;color:var(--tm);font-style:italic">${data.pos}</div>` : ''}
          <div style="font-size:13px;color:var(--tm);margin-top:16px">點擊翻轉看答案</div>
        </div>
        <div class="vocab-back" style="min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px">
          <div style="font-size:20px;font-weight:700;color:var(--p);margin-bottom:8px">${data.def}</div>
          ${data.ex ? `<div style="font-size:13px;color:var(--tm);text-align:center;font-style:italic">${data.ex}</div>` : ''}
        </div>
      </div>
    </div>

    ${vocabQuizState.flipped ? `
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn danger lg" onclick="vocabAnswer(false)">✗ 不會</button>
      <button class="btn primary lg" onclick="vocabAnswer(true)" style="background:var(--ok);border-color:var(--ok)">✓ 會了</button>
    </div>` : `
    <div style="text-align:center;color:var(--tm);font-size:14px">點擊卡片查看中文意思</div>`}
  </div>`;
}

function flipVocabCard() {
  vocabQuizState.flipped = !vocabQuizState.flipped;
  renderVocabQuiz();
}

function vocabAnswer(isCorrect) {
  if (isCorrect) vocabQuizState.correct++;
  vocabQuizState.current++;
  vocabQuizState.flipped = false;
  renderVocabQuiz();
}

          </div>

            <div class="stat-fill" style="width:${data.acc}%;background:${data.acc>=80?'var(--ok)':data.acc>=60?'var(--ac)':'var(--ng)'}"></div>
          </div>

    <!-- Recent trend -->

function handleFileImport(e) {
  const file = e.target.files[0];
  if (file) readJsonFile(file);
}

function readJsonFile(file) {
  const reader = new FileReader();
  reader.onload = ev => processImportData(ev.target.result);
  reader.readAsText(file);
}

function importFromText() {
  const text = document.getElementById('jsonInput').value.trim();
  if (!text) { showToast('請貼上 JSON 資料'); return; }
  processImportData(text);
}

function processImportData(text) {
  try {
    let data = JSON.parse(text);
    if (!Array.isArray(data)) data = [data];

    let added = 0, skipped = 0, errors = [];

    data.forEach((q, i) => {
      // Validate required fields
      if (!q.stem || !q.options || !q.answer || !q.part) {
        errors.push(`第 ${i+1} 筆：缺少必要欄位 (stem/options/answer/part)`);
        skipped++;
        return;
      }
      if (!Array.isArray(q.options) || q.options.length < 2) {
        errors.push(`第 ${i+1} 筆：options 需為至少 2 個選項的陣列`);
        skipped++;
        return;
      }

      // Generate id if missing
      if (!q.id) q.id = genId();

      // Check duplicate
      if (DB.questions.find(x => x.id === q.id)) {
        skipped++;
        return;
      }

      // Defaults
      q.book = q.book || 0;
      q.qNum = q.qNum || 0;
      q.addedAt = q.addedAt || new Date().toISOString().slice(0,10);

      // P6/P7 validation warning
      if ((q.part === 6 || q.part === 7) && !q.groupId && !q.passage) {
        errors.push(`Q${q.qNum||i+1} (Part ${q.part})：沒有 groupId 和 passage，將被視為單題處理`);
      }

      DB.questions.push(q);
      added++;
    });

    saveDB();

    const msg = `✅ 匯入成功 ${added} 題${skipped ? `，略過 ${skipped} 題` : ''}`;
    if (errors.length) {
      showModal(`
        <div class="modal-title">匯入完成</div>
        <p style="font-size:14px;margin-bottom:12px">${msg}</p>
        <div style="font-size:13px;color:var(--tm);background:var(--bg);padding:12px;border-radius:8px;max-height:200px;overflow-y:auto">
          ${errors.map(e=>`<div style="margin-bottom:4px">⚠️ ${e}</div>`).join('')}
        </div>
        <button class="btn primary" style="margin-top:16px;width:100%" onclick="closeModal();renderImport()">確定</button>
      `);
    } else {
      showToast(msg);
      renderImport();
    }
  } catch(e) {
    showToast('❌ JSON 格式錯誤：' + e.message);
  }
}

function exportAll() {
  downloadJSON(DB.questions, 'toeic_og_all.json');
}

function exportMistakes() {
  const ids = Object.keys(DB.mistakes);
  const qs = ids.map(id => getQuestion(id)).filter(Boolean);
  downloadJSON(qs, 'toeic_og_mistakes.json');

function downloadJSON(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  showToast('✅ 已下載 ' + filename);
}

let popupTimeout;
function lookupWord(word) {
  const popup = document.getElementById('wordPopup');
  const known = DB.vocabSeen[word.toLowerCase()];

  // Show loading state immediately
  popup.style.display = 'block';
  popup.innerHTML = `<div style="color:var(--tm);font-size:13px">查詢中...</div>`;
  positionPopup(event);

  // If we have cached data, show it
  if (known && known.def) {
    showWordPopup(word, known.def, known.pos, known.ex);
    return;
  }

  // Call Claude API for word lookup
  fetchWordDef(word).then(result => {
    if (result) {
      addVocab(word.toLowerCase(), result.def, result.pos, result.ex);
      showWordPopup(word, result.def, result.pos, result.ex);
    } else {
      showWordPopup(word, '（查詢失敗）', '', '');
    }
  });
}

async function fetchWordDef(word) {
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 200,
        system: 'You are a dictionary. Reply ONLY with JSON: {"def":"中文意思","pos":"詞性(n./v./adj.等)","ex":"English example sentence"}. No other text.',
        messages: [{ role: 'user', content: `Define: ${word}` }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || '';
    return JSON.parse(text.replace(/```json?|```/g,'').trim());
  } catch(e) { return null; }
}

function showWordPopup(word, def, pos, ex) {
  const popup = document.getElementById('wordPopup');
  popup.innerHTML = `
    <div class="word-head">${word}</div>
    ${pos ? `<div class="word-pos">${pos}</div>` : ''}
    <div class="word-def">${def}</div>
    ${ex ? `<div class="word-ex">${ex}</div>` : ''}
    <div style="margin-top:8px;font-size:11px;color:var(--tm)">✓ 已加入單字本</div>
  `;

  clearTimeout(popupTimeout);
  popupTimeout = setTimeout(() => { popup.style.display = 'none'; }, 4000);
}

function positionPopup(e) {
  const popup = document.getElementById('wordPopup');
  const vw = window.innerWidth, vh = window.innerHeight;
  let x = (e?.clientX || vw/2) + 10;
  let y = (e?.clientY || vh/2) + 10;
  if (x + 280 > vw) x = vw - 290;
  if (y + 150 > vh) y = y - 160;
  popup.style.left = x + 'px';
  popup.style.top = y + 'px';
}

document.addEventListener('click', (e) => {
  const popup = document.getElementById('wordPopup');
  if (!e.target.classList.contains('cw') && popup.style.display !== 'none') {
    popup.style.display = 'none';
  }
});

// ============================================================
// MODAL
// ============================================================
function showModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').style.display = 'flex';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').style.display = 'none';
}

// ============================================================
// TOAST
// ============================================================
let toastTimeout;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => el.style.display = 'none', 2800);
}

// ============================================================
// UTILS
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

renderHome();
</script>
