pping activity」是一個名詞片語，由不定冠詞「an」引導。冠詞後方應接名詞或由形容詞修飾的名詞。選項B「increase」可作名詞，意為「增加、增長」，形成「an increase in shipping activity」（航運活動的增加），語法和語義皆符合。選項A「increased」是形容詞或動詞過去式，若作形容詞，應為「an increased shipping activity」，而非「an increased in...」。選項C「increases」是複數名詞或動詞第三人稱單數形式，「an」後不接複數名詞。選項D「increasingly」是副詞，不能直接跟在冠詞「an」後面。因此，正確答案為B。","translation":"Yakubu 物流公司將擴大倉庫裝卸區，為航運活動的增加做準備。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_115_344","book":12,"part":5,"qNum":115,"stem":"The High Performance weather gauge is ______ accurate in measuring the level of humidity in the air.","options":["A) surprising","B) surprisingly","C) surprised","D) surprises"],"answer":"B","explanation":"此題考驗詞性辨識。空格後方是形容詞「accurate」（精確的），而能夠修飾形容詞的詞類是副詞。選項 (B)「surprisingly」是副詞，意為「令人驚訝地」，用來修飾後方的形容詞「accurate」，表示「令人驚訝地精確」。因此，(B) 是正確答案。選項 (A)「surprising」和 (C)「surprised」都是形容詞，不能修飾另一個形容詞。選項 (D)「surprises」是動詞或名詞，不符合句型結構，故皆為錯誤選項。","translation":"這款高效能天氣測量儀在測量空氣濕度方面，精確度令人驚訝。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_116_345","book":12,"part":5,"qNum":116,"stem":"Ms. Oh's proposal highlights a ______ strategy for decreasing the company's transportation costs in the coming year.","options":["A) surrounding","B) securing","C) relative","D) comprehensive"],"answer":"D","explanation":"正確答案為 (D) comprehensive。此字意為「全面的、詳盡的」，用來形容策略 (strategy) 最為貼切。一個「全面的策略」表示該提案涵蓋了所有必要的面向，旨在徹底解決降低運輸成本的問題，符合商業情境中對提案內容的期待。(A) surrounding (周圍的) 意為「周圍的」，不適合形容策略。(B) securing (確保的) 作為形容詞修飾策略時語意不自然，通常會說「確保某事的策略」(strategy for securing something)。(C) relative (相對的) 則無法表達策略的性質或範圍。因此，(D) comprehensive 最能完整描述提案中策略的特點。","translation":"吳女士的提案強調了一項______策略，旨在降低公司來年的運輸成本。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_117_346","book":12,"part":5,"qNum":117,"stem":"To receive ______ updates regarding your journal subscription status, please provide an e-mail address on the order form.","options":["A) period","B) periods","C) periodicals","D) periodic"],"answer":"D","explanation":"正確答案D) periodic 是一個形容詞，意為「週期的、定期的」。它修飾名詞updates（更新），表示這些更新會定期發送，完全符合「關於您的期刊訂閱狀態」的語境，即會定期收到相關通知。選項A) period 和B) periods 都是名詞，分別為單數和複數形式，不能直接修飾名詞updates。選項C) periodicals 也是名詞，意為「期刊、雜誌」，雖然與journal（期刊）相關，但「periodicals updates」語意不通，並非指更新的內容本身是期刊，而是指更新的頻率或性質。因此，D是唯一正確的選項，能使句意完整且符合文法。","translation":"為了收到關於您的期刊訂閱狀態的定期更新，請在訂購單上提供一個電子郵件地址。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_118_347","book":12,"part":5,"qNum":118,"stem":"______ when they are away conducting business, members of the sales team are usually available by e-mail.","options":["A) Both","B) Even","C) Ahead","D) Whether"],"answer":"B","explanation":"正確答案是 B) Even。此處需要一個連接詞來表達「即使當...的時候」的語氣，表示儘管業務團隊成員出差在外，他們仍然可以透過電子郵件聯繫上。Even when (即使當...的時候) 完美地表達了這種讓步或對比關係，強調了即使在特定情況下，某事依然成立。A) Both (兩者都) 通常與 and 連用，不符合句型結構。C) Ahead (在前面；提前) 是副詞或介詞，不能引導此類從句。D) Whether (是否) 用於引導選擇或間接問句，不適用於此處的時間從句語境。","translation":"即使當業務團隊成員出差在外時，他們通常也能透過電子郵件聯繫上。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_119_348","book":12,"part":5,"qNum":119,"stem":"There is a coffee machine ______ located on the second floor of the Tabor Building.","options":["A) conveniently","B) slightly","C) considerably","D) eventually"],"answer":"A","explanation":"【文法解析】本題考查副詞的選擇，以修飾動詞 \"located\"（位於）。正確答案 A) \"conveniently\"（方便地）最符合語境。咖啡機\"conveniently located\"表示其位置對使用者來說是方便、容易到達的，這在描述建築物內設施時非常常見且合理。B) \"slightly\"（輕微地）表示程度小，與\"located\"搭配不自然。C) \"considerably\"（相當大地）表示程度大，同樣不適合修飾位置。D) \"eventually\"（最終）表示時間上的結果，通常指經過一段時間或困難後才發生，不適用於描述一個固定設施的常態性位置。","translation":"Tabor 大樓的二樓有一台咖啡機，位置很方便。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_120_349","book":12,"part":5,"qNum":120,"stem":"The editor granted Ms. Porter a deadline ______ so that some information in her building renovations report could be updated.","options":["A) extend","B) extensive","C) extension","D) extends"],"answer":"C","explanation":"此題考驗詞性與語意。句中「granted Ms. Porter a deadline ______」需要一個名詞來完成「grant (某人) (某物)」的結構，且與前面的「a deadline」形成複合名詞或被修飾。選項C)「extension」是名詞，意為「延期」，與「deadline」結合形成「deadline extension (截止日期延期)」，語意上完美符合後方「以便更新資訊」的語境，表示編輯給予波特女士更多時間。選項A)「extend」和D)「extends」是動詞，不符合此處需要名詞的文法結構。選項B)「extensive」是形容詞，意為「廣泛的、大量的」，若用在此處會變成「a deadline extensive」，語意不通，且不符合「給予延期」的動作。","translation":"編輯准許波特女士延期提交截止日期，以便她能更新建築翻修報告中的一些資訊。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_121_350","book":12,"part":5,"qNum":121,"stem":"Youssouf Electronics' annual charity fund-raising event ______ next Saturday at Montrose Park.","options":["A) will be held","B) to hold","C) to be held","D) will hold"],"answer":"A","explanation":"本題考查動詞時態與語態。主詞「Youssouf Electronics' annual charity fund-raising event」（年度慈善募款活動）是一個「事件」，它不會主動「舉辦」什麼，而是「被舉辦」。因此，需要使用被動語態。時間副詞「next Saturday」（下週六）明確指出動作發生在未來，所以應使用未來式。綜合以上，正確答案為 A) will be held（將被舉辦），符合未來被動語態。\n\n選項 B) to hold 和 C) to be held 都是不定詞片語，不能直接作為句子的主要動詞，會使句子缺乏謂語。選項 D) will hold 是未來主動語態，但「事件」是被舉辦而非主動舉辦，故不符合語意。","translation":"Youssouf Electronics 的年度慈善募款活動將於下週六在 Montrose 公園舉行。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_122_351","book":12,"part":5,"qNum":122,"stem":"The buildings in the Jamison Complex are open until 7:00 P.M. on workdays, but staff with proper ______ may enter at any time.","options":["A) reinforcement","B) participation","C) competency","D) authorization"],"answer":"D","explanation":"正確答案是 (D) authorization。Authorization 指的是「授權、許可」，與上下文「員工可以在任何時間進入」的需求完美契合。擁有適當授權的員工才能享有特別的進出權限，這符合實際工作場所的管理邏輯。\n(A) reinforcement 意為「加強、增援」，不符合員工進出建築物的語境。\n(B) participation 意為「參與」，與進入建築物的權限無關。\n(C) competency 意為「能力、勝任」，雖然員工可能具備能力，但能力本身並不能賦予他們隨時進入的權限，而是需要正式的許可。因此，(D) authorization 是最符合邏輯且語意正確的選項。","translation":"Jamison 大樓群的建築物在工作日開放至晚上七點，但持有適當授權的員工可以在任何時間進入。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_123_352","book":12,"part":5,"qNum":123,"stem":"Kochi Engineering has proposed the construction of a drainage system ______ to keep the Route 480 highway dry during heavy rain.","options":["A) was designed","B) designed","C) designer","D) designing"],"answer":"B","explanation":"【文法解析】本題考驗分詞作形容詞的用法。空格前的「a drainage system」是名詞，空格後「to keep...」是目的片語。選項B)「designed」是過去分詞，在此作形容詞修飾前面的名詞「a drainage system」，表示「被設計來...的排水系統」。這是一個簡化過的關係子句，完整形式是「a drainage system *which was designed* to keep...」。排水系統是被設計的，因此使用被動語態的過去分詞是正確的。選項A)「was designed」是動詞片語，若直接放入會造成句子結構錯誤。選項C)「designer」是名詞，語意不通。選項D)「designing」是現在分詞，表示主動語態，但排水系統是被設計的，而非主動設計，故不符語意。","translation":"高知工程公司已提議建造一個排水系統，該系統旨在保持480號公路在豪雨期間保持乾燥。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_124_353","book":12,"part":5,"qNum":124,"stem":"Customers can obtain coverage for replacement and repair of printers ______ the purchase of an extended warranty.","options":["A) although","B) because","C) since","D) through"],"answer":"D","explanation":"【文法解析】此題考驗連接詞與介系詞的辨別。空格後方「the purchase of an extended warranty」是一個名詞片語，而非一個完整的子句（主詞+動詞）。選項A) although、B) because、C) since 都是從屬連接詞，用於連接兩個子句，因此在此處語法不符。它們後面必須接一個包含主詞和動詞的子句。選項D) through 是一個介系詞，意為「透過、藉由」，後面可以接名詞片語，表示「透過…方式」或「藉由…手段」。將D選項代入後，句意為「顧客可以透過購買延長保固來獲得印表機更換與維修的保障」，語法與語意皆通順，完美表達了獲得保障的「方式」。","translation":"顧客可以透過購買延長保固，獲得印表機更換與維修的保障。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_125_354","book":12,"part":5,"qNum":125,"stem":"We regret to announce that Mr. Charles Appiah has resigned his position as senior sales manager, ______ next Monday.","options":["A) effect","B) effected","C) effectiveness","D) effective"],"answer":"D","explanation":"【文法解析】\n本題考查詞性與慣用搭配。句中「______ next Monday」修飾前面的辭職動作，表示辭職「從下週一開始生效」。\n選項 D) effective 是一個形容詞，意為「生效的；從…開始的」。片語「effective + 日期/時間」是商務英文中常見的用法，表示某事從該日期起生效或實施。因此，「effective next Monday」意指「從下週一開始生效」，語意和文法皆符合。\n選項 A) effect 是名詞，意為「影響、效果」，不能直接修飾日期。\n選項 B) effected 是動詞 effect 的過去式或過去分詞，意為「造成、實現」，在此語境下不合適。\n選項 C) effectiveness 也是名詞，意為「有效性」，語意不符。\n故正確答案為 D。","translation":"我們很遺憾地宣布，Charles Appiah 先生已辭去其資深銷售經理的職位，下週一生效。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_126_355","book":12,"part":5,"qNum":126,"stem":"The Epsilon 3000 camera allows beginning photographers to enjoy professional-quality equipment, as it is ______ sophisticated yet inexpensive.","options":["A) gradually","B) technologically","C) annually","D) productively"],"answer":"B","explanation":"本題考驗副詞詞義。空格後接形容詞「sophisticated」（精密的），需要一個副詞來修飾它。選項B「technologically」（在技術上）最符合語境，表示這款相機在技術層面上是精密的。選項A「gradually」（逐漸地）、C「annually」（每年地）和D「productively」（有成效地）皆不符合句意，無法描述相機「精密」的方式。","translation":"Epsilon 3000 相機讓初學者也能享受專業品質的設備，因為它在技術上既精密又價格實惠。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_127_356","book":12,"part":5,"qNum":127,"stem":"Yee-Yin Xiong held interviews with numerous clients to determine ______ Echegaray Consulting, Inc., can improve customer service.","options":["A) unless","B) in order to","C) how","D) as if"],"answer":"C","explanation":"【文法解析】本題考驗連接詞與子句的用法。空格後接一個完整的子句「Echegaray Consulting, Inc., can improve customer service」，此子句作為動詞「determine」（判斷、決定）的受詞。選項 C) \"how\" 是一個引導名詞子句的連接詞，意為「如何、用什麼方式」，能完整表達「判斷 Echegaray Consulting, Inc. *如何*改善客戶服務」的語意，語法和語意皆正確。選項 A) \"unless\"（除非）是條件連接詞，語意不符。選項 B) \"in order to\"（為了）是目的片語，後接原形動詞，不能接完整子句。選項 D) \"as if\"（彷彿、好像）引導方式狀語子句，不能作為動詞的受詞，語意亦不合。","translation":"熊怡音與眾多客戶進行了訪談，以判斷 Echegaray Consulting, Inc. 如何改善客戶服務。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_128_357","book":12,"part":5,"qNum":128,"stem":"Several letters of reference from local community organizations are required for ______ into the Cypress Beach Business Association.","options":["A) acquisition","B) acceptance","C) prospects","D) improvement"],"answer":"B","explanation":"正確答案為 (B) acceptance。句子的語境是加入一個商業協會需要推薦信，因此空格處應填入表示「被接納、被允許加入」的詞。「acceptance into」是常見且正確的搭配，意指「被接納進入某組織或團體」。(A) acquisition (獲得、收購) 通常指獲得資產或公司，不適用於加入協會。(C) prospects (前景、可能性) 語意不符，且不與「into」搭配。(D) improvement (改善、進步) 亦不符合語境，且搭配不自然。因此，(B) acceptance 最能完整表達句子的意思。","translation":"來自當地社區組織的數封推薦信，是加入賽普拉斯海灘商業協會所必需的。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_129_358","book":12,"part":5,"qNum":129,"stem":"Rather than wearing business attire on Thursdays, staff may choose to wear casual clothing ______.","options":["A) enough","B) despite","C) instead","D) in case"],"answer":"C","explanation":"【文法解析】正確答案C) instead是副詞，意為「取而代之；反而」。此處用來表示員工選擇穿休閒服裝，是取代了穿商務服裝的選項，與句首的「Rather than...」（與其...不如...）形成完美對應，使語意連貫且符合邏輯。A) enough（足夠地）是副詞，語意不符。B) despite（儘管）是介系詞，後需接名詞或動名詞，且語意不符。D) in case（以防萬一）是連詞片語，語意不符。","translation":"與其在週四穿著商務正裝，員工可以選擇改穿休閒服裝。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_130_359","book":12,"part":5,"qNum":130,"stem":"Your ______ registration card provides proof of ownership in case this product is lost or damaged.","options":["A) frequent","B) indicative","C) validated","D) dispersed"],"answer":"C","explanation":"【文法解析】本題考查形容詞的語義搭配。句子的核心是「註冊卡提供所有權證明」。要能提供所有權證明，這張卡必須是經過官方確認或核准的。選項C) \"validated\" 意為「已驗證的、經確認的」，完美符合語境，表示這張註冊卡已經過官方程序確認其有效性，因此能作為所有權證明。選項A) \"frequent\" 意為「頻繁的」，不適用於描述一張卡片。選項B) \"indicative\" 意為「指示性的、象徵性的」，雖然註冊卡確實「指示」所有權，但在作為「證明」的語境下，\"validated\" 更強調其官方認可的有效性。選項D) \"dispersed\" 意為「分散的」，語義上完全不符。","translation":"您已驗證的註冊卡可作為所有權證明，以防本產品遺失或損壞。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_101_360","book":13,"part":5,"qNum":101,"stem":"Kanelek Limited and Evensohn LLC have entered a strategic partnership to ______ their market share.","options":["A) increased","B) increasing","C) increases","D) increase"],"answer":"D","explanation":"本題考查不定詞 (infinitive) 的用法。句中的 \"to ______ their market share\" 表達了「目的」，即「為了增加他們的市場佔有率」。在英文中，表示目的的不定詞結構為 \"to + 動詞原形 (base form of the verb)\"。\n選項 D) \"increase\" 是動詞原形，符合 \"to + 動詞原形\" 的結構，因此是正確答案。\n選項 A) \"increased\" 是動詞的過去式或過去分詞，不能直接接在 \"to\" 後面形成不定詞。\n選項 B) \"increasing\" 是現在分詞 (V-ing 形式)，不能直接接在 \"to\" 後面形成不定詞。\n選項 C) \"increases\" 是動詞的第三人稱單數現在式，也不能直接接在 \"to\" 後面形成不定詞。\n因此，正確答案為 D) increase。","translation":"Kanelek Limited 和 Evensohn LLC 已建立策略夥伴關係，以增加他們的市場佔有率。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_102_361","book":13,"part":5,"qNum":102,"stem":"Glenwick Organic Farm stands out from other farms for its environmentally ______ practices.","options":["A) exposed","B) communal","C) friendly","D) considerable"],"answer":"C","explanation":"正確答案為 (C) friendly。此題考驗詞彙搭配。片語「environmentally friendly」意指「環保的、對環境友善的」，是描述農場實踐方式對環境有益的標準用法，與句中「有機農場」及「脫穎而出」的語境完美契合。 (A) exposed 意為「暴露的、顯露的」，「environmentally exposed practices」語意不通，不符上下文。 (B) communal 意為「公共的、共享的」，「environmentally communal practices」並非慣用搭配，且無法表達農場的環保特點。 (D) considerable 意為「相當大的、可觀的」，「environmentally considerable practices」語意不合，無法形容實踐方式的環保性質。因此，(C) friendly 是唯一能正確表達農場環保特性的選項。","translation":"格倫威克有機農場因其環保的實踐方式而從其他農場中脫穎而出。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_103_362","book":13,"part":5,"qNum":103,"stem":"Our ______ is responsible for performing quality-control reviews during production.","options":["A) divided","B) division","C) divisive","D) dividing"],"answer":"B","explanation":"此題考驗詞性辨識。句子的結構為 \"Our ______ is responsible...\"，其中 \"Our\" 是所有格代名詞，後面需要一個名詞作為句子的主詞。\nA) \"divided\" 是動詞 \"divide\" 的過去式或過去分詞，也可作形容詞，不適合做主詞。\nB) \"division\" 是名詞，意為「部門」或「分部」。在此語境中，\"Our division\" 指的是「我們的部門」，作為執行品管審查的主體，語法和語義上都正確。\nC) \"divisive\" 是形容詞，意為「造成分裂的」，不能作主詞。\nD) \"dividing\" 是動名詞或現在分詞。雖然動名詞可作主詞，但 \"Our dividing\" (我們的劃分/分割行為) 在語義上不符，我們需要的是一個負責執行任務的「實體」或「單位」。\n因此，正確答案為名詞 \"division\"。","translation":"我們的部門負責在生產過程中執行品質控制審查。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_104_363","book":13,"part":5,"qNum":104,"stem":"Because of a mechanical failure in the production facility, Fizzy Bottlers will be closed ______ further notice.","options":["A) around","B) through","C) except","D) until"],"answer":"D","explanation":"【文法解析】正確答案是D) until。片語「until further notice」是常見的慣用語，意指「直到另行通知為止」，完美符合句中Fizzy Bottlers因故障而暫停營業，等待後續通知的語境。選項A) around 表示「大約」，不適用於時間的終點。選項B) through 雖可指一段時間，但「through further notice」不符合慣用表達。選項C) except 表示「除了…之外」，語意不符，無法表達時間的持續性。","translation":"由於生產設施發生機械故障，Fizzy Bottlers 將會關閉直到另行通知為止。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_105_364","book":13,"part":5,"qNum":105,"stem":"Interviewees are asked not to talk among ______ while waiting in the reception area.","options":["A) themselves","B) theirs","C) them","D) their"],"answer":"A","explanation":"【文法解析】本題考驗代名詞的正確使用。句子的主詞是「Interviewees」（面試者），動詞是「talk」。當主詞所執行的動作是針對主詞本身或主詞群體內部時，我們需要使用反身代名詞。片語「talk among themselves」意指「彼此交談」，符合語意，表示面試者們在等候時不應相互交談。A)「themselves」是複數反身代名詞，與複數主詞「Interviewees」相符，故為正解。B)「theirs」是所有格代名詞，語法不符。C)「them」是受格代名詞，若使用「talk among them」，則語意會變成在「他們（指其他人）」之中交談，而非「彼此」交談，不符合題目情境。D)「their」是所有格形容詞，後面必須接名詞，語法不符。","translation":"面試者被要求在接待區等候時不要彼此交談。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_106_365","book":13,"part":5,"qNum":106,"stem":"The accounting department reminds all staff to submit expense reports ______ after returning from a trip.","options":["A) very","B) enough","C) rather","D) soon"],"answer":"D","explanation":"正確答案是 D) soon。Soon 是一個時間副詞，表示「很快地；不久之後」。在此句中，\"soon after returning from a trip\" 形成一個常見的片語，意指「出差回來後不久/盡快」。它修飾動詞 submit，說明提交費用報銷單的時間點。A) very 是程度副詞，修飾形容詞或副詞，如 \"very quickly\"，不適用於此。B) enough 意為「足夠地」，表示數量或程度，語意不符。C) rather 意為「相當地」或「寧願」，表示程度或選擇，不符合時間的語境。因此，D) soon 最符合語意，表示應及時提交報銷單。","translation":"會計部門提醒所有員工，在出差回來後盡快提交費用報銷單。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_107_366","book":13,"part":5,"qNum":107,"stem":"Olayinka Boutique ______ hosts special shopping events for members of its loyalty club.","options":["A) occasion","B) occasions","C) occasional","D) occasionally"],"answer":"D","explanation":"此題考驗詞性判斷。句子的結構是「主詞 (Olayinka Boutique) + ______ + 動詞 (hosts) + 受詞」。空白處需要一個詞來修飾動詞「hosts」，說明其動作發生的頻率。A) occasion (名詞) 和 B) occasions (名詞複數) 意指「場合」，不能修飾動詞。C) occasional (形容詞) 意指「偶爾的」，修飾名詞，例如 \"occasional events\"，但不能直接修飾動詞。D) occasionally (副詞) 意指「偶爾地」，副詞的功能正是修飾動詞、形容詞或其他副詞，說明動作發生的方式、時間或頻率。因此，\"occasionally hosts\" 意為「偶爾舉辦」，符合語法和語意。","translation":"Olayinka精品店偶爾會為其忠誠會員俱樂部的成員舉辦特別購物活動。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_108_367","book":13,"part":5,"qNum":108,"stem":"For homeowners seeking to reduce their electricity bills, the energy-saving ideas in this brochure should be ______.","options":["A) lengthy","B) immediate","C) helpful","D) perceptive"],"answer":"C","explanation":"正確答案為 (C) helpful。句子的語境是屋主想降低電費，而手冊中的節能點子應該能達到這個目的。因此，這些點子「應該是有幫助的」。(A) lengthy (冗長的) 不符合語境，點子冗長不代表有用。(B) immediate (立即的) 形容的是時間性，雖然屋主可能希望立即見效，但「點子」本身並非立即的，而是其效果可能立即。(D) perceptive (有洞察力的) 通常用來形容人或其觀察力，不適用於形容「點子」能幫助屋主省錢的特質。綜合來看，(C) helpful 最能表達這些節能點子對屋主降低電費的實用價值。","translation":"對於那些希望降低電費的屋主來說，這本手冊中的節能點子應該會很有幫助。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_109_368","book":13,"part":5,"qNum":109,"stem":"The Delmar Highway Department ______ an online list of current road closures.","options":["A) maintenance","B) maintains","C) maintaining","D) is maintained"],"answer":"B","explanation":"本題考驗動詞形式與主動被動語態。句子的主詞是單數名詞「The Delmar Highway Department」，需要一個主動語態的動詞來描述其行為。選項 A) maintenance 是名詞，不能直接作動詞。選項 C) maintaining 是現在分詞，若要作主要動詞，需搭配助動詞（如 is maintaining）。選項 D) is maintained 是被動語態，表示「被維護」，但根據語意，公路局是主動「維護」清單，而非被維護。選項 B) maintains 是動詞 maintain 的第三人稱單數現在式，符合主詞單數形式，且語態為主動，表示公路局主動執行維護動作，語意和文法皆正確。","translation":"德爾瑪公路局維護一份線上清單，列出目前的道路封閉情況。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_110_369","book":13,"part":5,"qNum":110,"stem":"______ reducing staff, management made the decision to decrease administrative bonuses.","options":["A) Rather than","B) Whether","C) Just as","D) Namely"],"answer":"A","explanation":"正確答案為 A) Rather than。此片語意為「而非；而不是」，用來表示寧願選擇後者而非前者，或指出某事是取代另一件事的選擇。其後可接名詞、代名詞、動名詞（gerund）或不定詞（infinitive）。題目中 \"reducing staff\" 為動名詞片語，與 \"Rather than\" 完美結合，表示「管理階層決定減少行政獎金，而非裁員」。B) Whether 意為「是否」，通常引導子句或不定詞片語，不直接接動名詞。C) Just as 意為「正如；正當...之際」，引導子句，語法不符。D) Namely 意為「即是；也就是說」，用來解釋或列舉，語意不合。","translation":"管理階層決定減少行政獎金，而非裁員。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_111_370","book":13,"part":5,"qNum":111,"stem":"The doorways, which arch so ______, were left intact during the renovation of the historic Dersten Building.","options":["A) graceful","B) grace","C) gracefully","D) graces"],"answer":"C","explanation":"這題考驗詞性判斷。句中「arch」是動詞，意為「形成拱形」，而「so」是副詞，用來修飾其後的形容詞或副詞，表示程度。因此，空格處需要一個副詞來修飾動詞「arch」，說明拱形「如何」形成。選項C) gracefully 是副詞，意為「優雅地」，符合語法結構，表示門道拱形優雅。選項A) graceful 是形容詞，不能直接修飾動詞；選項B) grace 是名詞或動詞，不符；選項D) graces 是名詞複數或動詞第三人稱單數，亦不符。故選C。","translation":"那些拱形優雅的門道，在歷史悠久的德斯坦大樓翻修期間被完整保留下來。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_112_371","book":13,"part":5,"qNum":112,"stem":"Ms. Maeda was ______ that her art submission was used on the cover of the firm's annual report.","options":["A) performed","B) flattered","C) welcomed","D) challenged"],"answer":"B","explanation":"這題考驗動詞的語意與搭配。句中描述前田女士對於她的藝術作品被選為公司年報封面所產生的感受。\n*   A) performed (執行、表演)：語意不符，前田女士不會被「執行」。\n*   B) flattered (感到受寵若驚、感到榮幸)：當作品被選中用於重要位置，通常會讓人感到榮幸或受寵若驚，這與句意完全吻合。「be flattered that...」是很常見的用法。\n*   C) welcomed (受到歡迎)：通常指人或事物受到歡迎，而非個人因某事感到「被歡迎」。\n*   D) challenged (受到挑戰)：語意不符，被選中是榮譽而非挑戰。\n因此，B) flattered 是最符合語境的選項。","translation":"前田女士對於她的藝術作品被用於公司年報的封面感到受寵若驚。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_113_372","book":13,"part":5,"qNum":113,"stem":"The primary ______ is whether the cost of the car repair is reasonable considering the amount of labor involved.","options":["A) method","B) relation","C) concern","D) source"],"answer":"C","explanation":"本題考驗詞彙搭配與語意理解。句子主旨是討論汽車維修費用是否合理，特別是考量到所投入的工時。A) method (方法)：不符語境，此處並非指某種方法。B) relation (關係)：雖然費用與工時有關係，但「primary relation is whether...」並非慣用表達，語意不順。C) concern (關切；主要問題)：最符合語意。「The primary concern is whether...」意指「主要關切點／問題在於是否...」，完美表達了句子要傳達的核心議題。D) source (來源)：不符語境，此處並非指某物的來源。因此，C) concern 是唯一能使句意通順且符合邏輯的選項。","translation":"主要的問題在於，考量到所投入的工時，汽車維修的費用是否合理。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_114_373","book":13,"part":5,"qNum":114,"stem":"Norvo Financial has built an ______ client base in a short period of time.","options":["A) impressive","B) impress","C) impressively","D) impresses"],"answer":"A","explanation":"此題考驗詞性判斷。句中「an ______ client base」的結構，需要一個形容詞來修飾名詞片語「client base」。\nA) 「impressive」是形容詞，意為「令人印象深刻的」，符合語法，修飾「client base」形成「令人印象深刻的客戶群」。\nB) 「impress」是動詞原形，不能直接修飾名詞。\nC) 「impressively」是副詞，意為「令人印象深刻地」，主要用來修飾動詞、形容詞或另一個副詞，而非直接修飾名詞。\nD) 「impresses」是動詞的第三人稱單數現在式，也不能修飾名詞。\n因此，正確答案為 A，使句子語意完整且符合文法。","translation":"Norvo Financial 在短時間內建立了一個令人印象深刻的客戶群。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_115_374","book":13,"part":5,"qNum":115,"stem":"We ______ all employees to wear formal business attire when meeting with clients in the office.","options":["A) monitor","B) require","C) confirm","D) include"],"answer":"B","explanation":"【文法解析】本題考驗動詞的語意與搭配用法。正確答案B) require 意為「要求、規定」，其常用句型為「require + 受詞 + to V」，表示「要求某人做某事」，與題目中「我們要求所有員工穿著正式商務服裝」的語境完全吻合。A) monitor 意為「監控、監測」，語意不符，且文法上不能接「受詞 + to V」。C) confirm 意為「確認」，語意不符，且文法結構不符。D) include 意為「包含、包括」，語意不符，且文法結構不符。因此，B是唯一符合語意和文法結構的選項。","translation":"當在辦公室與客戶會面時，我們要求所有員工穿著正式商務服裝。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_116_375","book":13,"part":5,"qNum":116,"stem":"______ Ms. Chang nor Mr. Kao received the e-mail outlining the project proposal.","options":["A) Both","B) None","C) Neither","D) Whoever"],"answer":"C","explanation":"【文法解析】本題考驗對等連接詞（correlative conjunctions）的理解。句中的「nor」是關鍵線索，它通常與「neither」形成「neither...nor」的結構，表示「兩者皆不」或「既不...也不...」。因此，選項C) Neither 是唯一能與「nor」搭配，並使句意通順的詞。選項A) Both 應與「and」搭配形成「both...and」，表示「兩者皆是」，與句中的「nor」語意相反，故不正確。選項B) None 雖然表示「沒有任何一個」，但它通常作為代名詞使用，不與「nor」構成對等連接詞結構。例如，我們會說 \"None of them received...\" 而非 \"None...nor...\"。選項D) Whoever 是一個複合關係代名詞，表示「無論是誰」，不適用於此對等連接詞的語法結構。故正確答案為C。","translation":"張小姐和高先生都沒有收到概述專案提案的電子郵件。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_117_376","book":13,"part":5,"qNum":117,"stem":"In case of inclement weather, employees are encouraged to work ______ rather than travel to the office.","options":["A) carefully","B) remotely","C) eventually","D) closely"],"answer":"B","explanation":"正確答案為 (B) remotely。句子的語境是「惡劣天氣時，員工被鼓勵______工作，而非前往辦公室」。(B) remotely（遠端地）最符合此語境，意指在家或其他非辦公室地點工作，以避免通勤。其他選項：(A) carefully（小心地）、(C) eventually（最終地）、(D) closely（密切地）皆不符合「取代前往辦公室」的語意。","translation":"若遇惡劣天氣，鼓勵員工遠端工作，而非前往辦公室。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_118_377","book":13,"part":5,"qNum":118,"stem":"Long-term maintenance fees ______ according to the type of industrial printing machine purchased.","options":["A) copy","B) repair","C) support","D) vary"],"answer":"D","explanation":"【文法解析】正確答案是 (D) vary。「Vary」意為「變化、不同」，與句中的「according to」（根據…而定）形成完美的搭配，表示長期維護費用會根據所購買的工業印刷機類型而有所不同。這符合邏輯，因為不同類型的機器通常會有不同的維護成本。在文法上，主詞「fees」（複數）與動詞「vary」（原形）也一致。\n\n(A) copy 意為「複製」，(B) repair 意為「修理」，(C) support 意為「支持」。這三個選項在語意上均不符合句子的邏輯。維護費用不會「複製」、不會「修理」自己，也不會「支持」自己「根據」機器類型而定。它們的詞義與費用「因…而異」的語境完全不符。因此，只有 (D) vary 能正確表達費用隨條件變化的概念。","translation":"長期維護費用會根據所購買的工業印刷機類型而有所不同。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_119_378","book":13,"part":5,"qNum":119,"stem":"Ms. Kwon made it absolutely ______ that hiring decisions require her approval.","options":["A) clearing","B) clear","C) clearly","D) cleared"],"answer":"B","explanation":"本題考驗動詞 \"make\" 後的句型。當 \"make\" 後接虛受詞 \"it\" 時，其後應使用形容詞來描述 \"it\" 所代表的內容（即後面的 that 子句）。句型為 \"make it + 形容詞 + that 子句\"，意指「使某事變得…」。選項 B) \"clear\" 是形容詞，符合此句型，表示「使某事變得清楚、明確」。選項 A) \"clearing\" 是動名詞或現在分詞，不符語法；選項 C) \"clearly\" 是副詞，不能直接修飾虛受詞 \"it\"；選項 D) \"cleared\" 是過去分詞，在此語境中不適用，無法表達「使某事明確」之意。因此，正確答案為 B。","translation":"權女士明確表示，所有聘用決定都需要她的批准。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_120_379","book":13,"part":5,"qNum":120,"stem":"Sookie Choi's latest children's book is being ______ by Chung-He Park.","options":["A) illustrating","B) illustrated","C) illustration","D) illustrates"],"answer":"B","explanation":"「is being ______ by」是現在進行式的被動語態結構。在被動語態中，動詞必須使用過去分詞（V3）形式。因此，動詞「illustrate」（繪製插圖）的過去分詞「illustrated」是正確選項，表示書本「正被繪製插圖」。A) illustrating 是現在分詞，用於主動語態或形容詞，不適用於此被動結構。C) illustration 是名詞，不能填入動詞位置。D) illustrates 是主動語態的現在簡單式動詞，不符合被動語態的語法要求。","translation":"崔淑熙的最新兒童讀物正由朴正熙繪製插圖。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_121_380","book":13,"part":5,"qNum":121,"stem":"The Stoneport Gallery is hosting a ______ next week to showcase the works of sculptor Fabrice Pepin.","options":["A) scene","B) society","C) formality","D) reception"],"answer":"D","explanation":"正確答案是 D) reception。「reception」指一場正式的社交活動或招待會，通常用於歡迎某人、慶祝某事或展示作品。在此語境中，藝廊舉辦「reception」來展示雕塑家的作品，是完全符合邏輯且常見的搭配。藝廊為藝術展覽舉辦招待會，讓來賓能欣賞作品並進行交流。A) scene 指「場景」或「景色」，不適合用來描述藝廊舉辦的活動。B) society 指「社會」或「社團」，藝廊不會「舉辦一個社會」。C) formality 指「形式」或「禮節」，雖然藝廊活動可能有其形式，但「formality」本身不是一個可以被「舉辦」的活動。因此，D) reception 是唯一能表達藝廊為展示作品而舉辦的社交活動的正確選項。","translation":"Stoneport 藝廊下週將舉辦一場招待會，以展示雕塑家 Fabrice Pepin 的作品。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_122_381","book":13,"part":5,"qNum":122,"stem":"Mr. Soto will run 5 kilometers every other day in order to ______ for the Leesburg Corporate Challenge half marathon.","options":["A) translate","B) listen","C) wait","D) train"],"answer":"D","explanation":"【文法解析】正確答案是 (D) train。句子的意思是Soto先生為了「準備」或「訓練」半程馬拉松而每隔一天跑5公里。「in order to」後接動詞原形，表示目的。「train」作為動詞，意指「為某項運動或活動進行訓練、準備」，完全符合語境，說明跑步是為了提升體能以應對比賽。選項 (A) translate (翻譯)、(B) listen (聽) 和 (C) wait (等待) 的意思皆與為馬拉松做準備的語境不符，邏輯上不合理，因此是錯誤選項。","translation":"Soto先生將每隔一天跑5公里，以便為利斯堡企業挑戰半程馬拉松進行訓練。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_123_382","book":13,"part":5,"qNum":123,"stem":"All employees are expected to behave ______ when they are traveling on company business.","options":["A) responsible","B) responsibly","C) responsibility","D) responsibleness"],"answer":"B","explanation":"「behave」是一個動詞，意為「行為、表現」。動詞通常需要副詞來修飾，以說明行為的方式或程度。選項B「responsibly」是副詞，意為「負責任地」，用來修飾動詞「behave」恰當，表示員工應「負責任地」行為。選項A「responsible」是形容詞，主要修飾名詞或代名詞，或用於連綴動詞後，不能直接修飾動詞「behave」。選項C「responsibility」和D「responsibleness」都是名詞，分別表示「責任」和「負責任的狀態」，在句中語法不通，不能用來修飾動詞。因此，正確答案是副詞「responsibly」。","translation":"所有員工在出差時，都應表現得負責任。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_124_383","book":13,"part":5,"qNum":124,"stem":"______ he is now retired, Mr. Matilla is able to pursue his hobby of woodworking.","options":["A) During","B) Therefore","C) When","D) Because"],"answer":"D","explanation":"正確答案是D) Because。「Because」是一個從屬連接詞，用於引導原因子句，說明主句動作發生的原因。句中「他現在退休了」是馬蒂拉先生能夠追求木工愛好的原因，兩者存在明確的因果關係，因此「Because」最為恰當。A) During 是介系詞，後面應接名詞或名詞片語，不能接子句。B) Therefore 是連接副詞，通常用於連接兩個獨立子句，表示結果，且用法與本題句型不符。C) When 也是從屬連接詞，引導時間子句，但在此句中，退休狀態是「原因」而非單純的「時間點」，故語意上不如「Because」精準。","translation":"因為他現在退休了，馬蒂拉先生得以追求他木工的愛好。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_125_384","book":13,"part":5,"qNum":125,"stem":"______ for press coverage of the music festival will receive official responses by June 30.","options":["A) Applies","B) Application","C) Applicants","D) Applying"],"answer":"C","explanation":"本題考查詞性與語意。句子的主語需要一個名詞來執行「will receive」（將會收到）這個動作。\nA) Applies 是動詞，意為「申請」，不能直接作主語。\nB) Application 是名詞「申請書」或「申請的動作」，但「申請書」或「申請的動作」本身不會收到回覆，而是提出申請的人會收到，語意不符。\nC) Applicants 是名詞「申請者」，指「提出申請的人」。這與句子的語意完全符合，即「申請新聞報導的人將會收到回覆」。\nD) Applying 是動名詞或現在分詞。若作主語，語意類似B，指「申請這個動作」，不合邏輯；若作分詞修飾，則需要一個先行名詞。\n因此，C) Applicants 是唯一正確且符合語意的選項。","translation":"針對音樂節新聞報導的申請者，將於6月30日前收到官方回覆。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_126_385","book":13,"part":5,"qNum":126,"stem":"All employees should back up crucial data ______ switching over to the new software system on August 5.","options":["A) before","B) of","C) what","D) so"],"answer":"A","explanation":"【文法解析】\n正確答案是 A) before。在此句中，before 作為介系詞，後面接動名詞 switching over，表示「在切換到新軟體系統之前」。這符合邏輯，員工應在轉換系統「之前」備份重要資料，以確保資料安全。\nB) of 是介系詞，但通常表示所有、部分或關係，不適用於表示時間順序，故「of switching」不合語法。\nC) what 是疑問詞或關係代名詞，無法在此處引導時間狀語，故「what switching」不正確。\nD) so 是連接詞，表示「所以」或「為了」，用於表示結果或目的，不符合句中表示時間先後的語境。因此，只有 before 能正確表達在轉換系統前完成備份的動作。","translation":"所有員工都應該在8月5日切換到新軟體系統「之前」備份重要資料。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_127_386","book":13,"part":5,"qNum":127,"stem":"A label on each box should indicate the production date as well as the place of ______ of the contents.","options":["A) importance","B) safety","C) foundation","D) origin"],"answer":"D","explanation":"正確答案是D) origin。「place of origin」意指「原產地」，與「production date」（生產日期）並列，共同說明產品的製造資訊，語意完整且符合標籤內容的邏輯。A) importance（重要性）、B) safety（安全）和C) foundation（基礎）在語意上均不符合「內容物來源地」的語境，無法與「place of」搭配形成合理且常見的片語來描述產品的來源。","translation":"每個箱子上的標籤應標明生產日期以及內容物的原產地。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_128_387","book":13,"part":5,"qNum":128,"stem":"Ms. Jha assured the client that ______ would deliver the contract that afternoon.","options":["A) her","B) she","C) hers","D) herself"],"answer":"B","explanation":"此題考驗代名詞的正確用法。句子的結構是「Ms. Jha assured the client that [從屬子句]」。在從屬子句「______ would deliver the contract that afternoon」中，空格處需要一個主格代名詞來作為動詞「would deliver」的主詞。A) `her` 是受格代名詞或所有格形容詞，不能作主詞。B) `she` 是主格代名詞，符合作主詞的語法要求，指代Ms. Jha。C) `hers` 是所有格代名詞，表示「她的東西」，不能作主詞。D) `herself` 是反身代名詞或強調代名詞，通常用於指回主詞本身或強調主詞，不能直接作獨立的主詞。因此，只有 `she` 能正確填入空格，使句子語法完整且意義清晰。","translation":"賈女士向客戶保證，她會在當天下午送達合約。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_129_388","book":13,"part":5,"qNum":129,"stem":"During negotiations, management appeared ______ to the idea of increasing the staff's wages.","options":["A) agree","B) agreement","C) agreeable","D) agrees"],"answer":"C","explanation":"【文法解析】本題考驗連綴動詞的用法。句中的「appeared」是連綴動詞（linking verb），後面應接形容詞來描述主詞「management」。選項A) agree 是動詞原形，D) agrees 是動詞第三人稱單數現在式，皆不符合。選項B) agreement 是名詞，不符合文法結構。選項C) agreeable 是形容詞，意為「樂意的、贊同的」，符合句型「主詞 + 連綴動詞 + 形容詞」，且「agreeable to something」是常見搭配，表示「贊同某事」。因此，C是正確答案。","translation":"在談判期間，管理階層似乎贊同為員工加薪的提議。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og13_p5_130_389","book":13,"part":5,"qNum":130,"stem":"Employees ______ several departments have been encouraged to minimize costs.","options":["A) across","B) into","C) between","D) despite"],"answer":"A","explanation":"【文法解析】\n正確答案是 A) across。「Across」在此表示「遍及、分佈於多個」，意指員工來自或分佈在多個部門。這完美符合語境，說明是「跨越數個部門的員工」被鼓勵節省成本。例如：「employees across the company」意指全公司的員工。\n\nB) into 表示「進入…裡面」，語意不符，員工並非「進入」部門。\nC) between 通常用於兩者之間，或表示「在…之間」的選擇或關係。雖然「several departments」是多個，但「between」不適用於表達員工「分佈於」多個部門的概念。\nD) despite 表示「儘管、不顧」，語意上不合邏輯，不構成一個有意義的句子。","translation":"橫跨數個部門的員工已被鼓勵將成本降到最低。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_101_390","book":14,"part":5,"qNum":101,"stem":"The review board published a list of companies ______ considers to be the most charitable.","options":["A) it","B) its","C) itself","D) its own"],"answer":"A","explanation":"此題考驗代名詞的正確使用。句子的結構是「a list of companies ______ considers to be...」，其中「______ considers」是一個修飾「companies」的關係子句。關係代名詞（如which/that）在此被省略，因為它作為動詞consider的受詞。因此，空格處需要一個主格代名詞來作動詞「considers」的主詞。\n選項A) \"it\" 是主格代名詞，可以指代前文的單數名詞「The review board」，使其成為「The review board considers」的簡化形式，語意完整且文法正確。\n選項B) \"its\" 是所有格代名詞或所有格形容詞，不能作主詞。\n選項C) \"itself\" 是反身代名詞，通常作受詞或強調語，不能作主詞。\n選項D) \"its own\" 是所有格片語，也不能作主詞。\n故正確答案為A。","translation":"審查委員會公布了一份他們認為最慈善的公司名單。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_102_391","book":14,"part":5,"qNum":102,"stem":"Anyone who was unable to ______ yesterday's budget meeting may contact Mr. Kwon for his notes.","options":["A) recognize","B) achieve","C) attend","D) inform"],"answer":"C","explanation":"本題考驗動詞與受詞的搭配。句意為「任何未能出席昨天預算會議的人，可以聯絡權先生索取他的筆記。」\nA) recognize (認出、承認) 不適用於會議，通常用於辨識人事物。\nB) achieve (達成、實現) 通常用於目標或成就，不與會議搭配。\nD) inform (告知) 需要受詞為人，表示告知某人某事，而非告知會議。\nC) attend (出席、參加) 是唯一能與 \"meeting\" (會議) 搭配的動詞，表示「出席會議」。因此，正確答案為 C。","translation":"任何未能出席昨天預算會議的人，可以聯絡權先生索取他的筆記。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_103_392","book":14,"part":5,"qNum":103,"stem":"The evening's dance ______ was made possible with support from Taglet's Emporium.","options":["A) presented","B) presents","C) presenting","D) presentation"],"answer":"D","explanation":"此題考驗詞性。句子的主詞是「The evening's dance ______」，後面接動詞「was made possible」。空格處需要一個名詞來完成主詞片語。選項D「presentation」是名詞，意指「表演、呈現」，與「dance」結合形成「舞蹈表演」，作為主詞語意完整且符合文法。選項A、B是動詞，選項C是動詞的現在分詞或動名詞，在此句中皆不適合擔任主詞的核心名詞。","translation":"這場晚會的舞蹈表演，在Taglet's Emporium的支持下才得以實現。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_104_393","book":14,"part":5,"qNum":104,"stem":"All ______ candidates for the marketing position should submit a cover letter and résumé.","options":["A) increasing","B) qualified","C) beneficial","D) modified"],"answer":"B","explanation":"本題考驗形容詞的語意搭配。句子的意思是所有「______」的行銷職位應徵者都應該提交求職信和履歷。選項B) qualified (合格的、有資格的) 最符合語境，表示具備該職位所需條件的應徵者。這是招聘情境中常見的搭配詞 (qualified candidates)。選項A) increasing (增加中的) 指數量或程度正在增長，修飾應徵者不合邏輯。選項C) beneficial (有益的) 形容事物有益處，而非應徵者本身的特質。選項D) modified (被修改的) 指被改變過，與應徵者的狀態無關。因此，B是唯一正確且語意通順的答案。","translation":"所有符合行銷職位資格的應徵者都應該提交求職信和履歷。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_105_394","book":14,"part":5,"qNum":105,"stem":"Because experts ______ a strong allergy season, Chowlan Pharmacy has increased its stock of preventative medicine.","options":["A) predict","B) prediction","C) are predicted","D) predictably"],"answer":"A","explanation":"【文法解析】此題考驗動詞形式與語態。句中「Because experts ______ a strong allergy season」需要一個動詞來完成子句。選項A) predict 是動詞原形，與主詞 experts（複數）搭配，構成現在簡單式的主動語態「專家預測」，語意通順，表示專家主動預測過敏季節。選項B) prediction 是名詞，不能作為句子的主要動詞。選項C) are predicted 是被動語態，語意上不符，因為是「專家」主動預測「過敏季節」，而非「專家」被預測。選項D) predictably 是副詞，不能作為句子的主要動詞，它需要修飾一個動詞。因此，A是唯一正確且符合語法和語意的選項。","translation":"因為專家預測今年將是一個嚴重的過敏季節，周蘭藥局增加了預防藥品的庫存。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_106_395","book":14,"part":5,"qNum":106,"stem":"The mayor applauded the Wilton Clinic ______ its leadership in promoting the city's public health programs.","options":["A) at","B) for","C) of","D) to"],"answer":"B","explanation":"「Applaud」這個動詞後面接「for」是常見的搭配，表示讚揚某人或某事的原因或理由。「Applaud someone/something for [reason/action]」意指因為某人做了某事而給予讚揚或表示認可。在本句中，市長讚揚威爾頓診所，正是因為它在推廣公共衛生計畫方面展現了卓越的領導力。「at」、「of」和「to」在表達讚揚原因時皆不適用。「at」通常指地點；「of」表示所有格或部分；「to」則表示方向或對象。因此，選項B「for」是唯一正確且符合語意的選擇。","translation":"市長讚揚了威爾頓診所，因為它在推廣該市公共衛生計畫方面展現了領導力。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_107_396","book":14,"part":5,"qNum":107,"stem":"Liao Uniform Services has been a leading ______ of medical apparel for more than 30 years.","options":["A) supplies","B) supplying","C) supplier","D) supplied"],"answer":"C","explanation":"本題考查詞性。句中 'a leading ______ of' 結構，'leading' 為形容詞，修飾其後的名詞，表示『一個領先的...』。因此，空格處需填入一個單數名詞。選項 (C) 'supplier' 是單數名詞，意為『供應商』，符合語意和文法，形成『領先的醫療服裝供應商』。選項 (A) 'supplies' 作名詞時是複數，不符 'a' 的用法；作動詞時不符詞性要求。選項 (B) 'supplying' 是動名詞或現在分詞，不適合此處作核心名詞。選項 (D) 'supplied' 是動詞過去式或過去分詞，詞性不符。","translation":"廖氏制服服務公司三十多年來一直是醫療服裝的領先供應商。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_108_397","book":14,"part":5,"qNum":108,"stem":"Please adjust the budget to include the ______ of a fountain in the garden.","options":["A) schedule","B) determination","C) result","D) installation"],"answer":"D","explanation":"正確答案是D) installation。句子的語境是調整預算以「包含」花園裡噴泉的某個環節。Installation（安裝）指將設備或系統設置到位並使其運作的行為，這與預算編列和實際建造噴泉的成本直接相關，因此語意最為恰當。預算通常會包含某項工程或物品的「安裝費用」。\nA) schedule（時間表）不合適，因為噴泉本身沒有時間表，雖然安裝噴泉會有時間表，但「the schedule of a fountain」語意不通。\nB) determination（決心、測定）是抽象名詞，噴泉無法擁有決心，也與預算無關。\nC) result（結果）也不符合語境。預算通常是為了實現某事，而不是包含某事的「結果」。雖然噴泉安裝後會有結果，但預算調整是為了其「實現」過程，而非其「結果」。","translation":"請調整預算，以將花園裡噴泉的安裝費用納入其中。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_109_398","book":14,"part":5,"qNum":109,"stem":"The speed limit on all ______ streets in Benton has been changed to 40 kilometers per hour.","options":["A) residential","B) residing","C) residences","D) residentially"],"answer":"A","explanation":"【文法解析】此題考驗詞性辨別。空格後方為名詞「streets」（街道），因此空格處需填入一個形容詞來修飾「streets」。A) residential 是形容詞，意為「住宅的，居住的」，用來修飾「streets」非常恰當，指「住宅區街道」。B) residing 是動詞 reside 的現在分詞，雖然有時可作形容詞，但「residing streets」語意不通，通常用於修飾人。C) residences 是名詞「住宅」的複數形式，不能直接修飾另一個名詞。D) residentially 是副詞，意為「居住地，住宅地」，用來修飾動詞、形容詞或副詞，不能修飾名詞「streets」。因此，正確答案為 A。","translation":"班頓市所有住宅區街道的速限已更改為每小時40公里。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_110_399","book":14,"part":5,"qNum":110,"stem":"______ visitors generally prefer to set their own pace, the aquarium now offers user-friendly audio tours.","options":["A) Except","B) Since","C) How","D) That"],"answer":"B","explanation":"【文法解析】正確答案是B) Since。Since在此作為從屬連接詞，表示「因為」，用來引導原因子句。句子的意思是「因為遊客通常喜歡按照自己的步調參觀，水族館現在提供了使用者友善的語音導覽」。遊客的偏好是水族館提供語音導覽的原因，兩者構成明確的因果關係。A) Except是介系詞或連接詞，表示「除了」，不符合句意。C) How是連接詞，表示「如何」，引導方式或名詞子句，不引導原因子句。D) That是連接詞，通常引導名詞子句或目的子句，不適合在此引導原因子句。","translation":"由於遊客通常喜歡按照自己的步調參觀，水族館現在提供了使用者友善的語音導覽。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_111_400","book":14,"part":5,"qNum":111,"stem":"The salmon dish at Salia's Café ______ with a brown sugar, mustard, and pepper glaze.","options":["A) to serve","B) will serve","C) is served","D) was serving"],"answer":"C","explanation":"本題考驗動詞的語態與時態。句子的主詞是「The salmon dish」（鮭魚料理），這是一個無生命物體。料理本身不會主動「服務」或「供應」任何東西，而是「被服務」或「被供應」某種配料。因此，句子需要使用被動語態。\n\n選項A) \"to serve\" 是不定詞，不能直接作為句子的主要動詞。\n選項B) \"will serve\" 是主動語態的未來式，表示料理將主動供應，語意上不合理。\n選項D) \"was serving\" 是主動語態的過去進行式，表示料理過去正在主動供應，語意同樣不符。\n\n選項C) \"is served\" 是被動語態的現在式，表示「鮭魚料理被供應/搭配著...」，完全符合主詞的特性和句子的語意，說明這是該料理的常態供應方式。","translation":"Salia's Café 的鮭魚料理搭配著紅糖、芥末和胡椒醬。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_112_401","book":14,"part":5,"qNum":112,"stem":"Due to the uneven terrain of the Chilman Trail, proper hiking footwear is ______ recommended.","options":["A) closely","B) highly","C) nearly","D) roughly"],"answer":"B","explanation":"正確答案是 B) highly。「highly」作為副詞，意指「非常地；極度地」，常用來修飾動詞或形容詞，表示程度很高或非常重要。在此句中，「highly recommended」是常見的搭配詞，表示「強烈推薦」或「極力推薦」，非常符合因地形崎嶇而強調穿著適當鞋子的語境。A) closely 意指「密切地；仔細地」，通常用於描述關係或觀察方式，不適用於推薦的程度。C) nearly 意指「幾乎；差不多」，表示接近某個點但尚未達到，與推薦的語意不符。D) roughly 意指「大約地；粗略地」，表示不精確或不詳細，也不適合用來表達推薦的強度。","translation":"由於奇爾曼小徑崎嶇不平的地形，強烈建議穿著適當的登山鞋。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_113_402","book":14,"part":5,"qNum":113,"stem":"Visitors may tour the new printing plant facilities ______ the hours of 4 P.M. and 6 P.M.","options":["A) always","B) between","C) in","D) only"],"answer":"B","explanation":"【文法解析】本題考查介系詞的用法。句子中「the hours of 4 P.M. and 6 P.M.」表示一個時間區間，因此需要一個能表達「在…之間」的介系詞。\n\n正確答案 (B) between：介系詞，表示在兩個時間點或事物之間。片語「between the hours of X and Y」是表達特定時間區間的標準用法，符合句意。\n\n(A) always：副詞，表示「總是」，語法上無法直接連接時間區間。\n\n(C) in：介系詞，通常用於表達較大的時間段（如月份、年份、季節）或某個時間點內（如in the morning），但「in the hours of X and Y」並非表達時間區間的慣用說法。\n\n(D) only：副詞，表示「僅僅、只有」，語法上無法直接連接時間區間，且需要介系詞來連接前後文。","translation":"訪客可以在下午4點到6點之間參觀新的印刷廠設施。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_114_403","book":14,"part":5,"qNum":114,"stem":"Given the current economic climate, Playablanca Financial is ______ to make new acquisitions.","options":["A) hesitant","B) delinquent","C) worthy","D) empty"],"answer":"A","explanation":"A) hesitant (猶豫的) 最符合語境。在當前經濟氣候不佳的情況下，公司對於進行新的收購通常會感到猶豫或謹慎。B) delinquent (拖欠的、失職的) 指未履行義務，不適用於此。C) worthy (值得的) 語意不符，公司不是「值得去收購」。D) empty (空的) 則完全不合邏輯。因此，A是唯一能表達公司因經濟狀況而採取保守態度的選項。","translation":"鑑於當前的經濟氣候，Playablanca金融公司對於進行新的收購感到猶豫。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_115_404","book":14,"part":5,"qNum":115,"stem":"Mr. Fitzpatrick memorized his lines ______ weeks before the filming of the movie began.","options":["A) perfectly","B) perfected","C) perfect","D) perfecting"],"answer":"A","explanation":"此題考驗詞性判斷。句子的主幹是「Mr. Fitzpatrick memorized his lines...」（費茲派翠克先生記住了他的台詞）。空白處需要一個詞來修飾動詞「memorized」（記住），說明他是「如何」記住台詞的。\nA) perfectly 是副詞，意為「完美地」，修飾動詞「memorized」非常恰當，表示他完美地記住了台詞。\nB) perfected 是動詞的過去式或過去分詞，不能直接修飾動詞。\nC) perfect 是形容詞，修飾名詞，但此處沒有名詞可修飾。\nD) perfecting 是動名詞或現在分詞，在此句中語法不通。\n因此，選擇副詞 perfectly 最符合語法和語意。","translation":"費茲派翠克先生在電影開拍前數週就完美地記住了他的台詞。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_116_405","book":14,"part":5,"qNum":116,"stem":"Ms. Amari has scanned the grant applications, and they will be submitted ______ the deadline.","options":["A) along","B) over","C) during","D) before"],"answer":"D","explanation":"正確答案D) before表示「在...之前」，與deadline（截止日期）搭配，意指「在截止日期前提交」，符合語意且為慣用表達。A) along表示「沿著」或「與...一起」，不適用於時間點。B) over表示「超過」或「在...上方」，若指時間則通常為「超過期限」，與題目欲表達的「準時提交」語意不符。C) during表示「在...期間」，但deadline是一個時間點而非一段期間，故不適用。","translation":"阿瑪莉女士已掃描完補助金申請書，這些申請書將在截止日期前提交。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_117_406","book":14,"part":5,"qNum":117,"stem":"Good design and quality material are ______ important to Krasner Laboratory's product development team.","options":["A) gradually","B) enough","C) equally","D) well"],"answer":"C","explanation":"本題考查副詞的選擇。句中需要一個副詞來修飾形容詞「important」，表示「好的設計」與「優質材料」兩者對產品開發團隊的重要性程度。\nA) gradually (逐漸地) 不符合語境，無法表達兩者同等重要的概念。\nB) enough (足夠地) 作副詞時通常放在修飾的形容詞之後 (例如：important enough)，放在前面則語法錯誤。\nC) equally (同等地) 意指「程度相同」，完美表達「好的設計和優質材料兩者都同樣重要」的語意，且「equally important」是常見搭配。\nD) well (很好地) 通常修飾動詞或表示「健康地」，不適合修飾「important」來表達同等程度。\n因此，C) equally 是唯一正確選項。","translation":"好的設計和優質的材料對克拉斯納實驗室的產品開發團隊來說同等重要。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_118_407","book":14,"part":5,"qNum":118,"stem":"We make our ______ of pet treats with only the best ingredients.","options":["A) usage","B) line","C) result","D) addition"],"answer":"B","explanation":"正確答案為 (B) line。在商業語境中，\"a line of products\" 或 \"a line of goods\" 指的是一系列產品或產品線。句子 \"We make our line of pet treats\" 意指「我們生產我們的寵物零食系列」，語意通順且符合商業慣用語，表示公司生產多款寵物零食。 (A) usage (使用、用法) 不符語境，我們不會「製造使用」。(C) result (結果) 語意不合，我們不會「製造結果」。(D) addition (添加、附加物) 亦不符，我們不會「製造添加物」來指稱產品系列。因此，(B) line 是唯一能完整表達公司生產一系列寵物零食的選項。","translation":"我們只用最好的食材製作我們的寵物零食系列。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_119_408","book":14,"part":5,"qNum":119,"stem":"Dr. Wu provides patients with exceptional dental care at an ______ price.","options":["A) affords","B) affordable","C) affordably","D) affordability"],"answer":"B","explanation":"【文法解析】本題考驗詞性辨識。句型為「at an ______ price」，其中「an」是冠詞，「price」是名詞，因此空格處需要一個形容詞來修飾名詞「price」。\n\n選項 (B) affordable 是形容詞，意為「負擔得起的；實惠的」，符合文法結構，修飾「price」形成「實惠的價格」。\n\n選項 (A) affords 是動詞，意為「提供；買得起」，不符合修飾名詞的需求。\n選項 (C) affordably 是副詞，意為「負擔得起地」，不能直接修飾名詞。\n選項 (D) affordability 是名詞，意為「可負擔性」，不能用來修飾另一個名詞「price」。","translation":"吳醫師以實惠的價格為患者提供卓越的牙科護理。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_120_409","book":14,"part":5,"qNum":120,"stem":"______ two additional designers are hired, current staffers will not need to work overtime to complete projects on time.","options":["A) Whether","B) Already","C) Instead","D) If"],"answer":"D","explanation":"本題需要一個連接詞來引導條件子句。句子的結構是「如果某條件成立，則會產生某結果」。選項D) \"If\" (如果) 是一個從屬連接詞，用於引導條件子句，表示「如果...，那麼...」，完全符合句意：如果雇用更多設計師，員工就不必加班。選項A) \"Whether\" (是否) 用於引導名詞子句或表示選擇，不符合此處的條件關係。選項B) \"Already\" (已經) 是一個副詞，不能連接兩個子句。選項C) \"Instead\" (反而、取而代之) 也是副詞，通常用於表示替代或對比，不能引導條件子句。因此，D是唯一正確答案。","translation":"如果再雇用兩名設計師，現有的員工就不需要加班來準時完成專案。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_121_410","book":14,"part":5,"qNum":121,"stem":"All safety policies will be ______ reviewed by the Human Resources Department before publication.","options":["A) extensively","B) extensive","C) extension","D) extending"],"answer":"A","explanation":"本題考驗詞性判斷。句子的結構為「will be ______ reviewed」，其中「reviewed」是動詞的過去分詞，作為被動語態的一部分。我們需要一個副詞來修飾動詞「reviewed」，說明審查的方式。選項A「extensively」是副詞，意為「廣泛地、徹底地」，符合句意，表示政策將被人力資源部門徹底審查。選項B「extensive」是形容詞，修飾名詞，不能修飾動詞。選項C「extension」是名詞。選項D「extending」是動詞的現在分詞，在此不符合語法結構。因此，正確答案是A。","translation":"所有安全政策在發布前，都將由人力資源部門進行廣泛（或徹底）審查。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_122_411","book":14,"part":5,"qNum":122,"stem":"Some roadside farmers markets in Dublin run year-round, while others ______ only in the summer and fall.","options":["A) grow","B) operate","C) raise","D) promise"],"answer":"B","explanation":"【文法解析】本題考驗動詞的語意搭配。句中提到「有些市集全年營運 (run year-round)」，而「其他市集則只在夏季和秋季______」。動詞「operate」意指「營運、運作」，與前句的「run」形成完美的語意對應，表示市集在特定季節開放營業。選項 A) grow (生長、發展) 通常指植物或事業的成長，不適用於市集的季節性開放。選項 C) raise (舉起、撫養、募款) 和 D) promise (承諾) 在語意上皆不符合市集營運的情境，因此 B) operate 是唯一正確且語意通順的選項。","translation":"都柏林有些路邊農夫市集全年營運，而其他市集則只在夏季和秋季營運。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_123_412","book":14,"part":5,"qNum":123,"stem":"We do not have enough fabric samples, so please promptly return ______ ones you borrowed.","options":["A) what","B) whomever","C) whichever","D) whose"],"answer":"C","explanation":"正確答案是 C) whichever。「whichever」在此作為限定詞（determiner），修飾名詞「ones」，並引導一個名詞子句「whichever ones you borrowed」，意指「你借走的那些（樣品），不論是哪一些」。語氣上表示「無論是哪一個，都請歸還」。A) what：通常作為疑問詞或關係代名詞，但「what ones」的用法不自然，且語意不符。B) whomever：是關係代名詞，指「任何人」，且用於指人，不適用於指物品「samples」。D) whose：是所有格限定詞或代名詞，指「誰的」，語意不符。因此，C) whichever 最能表達「請歸還你借走的任何樣品」之意。","translation":"我們沒有足夠的布料樣品，所以請立即歸還你借走的那些。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_124_413","book":14,"part":5,"qNum":124,"stem":"______ it does not rain tomorrow, tents will be set up for any scheduled outdoor events.","options":["A) Though","B) Even if","C) Almost","D) Besides that"],"answer":"B","explanation":"正確答案為 (B) Even if。「Even if」意為「即使」，引導一個讓步子句，表示即使某種情況發生（或不發生），主句的動作仍會進行。題目中，「即使明天不下雨，帳篷仍會為所有預定的戶外活動搭建」，強調無論天氣如何，帳篷都會作為預防措施而搭建。 (A) Though 意為「雖然」，引導對比，語氣不符。 (C) Almost 意為「幾乎」，是副詞，在此不符合文法結構與語意。 (D) Besides that 意為「除此之外」，用於補充資訊，不適合引導條件子句。","translation":"即使明天不下雨，帳篷仍將為所有預定的戶外活動搭建。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_125_414","book":14,"part":5,"qNum":125,"stem":"The network is expected to be unavailable for ______ two hours.","options":["A) no more than","B) hardly any","C) as far as","D) that many"],"answer":"A","explanation":"【文法解析】正確答案為 A) no more than。「no more than」意為「最多」、「不超過」，用於表示數量或時間的上限。將其置於句中，\"for no more than two hours\" 意指「最多兩個小時」，語意通順，精確表達了網路預計停用時間的上限。B) hardly any 意為「幾乎沒有」，通常用於修飾可數名詞複數或不可數名詞，不適用於表示特定時間長度。C) as far as 意為「就…而言」或「遠至…」，用於表示範圍或程度，不適用於修飾具體的時間長度。D) that many 意為「那麼多」，通常指代前面提及的數量，或表示驚訝於某個數量之大，在此處修飾「兩個小時」不自然，且語意不符。","translation":"網路預計將停用最多兩個小時。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_126_415","book":14,"part":5,"qNum":126,"stem":"Consumer advocates advise against blindly accepting ______ opinions about a product.","options":["A) total","B) biased","C) profitable","D) competitive"],"answer":"B","explanation":"【文法解析】本題考驗詞彙選擇。正確答案B) biased 意指「有偏見的，偏頗的」。消費者倡導者會建議消費者不要盲目接受「有偏見的」產品意見，因為這些意見可能受到特定利益（例如製造商或銷售商）的影響，而非客觀中立，這與「blindly accepting」（盲目接受）形成邏輯上的對應。A) total（總計的，完全的）修飾意見語意不通。C) profitable（有利可圖的）雖可能與企業動機相關，但「有利可圖的意見」不如「有偏見的意見」直接表達其不可信賴性。D) competitive（競爭的）修飾意見語意不合。因此，B最符合語境。\n","translation":"消費者倡導者建議不要盲目接受關於產品的______意見。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_127_416","book":14,"part":5,"qNum":127,"stem":"______ of tasks makes a supervisor's job easier and helps team members learn new skills.","options":["A) Promotion","B) Commission","C) Provision","D) Delegation"],"answer":"D","explanation":"D) Delegation (委派、授權) 是正確答案。當主管將任務委派給團隊成員時，能有效減輕自己的工作負擔（makes a supervisor's job easier），同時也讓團隊成員有機會承擔新職責並學習新技能（helps team members learn new skills），完全符合句意。A) Promotion (晉升、推廣) 指職位提升或產品推廣，與任務分配無關。B) Commission (佣金、委員會) 指服務費或受託的委員會，語意不符。C) Provision (提供、供應) 指提供或供應某物，雖然主管會提供任務，但「delegation」更精確地表達了將任務和權責下放的動作，這才是達到減輕負擔和培養技能的關鍵。","translation":"任務的委派使主管的工作更輕鬆，並幫助團隊成員學習新技能。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_128_417","book":14,"part":5,"qNum":128,"stem":"Scientists at Lipkin Pharmaceuticals described findings similar to those reported ______.","options":["A) elsewhere","B) beyond","C) furthermore","D) wherever"],"answer":"A","explanation":"【文法解析】本題考查副詞的語義辨析。空格處需要一個副詞來修飾動詞 reported，表示「在什麼地方被報導」。\n選項 A) elsewhere 是一個副詞，意為「在別處；在其他地方」，完美符合語境，表示這些發現與「在其他地方被報導的」發現相似。\n選項 B) beyond 作為介系詞或副詞，意為「超越；在…之外」，不符合「被報導」的語境。\n選項 C) furthermore 是一個副詞，意為「此外；而且」，用於補充資訊，而非指地點。\n選項 D) wherever 作為連接詞或副詞，意為「無論何處」，雖然指地點，但在本句中不如 elsewhere 精準地表達「在其他地方」的比較概念。因此，A 是最佳答案。","translation":"Lipkin製藥公司的科學家們描述了與在其他地方報導的發現相似的研究結果。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_129_418","book":14,"part":5,"qNum":129,"stem":"All four walls of the greenhouse ______ of fully tempered glass.","options":["A) construct","B) constructing","C) have constructed","D) will be constructed"],"answer":"D","explanation":"本題考驗被動語態與時態的選擇。句子的主詞是「All four walls of the greenhouse」（溫室的所有四面牆），牆壁是被建造的對象，而非主動建造者，因此需要使用被動語態。被動語態的結構是「be動詞 + 過去分詞」。\nA) construct 是主動語態，表示牆壁主動建造，語意不符。\nB) constructing 是現在分詞，若要構成進行式或被動進行式，需要搭配be動詞，且此處應為被動。\nC) have constructed 是現在完成式的主動語態，表示牆壁主動建造完成，語意不符。\nD) will be constructed 是未來簡單式的被動語態（will + be + 過去分詞），表示牆壁將會被建造，語意和文法皆正確，符合題目語境。","translation":"溫室的所有四面牆都將由全鋼化玻璃建造。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og14_p5_130_419","book":14,"part":5,"qNum":130,"stem":"The increase in tourism in Mariondale can be ______ to the various attractions the city has added in recent years.","options":["A) deducted","B) confirmed","C) attributed","D) amplified"],"answer":"C","explanation":"正確答案為 (C) attributed。「attribute X to Y」意指將 X 歸因於 Y，表示 Y 是 X 的原因。題目中，Mariondale 觀光人數的增加，正是「歸因於」近年新增的各種景點，語意完全符合。 (A) deducted 意為「扣除」或「推斷」，不符合將結果歸因於原因的語境。 (B) confirmed 意為「確認」，雖然觀光人數增加可能被確認，但此動詞無法與介系詞「to」形成「歸因於」的關係。 (D) amplified 意為「放大」或「增強」，通常指強度或範圍的增加，而非因果關係的連結，且在此語境下不與「to」搭配表達因果。","translation":"Mariondale 觀光人數的增加，可以歸因於該城市近年來新增的各種景點。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_101_420","book":15,"part":5,"qNum":101,"stem":"Sunwirth Sneakers has several ______ in the greater metropolitan area.","options":["A) locations","B) locate","C) located","D) location"],"answer":"A","explanation":"本題考驗名詞的單複數與詞性。句中「Sunwirth Sneakers has several ______」指出 Sunwirth Sneakers 擁有「數個」某物。「several」是一個數量詞，表示「數個、一些」，其後必須接可數名詞的複數形式。\n選項 A) 「locations」是名詞「location」的複數形式，意指「地點、據點」，符合「several」後需接複數名詞的語法規則，故為正確答案。\n選項 B) 「locate」是動詞原形，意為「找出、定位」，詞性不符。\n選項 C) 「located」是動詞「locate」的過去分詞，常作形容詞用，意為「位於...的」，或構成被動語態，詞性不符。\n選項 D) 「location」是名詞單數形式，雖然詞性正確，但「several」後必須接複數名詞，故不符語法。","translation":"Sunwirth Sneakers 在大都會區擁有數個據點。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_102_421","book":15,"part":5,"qNum":102,"stem":"Cimber CPAs offers clients the convenience of ______ their invoices online and by mail.","options":["A) buying","B) paying","C) going","D) eating"],"answer":"B","explanation":"此題為動名詞選擇題，空白處位於介系詞 \"of\" 之後，因此需要一個動名詞 (V-ing) 來修飾。句子的語境是會計師事務所提供客戶處理「發票」的便利。\nA) \"buying\" (購買) 發票不符合常理，客戶通常是支付發票，而非購買發票。\nB) \"paying\" (支付) 發票是正確且常見的商業用語，意指結清帳單。Cimber 會計師事務所提供客戶線上或郵寄「支付」發票的便利，語意通順。\nC) \"going\" (去/進行) 發票，語意不通。\nD) \"eating\" (吃) 發票，明顯荒謬。\n因此，B) \"paying\" 是唯一符合語法和語意的選項。","translation":"Cimber 會計師事務所提供客戶線上和郵寄支付帳單的便利。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_103_422","book":15,"part":5,"qNum":103,"stem":"The new software at Patel Industries has been working ______ since it was installed last year.","options":["A) reliable","B) to rely","C) more reliable","D) reliably"],"answer":"D","explanation":"此題考驗詞性辨識。句中動詞 \"has been working\" 需要一個副詞來修飾，說明其「如何」運作。選項D) \"reliably\" 是副詞，意指「可靠地」，完美修飾動詞 \"working\"，表示軟體自安裝以來一直可靠地運作。選項A) \"reliable\" 是形容詞，修飾名詞而非動詞，故錯誤。選項B) \"to rely\" 是不定詞，表示「依賴」，語意不符。選項C) \"more reliable\" 是比較級形容詞，同樣不能修飾動詞。因此，D是唯一正確答案。","translation":"Patel工業公司的新軟體自去年安裝以來，一直運作得很______。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_104_423","book":15,"part":5,"qNum":104,"stem":"Best practices in customer service are outlined ______ the training handbook.","options":["A) along","B) toward","C) over","D) throughout"],"answer":"D","explanation":"正確答案D) throughout 表示「遍及、貫穿始終」，用來指某事物（最佳實踐）被完整地記載或呈現於另一事物（訓練手冊）的各個部分或整體範圍內，語意上最為貼切。句子意指客戶服務的最佳實踐在訓練手冊中被詳細闡述。A) along 通常指「沿著、與…一起」，不符合內容被包含在手冊中的語境。B) toward 指「朝向、接近」，表示方向，與本句語意不符。C) over 指「在…上方、結束、遍及」，在此處無法表達內容被「包含在」手冊中的意思。因此，throughout 是唯一能表達「在手冊中被完整說明」的選項。","translation":"客戶服務的最佳實踐已在訓練手冊中被闡明。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_105_424","book":15,"part":5,"qNum":105,"stem":"The Scratch software will help us migrate our client records ______.","options":["A) simple","B) simpler","C) simply","D) simplicity"],"answer":"C","explanation":"正確答案是 C) simply。此空格需要一個副詞來修飾動詞 \"migrate\"（遷移），說明遷移的方式。副詞 \"simply\" 意為「簡單地、簡便地」，完美地描述了客戶記錄將被遷移的方式。A) simple 是形容詞，用來修飾名詞，不能修飾動詞。B) simpler 是形容詞 \"simple\" 的比較級，同樣是形容詞，且在此句中沒有比較的語境，故不適用。D) simplicity 是名詞，意為「簡單性」，不能用來修飾動詞。因此，選擇副詞 \"simply\" 才能正確表達「簡便地遷移」的語意。","translation":"Scratch 軟體將幫助我們簡便地遷移客戶記錄。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_106_425","book":15,"part":5,"qNum":106,"stem":"The comedian said that ______ sense of humor was inherited from a grandparent.","options":["A) herself","B) her","C) she","D) hers"],"answer":"B","explanation":"正確答案是 B) her。此處需要一個所有格形容詞來修飾後面的名詞片語「sense of humor」（幽默感）。「her」作為所有格形容詞，表示「她的」，符合文法結構，用來指明幽默感是屬於這位喜劇演員的。選項 A) herself 是反身代名詞，通常用作受詞或強調語，不能直接修飾名詞。選項 C) she 是主格代名詞，用作句子的主詞，不能修飾名詞。選項 D) hers 是所有格代名詞，其功能是取代「所有格形容詞 + 名詞」，例如「hers = her sense of humor」，因此不能再與名詞「sense of humor」並列使用。故 B 為唯一正確選項。","translation":"這位喜劇演員說，她的幽默感是遺傳自一位祖父母。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_107_426","book":15,"part":5,"qNum":107,"stem":"Starting this August, Gavelton Bike Tours will be leading group cycling trips ______ Paris to Berlin.","options":["A) from","B) beside","C) along","D) after"],"answer":"A","explanation":"正確答案是 (A) from。片語 \"from X to Y\" 是表示旅程或範圍起點與終點的標準用法。題目中，自行車旅行的起點是巴黎，終點是柏林，因此 \"from Paris to Berlin\" 完美符合語意，表示從巴黎出發到柏林。 (B) beside (在...旁邊) 不符合表示旅程路徑的語境。 (C) along (沿著) 通常用於沿著某條路徑或物體移動（例如 along the river），但不能用來連接兩個城市作為起點和終點。 (D) after (在...之後) 則表示時間或順序，與此處的空間移動無關。","translation":"從今年八月開始，蓋維爾頓自行車之旅將會帶領團體自行車旅行，從巴黎到柏林。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_108_427","book":15,"part":5,"qNum":108,"stem":"We hope to ______ an agreement with Mason Cooper, Inc., within the next week.","options":["A) reach","B) talk","C) reason","D) put"],"answer":"A","explanation":"【文法解析】本題考驗動詞與名詞的慣用搭配（collocation）。正確答案 A) reach 是因為「reach an agreement」是一個非常常見且固定的片語，意指「達成協議」或「達成共識」，完全符合句子的語境，表達了公司希望成功簽訂協議的意圖。選項 B) talk (談論)、C) reason (推理、說服) 和 D) put (放置) 都無法與 agreement 形成慣用的動詞片語來表達「達成協議」的意思。例如，我們會說「talk about an agreement」，而不是「talk an agreement」。因此，A) reach 是唯一正確且符合英語習慣的選擇。","translation":"我們希望在下週內與Mason Cooper公司達成協議。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_109_428","book":15,"part":5,"qNum":109,"stem":"Factory-floor managers must submit an inspection report at the end ______ their shift.","options":["A) if","B) to","C) of","D) as"],"answer":"C","explanation":"正確答案是 C) of。此題考驗考生對常用介系詞片語的掌握。「at the end of + 名詞」是一個固定的英文片語，意指「在…的末尾/結束時」。因此，將 of 填入空格後，形成「at the end of their shift」，表示「在他們輪班結束時」，語意和文法皆正確。\nA) if 是一個連接詞，表示「如果」，用於引導條件子句，不符合此處需要介系詞來連接「end」和「shift」的語法結構。\nB) to 介系詞通常表示方向、目的或對象，例如「go to the end」，在此句中語意不通。\nD) as 可以是連接詞或介系詞，表示「作為」或「當…時」，也不適用於「at the end」後接名詞的結構。故 C 是唯一正確選項。","translation":"工廠現場經理必須在他們輪班結束時提交一份檢查報告。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_110_429","book":15,"part":5,"qNum":110,"stem":"______ a retail store, Seedum International will now sell merchandise only through its Web site.","options":["A) Sometimes","B) Later","C) Formerly","D) Frequently"],"answer":"C","explanation":"正確答案是C) Formerly。Formerly是一個副詞，意為「以前地，從前地」，用來表示過去的狀態或身份。題目中提到Seedum International「現在」只透過網站銷售商品，這與其「以前」是實體零售店形成對比。因此，Formerly精確地表達了這種過去與現在的轉變，完美符合句子的邏輯關係。A) Sometimes（有時候）、B) Later（之後）和D) Frequently（頻繁地）都是副詞，但它們分別表示頻率或時間點，無法表達「過去曾是」的語意，也不符合句子強調從過去狀態轉變到現在狀態的語境。","translation":"Seedum International 以前是一家零售店，但現在將只透過其網站銷售商品。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_111_430","book":15,"part":5,"qNum":111,"stem":"Remarkably, neither Ms. Chen ______ Mr. Gillespie had been notified that the board meeting was canceled.","options":["A) or","B) and","C) with","D) nor"],"answer":"D","explanation":"本題考查相關連接詞 (correlative conjunctions) 的正確搭配。「neither...nor」是一個固定的連接詞片語，意為「既不...也不...」，用來連接兩個平行的主詞、動詞、受詞或片語。題目中已有「neither」，因此必須搭配「nor」來完成這個結構，表示陳女士和吉雷斯皮先生兩人都沒有被告知會議取消。選項 A) \"or\" 通常與 \"either\" 搭配；選項 B) \"and\" 通常與 \"both\" 搭配；選項 C) \"with\" 是介系詞，不屬於連接詞片語，因此皆不符合文法結構。","translation":"值得注意的是，陳女士和吉雷斯皮先生兩人，都沒有被告知董事會會議已取消。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_112_431","book":15,"part":5,"qNum":112,"stem":"The new microwave soup containers are ______ than the previous ones.","options":["A) rigid","B) most rigidly","C) rigidly","D) more rigid"],"answer":"D","explanation":"這題考驗形容詞的比較級用法。句中出現關鍵字「than」，表示這是一個比較句型。空格前有be動詞「are」，後面要接形容詞來描述主詞「containers」。\nA) rigid 是形容詞原級，不符合比較句型。\nB) most rigidly 是副詞的最高級，副詞不能用來描述名詞，且最高級通常搭配「the」。\nC) rigidly 是副詞，不能用來描述名詞。\nD) more rigid 是形容詞「rigid」的比較級，符合「be動詞 + 比較級形容詞 + than」的句型，用來比較兩種容器的堅硬程度。因此，D是正確答案。","translation":"新的微波湯品容器比之前的更堅固。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_113_432","book":15,"part":5,"qNum":113,"stem":"The Banly Tourism Society is ______ to present the first issue of its publication, The Banly Quarterly.","options":["A) regular","B) general","C) proud","D) favorite"],"answer":"C","explanation":"正確答案為 C) proud。片語「be proud to do something」意指「很榮幸/很自豪去做某事」，符合班利旅遊協會首次發行刊物時，感到榮幸或自豪的情境。A) regular (規律的)、B) general (一般的) 和 D) favorite (最喜歡的) 均無法與「to present」形成具邏輯意義或慣用表達的片語，因此不適用於此句。","translation":"班利旅遊協會很榮幸能推出其刊物《班利季刊》的第一期。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_114_433","book":15,"part":5,"qNum":114,"stem":"Konixer Printers is conducting a thorough ______ of current requests for equipment upgrades.","options":["A) evaluate","B) evaluation","C) evaluator","D) evaluative"],"answer":"B","explanation":"【文法解析】此題考驗詞性辨識。句子的結構為 \"conducting a thorough ______ of...\"。在冠詞 \"a\" 和形容詞 \"thorough\" 之後，以及介系詞 \"of\" 之前，空白處需要填入一個名詞，以構成「進行一次徹底的（名詞）」的結構。\nA) \"evaluate\" 是動詞原形，不符合此處需要名詞的文法要求。\nB) \"evaluation\" 是名詞，意為「評估、評價」，符合句意與文法結構，表示「進行一次徹底的評估」。\nC) \"evaluator\" 也是名詞，意為「評估者」，指人。然而，句子主語 Konixer Printers 正在「進行」的是一個動作或過程（評估），而非「評估者」這個人。\nD) \"evaluative\" 是形容詞，意為「評估性的」，不符合此處需要名詞的文法要求。\n因此，正確答案為 B，使句子語意完整且文法正確。","translation":"Konixer Printers 正在對目前設備升級的需求進行一次徹底的評估。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_115_434","book":15,"part":5,"qNum":115,"stem":"______ the addition of 300 spaces, the ferry terminal's parking area is still full by 9:00 A.M. every day.","options":["A) Despite","B) Across","C) Besides","D) Inside"],"answer":"A","explanation":"本題考驗介系詞的語義。句子前後語意為對比關係：「增加了300個停車位」與「停車場仍然客滿」。A) Despite (儘管、雖然) 是表示讓步的介系詞，符合語意，表示即使增加了車位，情況仍未改善。B) Across (橫越)、C) Besides (除了...之外，表示附加)、D) Inside (在...裡面) 皆不符合句子的轉折語氣。","translation":"儘管增加了300個停車位，渡輪碼頭的停車場每天早上9點前仍然客滿。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_116_435","book":15,"part":5,"qNum":116,"stem":"Justlox, Inc., is planning to ______ redesign Model 543Q with its partners in Britain to ensure a better product.","options":["A) collaboration","B) collaborative","C) collaboratively","D) collaborate"],"answer":"C","explanation":"此題考驗詞性判斷。句子的結構是「is planning to ______ redesign」。動詞「redesign」（重新設計）前需要一個詞來修飾它，說明「如何」進行重新設計。\nA) collaboration 是名詞（合作），不能修飾動詞。\nB) collaborative 是形容詞（合作的），修飾名詞，不能直接修飾動詞「redesign」。\nC) collaboratively 是副詞（合作地），副詞的功能正是修飾動詞、形容詞或其他副詞。在此，它修飾動詞「redesign」，表示「以合作的方式」重新設計，語法和語意皆正確。\nD) collaborate 是動詞（合作），不能與「redesign」並列作為「to」的不定詞，會形成兩個動詞連用，語法錯誤。\n因此，選擇副詞 collaboratively 最為恰當，完整表達了合作重新設計的意圖。","translation":"Justlox公司正計劃與其英國合作夥伴「以合作的方式」重新設計Model 543Q，以確保產品更臻完善。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_117_436","book":15,"part":5,"qNum":117,"stem":"Each box of Lane Permanent Markers contains an ______ of surprising colors.","options":["A) assortment","B) excitement","C) account","D) industry"],"answer":"A","explanation":"本題考驗詞彙搭配與語意理解。空格前有不定冠詞「an」，後接介系詞片語「of surprising colors」，表示需要一個可數名詞，且能與「of colors」形成合理搭配。\nA) assortment (多樣化、各式各樣的組合)：「an assortment of surprising colors」意指「各式各樣令人驚訝的顏色組合」，語意通順，表示一盒麥克筆內含多種顏色，符合上下文。\nB) excitement (興奮)：「an excitement of colors」不符合慣用搭配，語意不通，盒子不會「包含」興奮。\nC) account (帳戶、報告)：「an account of colors」表示「顏色的描述或報告」，不符合盒子「包含」顏色的語境。\nD) industry (產業)：「an industry of colors」語意完全不符。\n因此，A是唯一正確答案。","translation":"每盒Lane牌永久性麥克筆都含有一系列令人驚訝的顏色。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_118_437","book":15,"part":5,"qNum":118,"stem":"We were pleased by the ______ and courteous reply we received from Astella Airlines concerning the change in itinerary.","options":["A) safe","B) close","C) clean","D) prompt"],"answer":"D","explanation":"正確答案是 D) prompt。Prompt 意為「迅速的，及時的」，用來形容回覆（reply）表示該回覆來得很快，非常符合顧客在處理行程變更時所期待的效率。句中「courteous」（有禮貌的）與「prompt」形成良好的搭配，共同描述了航空公司提供的優質服務，即回覆既迅速又有禮貌。A) safe（安全的）不適用於形容抽象的回覆。B) close（接近的，親密的）在此語境下不合適，無法修飾回覆的特質。C) clean（乾淨的）通常指物理上的清潔，無法形容回覆的品質。因此，D) prompt 是唯一能合理修飾「reply」並符合語境的選項。","translation":"我們對 Astella 航空公司就行程變更所給予的迅速且有禮貌的回覆感到滿意。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_119_438","book":15,"part":5,"qNum":119,"stem":"The rising employment rate is one factor contributing to ______ in the housing construction trade.","options":["A) grow","B) growth","C) grew","D) grown"],"answer":"B","explanation":"此題考驗介系詞後接詞性。句中「contributing to」的「to」是介系詞，介系詞後面必須接名詞或動名詞（V-ing）。\n選項A) grow 是動詞原形，不符文法。\n選項C) grew 是動詞過去式，不符文法。\n選項D) grown 是動詞過去分詞或形容詞，不符文法。\n選項B) growth 是名詞，意為「成長、增長」，符合介系詞後接名詞的文法規則。因此，正確答案為B，表示就業率上升是促成房屋建築業「成長」的因素之一，語意和文法皆正確。","translation":"不斷上升的就業率是促成房屋建築業「成長」的因素之一。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_120_439","book":15,"part":5,"qNum":120,"stem":"The color of the new chairs was not ______ on the invoice.","options":["A) specify","B) specified","C) specifying","D) specification"],"answer":"B","explanation":"本題考驗被動語態的結構。句子的主詞是「The color」（顏色），它不是主動執行「指定」這個動作，而是被「指定」。因此，我們需要使用被動語態「be動詞 + 過去分詞」。句中已有「was not」，所以空格處應填入動詞「specify」的過去分詞「specified」。選項A「specify」是動詞原形，不符合被動語態結構。選項C「specifying」是現在分詞，若使用則會變成主動語態（was not specifying），語意不符。選項D「specification」是名詞，不能用來構成被動語態的動詞部分。故選B。","translation":"新椅子的顏色在發票上並未註明。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_121_440","book":15,"part":5,"qNum":121,"stem":"Two hours is the ______ amount of time needed to complete the assignment.","options":["A) minimum","B) temporary","C) bottom","D) durable"],"answer":"A","explanation":"【文法解析】正確答案是 A) minimum。'minimum' 意為「最少、最低限度」，與 'amount of time' 搭配，表示完成作業所需的最少時間是兩小時，語意最為恰當。B) temporary (暫時的) 通常修飾事件或狀態，而非「時間量」本身。C) bottom (底部) 通常指實體位置或最低點，不與 'amount of time' 搭配。D) durable (耐用的) 用來形容物品的特性，與時間量無關。因此，A選項最符合句子的邏輯和語境。","translation":"完成這項作業所需的時間最少為兩小時。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_122_441","book":15,"part":5,"qNum":122,"stem":"A successful digital marketing campaign has helped Fossler Electronics ______ its profit margins.","options":["A) stabilized","B) stability","C) stabilizing","D) stabilize"],"answer":"D","explanation":"本題考查動詞 \"help\" 的用法。當 \"help\" 後面接「受詞 (object)」時，其後方的動詞應使用「原形動詞 (base form)」，形成 \"help + object + (to) + V (原形動詞)\" 的結構。句中 \"Fossler Electronics\" 是受詞，因此空格處應填入原形動詞。選項 A \"stabilized\" 是過去式或過去分詞，不符；選項 B \"stability\" 是名詞，詞性不符；選項 C \"stabilizing\" 是現在分詞，雖然有時可見 \"help + object + V-ing\" 的用法，但最標準且常見的結構是接原形動詞，尤其在此表達「幫助某人做某事」的完成或結果時。選項 D \"stabilize\" 是原形動詞，完美符合文法結構，表示幫助 Fossler Electronics 穩定其利潤。","translation":"一場成功的數位行銷活動幫助福斯勒電子公司穩定其利潤。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_123_442","book":15,"part":5,"qNum":123,"stem":"Applicants for the position of data manager are expected to have a minimum of three years' ______ experience.","options":["A) supervisors","B) supervisory","C) supervise","D) supervises"],"answer":"B","explanation":"此題考驗詞性辨析與名詞修飾。句中「three years' ______ experience」需要一個詞來修飾名詞「experience」（經驗）。\nA) supervisors 是複數名詞，若用「supervisors experience」語意不通，不符「管理經驗」之意。\nB) supervisory 是形容詞，意為「監督的、管理的」。用來修飾名詞「experience」形成「supervisory experience」（管理經驗、監督經驗），語意及文法皆正確，表示所需的是與監督工作相關的經驗。\nC) supervise 是動詞原形，D) supervises 是動詞第三人稱單數形，動詞不能直接修飾名詞。\n故正確答案為B，形容詞修飾名詞。","translation":"資料經理職位的申請者，預計需具備至少三年的管理經驗。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_124_443","book":15,"part":5,"qNum":124,"stem":"The mayor's speech at Monday's business breakfast ______ and will be broadcast later this week.","options":["A) record","B) recording","C) being recorded","D) was recorded"],"answer":"D","explanation":"【被動語態時態】主詞 The mayor's speech（市長的演講）是被錄製的對象，需用被動語態。and 連接兩個動詞，後面 will be broadcast 為未來被動式，前面應用過去被動式 was recorded（已被錄製）表示錄製已完成。A) record、B) recording、C) being recorded 均不符合句子結構，故選D。","translation":"市長週一商業早餐會上的演講已被錄製，稍後將在地方電視台播出。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_125_444","book":15,"part":5,"qNum":125,"stem":"The researchers ______ tested different formulas until the desired results were achieved.","options":["A) soon","B) suddenly","C) well","D) repeatedly"],"answer":"D","explanation":"【文法解析】正確答案是 D) repeatedly。句子的後半部「until the desired results were achieved」（直到達到預期結果）是關鍵線索，它暗示研究人員需要多次嘗試才能成功。因此，副詞 \"repeatedly\"（重複地、一再地）最能精確描述他們不斷測試的行為，直到目標達成。A) soon（很快地）指時間，不符語境。B) suddenly（突然地）指動作的意外性，與持續嘗試的語氣不符。C) well（好好地、充分地）指測試的品質或程度，但未能表達「多次嘗試」的含義。所以，\"repeatedly\" 是唯一能完整表達句子邏輯的副詞。","translation":"研究人員重複測試了不同的配方，直到達到預期的結果。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_126_445","book":15,"part":5,"qNum":126,"stem":"Loan specialists at Newton Bank can help your company ______ equipment purchases.","options":["A) commit","B) associate","C) reserve","D) finance"],"answer":"D","explanation":"【文法解析】正確答案是D) finance。「finance」意為「為…提供資金；資助」，與句中「Newton Bank 的貸款專員」和「設備採購」的語境完美契合。銀行貸款專員的職責正是協助公司取得資金以完成採購。因此，D是唯一符合語意和文法結構的選項。\nA) commit 意為「承諾；致力於」，通常接介系詞to，如commit to a plan，或指「犯（罪）」。在此語境下，「幫助公司承諾採購」語意不通。\nB) associate 意為「聯想；聯繫」，通常搭配介系詞with，如associate A with B。與銀行提供資金的功能無關。\nC) reserve 意為「預訂；保留」，通常指預留物品或座位，而非提供資金協助採購行為。","translation":"牛頓銀行的貸款專員可以幫助貴公司資助設備採購。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_127_446","book":15,"part":5,"qNum":127,"stem":"______ our partnership with Shox Gym, we are able to provide employees with a free membership to the fitness center.","options":["A) After all","B) Because of","C) For this reason","D) As long as"],"answer":"B","explanation":"B) Because of 是一個複合介系詞，後面接名詞片語，表示原因。題目中「our partnership with Shox Gym」是名詞片語，與後面的結果句形成因果關係，故為正確答案。A) After all 是副詞片語，表示「畢竟」，不能直接接名詞。C) For this reason 是轉折副詞，表示「因此」，用於連接子句。D) As long as 是從屬連接詞，表示「只要」，後面需接子句。","translation":"由於我們與Shox Gym的合作關係，我們能夠為員工提供健身中心的免費會員資格。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_128_447","book":15,"part":5,"qNum":128,"stem":"Mr. Tran asked the department whether ______ could work overtime on Friday.","options":["A) anyone","B) anywhere","C) anyway","D) anyhow"],"answer":"A","explanation":"本題考查不定代名詞的用法。句子結構為「whether ______ could work overtime」，其中空格處需要一個主詞來搭配動詞「could work overtime」。\n\n(A) **anyone** 是一個不定代名詞，意為「任何人」，常用於疑問句、否定句或帶有「if/whether」的子句中，表示不確定或詢問某個特定群體中的任何成員。在此句中，Tran先生詢問部門「是否有人」可以在週五加班，語意和文法上都非常符合。\n\n(B) **anywhere** 是一個副詞，意為「任何地方」，指地點，不能作主詞。\n\n(C) **anyway** 是一個副詞，意為「無論如何；反正」，表示轉折或強調，不能作主詞。\n\n(D) **anyhow** 是一個副詞，意為「無論如何；隨便地」，與anyway相似，也不能作主詞。\n\n因此，只有(A) anyone 能正確填入空格，作為主詞指代人，使句意完整且符合文法。","translation":"Tran先生詢問部門是否有人可以在週五加班。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_129_448","book":15,"part":5,"qNum":129,"stem":"Canyonland Corporation will research the potential ______ of expanding its overseas market to East Africa.","options":["A) deadline","B) availability","C) profitability","D) emphasis"],"answer":"C","explanation":"正確答案為 (C) profitability。句中提到公司將「研究擴展海外市場的潛力」，擴展市場的主要目的是為了獲利，因此「潛在獲利能力 (potential profitability)」最符合語境。 (A) deadline (截止日期)、(B) availability (可用性) 和 (D) emphasis (強調) 皆不符合公司研究市場擴展潛力的邏輯。","translation":"峽谷地公司將研究將其海外市場擴展至東非的潛在獲利能力。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og15_p5_130_449","book":15,"part":5,"qNum":130,"stem":"Chef Lind's cookbook, ______ will be available next week, contains only dessert recipes.","options":["A) who","B) what","C) which","D) whose"],"answer":"C","explanation":"本題考查關係代名詞的用法。句中逗號後的子句「______ will be available next week」是一個非限定關係子句，用來補充說明前面的名詞「Chef Lind's cookbook」。由於「cookbook」是「物」，且在關係子句中作主詞（will be available 的主詞），因此應選用關係代名詞「which」。選項 A) \"who\" 用於指人，不適用於指物。選項 B) \"what\" 通常用於引導名詞子句，或表示「所…的事物」，不在此處引導有明確先行詞的關係子句。選項 D) \"whose\" 是所有格關係代名詞，後面應接名詞，而非動詞。故正確答案為 C) \"which\"。","translation":"林德主廚的食譜，下週將會上市，裡面只收錄了甜點食譜。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_101_450","book":16,"part":5,"qNum":101,"stem":"As a fashion ______, Mr. Goto stays current with constantly evolving trends.","options":["A) Marketed","B) Marketing","C) Marketer","D) Markets"],"answer":"C","explanation":"本題考查詞性與語意。句首的「As a fashion ______」表示「作為一名時尚______」，其中「fashion」是形容詞，修飾空格處的名詞。因此，空格需要填入一個名詞來指稱「人」的身份或職業。\n\nA) Marketed 是動詞的過去分詞，意為「被行銷的」，不符語意。\nB) Marketing 是動名詞或現在分詞，若作名詞，指「行銷活動」或「行銷學」，而非「行銷人員」。\nC) Marketer 是名詞，意為「行銷人員」或「市場銷售員」，符合句中 Mr. Goto 職業的語境。\nD) Markets 是名詞複數或動詞第三人稱單數，不符合「a」後接單數名詞的用法。\n\n故選 C) Marketer，使全句語意通順，文法正確。","translation":"作為一名時尚行銷人員，後藤先生隨時掌握不斷變化的趨勢。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_102_451","book":16,"part":5,"qNum":102,"stem":"To celebrate ______ restaurant's successful first year, Chef Zara gave the staff a bonus.","options":["A) Her","B) She","C) Hers","D) Herself"],"answer":"A","explanation":"此題考驗代名詞的詞性與用法。空格後方為「restaurant's successful first year」，其中「restaurant's」是所有格名詞，修飾後方的「successful first year」。我們需要一個所有格形容詞來修飾「restaurant's」，表明餐廳是屬於誰的。\nA) Her：所有格形容詞，意為「她的」，能修飾名詞「restaurant's」，表示「她的餐廳的」。語法正確，符合句意。\nB) She：主格代名詞，不能修飾名詞。\nC) Hers：所有格代名詞，用來取代所有格名詞片語，不能直接修飾名詞。\nD) Herself：反身代名詞，不能修飾名詞。\n因此，只有(A) Her 符合文法結構與語意，表示該餐廳是「她的」餐廳。","translation":"為了慶祝她的餐廳成功營運的第一年，主廚莎拉發給員工一筆獎金。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_103_452","book":16,"part":5,"qNum":103,"stem":"Ramico's Web site typically gets more than 1000 unique visitors ______ week.","options":["A) Both","B) Whole","C) Another","D) Every"],"answer":"D","explanation":"【文法解析】本題考查表示頻率的限定詞。正確答案D) Every，意為「每個、每一」，與單數名詞「week」連用時，表示「每週」，完美符合句中「typically gets」（通常會獲得）所表達的規律性與頻率。A) Both（兩者都）用於指代兩個事物，不適用於單數名詞「week」。B) Whole（整個的）表示完整性，如「the whole week」（整個星期），而非頻率。C) Another（另一個、又一個）表示額外或不同的事物，不符合「通常」發生的規律性語境。","translation":"Ramico的網站通常每週會獲得超過1000名獨立訪客。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_104_453","book":16,"part":5,"qNum":104,"stem":"Gardne company has become the most ______ supplier of fruit in the region.","options":["A) Rely","B) Reliable","C) Relies","D) Reliably"],"answer":"B","explanation":"此題空格前有 'the most'，空格後有名詞 'supplier'，表示空格處需填入形容詞來修飾名詞。選項B 'reliable' 是形容詞，意為『可靠的』，符合文法結構，形成『最可靠的供應商』。選項A 'rely' 和C 'relies' 是動詞，選項D 'reliably' 是副詞，皆無法修飾名詞，故B為正解。","translation":"Gardne 公司已成為該地區最可靠的水果供應商。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_105_454","book":16,"part":5,"qNum":105,"stem":"Rainer International provided a generous ______ that helped the park reach its goal.","options":["A) Contribute","B) Contribution","C) Contributed","D) Contributing"],"answer":"B","explanation":"【文法解析】此題考驗詞性判斷。句中「provided a generous ______」是動詞「provided」的受詞片語。在冠詞「a」和形容詞「generous」之後，需要一個名詞來構成完整的名詞片語。選項 (A) Contribute 是動詞原形，不符。選項 (B) Contribution 是名詞，意為「捐獻、貢獻」，符合文法結構，作為受詞。選項 (C) Contributed 是動詞的過去式或過去分詞，不符。選項 (D) Contributing 是動詞的現在分詞或動名詞。雖然動名詞可作名詞用，但在此語境中，「a generous contribution」（慷慨的捐獻）是慣用且語意最恰當的表達，指稱所提供的具體物品或款項，而非「慷慨的貢獻行為」。因此，(B) 是最佳答案。","translation":"Rainer International 提供了一筆慷慨的捐獻，幫助公園達成目標。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_106_455","book":16,"part":5,"qNum":106,"stem":"The aritsits and editors will vote today on which magazine cover ______ prefer.","options":["A) They","B) Their","C) Themselves","D) Them"],"answer":"A","explanation":"此題考驗代名詞的正確使用。句子的結構是「The artists and editors will vote today on [which magazine cover ______ prefer]」。方括號內是一個名詞子句，作為介系詞 \"on\" 的受詞。在這個名詞子句中，\"which magazine cover\" 是動詞 \"prefer\" 的受詞，因此空格處需要一個主格代名詞來作 \"prefer\" 的主詞，指代前面的「The artists and editors」。\nA) They：主格代名詞，可作動詞 \"prefer\" 的主詞，指代「The artists and editors」，語意和文法皆正確。\nB) Their：所有格形容詞，後面需接名詞，不能單獨作主詞。\nC) Themselves：反身代名詞，通常作受詞或強調語氣，不能作動詞的主詞。\nD) Them：受格代名詞，作動詞或介系詞的受詞，不能作主詞。\n因此，正確答案為 A。","translation":"藝術家和編輯們今天將投票決定他們比較喜歡哪一個雜誌封面。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_107_456","book":16,"part":5,"qNum":107,"stem":"Mr. Masaki telephoned to ______ appreciation for your help in getting his roof repaired.","options":["A) Express","B) Expressed","C) Expression","D) Be expressed"],"answer":"A","explanation":"【文法解析】本題考查不定詞結構。句中的 \"to ______\" 表示目的，後面必須接動詞原形，形成 \"to + 動詞原形\" 的不定詞片語。\nA) \"Express\" 是動詞原形，符合不定詞結構，表示「表達感謝」，語意通順。\nB) \"Expressed\" 是動詞的過去式或過去分詞，不能直接接在 \"to\" 後面作不定詞。\nC) \"Expression\" 是名詞，若要使用，需改為 \"to give an expression of appreciation\" 或 \"to make an expression of appreciation\"，單獨 \"to expression\" 不符合文法。\nD) \"Be expressed\" 是被動語態的不定詞，但句中 Mr. Masaki 是主動表達感謝，應使用主動語態。因此，A 是唯一正確答案。","translation":"正樹先生打電話來，是為了表達對您協助修好他屋頂的感謝。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_108_457","book":16,"part":5,"qNum":108,"stem":"Above all else, Suze Enterprise award employees who are ______.","options":["A) Resource","B) Resourceful","C) Resource","D) Resourcefulness"],"answer":"B","explanation":"【文法解析】本題考驗詞性辨識。句子的結構是「Suze Enterprise award employees who are ______」，其中「who are ______」是一個關係子句，修飾前面的名詞「employees」。在連綴動詞「are」之後，需要一個形容詞來描述主詞「who」（即「employees」）。選項 B) Resourceful 是形容詞，意為「足智多謀的、機敏的」，用來形容員工非常恰當，表示公司獎勵那些足智多謀的員工，語意和文法皆正確。選項 A) 和 C) Resource 是名詞，意為「資源」，不能直接跟在「are」後面描述人。選項 D) Resourcefulness 也是名詞，意為「足智多謀、機敏（的特質）」，員工不能「是」一種特質，而是「擁有」這種特質，故不符合文法。","translation":"最重要的是，蘇茲企業獎勵那些足智多謀的員工。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_109_458","book":16,"part":5,"qNum":109,"stem":"In light of (有鑒於)her recent ______, Mr. Goto will no longer be charged with inspecting the storage room.","options":["A) Invitation","B) Assortment","C) Promotion","D) Element"],"answer":"C","explanation":"正確答案是 (C) Promotion (升遷)。句子的語氣表示「有鑒於她最近的某事，後藤先生將不再負責檢查儲藏室」。升遷通常伴隨著職責的調整或更高階的任務，因此她獲得升遷是後藤先生不再負責檢查儲藏室的合理原因，符合因果關係。 (A) Invitation (邀請) 與職責變動無關，不構成理由。(B) Assortment (分類、組合) 在此語境下不合邏輯，無法解釋職務變動。(D) Element (元素) 則過於籠統且不符合句意。只有「升遷」能提供一個明確且合理的因果關係。","translation":"有鑒於她最近的升遷，後藤先生將不再負責檢查儲藏室。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_110_459","book":16,"part":5,"qNum":110,"stem":"In order to manage expenses, TZR Electronics reduced its marketing ______ by 10 percent last quarter.","options":["A) Consumer","B) Advertisement","C) Budget","D) Brand"],"answer":"C","explanation":"【文法解析】正確答案是 C) Budget。句中提到「In order to manage expenses (為了管理開支)」並「reduced its marketing ______ by 10 percent (將其行銷______減少了10%)」，這明確指出是在財務方面進行縮減。「Marketing budget (行銷預算)」最符合語境，表示公司為了控制成本而減少了行銷方面的資金投入。A) Consumer (消費者) 和 D) Brand (品牌) 無法被「減少10%」。B) Advertisement (廣告) 雖然與行銷相關，但「marketing advertisement」的組合較不自然，且預算才是直接被減少的對象。","translation":"為了管理開支，TZR電子公司上個季度將其行銷預算減少了10%。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_111_460","book":16,"part":5,"qNum":111,"stem":"Lena Sales, a leading online store, ______ two-hour delivery in several major stores.","options":["A) Excels","B) Determines","C) Proceeds","D) Advertises"],"answer":"D","explanation":"正確答案是 D) Advertises。此句意指「Lena Sales 這家領先的線上商店，在數家主要門市宣傳兩小時送達服務」。動詞 \"advertises\" (宣傳、廣告) 與後方的名詞片語 \"two-hour delivery\" (兩小時送達服務) 搭配，語意通順且符合文法。商店會宣傳其提供的服務，以吸引顧客。\n選項 A) Excels (擅長) 通常需搭配介系詞，如 \"excels at/in something\"，直接接 \"two-hour delivery\" 不符文法。\n選項 B) Determines (決定、確定) 語意上雖有「決定提供」的可能，但直接接服務名稱較不自然，通常會說 \"determines to offer\" 或 \"determines that...\"。\n選項 C) Proceeds (繼續進行、著手) 為不及物動詞，常搭配 \"with\" 或 \"to do something\"，不能直接接名詞作受詞。","translation":"Lena Sales，一家領先的線上商店，在數家主要門市宣傳兩小時送達服務。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_112_461","book":16,"part":5,"qNum":112,"stem":"Personal information disclosed to Manie Industries is ______ released to third parties without client permission.","options":["A) Quite","B) Never","C) Close","D) Well"],"answer":"B","explanation":"這題考驗副詞的語意與搭配。句子的語境是「未經客戶許可，個人資訊會被______發布給第三方」。從「without client permission（未經客戶許可）」這個關鍵詞來看，公司通常不會在未獲許可的情況下發布客戶的個人資訊，因此需要一個表示「絕不」或「從不」的副詞。\n選項B) \"Never\" 意為「從不、絕不」，完美符合語意，表示公司有嚴格的保密政策，絕不會在未經許可的情況下洩露資訊。\n選項A) \"Quite\" 意為「相當地」，語意不符。\n選項C) \"Close\" 作為副詞時意為「接近地」，但通常不修飾\"released\"，且語意不符。\n選項D) \"Well\" 意為「好好地、充分地」，語意不符。\n因此，\"Never\" 是唯一能使句子語意合理且符合常理的選項。","translation":"透露給Manie工業的個人資訊，在未經客戶許可的情況下，絕不會發布給第三方。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_113_462","book":16,"part":5,"qNum":113,"stem":"Arona Shopping plaza saw a 15 percent increase in foot traffic(人流) in the year after being ______.","options":["A) Redesign","B) Redesigned","C) Redesigning","D) Redesigns"],"answer":"B","explanation":"【文法解析】本題考驗「after being + 過去分詞」的被動語態結構。句中的「Arona Shopping plaza」是動作的承受者，意指購物中心「被」重新設計，而非主動執行設計。因此，在「after being」之後必須接過去分詞（V3）來構成被動語態，表示「在被重新設計之後」。選項B) Redesigned 是動詞「redesign」的過去分詞，符合此文法規則。選項A) Redesign 是動詞原形，C) Redesigning 是現在分詞，D) Redesigns 是第三人稱單數現在式動詞，皆不符合「being + V3」的被動語態結構，故為錯誤答案。","translation":"Arona購物廣場在被重新設計後的一年內，人流量增加了15%。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_114_463","book":16,"part":5,"qNum":114,"stem":"Part-time and seasonal employees are encouraged to attend the dinner and meet ______ members of the staff.","options":["A) The other","B) One another(後面不用接)","C) Others(後面不用接)","D) Everyone"],"answer":"A","explanation":"正確答案為(A)。此處需要一個限定詞來修飾名詞「members」。(A) \"The other\" 作為限定詞，表示「其餘的、其他的」，後面可接複數名詞，符合語意「與其餘的員工見面」。(B) \"One another\" 是相互代名詞，不能修飾名詞。(C) \"Others\" 是代名詞，不能修飾名詞。(D) \"Everyone\" 是不定代名詞，也不能修飾名詞。","translation":"兼職和季節性員工被鼓勵參加晚宴並與其他員工會面。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_115_464","book":16,"part":5,"qNum":115,"stem":"For the warranty to remain valid, the consumer must adhere to a ______ scheduled maintenance plan.","options":["A) Regular","B) Regularly","C) Regularity","D) Regularize..."],"answer":"B","explanation":"此題考驗詞性辨識。句子的核心結構是 \"a ______ scheduled maintenance plan\"。其中 \"plan\" 是主要名詞，\"maintenance\" 是修飾 \"plan\" 的名詞，而 \"scheduled\" 是一個過去分詞，在此作形容詞使用，修飾 \"maintenance plan\"。因此，空格處需要一個詞來修飾形容詞 \"scheduled\"。在英文文法中，修飾形容詞的詞必須是副詞。\n\n選項 A) \"Regular\" 是形容詞，不能直接修飾另一個形容詞。\n選項 C) \"Regularity\" 是名詞，不符合修飾形容詞的需求。\n選項 D) \"Regularize\" 是動詞，亦不符合。\n\n唯有選項 B) \"Regularly\" 是副詞，意指「定期地、規律地」，修飾 \"scheduled\"（被安排的），形成「定期安排的」維護計畫（regularly scheduled maintenance plan），完全符合語意與文法結構。","translation":"為了使保固保持有效，消費者必須遵守一份定期安排的維護計畫。","tags":[],"groupId
