Wireless, please _______ us in writing.","options":["A) declare","B) notify","C) qualify","D) state"],"answer":"B","explanation":"正確答案是 B) notify。Notify 意為「通知、告知」，在此句中表示「請書面通知我們」，語意和文法皆符合。當客戶決定終止服務時，通常需要「通知」服務提供商其決定。","translation":"如果您決定終止與 PQ Wireless 的手機服務方案，請書面通知我們。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_113_222","book":8,"part":5,"qNum":113,"stem":"The survey shows that most customers find Lundy Sweets' packaging ______ .","options":["A) appealed","B) appealing","C) appeal","D) appealingly"],"answer":"B","explanation":"此題考驗動詞 \"find\" 後接「受詞 + 受詞補語」的句型。句中 \"find\" 意為「認為、發現」，其後接 \"Lundy Sweets' packaging\" 作為受詞。受詞補語用來描述或補充說明受詞的狀態或性質，通常為形容詞或名詞。\n選項 A) appealed 是動詞過去式或過去分詞，不適合直接作形容詞補語。\n選項 C) appeal 是動詞原形或名詞，不符合此句型對形容詞補語的需求。\n選項 D) appealingly 是副詞，修飾動詞、形容詞或副詞，不能作受詞補語。\n選項 B) appealing 是現在分詞作形容詞，意為「有吸引力的、討人喜歡的」，恰好能描述 \"packaging\" 的特質，使其成為正確答案。","translation":"這項調查顯示，大多數顧客認為Lundy Sweets的包裝很有吸引力。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_114_223","book":8,"part":5,"qNum":114,"stem":"Today Mr. Lo verbally agreed to rent the property, _______ he will not sign the lease until next week.","options":["A) despite","B) or","C) but","D) either"],"answer":"C","explanation":"此題考驗連接詞的用法。句子前後兩半表達了對比關係：羅先生今天口頭同意租賃，但要到下週才會簽約。\nA) \"despite\" 是介系詞，後接名詞或動名詞，不能直接連接兩個獨立子句。\nB) \"or\" 表示選擇或替代，語意不符。\nC) \"but\" 是對等連接詞，表示轉折或對比，恰好表達了「口頭同意」與「延遲簽約」之間的對立關係，語意最為通順。\nD) \"either\" 通常與 \"or\" 連用，或作為代名詞/形容詞，不能單獨連接兩個子句。\n因此，\"but\" 是唯一正確選項，用來連接兩個語意上形成對比的子句。","translation":"羅先生今天口頭同意租賃該物業，但他要到下週才會簽署租約。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_115_224","book":8,"part":5,"qNum":115,"stem":"The new bus line is scheduled to travel _______ to the coast, bypassing several villages along its route.","options":["A) directions","B) director","C) directing","D) directly"],"answer":"D","explanation":"本題考驗詞性判斷。句中動詞 \"travel\"（行駛）需要一個副詞來修飾，說明其行駛的方式或方向。選項 D \"directly\"（直接地）是副詞，用來修飾動詞 \"travel\"，表示公車路線將「直接」行駛到海岸，語意完整且符合文法，並與後面的「繞過幾個村莊」形成邏輯上的呼應。選項 A \"directions\"（方向）是名詞，不能修飾動詞。選項 B \"director\"（主管、導演）是名詞，語意不符。選項 C \"directing\" 是動詞的現在分詞或動名詞形式，在此無法修飾動詞 \"travel\"，若要表達「直接前往」，應使用副詞 \"directly\"。因此，選 D 最為恰當。","translation":"這條新的公車路線預計將直接通往海岸，沿途會繞過好幾個村莊。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_116_225","book":8,"part":5,"qNum":116,"stem":"Please fill out the customer satisfaction survey and leave it at the reception desk at any time _______ your stay.","options":["A) during","B) onto","C) against","D) about"],"answer":"A","explanation":"【文法解析】本題考查介系詞的用法。句子的意思是「請填寫客戶滿意度調查表，並在您住宿期間的任何時間將其留在接待櫃檯。」。\n選項 A) during：表示「在…期間」，精確地指出填寫和提交問卷的動作可以在「您住宿」的整個時間範圍內進行，符合語境。\n選項 B) onto：表示「到…上面」，強調動作的方向或位置，與時間概念不符。\n選項 C) against：表示「反對」、「倚靠」或「對抗」，與時間概念不符。\n選項 D) about：表示「關於」或「大約」，雖然「about your stay」可以指「關於您的住宿」，但與「at any time」結合時，無法表達在某段時間內進行的意思，語意不通。\n因此，正確答案為 A。","translation":"請填寫客戶滿意度調查表，並在您住宿期間的任何時間將其留在接待櫃檯。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_117_226","book":8,"part":5,"qNum":117,"stem":"When Gollnick Architects presents the two housing construction plans, community members will be invited to express their ______ .","options":["A) prefers","B) preferring","C) preferential","D) preferences"],"answer":"D","explanation":"D是正確答案，因為「express their ______」需要一個名詞來作為動詞express的受詞。「preferences」是名詞，意為「偏好、選擇」，符合語意及文法結構。A選項「prefers」是動詞，不符。B選項「preferring」是動名詞或現在分詞，在此不符語意。C選項「preferential」是形容詞，不能直接作受詞。因此，D為最佳選擇。","translation":"當Gollnick建築事務所提出兩項住宅建設計畫時，社區成員將受邀表達他們的偏好。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_118_227","book":8,"part":5,"qNum":118,"stem":"Barett Printing produces high-quality posters with colors that stand ______ .","options":["A) for","B) by","C) up","D) out"],"answer":"D","explanation":"正確答案是 D) out。「stand out」是一個常用片語動詞，意指「顯眼、突出、引人注目」。在句中，它用來形容海報上的顏色鮮明、突出，使海報品質優良，符合題意。A) 「stand for」意為「代表、象徵」或「容忍」，與顏色鮮明的語境不符。B) 「stand by」意為「支持、遵守」或「準備就緒」，不適用於描述顏色。C) 「stand up」意為「站立」或「經得起考驗」，與顏色突出的意思無關。因此，只有「stand out」能完整表達題目中「顏色鮮明突出」的語意，使海報品質優良。","translation":"巴雷特印刷公司製作高品質海報，其色彩鮮明突出。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_119_228","book":8,"part":5,"qNum":119,"stem":"Many of the dishes at Conrad's Bistro tend _______ of varying quality.","options":["A) are","B) to be","C) are being","D) having been"],"answer":"B","explanation":"【文法解析】動詞「tend」後面通常接不定詞 (infinitive)「to + 原形動詞」，表示「傾向於」、「往往會」。因此，選項 B)「to be」是正確的用法，構成「tend to be」，意指「往往是」或「傾向於是」。\n\n選項 A)「are」是動詞，不能直接接在「tend」後面，會造成文法錯誤。選項 C)「are being」是現在進行式，不符合「tend」的慣用句型。選項 D)「having been」是完成分詞，語氣和文法上都不適用於此句，無法表達「傾向於」的意義。","translation":"康拉德小餐館的許多菜餚品質往往參差不齊。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_120_229","book":8,"part":5,"qNum":120,"stem":"The metal used by XRRM Co. to manufacture beverage cans weighs _______ less than it did a few years ago.","options":["A) tightly","B) enough","C) substantially","D) only"],"answer":"C","explanation":"這個空格需要一個副詞來修飾比較級「less」，表示重量減少的程度。\nA) tightly (緊密地) 語意不符，無法修飾「less」來表達程度，例如「tightly packed」（包裝緊密）。\nB) enough (足夠地) 通常放在形容詞或副詞之後，或名詞之前，例如「tall enough」（夠高），且「enough less」的組合不自然，無法表達「顯著減少」的語意。\nD) only (僅僅) 表示「只有、僅限於」，若用在此處，會表示重量減少的幅度很小或有限，與上下文可能想表達的「顯著進步」不符，且語氣上也不如C選項自然。\nC) substantially (實質上地、大幅地) 是一個常用來修飾比較級的副詞，表示「顯著地、大幅地」，完美地表達了金屬重量「大幅減少」的語意，強調了公司在材料使用上的顯著改進。因此，C是最佳答案。","translation":"XRRM公司用於製造飲料罐的金屬，其重量比幾年前大幅減少了。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_121_230","book":8,"part":5,"qNum":121,"stem":"Due to a decline in viewership, it is _______ whether the Jim Fuji Show will return next season.","options":["A) doubt","B) doubtful","C) doubtfully","D) doubting"],"answer":"B","explanation":"正確答案B) doubtful為形容詞，表示「令人懷疑的；不太可能的」。本題句型為「it is + 形容詞 + whether/that 子句」，其中it為虛主詞，真正的主詞是後面的whether子句。此句型用來表達某事是否會發生或是否屬實。因此，用形容詞doubtful來描述「吉姆富士秀下季是否回歸」這件事是「令人懷疑的」或「不太可能的」，語意和文法皆正確。\nA) doubt 是名詞或動詞，不能直接放在be動詞is之後作為主詞補語。\nC) doubtfully 是副詞，修飾動詞、形容詞或副詞，不能修飾主詞it。\nD) doubting 是動詞現在分詞，在此句中不符合語意，因為it並非主動執行「懷疑」這個動作。","translation":"由於收視率下降，吉姆富士秀下季是否會回歸仍是_______。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_122_231","book":8,"part":5,"qNum":122,"stem":"The publisher had to print a revised edition of the cookbook _______ the author found mistakes in several recipes.","options":["A) which","B) besides","C) after","D) until"],"answer":"C","explanation":"【文法解析】本題考查連接詞的選擇，以表達事件發生的先後順序或因果關係。選項C) \"after\" 作為從屬連接詞，意為「在…之後」，完美地表達了作者發現錯誤在先，出版社才不得不印刷修訂版在後的時間順序。作者發現錯誤是導致出版社印刷修訂版的原因，且時間上先於印刷。選項A) \"which\" 是關係代名詞，用於引導關係子句，不適用於連接兩個獨立的事件。選項B) \"besides\" 是介系詞或副詞，意為「除了」或「此外」，無法連接兩個子句並表達時間關係。選項D) \"until\" 意為「直到…為止」，表示某事持續到某個時間點或某事在某個時間點之前不會發生，與句子的邏輯不符。","translation":"出版社不得不印刷一本修訂版的食譜，因為作者在幾道食譜中發現了錯誤。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_123_232","book":8,"part":5,"qNum":123,"stem":"At DiFazio Entertainment, executives must be consulted before any _______ decisions are made.","options":["A) consequence","B) consequently","C) consequential","D) consequences"],"answer":"C","explanation":"此題考驗詞性辨識。句中「before any _______ decisions are made」需要一個形容詞來修飾名詞「decisions」（決策）。\nA) consequence 是名詞，意為「結果」。\nB) consequently 是副詞，意為「因此、結果是」，不能直接修飾名詞。\nC) consequential 是形容詞，意為「重要的、有重大影響的」。將其置入句中，形成「consequential decisions」（有重大影響的決策），語意和文法皆正確。\nD) consequences 是名詞「consequence」的複數形式。\n因此，只有形容詞 C) consequential 符合句子的文法結構，能正確修飾名詞「decisions」。","translation":"在DiFazio娛樂公司，任何重大決策制定前都必須諮詢高階主管。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_124_233","book":8,"part":5,"qNum":124,"stem":"Having the air-conditioning unit fixed by tomorrow is not _______ necessary, since the fan can keep the office cool enough.","options":["A) absolutely","B) already","C) eventually","D) closely"],"answer":"A","explanation":"本題考驗副詞修飾形容詞的能力及語意理解。空格後為形容詞 necessary (必要的)，因此需要一個副詞來修飾它。A) absolutely (絕對地，完全地) 是副詞，與 not 搭配形成 \"not absolutely necessary\" (非絕對必要)，表示「並非完全必要」，語意上與後面的「因為電扇已足夠讓辦公室保持涼爽」完美契合。B) already (已經) 是副詞，語意不符，不能修飾 necessary。C) eventually (最終，終於) 是副詞，語意不符，不能修飾 necessary。D) closely (密切地，仔細地) 是副詞，語意不符，不能修飾 necessary。因此，A 是唯一正確選項。","translation":"明天之前把空調機修好並非絕對必要，因為電扇已足夠讓辦公室保持涼爽。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_125_234","book":8,"part":5,"qNum":125,"stem":"The new Wyatt Medical Center was designed with environmental _______ in mind.","options":["A) sustainability","B) sustainable","C) sustaining","D) sustain"],"answer":"A","explanation":"【文法解析】\n本題考驗詞性辨識。句子的結構是「with environmental _______ in mind」，其中「environmental」是一個形容詞，用來修飾其後的名詞。因此，空格處需要填入一個名詞。\n選項A) sustainability 是一個名詞，意為「永續性、可持續性」，符合文法結構，與「environmental」結合形成「環境永續性」。\n選項B) sustainable 是一個形容詞，意為「可持續的、永續的」，若選此項，則會形成「形容詞 + 形容詞」修飾，文法錯誤。\n選項C) sustaining 是動詞 sustain 的現在分詞形式，可作形容詞（維持的）或動名詞，但在這裡不適合單獨作名詞。\n選項D) sustain 是動詞原形，意為「維持、支撐」，詞性不符。\n故正確答案為A，表示該醫療中心在設計時考量了環境的永續性。","translation":"新的懷亞特醫療中心在設計時，將環境永續性納入考量。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_126_235","book":8,"part":5,"qNum":126,"stem":"The house looks like a _______ residence on the outside, yet inside there are many unusual features.","options":["A) dominant","B) typical","C) relevant","D) potential"],"answer":"B","explanation":"正確答案是 (B) typical。「typical」意為「典型的，平常的」，用來形容房屋外觀「看起來很普通、常見」，與後半句「內部有許多不尋常的特色」形成鮮明對比，符合轉折詞「yet」的語氣。(A) dominant (主要的，支配的) 不符語境。(C) relevant (相關的) 無法描述外觀。(D) potential (潛在的) 亦不合適，因為句子描述的是房屋的現有外觀。","translation":"這棟房子從外面看起來像是一棟典型的住宅，然而內部卻有許多不尋常的特色。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_127_236","book":8,"part":5,"qNum":127,"stem":"Ms. Theroux has asked that last month's expenses be _______ in more detail on the budget report.","options":["A) clarify","B) clarifies","C) clarified","D) clarification"],"answer":"C","explanation":"【文法解析】正確答案是 C) clarified。此題考查被動語態的結構。句子中的「be _______」是形成被動語態的關鍵，其後必須接動詞的過去分詞 (past participle)。「expenses be clarified」意指「開支被澄清或說明」，符合語意，因為開支是被動地被要求說明。A) clarify 是動詞原形，B) clarifies 是動詞第三人稱單數現在式，兩者都不能直接接在「be」後形成被動語態。D) clarification 則是名詞，不能用來構成動詞片語，因此皆為錯誤選項。","translation":"Theroux 女士要求上個月的開支在預算報告中被更詳細地說明。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_128_237","book":8,"part":5,"qNum":128,"stem":"The writing conference in Austin has received a lot of _______ for its lineup of acclaimed authors.","options":["A) publicity","B) campaign","C) association","D) authorization"],"answer":"A","explanation":"本題考驗詞彙辨析能力。正確答案為 A) publicity。Publicity 指的是公眾關注或媒體報導，與會議因其知名作家陣容而獲得大量關注的語境完全吻合。「receive a lot of publicity」是常見搭配，意為「獲得大量宣傳/關注」。\n\nB) campaign 指的是一系列有目的的活動或運動。會議通常是「舉辦」或「發起」活動，而非「收到」大量活動，語意不符。\nC) association 指的是協會、團體或關聯。會議不會「收到」關聯，語意不通。\nD) authorization 指的是授權或批准。會議通常是「獲得」授權，而不是「收到」大量授權，且與「作家陣容」無直接關聯。","translation":"奧斯汀的寫作會議因其知名作家陣容而獲得了大量宣傳。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_129_238","book":8,"part":5,"qNum":129,"stem":"Skillman Manufacturing has been specializing in _______ plastic parts since 1987.","options":["A) fabrication","B) fabricating","C) fabricates","D) fabricate"],"answer":"B","explanation":"「Skillman Manufacturing has been specializing in _______ plastic parts since 1987.」此句中，「in」是一個介系詞。介系詞後面若接動詞，該動詞必須使用動名詞（V-ing）形式。選項B「fabricating」是動名詞，表示「製造」的動作，且動名詞可以帶受詞「plastic parts」，語意和文法皆符合。選項A「fabrication」是名詞，但不能直接接「plastic parts」作為其受詞，若要使用需改為「fabrication of plastic parts」。選項C「fabricates」是動詞的第三人稱單數現在式，選項D「fabricate」是動詞原形，兩者皆不能直接接在介系詞「in」之後。","translation":"Skillman 製造公司自1987年以來一直專門從事塑膠零件的製造。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_130_239","book":8,"part":5,"qNum":130,"stem":"The hiring committee may recommend candidates for positions _______ they have only limited professional experience.","options":["A) even if","B) except for","C) along with","D) in spite of"],"answer":"A","explanation":"【文法解析】本題考查連接詞的用法。句子結構為「主句 + 連接詞 + 從句」。從句「they have only limited professional experience」是一個完整的子句（主詞they + 動詞have）。\n選項A) even if 是一個從屬連接詞，意為「即使，儘管」，引導讓步子句，表示主句的動作會發生，即使從句的條件存在。這與句意「委員會可能會推薦候選人，即使他們經驗有限」吻合。\n選項B) except for、C) along with 和 D) in spite of 都是介系詞片語，後面應接名詞、代名詞或動名詞，而非完整的子句。因此，B、C、D在文法上不正確。","translation":"招聘委員會可能會推薦候選人擔任職位，即使他們只有有限的專業經驗。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_101_240","book":9,"part":5,"qNum":101,"stem":"Our advisers help clients make informed decisions about _______ investments.","options":["A) their","B) them","C) they","D) themselves"],"answer":"A","explanation":"【文法解析】此題考驗代名詞的正確使用。空格後方為名詞「investments（投資）」，因此空格處需要一個所有格形容詞來修飾該名詞，表示「誰的投資」。選項 A) \"their\" 是所有格形容詞，意指「他們的」，用來指代前文的「clients（客戶）」，表示「客戶的投資」，語法和語義上都正確。選項 B) \"them\" 是受格代名詞，不能直接修飾名詞。選項 C) \"they\" 是主格代名詞，不能直接修飾名詞。選項 D) \"themselves\" 是反身代名詞，雖然可以指代「clients」，但不能直接修飾名詞「investments」。因此，正確答案為 A。","translation":"我們的顧問協助客戶針對他們的投資做出明智的決定。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_102_241","book":9,"part":5,"qNum":102,"stem":"The photos available on clearlypictorial.com are intended for _______ use only.","options":["A) full","B) empty","C) personal","D) wealthy"],"answer":"C","explanation":"正確答案為 (C) personal。「for personal use only」是一個非常常見且標準的片語，意指「僅供個人使用」。這表示這些照片只能用於私人目的，而非商業或其他公開用途，這符合網站圖片通常會有的版權或使用限制語境，與句尾的「only」相呼應，強調其限制性。 (A) full：雖然有「full use」（充分利用）的說法，但與「only」連用時，語意上會產生矛盾，不符合題目限制使用的語境。(B) empty：「empty use」不是一個慣用片語，且「empty」（空的、無內容的）在此語境下沒有意義。(D) wealthy：「wealthy」（富有的）形容詞通常用來形容人或國家，不能用來修飾「use」，因此不合適。","translation":"clearlypictorial.com 網站上提供的照片僅供個人使用。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_103_242","book":9,"part":5,"qNum":103,"stem":"Before _______ the laboratory, all technicians must wash their hands thoroughly.","options":["A) leave","B) leaving","C) to leave","D) have left"],"answer":"B","explanation":"【文法解析】此題考驗介系詞後接詞類的文法規則。「Before」是一個介系詞，介系詞後面必須接名詞或動名詞（gerund）。選項 B) 「leaving」是動名詞，因此符合文法，意指「在離開之前」。選項 A) 「leave」是動詞原形，不能直接接在介系詞後面。選項 C) 「to leave」是不定詞，通常不直接接在介系詞後面。選項 D) 「have left」是現在完成式動詞片語，也不能接在介系詞後面。故正確答案為 B，形成「Before leaving...」的結構，表示「在做某事之前」。","translation":"在離開實驗室之前，所有技術人員都必須徹底洗手。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_104_243","book":9,"part":5,"qNum":104,"stem":"A 15 percent discount will be applied to the order only _______ the total price exceeds 100 euros.","options":["A) that","B) yet","C) also","D) if"],"answer":"D","explanation":"這題考驗連接詞的用法。句子表達的是「只有在總價超過100歐元時，訂單才會享有15%的折扣」，明顯需要一個表示條件的連接詞。「only if」是常見的片語，意為「只有當…才」，完美符合語意，引導一個條件子句。選項A) that 通常引導名詞子句或形容詞子句，不表示條件。選項B) yet 是對等連接詞，表示轉折或「然而」，不符。選項C) also 是副詞，表示「也」，不能連接子句或表達條件。因此，D) if 是唯一正確選項。","translation":"訂單將享有百分之十五的折扣，但僅限於總價超過一百歐元的情況。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_105_244","book":9,"part":5,"qNum":105,"stem":"The Stalmer Library is _______ to announce its second annual International Book Fair.","options":["A) exciting","B) excited","C) excitement","D) excite"],"answer":"B","explanation":"【文法解析】本題考驗動詞分詞作形容詞的用法。正確答案B) excited 是過去分詞，用來描述主詞「The Stalmer Library」的感受或狀態，表示圖書館「感到興奮」。片語「be excited to do something」意為「很高興/很興奮能做某事」，符合語意。A) exciting 是現在分詞，描述事物「令人興奮的」，若選A則表示圖書館本身是令人興奮的，而非它感到興奮。C) excitement 是名詞「興奮」，不能直接接在be動詞後作形容詞。D) excite 是動詞原形，文法上不符。","translation":"史塔默圖書館很高興宣布其第二屆年度國際書展。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_106_245","book":9,"part":5,"qNum":106,"stem":"Mr. Su will initiate a competitive process to _______ the vacant director's position.","options":["A) fill","B) hire","C) set","D) give"],"answer":"A","explanation":"正確答案為 (A) fill。在英文中，\"fill a position\" 是一個常見且自然的搭配詞，意指「填補職位空缺」或「為某個職位找到合適人選」。題目中提到「啟動競爭性流程」，目的正是為了找到人來填補這個空缺，因此 \"fill\" 最符合語意。 (B) hire 雖然與招聘相關，但通常是「雇用某人」，其受詞是人而非職位。你可以說 \"hire someone for a position\"。 (C) set (設定) 和 (D) give (給予) 在此語境下皆不符合邏輯或慣用法。你不會「設定職位」或「給予職位」來完成競爭性流程。","translation":"蘇先生將啟動一個競爭性流程來填補這個空缺的總監職位。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_107_246","book":9,"part":5,"qNum":107,"stem":"The charity auction was a huge _______ and raised enough funds for our planned improvements to Aurora Center.","options":["A) succeeds","B) succeeding","C) successful","D) success"],"answer":"D","explanation":"本題考驗詞性辨識。句型為「The charity auction was a huge _______」，其中「was」是連綴動詞，「a」是不定冠詞，「huge」是形容詞。在「a huge」之後，需要一個名詞來作為主詞補語，說明拍賣會的性質。\nA) 「succeeds」是動詞（第三人稱單數現在式），不符合此處需要名詞的語法。\nB) 「succeeding」是現在分詞，可作形容詞或動詞的一部分，不能作為名詞使用。\nC) 「successful」是形容詞，不能直接接在另一個形容詞「huge」之後作為名詞使用，會造成語法錯誤。\nD) 「success」是名詞，意指「成功」。因此，「a huge success」意為「巨大的成功」，完美符合語法結構和語意，表示拍賣會非常成功。","translation":"這場慈善拍賣會取得了巨大的成功，並為我們計劃中對極光中心的改善籌集到了足夠的資金。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_108_247","book":9,"part":5,"qNum":108,"stem":"Audience members are asked to sit _______ in their seats until all the performers have exited the stage.","options":["A) quietly","B) extremely","C) abruptly","D) possibly"],"answer":"A","explanation":"【文法解析】本題考查副詞的語義和用法。空格處需要一個副詞來修飾動詞「sit」，說明觀眾應該「如何」坐著。選項A)「quietly」意為「安靜地」，符合表演結束後觀眾應保持安靜、不打擾表演者離場的情境。選項B)「extremely」意為「極度地」，通常修飾形容詞或副詞，不適合修飾「sit」。選項C)「abruptly」意為「突然地」，與題目要求「保持坐著」的狀態不符。選項D)「possibly」意為「可能地」，表達可能性，而非坐姿的方式。因此，A)「quietly」是唯一符合語境和語法的選項。","translation":"觀眾被要求安靜地坐在座位上，直到所有表演者都離開舞台。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_109_248","book":9,"part":5,"qNum":109,"stem":"Givatti Products' cosmetics and household cleaners are manufactured in _______ facilities.","options":["A) separating","B) separate","C) separation","D) separately"],"answer":"B","explanation":"此題考驗詞性辨析。句型為「in _______ facilities」，空格處需填入一個形容詞來修飾名詞「facilities」（設施）。\nA) 「separating」是現在分詞，意為「正在分離的」，語意不符，因為設施本身不是在執行「分離」的動作，而是指設施的狀態是分開的。\nB) 「separate」是形容詞，意為「分開的、獨立的」，修飾「facilities」恰當，表示化妝品和家用清潔劑是在「分開的設施」中製造，符合產品類別不同而需獨立生產的邏輯。\nC) 「separation」是名詞，意為「分離」，不能直接修飾名詞。\nD) 「separately」是副詞，意為「分開地」，用來修飾動詞、形容詞或副詞，不能修飾名詞「facilities」。\n故選B，表示產品在不同的設施中生產。","translation":"吉瓦蒂產品的化妝品和家用清潔劑在分開的設施中製造。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_110_249","book":9,"part":5,"qNum":110,"stem":"The Public Works office will accept bids for the reconstruction of Bluebee Square _______ August 1.","options":["A) inside","B) against","C) onto","D) through"],"answer":"D","explanation":"【文法解析】正確答案為 D) through。在這裡，\"through\" 表示「直到…為止（包含該日期）」，意指公共工程處將接受藍蜂廣場重建工程的投標，直到8月1日（包含8月1日當天）。選項 A) inside 通常指在某空間或時間範圍內，不適用於表示截止日期。選項 B) against 意為「反對」或「對抗」，不符語境。選項 C) onto 表示「到…上面」，用於動作，不適用於時間。","translation":"公共工程處將接受藍蜂廣場重建工程的投標，直到8月1日為止。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_111_250","book":9,"part":5,"qNum":111,"stem":"The event coordinator recommends Zemecky Caterers because they _______ that they can handle complicated menus.","options":["A) are shown","B) showing","C) have shown","D) shows"],"answer":"C","explanation":"【文法解析】本題考查動詞時態與語態。句子的主詞是「they」（指Zemecky Caterers），需要一個能與之搭配的動詞形式。選項C「have shown」是現在完成式，表示Zemecky Caterers在過去某個時間點已經展現出他們能處理複雜菜單的能力，且此能力對現在的推薦仍具相關性，語意上最符合「因為他們已經證明過能力，所以被推薦」的邏輯。選項A「are shown」是被動語態，表示「他們被展示」，語意不符。選項B「showing」是現在分詞，不能單獨作為句子的主要動詞。選項D「shows」是第三人稱單數現在式，但主詞「they」是複數，動詞應為「show」，故文法錯誤。","translation":"活動統籌推薦Zemecky Caterers，因為他們已經證明自己能夠處理複雜的菜單。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_112_251","book":9,"part":5,"qNum":112,"stem":"The travel agency arranged to have _______ tour guides for each city on the group's itinerary.","options":["A) completed","B) experienced","C) far","D) sudden"],"answer":"B","explanation":"本題考驗形容詞的語意選擇。空格處需要一個形容詞來修飾「tour guides (導遊)」。A) completed (完成的) 不符語意，導遊不是被完成的任務。B) experienced (有經驗的) 最符合語境，旅行社當然會安排有經驗的導遊以確保服務品質。C) far (遠的) 語意不通，與導遊的特質無關。D) sudden (突然的) 也不合邏輯，導遊是事先安排的。因此，B) experienced 是唯一正確且合理的選項。","translation":"這家旅行社安排了在團體行程中的每個城市都有經驗豐富的導遊。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_113_252","book":9,"part":5,"qNum":113,"stem":"Information on Pretoria's water-quality standards is available on the city's Web site for _______ who might be interested.","options":["A) another","B) anyone","C) everything","D) either"],"answer":"B","explanation":"【文法解析】本題考查不定代名詞的用法。正確答案 (B) \"anyone\" 意指「任何人」，與後面的關係子句 \"who might be interested\" 搭配，形成「任何可能感興趣的人」，語意完整且符合上下文，表示資訊是提供給所有潛在的感興趣者。選項 (A) \"another\" 意指「另一個」，通常指單數的另一個人或事物，不適合此處指稱所有可能感興趣的人。選項 (C) \"everything\" 意指「所有事物」，指物而非人，不能與指人的關係代名詞 \"who\" 連用。選項 (D) \"either\" 意指「兩者之一」，表示在兩個選項中選擇一個，不符合此處指稱廣泛對象的語境。","translation":"關於普利托利亞水質標準的資訊，可在該市的網站上查閱，供任何可能感興趣的人參考。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_114_253","book":9,"part":5,"qNum":114,"stem":"Because the Telco 5XP industrial mixer has over 100 parts, a skilled _______ is required even for minor repairs.","options":["A) component","B) manual","C) device","D) technician"],"answer":"D","explanation":"【文法解析】正確答案為(D) technician。題目指出工業攪拌機零件繁多，即使是小幅維修也需要「一位熟練的_______」。(D) technician 指的是「技術人員」，符合語境中需要一位具備專業技能的人來執行維修工作。選項(A) component（零件）、(B) manual（手冊）和(C) device（裝置）皆為物品，而非執行維修動作的人。句中「a skilled _______」明確表示需要一個「熟練的」人來完成任務，因此(D) technician 是唯一符合語法和語義的選項。","translation":"因為Telco 5XP工業攪拌機有超過100個零件，即使是小幅維修也需要一位熟練的技術人員。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_115_254","book":9,"part":5,"qNum":115,"stem":"Pataki IT Systems had difficulty deciding which of two offices to lease, as both spaces were _______ attractive.","options":["A) equal","B) equals","C) equally","D) equality"],"answer":"C","explanation":"【文法解析】本題考驗詞性辨識與修飾關係。空格後的「attractive」是形容詞，表示「有吸引力的」。在be動詞（were）之後，若要修飾形容詞，我們需要一個副詞。選項(C)「equally」是副詞，意為「同樣地」，能正確修飾形容詞「attractive」，形成「equally attractive」（同樣有吸引力）。選項(A)「equal」是形容詞，不能直接修飾另一個形容詞。選項(B)「equals」是名詞或動詞，詞性不符。選項(D)「equality」是名詞，意為「平等」，在此處語法上不正確。因此，只有副詞「equally」能使句意完整且符合文法。","translation":"Pataki IT Systems在決定租賃哪間辦公室時遇到困難，因為這兩個空間都同樣具有吸引力。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_116_255","book":9,"part":5,"qNum":116,"stem":"Although the hotel is located in a resort area, its new marketing campaign is aimed _______ business travelers.","options":["A) behind","B) in","C) at","D) from"],"answer":"C","explanation":"「aimed at」是一個常見的片語，意為「針對、瞄準」某個目標或群體。句中表示行銷活動的目標客群是商務旅客，因此選擇介系詞「at」最為恰當。其他選項（A) behind, (B) in, (D) from）與「aimed」搭配時，無法表達「針對」的語意，不符合句子的邏輯和習慣用法。","translation":"儘管這家飯店位於度假區，但其新的行銷活動卻是針對商務旅客。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_117_256","book":9,"part":5,"qNum":117,"stem":"After Mr. Lash retired, Ms. Cho took the _______ in planning the company's social events.","options":["A) leader","B) leading","C) lead","D) leads"],"answer":"C","explanation":"這題考驗慣用語的掌握。「take the lead」是一個常見的英文慣用語，意指「帶頭、主導、負責」。句子的意思是，在Lash先生退休後，Cho女士開始主導公司社交活動的規劃。選項A) leader 是指「領導者」，但不能直接說「took the leader」。選項B) leading 是動詞現在分詞或形容詞，不符合此處需要名詞的結構。選項D) leads 是動詞第三人稱單數或名詞複數，也不符合慣用語「take the lead」的用法。因此，C) lead 作為名詞，構成慣用語「take the lead」，是唯一正確的選項。","translation":"在Lash先生退休後，Cho女士開始主導公司社交活動的規劃。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_118_257","book":9,"part":5,"qNum":118,"stem":"The intersection of Wallace Avenue and Third Street will _______ open to pedestrian traffic during construction.","options":["A) enlarge","B) secure","C) transform","D) remain"],"answer":"D","explanation":"正確答案為 D) remain。「remain open」是常見搭配，意指「保持開放」，表示在施工期間，該路口將持續對行人開放，語意通順且符合上下文。A) enlarge 意為「擴大」。不能「擴大開放」的狀態，語意不合。B) secure 意為「確保；固定」。雖然施工期間可能需要確保安全，但「secure open」並非慣用搭配，且在此處語意不符，並非確保「開放」本身。C) transform 意為「轉變」。通常指將某物轉變為另一種形式，不能直接與「open」搭配表示「轉變開放」的狀態，語法不自然。","translation":"華勒斯大道與第三街的交叉口在施工期間將保持對行人開放。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_119_258","book":9,"part":5,"qNum":119,"stem":"______ caterers charge an extra fee for cups and napkins.","options":["A) Most","B) Almost","C) Most of","D) The most"],"answer":"A","explanation":"選項A) Most 是正確答案。Most 作為限定詞 (determiner) 可以直接修飾複數名詞 (caterers)，表示「大多數的」或「大部分的」，語意和文法皆符合。選項B) Almost 是一個副詞，意為「幾乎」，不能直接修飾名詞。它通常修飾動詞、形容詞、其他副詞或限定詞 (例如 almost all)。選項C) Most of 需要在其後接一個限定詞 (如 the, these, my) 或代名詞，例如 \"most of the caterers\" 或 \"most of them\"，不能直接接裸露的複數名詞。選項D) The most 是最高級形式，通常用於形容詞或副詞的最高級 (如 the most expensive) 或與不可數名詞連用 (如 the most money)，不適用於此處表示「大部分」的語境。因此，A是最佳選擇。","translation":"大多數的餐飲業者會對杯子和餐巾收取額外費用。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_120_259","book":9,"part":5,"qNum":120,"stem":"Our online and evening programs allow students to earn credits while _______ working full-time.","options":["A) hourly","B) similarly","C) especially","D) simultaneously"],"answer":"D","explanation":"【文法解析】本題考查副詞的選擇，以精確表達時間上的並行關係。句中的 \"while\" 引導一個時間狀語從句，表示「在...的同時」。因此，我們需要一個副詞來修飾 \"working full-time\"，表示學生在全職工作的「同時」也能賺取學分。選項 D) \"simultaneously\" 意為「同時地」，完美符合語境，指學生可以一邊全職工作，一邊修讀課程賺取學分，兩者並行不悖。選項 A) \"hourly\" (每小時地) 指頻率或計費方式，不符合「同時進行」的語境。選項 B) \"similarly\" (相似地) 表示方式的相似，與時間點無關。選項 C) \"especially\" (尤其地) 表示強調或特別，也與「同時」的概念不符。因此，D) 是唯一正確的答案。","translation":"我們的線上和夜間課程讓學生能夠在全職工作的同時賺取學分。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_121_260","book":9,"part":5,"qNum":121,"stem":"If the city attempts _______ the contract further, construction of the Fontmore Bridge will be delayed.","options":["A) modifies","B) modified","C) has modified","D) to modify"],"answer":"D","explanation":"【文法解析】本題考查動詞 “attempt” 的用法。當 “attempt” 作為動詞，後面接續另一個動詞時，通常使用不定詞 (infinitive) 結構，即 “attempt to do something”，表示「試圖做某事」。因此，選項 D) “to modify” 是唯一符合此文法規則的選項。選項 A) “modifies” 是動詞原形加 s，B) “modified” 是過去式或過去分詞，C) “has modified” 是現在完成式，這三者都不能直接接在 “attempts” 後面形成正確的動詞片語。","translation":"如果市政府試圖進一步修改合約，豐特莫爾橋的建設將會延遲。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_122_261","book":9,"part":5,"qNum":122,"stem":"Results of the customer survey will be presented _______ the data have been analyzed.","options":["A) in addition to","B) by comparison","C) as soon as","D) all the same"],"answer":"C","explanation":"本題考連接詞。句中「Results...will be presented」與「the data have been analyzed」為兩個子句，需連接詞連接並表達時間關係。「as soon as」意為「一...就...」，引導時間副詞子句，表示資料分析完畢後，結果就會立即呈現，語意最為恰當。A) in addition to (除了...之外) 為介系詞片語，後接名詞或動名詞，不能接子句。B) by comparison (相較之下) 與 D) all the same (儘管如此) 皆為副詞片語，語意不符。","translation":"客戶調查結果將在資料分析完畢後立即呈現。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_123_262","book":9,"part":5,"qNum":123,"stem":"The Human Resources director stressed that the professor's contract must _______ include a clause about information protection.","options":["A) definite","B) definitely","C) define","D) definitive"],"answer":"B","explanation":"本題考查詞性辨析。句子的結構為「must _______ include」，其中「must」是助動詞，而「include」是動詞原形。在助動詞與主要動詞之間，需要一個副詞來修飾動詞「include」，說明「如何」包含或「以何種方式」包含。選項B) definitely 是一個副詞，意為「明確地，肯定地」，符合語法要求，修飾動詞「include」，表示合約必須「明確地」包含該條款。選項A) definite 和 D) definitive 都是形容詞，不能修飾動詞。選項C) define 是一個動詞，與後面的動詞「include」連用會造成語法錯誤。","translation":"人力資源部主管強調，教授的合約必須明確地包含一項關於資訊保護的條款。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_124_263","book":9,"part":5,"qNum":124,"stem":"______ with multiple programming languages greatly improves job prospects for those in the computer technology industry.","options":["A) Instruction","B) Interest","C) Familiarity","D) Variety"],"answer":"C","explanation":"本題考驗詞彙與介系詞搭配。空格處需填入一個名詞作為主詞，且能與介系詞「with」搭配，表達「熟悉、通曉」多種程式語言。選項C) Familiarity (熟悉) 最符合語意與文法，Familiarity with... (熟悉...) 是常見搭配。A) Instruction (教導) 和 B) Interest (興趣) 通常搭配 in；D) Variety (多樣性) 語意不符，且通常搭配 of。因此，C為正解。","translation":"熟悉多種程式語言能大幅提升電腦科技產業從業人員的就業前景。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_125_264","book":9,"part":5,"qNum":125,"stem":"Aomas Airlines only allows customers to cancel their tickets _______ 24 hours of purchase.","options":["A) above","B) within","C) even","D) when"],"answer":"B","explanation":"此題考驗介系詞的正確使用。句子的語境是航空公司設定取消機票的時間限制，需要一個介系詞來表達「從購買時間算起的24小時之內」。\n\nA) above (超過)：若填入，表示「超過24小時後」才能取消，與「only allows (只允許)」的限制語氣不符，且語意不通順。\nB) within (在…之內)：表示「在24小時內」可以取消，精確表達了時間限制，符合航空公司設定的規則，為正確答案。\nC) even (甚至)：為副詞，不能作為介系詞引導時間片語。\nD) when (當…時)：為從屬連接詞，不能直接接「24 hours of purchase」形成介系詞片語。\n\n故正確答案為B。","translation":"Aomas 航空只允許顧客在購買機票後的 24 小時內取消機票。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_126_265","book":9,"part":5,"qNum":126,"stem":"Ms. Orlov's achievements in the advertising industry are based on her ability to be _______ in trying out new marketing approaches.","options":["A) expected","B) honored","C) harmless","D) fearless"],"answer":"D","explanation":"【文法解析】本題考查詞彙語意。句子描述歐洛芙女士在廣告業的成就，是基於她「在嘗試新行銷手法時」所展現的能力。廣告業需要創新和勇於嘗試，因此「無所畏懼、大膽的」(fearless) 最符合語境，表示她不害怕冒險或嘗試新事物，這正是成就的基礎。\n\nA) expected (預期的)：語意不通，無法形容一種能力。\nB) honored (受尊敬的)：雖然成就可能帶來尊敬，但「有能力在嘗試時受尊敬」並非成就的直接原因。\nC) harmless (無害的)：與成就的因果關係薄弱，且廣告業的創新往往需要冒險，而非僅僅無害。","translation":"歐洛芙女士在廣告業的成就，是建立在她勇於嘗試新行銷手法、無所畏懼的能力之上。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_127_266","book":9,"part":5,"qNum":127,"stem":"Shareholders' _______ in the interim president has been high thanks to her clear and specific transition plan.","options":["A) confidence","B) confident","C) confidently","D) confidential"],"answer":"A","explanation":"此題考驗詞性辨識。句子的主詞是「Shareholders' _______」，需要一個名詞來完成所有格結構並作為句子的主語。選項A) confidence 是名詞，意為「信心」，與介系詞「in」搭配形成「對…的信心」，語意通順，符合句意。選項B) confident 是形容詞，意為「有信心的」；選項C) confidently 是副詞，意為「有信心地」；選項D) confidential 也是形容詞，意為「機密的」。這三者都無法在所有格「Shareholders'」之後作名詞使用，因此在文法上皆不正確。故選A。","translation":"股東們對這位臨時總裁的信心一直很高，這歸功於她清晰且具體的過渡計畫。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_128_267","book":9,"part":5,"qNum":128,"stem":"As senior researcher, Dr. Stanton is _______ qualified to present the results of the study.","options":["A) uniquely","B) earnestly","C) effortlessly","D) approximately"],"answer":"A","explanation":"【文法解析】本題考查副詞的選擇。空格處需要一個副詞來修飾形容詞「qualified」（有資格的）。選項A) uniquely（獨特地，獨一無二地）與「qualified」結合，表示史丹頓博士具備獨特或無與倫比的資格，非常符合「資深研究員」的身份，使其成為發表研究成果的最佳人選。選項B) earnestly（認真地）、C) effortlessly（不費力地）和D) approximately（大約地）在語意上均不適合修飾「qualified」，無法構成合理的語句。","translation":"作為資深研究員，史丹頓博士具備獨特的資格來發表這項研究的結果。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_129_268","book":9,"part":5,"qNum":129,"stem":"Kid Pro Toys' new action figures have outsold _______ of the competition.","options":["A) those","B) whose","C) what","D) which"],"answer":"A","explanation":"【文法解析】本題考查代名詞的用法，特別是用於比較句型中避免重複名詞。句子的意思是「Kid Pro Toys 的新公仔銷量超越了競爭對手的公仔」。為了避免重複「action figures」（公仔），我們需要一個複數代名詞來指代它。\n\nA) those：是複數指示代名詞，用來指代前面提到的複數名詞「action figures」，使比較對象明確且平行，語意為「競爭對手的那些（公仔）」。這是正確的用法。\nB) whose：是所有格代名詞或限定詞，表示「誰的」或「其…的」，不符合句子的比較結構。\nC) what：是疑問代名詞或關係代名詞，通常指「什麼」或「…的事物」，在此不適用於指代特定的複數名詞。\nD) which：是疑問代名詞或關係代名詞，用於選擇或引導子句，不適合在此處作為比較對象的代名詞。","translation":"Kid Pro Toys 的新公仔銷量已超越了競爭對手的公仔。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og9_p5_130_269","book":9,"part":5,"qNum":130,"stem":"Grape Street Apparel deliveries have been _______ by one day due to adverse weather conditions in the Northeast.","options":["A) taken on","B) broken down","C) gone through","D) held back"],"answer":"D","explanation":"正確答案是 D) held back。「held back」是一個動詞片語，意為「延遲、阻礙」或「阻止前進」。在本句中，惡劣天氣導致「Grape Street Apparel」的交貨被延遲了一天，因此「held back」完美符合語境。其他選項：A) taken on 意為「承擔、雇用」，不符；B) broken down 意為「故障、崩潰」，不符；C) gone through 意為「經歷、仔細檢查」，亦不符。唯有「held back」能表達交貨因天氣因素而延誤的意義。","translation":"由於東北部惡劣的天氣條件，Grape Street Apparel 的交貨已延遲了一天。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_101_270","book":10,"part":5,"qNum":101,"stem":"Attendees should bring a _______ of the accounting report to Friday's meeting.","options":["A) number","B) copy","C) message","D) figure"],"answer":"B","explanation":"【文法解析】正確答案是 B) copy。在會議情境中，與會者通常需要攜帶文件或報告的「副本」。\"A copy of the accounting report\" 意指一份會計報告的複製品，語意完整且符合常理。選項 A) number (數字) 和 D) figure (數字、圖表) 雖然可能存在於報告中，但不能用 \"a number/figure of the report\" 來表示要攜帶「報告本身」；通常會說 \"a number/figure *from* the report\"。選項 C) message (訊息) 則不適用於指稱一份實體報告。因此，\"copy\" 是唯一能表達攜帶報告複本的正確選項。","translation":"與會者應攜帶一份會計報告的副本參加週五的會議。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_102_271","book":10,"part":5,"qNum":102,"stem":"The increase in our domestic sales _______ quarter was more than we expected.","options":["A) lastly","B) lasting","C) last","D) lasted"],"answer":"C","explanation":"正確答案是 (C) last。在此句中，\"last\" 作為形容詞，修飾名詞 \"quarter\"，表示「上一個、最近的一個」季度。因此 \"last quarter\" 意指「上一季度」，完全符合語意，說明銷售增長發生在上一季度，且其增長超出預期。\n(A) lastly 是副詞，意為「最後地」，不能修飾名詞 \"quarter\"。\n(B) lasting 是形容詞，意為「持久的、持續的」，語意不符，因為我們談論的是特定的「上一季」，而非「持久的季度」。\n(D) lasted 是動詞 \"last\" 的過去式，句子結構需要一個形容詞來修飾 \"quarter\"，而非動詞。因此，(C) last 是唯一正確的選項。","translation":"我們國內銷售在上一季度的增長超出我們的預期。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_103_272","book":10,"part":5,"qNum":103,"stem":"Although Ms. Chaikin and Mr. Wexler are not musicians ______ , they proudly support the Fayville Symphony Orchestra.","options":["A) they","B) them","C) theirs","D) themselves"],"answer":"D","explanation":"正確答案是 D) themselves。此處需要一個反身代名詞 (reflexive pronoun) 的強調用法 (intensive use)，用來強調主詞 Ms. Chaikin 和 Mr. Wexler 本身並非音樂家。句子的意思是「儘管 Chaikin 女士和 Wexler 先生本人並非音樂家，他們仍驕傲地支持 Fayville 交響樂團。」D) themselves 最能表達「他們自己、本人」的意思，強調主詞的身份。A) they 是主格代名詞，不能直接跟在名詞後面修飾或強調。B) them 是受格代名詞，此處並非動詞或介系詞的受詞。C) theirs 是所有格代名詞，表示「他們的（東西）」，語意不符。","translation":"儘管 Chaikin 女士和 Wexler 先生本人並非音樂家，他們仍驕傲地支持 Fayville 交響樂團。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_104_273","book":10,"part":5,"qNum":104,"stem":"All the narrow streets leading to the railroad depot are _______ for repaving this month.","options":["A) allowed","B) scheduled","C) advanced","D) caused"],"answer":"B","explanation":"這題考驗動詞的語意搭配。句子的主語是「所有通往鐵路車站的狹窄街道」，後面接續「本月將進行重新鋪設」。選項B) \"scheduled\" 意為「排定、預定」，與「為重新鋪設而排定」語意完全符合，表示這些街道的重新鋪設工程已在本月排入計畫。選項A) \"allowed\" (允許) 不適用於街道，語意不通；選項C) \"advanced\" (提前、進階) 在此語境下不合邏輯；選項D) \"caused\" (造成、導致) 則文法和語意皆不通。因此，\"scheduled\" 是唯一正確的選擇，表達了計畫性。","translation":"所有通往鐵路車站的狹窄街道都已排定於本月重新鋪設。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_105_274","book":10,"part":5,"qNum":105,"stem":"Upon _______ at Califon Airport, please proceed to Kerrie Car Rental in Terminal G to pick up your vehicle.","options":["A) arrive","B) arrives","C) arrival","D) arrived"],"answer":"C","explanation":"「Upon」是一個介系詞，後面必須接名詞或動名詞（V-ing）。選項C「arrival」是名詞，與介系詞「Upon」形成「Upon arrival」（抵達時）的標準片語，語法正確且語意通順。選項A「arrive」是動詞原形，B「arrives」是動詞第三人稱單數，D「arrived」是動詞過去式或過去分詞，皆不能直接接在介系詞「Upon」之後。","translation":"抵達卡利豐機場後，請前往G航廈的凱瑞租車公司領取您的車輛。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_106_275","book":10,"part":5,"qNum":106,"stem":"Account managers at Stolzburg Company are trained _______ the use of the latest analytical tools.","options":["A) up","B) out","C) by","D) on"],"answer":"D","explanation":"正確答案是D) on。片語「train on something」意指「針對某事物進行訓練或學習」，強調訓練的內容或主題。在此句中，「the use of the latest analytical tools」是訓練的內容，因此使用介系詞on最為恰當，表示客戶經理們學習如何使用這些工具。A) up：雖然有「train up」的用法，但通常指培養某人或某技能，而非「train up the use of...」。B) out：在此語境中不適用。C) by：表示「由...訓練」，強調訓練者，而非訓練內容。因此，D) on是唯一符合語意和文法結構的選項。","translation":"Stolzburg公司的客戶經理都受過關於使用最新分析工具的訓練。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_107_276","book":10,"part":5,"qNum":107,"stem":"Further measures to improve air quality in the Chicago processing plant _______ in October.","options":["A) take","B) to take","C) be taken","D) will be taken"],"answer":"D","explanation":"主詞「Further measures」（進一步的措施）是動作的承受者，而非執行者，因此需要使用被動語態。動詞「take」（採取）的被動語態為「be taken」。句尾的「in October」（在十月）明確指出該動作將在未來發生，因此需要使用未來式。綜合以上兩點，正確的動詞形式應為未來被動語態「will be taken」。\nA) 「take」是主動語態，且為現在式，不符合主詞與時間。\nB) 「to take」是不定詞，不能作為句子的主要動詞。\nC) 「be taken」雖然是被動語態，但缺乏助動詞構成完整的未來被動語態動詞片語，無法獨立作為句子的主要謂語動詞。","translation":"進一步改善芝加哥加工廠空氣品質的措施將於十月採取。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_108_277","book":10,"part":5,"qNum":108,"stem":"The _______ item on the agenda will be approving the venue for the company's end-of-year gathering.","options":["A) next","B) busy","C) broad","D) high"],"answer":"A","explanation":"【文法解析】此題考驗形容詞的語意搭配。選項A) next (下一個的) 最符合語境，因為議程（agenda）上的項目通常是按順序進行的，因此「下一個項目」是自然且常見的表達方式。選項B) busy (忙碌的) 通常用來形容人或地方，不能修飾「項目」。選項C) broad (廣泛的) 雖然可以形容某個主題的範圍，但「the broad item」在此處語意不通順，無法指明是議程上的哪一個特定項目。選項D) high (高的) 無法用來形容議程上的項目，除非是「high-priority item」（高優先級項目），但單獨的「high」不適用。因此，A) next 是唯一正確且語意通順的選項。","translation":"議程上的下一個項目將是批准公司年終聚會的場地。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_109_278","book":10,"part":5,"qNum":109,"stem":"Ms. Yamamoto's ideas have greatly improved the hiring _______ for new employees at Bensouk, Inc.","options":["A) experienced","B) to experience","C) experiencing","D) experience"],"answer":"D","explanation":"本題考查詞性。句中「the hiring _______」需要填入一個名詞，與前面的「hiring」（在此作形容詞，修飾後面的名詞）共同構成一個名詞片語。選項D) \"experience\" 是一個名詞，意指「經驗」或「經歷」。將其填入後，形成「hiring experience」，指「招募經驗」或「招募過程中的經歷」，語意通順，表示山本女士的點子改善了新員工的招募過程或他們在招募過程中的感受。選項A) \"experienced\" 是形容詞（有經驗的），選項B) \"to experience\" 是不定詞，選項C) \"experiencing\" 是動名詞或現在分詞，三者皆無法在此處作名詞使用，故為錯誤選項。","translation":"山本女士的點子大大改善了Bensouk公司新員工的招募經驗。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_110_279","book":10,"part":5,"qNum":110,"stem":"Summer interns are monitored ______ , and those who excel are offered permanent positions.","options":["A) continuous","B) continue","C) continuously","D) continuity"],"answer":"C","explanation":"【文法解析】本題考查詞性。空格前為動詞片語 \"are monitored\" (被監控)，空格處需要一個副詞來修飾動詞，說明「如何」被監控。\nA) continuous 是形容詞，意為「連續的」，修飾名詞，故不符。\nB) continue 是動詞原形，意為「繼續」，不能修飾動詞，故不符。\nC) continuously 是副詞，意為「持續地、不斷地」，用來修飾動詞 \"monitored\"，表示實習生被「持續地」監控，語法和語義皆正確。\nD) continuity 是名詞，意為「連續性」，不能修飾動詞，故不符。\n因此，正確答案為 C。","translation":"暑期實習生受到持續監控，表現優異者將獲得永久職位。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_111_280","book":10,"part":5,"qNum":111,"stem":"The finance department has written a _______ description of various cost-cutting options.","options":["A) detailed","B) timed","C) regulated","D) sized"],"answer":"A","explanation":"【文法解析】本題考驗詞彙搭配與語境理解。空格處需要一個形容詞來修飾名詞「description」（描述）。\n\nA) detailed (詳細的)：最符合語境。財務部門撰寫關於「各種成本削減方案」的描述，通常需要提供深入、完整的資訊，因此「詳細的描述」是合理的搭配，表示內容豐富、資訊充足。\n\nB) timed (定時的)：指與時間相關或有時間限制的，不適用於描述文件內容的性質。\n\nC) regulated (受管制的)：指受規則或法律約束的，不適合修飾「描述」本身，描述的內容可能受管制，但描述本身不是「受管制的」。\n\nD) sized (有特定尺寸的)：指大小或尺寸，通常用於實體物品，不適用於抽象的「描述」。\n\n因此，選擇 A) detailed 最能完整表達財務部門對成本削減方案的說明程度。","translation":"財務部門已經撰寫了一份關於各種成本削減方案的_______描述。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_112_281","book":10,"part":5,"qNum":112,"stem":"For Delento Bakery's tenth anniversary, _______ gave away free cookies to the first 50 customers.","options":["A) it","B) what","C) there","D) who"],"answer":"A","explanation":"此題考驗代名詞的正確使用。句子的主語是「Delento Bakery」，這是一個組織或公司。當指代一個非人稱的組織或公司作為動作的執行者時，應使用代名詞「it」。因此，選項 A) it 是正確的，它指代 Delento 烘焙坊，表示烘焙坊贈送了免費餅乾。選項 B) what 是疑問代名詞或關係代名詞，不適合在此作主語。選項 C) there 通常用於引導句型（如 there is/are）或作地點副詞，不能作動詞「gave away」的主語。選項 D) who 是指人的代名詞，不適用於指代一個組織。","translation":"為了慶祝 Delento 烘焙坊的十週年紀念，它向首批 50 位顧客贈送了免費餅乾。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_113_282","book":10,"part":5,"qNum":113,"stem":"Wilthorn Landscapes sells hardy plants that thrive in climates that are _______ dry.","options":["A) soon","B) fast","C) quite","D) well"],"answer":"C","explanation":"正確答案是 C) quite。「quite」是一個程度副詞，意為「相當地；頗為」，用來修飾形容詞「dry」（乾燥的），表示氣候「相當乾燥」。這符合語意，說明植物能在某種程度乾燥的氣候中生長。A) soon 是時間副詞，意為「很快地」，不能修飾形容詞的程度。B) fast 作副詞時意為「快速地」，通常修飾動詞，不修飾形容詞的程度。D) well 作副詞時意為「良好地」，通常修飾動詞或表示健康狀況，不修飾形容詞的程度。因此，只有 C 能正確修飾「dry」。","translation":"威爾索恩景觀公司販售耐寒植物，這些植物能在相當乾燥的氣候中茁壯成長。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_114_283","book":10,"part":5,"qNum":114,"stem":"Dr. Garcia _______ everyone in the lab to a special dinner after the research project's successful conclusion.","options":["A) to treat","B) treated","C) treating","D) was treated"],"answer":"B","explanation":"【文法解析】本題考驗動詞時態與語態。句子的關鍵在於「after the research project's successful conclusion」（在研究專案成功結束之後），這明確指出動作發生在過去，因此需要一個過去式動詞。選項B) treated 是動詞treat的過去式，符合時間背景，且「treat someone to something」是常見的片語，意指「請某人吃/享受某物」。\n\n選項A) to treat 是不定詞，不能單獨作為句子的主要動詞。選項C) treating 是現在分詞，若要作主要動詞，需搭配助動詞（例如is treating或was treating）。選項D) was treated 是過去被動語態，但根據句意，Dr. Garcia是請客的人（主動），而非被請客的人（被動），故語態不符。","translation":"研究專案成功結束後，賈西亞博士請實驗室裡的每個人吃了一頓特別的晚餐。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_115_284","book":10,"part":5,"qNum":115,"stem":"______ to the Milwaukee-Chicago train line are causing major delays for commuters.","options":["A) Standards","B) Records","C) Selections","D) Disruptions"],"answer":"D","explanation":"「Disruptions (中斷、擾亂)」是正確答案。此字意指對正常運作的干擾或中斷，與句中「造成通勤者嚴重延誤 (causing major delays)」的語境完全吻合。火車路線上的中斷（例如故障、事故或天氣影響）會直接導致延誤。A) Standards (標準)：指規範或品質水準，與造成延誤無關。B) Records (紀錄)：指書面資料或檔案，不符合語意。C) Selections (選擇)：指挑選或選取，與火車延誤的語境不符。因此，從語意和上下文來看，「Disruptions」是唯一能使句子邏輯通順的選項。","translation":"對密爾瓦基-芝加哥火車路線的______正導致通勤者嚴重延誤。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_116_285","book":10,"part":5,"qNum":116,"stem":"A comprehensive company profile allows for a more _______ interaction with potential clients.","options":["A) productivity","B) production","C) productive","D) product"],"answer":"C","explanation":"本題考驗詞性辨識。句型為「a more _______ interaction」，其中「interaction」是名詞，因此空格處需要一個形容詞來修飾它，並與比較級副詞「more」搭配，形成「更...的互動」。選項C)「productive」是形容詞，意為「有成效的、富有生產力的」，符合文法結構與語意，表示「更有成效的互動」。選項A)「productivity」是名詞，意為「生產力」；選項B)「production」是名詞，意為「生產、製造」；選項D)「product」是名詞，意為「產品」。這三個選項皆為名詞，無法修飾名詞「interaction」，故為錯誤答案。","translation":"一份全面的公司簡介能讓與潛在客戶的互動更加富有成效。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_117_286","book":10,"part":5,"qNum":117,"stem":"Since _______ was available to travel on such short notice, the seminar was rescheduled.","options":["A) another","B) nobody","C) anything","D) several"],"answer":"B","explanation":"這題考驗代名詞的語意與上下文邏輯。句子的關鍵在於「the seminar was rescheduled」（研討會被重新安排），這暗示了前面子句的原因是負面的。B) nobody (沒有人)：若「沒有人」能在這麼短的時間內出差，那麼研討會被重新安排是合乎邏輯的結果。此選項完美符合語意。A) another (另一個)：若「另一個人」有空，研討會通常不會被取消或改期。語意不符。C) anything (任何事物)：anything通常指事物，且多用於疑問句或否定句。此處指「能出差」通常是人，且語意上不符。D) several (幾個)：several是複數代名詞，應搭配複數動詞were，而非was。即使文法正確，若「幾個人」有空，也不會導致研討會改期。","translation":"由於沒有人能在這麼短的時間內出差，研討會因此被重新安排了。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_118_287","book":10,"part":5,"qNum":118,"stem":"Toronto Fashion is always looking for new writers to _______ to future issues of the magazine.","options":["A) explain","B) gather","C) accompany","D) contribute"],"answer":"D","explanation":"正確答案是 D) contribute。動詞 contribute (貢獻；投稿) 與介系詞 to 形成片語 contribute to，意指「為…投稿/撰稿」，完美符合「作家為雜誌未來的期數撰稿」的語境。A) explain (解釋) 通常用於解釋某事，而非「解釋給期數」。B) gather (收集；聚集) 不符合作家與雜誌期數之間的關係。C) accompany (陪伴；伴隨) 意指與某人或某物同行，語意不符。因此，D 是唯一能使句意通順且符合文法結構的選項。","translation":"Toronto Fashion 雜誌一直在尋找新作家，希望他們能為雜誌未來的期數投稿。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_119_288","book":10,"part":5,"qNum":119,"stem":"The new automobile tires perform _______ in a variety of weather and road conditions.","options":["A) dependable","B) depend","C) dependability","D) dependably"],"answer":"D","explanation":"【文法解析】本題考驗動詞與修飾語的搭配。句中動詞「perform」（運作、表現）需要一個副詞來修飾，說明其「如何」運作。選項D)「dependably」是副詞，意為「可靠地」，恰好修飾動詞「perform」，表示輪胎在各種條件下都能可靠地運作。選項A)「dependable」是形容詞，用來修飾名詞，例如「a dependable tire」（可靠的輪胎），不適用於修飾動詞。選項B)「depend」是動詞原形，無法修飾另一個動詞。選項C)「dependability」是名詞，意為「可靠性」，在句中無法作為動詞的修飾語。因此，正確答案為D。","translation":"這些新汽車輪胎在各種天氣和路況下都能可靠地運作。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_120_289","book":10,"part":5,"qNum":120,"stem":"The economic outlook for the manufacturing sector remains uncertain _______ strong growth last year.","options":["A) unless","B) despite","C) eventually","D) whenever"],"answer":"B","explanation":"【文法解析】本題考驗連接詞的選擇，以表達前後句的邏輯關係。句子的前半部「製造業的經濟前景仍不明朗」表達負面或不確定的情況，而後半部「去年強勁的增長」則是一個正面的事實。這兩部分之間存在著「對比」或「讓步」的關係，即儘管去年有強勁增長，前景卻依然不明朗。\n選項 A) unless（除非）表示條件，不符合語境。\n選項 C) eventually（最終）是副詞，表示時間，不能連接兩個對比的事實。\n選項 D) whenever（每當）表示時間或頻率，不適用於描述單一的過去事件。\n選項 B) despite（儘管、雖然）正是表達這種對比或讓步關係的介系詞，意指「不顧、儘管有...」。因此，選擇 B 最能完整且正確地表達句意。","translation":"製造業的經濟前景仍不明朗，儘管去年有強勁的增長。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_121_290","book":10,"part":5,"qNum":121,"stem":"______ a fraction of the products sold at Ogden's Gifts are not made by local artisans.","options":["A) Only","B) Less","C) Enough","D) Very"],"answer":"A","explanation":"【文法解析】正確答案是A) Only。Only是唯一能修飾數量詞「a fraction of」（一小部分）的副詞，表示「只有一小部分」。它強調了非當地工匠製作的產品比例很小，語意通順。B) Less通常用於不可數名詞或比較級，不能直接修飾「a fraction of」。C) Enough意為「足夠的」，語法上不能這樣使用。D) Very用來修飾形容詞或副詞，不能修飾名詞片語。","translation":"在奧格登禮品店販售的產品中，只有一小部分不是由當地工匠製作的。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_122_291","book":10,"part":5,"qNum":122,"stem":"Because of unanticipated electrical repair work, all Corson Community Center events on Tuesday ______ .","options":["A) will be canceled","B) were canceling","C) to cancel","D) cancels"],"answer":"A","explanation":"【文法解析】本題考驗動詞時態與語態。主詞「all Corson Community Center events on Tuesday」（所有科森社區中心週二的活動）是複數，且活動本身不會主動「取消」；它們是被「取消」的，因此需要被動語態。此外，由於維修工作導致「週二」的活動受影響，表示這是一個關於未來事件的決定或結果，故應使用未來式。\n選項A)「will be canceled」是未來簡單被動語態（will + be + 過去分詞），完美符合主詞的複數形式、被動語態的需求以及對未來事件的描述。\n選項B)「were canceling」是過去進行式主動語態，語態和時態皆不符。\n選項C)「to cancel」是不定詞，不能直接作為句子的主要動詞。\n選項D)「cancels」是現在簡單式主動語態，且主詞「events」是複數，動詞應為「cancel」，不符主謂一致，語態也不符。","translation":"因為預料之外的電力維修工作，科森社區中心週二的所有活動都將被取消。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_123_292","book":10,"part":5,"qNum":123,"stem":"Review the _______ on the package carefully to ensure proper administration of the medicine.","options":["A) applications","B) policies","C) systems","D) directions"],"answer":"D","explanation":"正確答案為 D) directions。在此句中，\"directions\" 指的是藥品包裝上的「使用說明」或「指示」，這是確保藥物正確服用（administration）的關鍵資訊。因此，仔細審閱這些說明是合乎邏輯的。A) applications 指「應用」或「申請」，雖然藥物有其應用，但「包裝上的應用」在此語境下不自然，且無法表達「如何使用」的含義。B) policies 指「政策」，通常與組織或政府的規定相關，不會出現在藥品包裝上作為使用指南。C) systems 指「系統」，與藥品使用說明無關。綜合來看，只有 \"directions\" 能準確表達藥品包裝上需要仔細閱讀以確保正確用藥的「指示」。","translation":"請仔細審閱包裝上的使用說明，以確保藥物正確服用。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_124_293","book":10,"part":5,"qNum":124,"stem":"Table Mountain Ceramics of Cape Town is located _______ view of its namesake peak.","options":["A) along","B) toward","C) within","D) amid"],"answer":"C","explanation":"【文法解析】正確答案為 (C) within。「within view of...」是一個常見的片語，意指「在...的視野範圍內」或「看得到...的地方」。此處表示 Table Mountain Ceramics 位於一個能清楚看見其同名山峰（桌山）的位置，語意最為恰當。\n(A) along 通常表示「沿著」某物，如「沿著海岸線」，不適用於「view」。\n(B) toward 表示「朝向」或「往...的方向」，強調方向性，而非位置與視野的關係。\n(D) amid 意指「在...之中」或「被...環繞」，通常用於表示被多個事物包圍，不與「view」搭配形成慣用語。因此，(C) within 最能表達題目中「位於能看見桌山的位置」的語意。","translation":"開普敦的桌山陶瓷公司坐落於能看見其同名山峰（桌山）的位置。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_125_294","book":10,"part":5,"qNum":125,"stem":"Refunds can take up to three weeks, though incorrect charges are eligible for _______ reimbursement.","options":["A) affordable","B) essential","C) extended","D) immediate"],"answer":"D","explanation":"本題考驗詞彙語意與上下文邏輯。句中的「though」表示轉折或對比。前半句說明退款可能需要「長達三週」，因此後半句針對「錯誤收費」的退款，邏輯上應是提供一個更快速或不同的處理方式，以示區別。「immediate」意為「立即的、即刻的」，與前半句的「長達三週」形成鮮明對比，表示錯誤收費的退款處理會更迅速，符合語意。選項A「affordable」（負擔得起的）、B「essential」（必要的）與C「extended」（延長的）皆不符合句中對比「時間長短」的語境。","translation":"退款可能需要長達三週的時間，不過錯誤的收費則有資格獲得立即的補償。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_126_295","book":10,"part":5,"qNum":126,"stem":"The menus provided have not met our ______ , so Nectars Catering will no longer be a preferred vendor.","options":["A) expectant","B) expectations","C) expecting","D) expects"],"answer":"B","explanation":"正確答案為 (B) expectations。句中「our ______」需要一個名詞來作為動詞「met」的受詞。「our」是所有格代名詞，其後必須接名詞。\n(B) expectations 是複數名詞，意指「期望、預期、要求」，符合語意：「菜單未能達到我們的期望」。\n(A) expectant 是形容詞，意指「期待的、懷孕的」，不能直接接在所有格代名詞後作受詞。\n(C) expecting 是現在分詞或動名詞。雖然動名詞可作名詞用，但「our expecting」意指「我們期待的行為」，不符合「達到」的語境，我們達到的是「期望」本身，而非「期待的行為」。\n(D) expects 是動詞第三人稱單數現在式，不能接在所有格代名詞後。","translation":"所提供的菜單未能達到我們的期望，因此Nectars餐飲公司將不再是我們的首選供應商。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_127_296","book":10,"part":5,"qNum":127,"stem":"______ Ava Li was named top salesperson at Nye Furniture, Al Munn was a close second.","options":["A) In case","B) As if","C) While","D) Whether"],"answer":"C","explanation":"【文法解析】本題考查連接詞的用法。句子由兩個子句組成：「Ava Li was named top salesperson at Nye Furniture」和「Al Munn was a close second」，兩者之間存在對比關係。選項C) While 作為從屬連接詞，除了表示「當…的時候」，還能表示「然而、儘管」，用來連接兩個形成對比的事實或觀點，與句意「Ava Li 榮獲銷售冠軍，而 Al Munn 則緊追在後，位居第二」完美契合。選項A) In case (萬一、以防) 表示預防或假設；選項B) As if (彷彿、好像) 表示虛擬或不真實的比較；選項D) Whether (是否) 表示選擇或不確定性。這三者皆不符合句中對比的語義。","translation":"儘管艾娃·李被評為奈氏家具的頂級銷售員，艾爾·芒恩仍緊追在後，位居第二。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_128_297","book":10,"part":5,"qNum":128,"stem":"The invoice template can be _______ to accommodate changes in a company's pricing scheme.","options":["A) advised","B) disposed","C) counted","D) modified"],"answer":"D","explanation":"「The invoice template can be _______」為被動語態，空格需填入動詞的過去分詞。句意為「發票模板可以被_______以適應公司定價方案的變化」。A) advised (建議) 不適用於模板。B) disposed (處理掉) 與「適應變化」的語境不符，因為適應變化意味著修改而非丟棄。C) counted (計算) 不合語意。D) modified (修改、調整) 最符合語意，表示模板可以被修改來符合新的需求。","translation":"發票模板可以被修改，以適應公司定價方案的變化。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_129_298","book":10,"part":5,"qNum":129,"stem":"______ Director Miura gives his approval, we will submit the proposal tomorrow.","options":["A) As far as","B) Provided that","C) Regardless of","D) In addition to"],"answer":"B","explanation":"正確答案是B) Provided that。Provided that 是一個複合連接詞，意為「如果…；只要…」，用來引導條件子句，表示主句的動作或結果必須在某個條件滿足後才會發生。題目中，「只要三浦總監批准，我們明天就會提交提案」，明確表達了提交提案的條件是三浦總監的批准，因此B選項最符合語意。A) As far as 意為「就…而言；遠到…」，通常用於表達範圍或程度，不適用於引導條件子句。C) Regardless of 意為「不顧；儘管」，表示不考慮某事，與句子的條件關係相反。D) In addition to 意為「除了…之外；此外」，用於補充資訊，而非建立條件。","translation":"只要三浦總監批准，我們明天就會提交提案。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og10_p5_130_299","book":10,"part":5,"qNum":130,"stem":"______ Amaxek's attendance policy, all employees should be at the office by 9 A.M.","options":["A) In the event that","B) In accordance with","C) In order that","D) In front of"],"answer":"B","explanation":"【文法解析】本題考驗複合介系詞與連接詞的用法。空格後接名詞片語「Amaxek's attendance policy」，表示需要一個能引導名詞片語的介系詞或複合介系詞。\nB) In accordance with 是一個複合介系詞片語，意為「根據、依照」，後面直接接名詞或名詞片語，語意上完全符合「根據Amaxek的考勤政策」的上下文。\nA) In the event that 和 C) In order that 都是連接詞片語，後面必須接一個完整的子句（主詞+動詞），不能直接接名詞片語，故錯誤。\nD) In front of 是一個介系詞片語，意為「在...前面」，表示空間位置，語意上不符合「考勤政策」的上下文，故錯誤。","translation":"根據Amaxek的考勤政策，所有員工都應該在上午9點前到達辦公室。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_101_300","book":11,"part":5,"qNum":101,"stem":"New patients should arrive fifteen minutes before ______ scheduled appointments.","options":["A) themselves","B) their","C) them","D) they"],"answer":"B","explanation":"此題考驗代名詞的用法。空格後方是名詞片語「scheduled appointments」（預約好的會面），因此空格處需要一個所有格形容詞來修飾這個名詞片語，表示「新病患的預約」。選項B) \"their\" 是所有格形容詞，意指「他們的」，符合語法及語意，表示「新病患他們自己的預約」。選項A) \"themselves\" 是反身代名詞，不能修飾名詞。選項C) \"them\" 是受格代名詞，不能修飾名詞。選項D) \"they\" 是主格代名詞，也不能修飾名詞。故正確答案為B。","translation":"新病患應在他們預約好的會面時間前十五分鐘抵達。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_102_301","book":11,"part":5,"qNum":102,"stem":"The ______ version of the budget proposal must be submitted by Friday.","options":["A) total","B) many","C) final","D) empty"],"answer":"C","explanation":"正確答案是C) final。「final version」意指「最終版本」，與句中「必須在週五前提交」的截止日期語境完美契合，表示這是經過所有修改後，準備好正式提交的最終定稿。這是非常常見且自然的搭配詞。A) total (總計的) 不常用來形容「版本」，「total version」語意不通順，不符合提交文件的情境。B) many (許多) 用於修飾可數名詞的複數形式，但這裡的「version」是單數，且語意不符。D) empty (空的) 形容「版本」不合邏輯，一份空的預算提案不可能被要求提交。因此，C是唯一符合語法和語意的選項。","translation":"預算提案的最終版本必須在週五前提交。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_103_302","book":11,"part":5,"qNum":103,"stem":"Ms. Choi offers clients ______ tax preparation services and financial management consultations.","options":["A) only if","B) either","C) both","D) not only"],"answer":"C","explanation":"這題考驗對等連接詞的用法。句中提到Ms. Choi提供兩種服務：「tax preparation services」（稅務準備服務）和「financial management consultations」（財務管理諮詢），且兩者由「and」連接。選項C) \"both\" 能與 \"and\" 形成對等連接詞 \"both...and...\"，表示「兩者都」，語意為Ms. Choi同時提供這兩種服務，完全符合句意與文法結構。選項A) \"only if\" 是從屬連接詞，引導條件子句，不適用於連接名詞片語。選項B) \"either\" 通常與 \"or\" 搭配成 \"either...or...\"（兩者擇一），與句中的 \"and\" 不符。選項D) \"not only\" 通常與 \"but also\" 搭配成 \"not only...but also...\"（不僅...而且...），與句中的 \"and\" 不符。因此，\"both\" 是唯一正確答案。","translation":"崔女士為客戶提供稅務準備服務和財務管理諮詢。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_104_303","book":11,"part":5,"qNum":104,"stem":"Maya Byun ______ by the executive team to head the new public relations department.","options":["A) chose","B) choose","C) was choosing","D) was chosen"],"answer":"D","explanation":"此題考驗被動語態的理解。句中出現「by the executive team」，明確指出主詞 Maya Byun 是動作的「承受者」，而非「執行者」，因此需要使用被動語態。被動語態的基本結構是「be動詞 + 過去分詞」。選項 A) chose 和 B) choose 都是主動語態，不符合句意。選項 C) was choosing 是過去進行式的主動語態，表示 Maya Byun 正在選擇，與「by」片語語意衝突。選項 D) was chosen 是過去簡單式的被動語態，表示 Maya Byun「被」執行團隊選中，完美符合句子的語法和語意，表達了 Maya Byun 是被選中的對象。","translation":"瑪雅·卞被執行團隊選中，負責領導新的公共關係部門。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_105_304","book":11,"part":5,"qNum":105,"stem":"Belvin Theaters will ______ allow customers to purchase tickets on its Web site.","options":["A) yet","B) since","C) ever","D) soon"],"answer":"D","explanation":"正確答案為D) soon。Soon是一個時間副詞，表示「不久之後」或「很快地」，與未來式助動詞「will」搭配使用，表示某動作將在近期發生，語意上最為通順，指Belvin戲院將很快允許顧客在其網站上購票。A) yet通常用於否定句或疑問句，表示「尚未」或「仍然」，不適合此肯定未來式語境。B) since作為介系詞或連接詞，表示「自從」或「因為」，需要過去時間點或因果關係，不符合句意。C) ever表示「曾經」或「任何時候」，多用於疑問句、否定句或與最高級連用，不適用於此簡單的肯定未來敘述。","translation":"Belvin戲院將很快允許顧客在其網站上購票。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_106_305","book":11,"part":5,"qNum":106,"stem":"AIZ Office Products offers businesses a ______ way to send invoices to clients online.","options":["A) secure","B) securely","C) securest","D) secures"],"answer":"A","explanation":"此題考驗詞性判斷。句型為「a ______ way」，其中「way」是名詞，前面需要一個形容詞來修飾。選項A)「secure」是形容詞，意為「安全的」，符合修飾名詞「way」的需求，形成「a secure way」（一種安全的方式）。選項B)「securely」是副詞，意為「安全地」，用來修飾動詞、形容詞或副詞，不能直接修飾名詞。選項C)「securest」是形容詞的最高級，意為「最安全的」。最高級前通常需要定冠詞「the」（如「the securest way」），而非不定冠詞「a」。選項D)「secures」是動詞的第三人稱單數現在式，意為「確保」，或名詞複數，皆不符合此處修飾名詞的文法結構。因此，正確答案為A。","translation":"AIZ 辦公產品為企業提供一種安全的方式，可以在線上向客戶發送發票。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_107_306","book":11,"part":5,"qNum":107,"stem":"Because several committee members have been delayed, the accounting report will be discussed ______ than planned at today's meeting.","options":["A) late","B) latest","C) later","D) lateness"],"answer":"C","explanation":"本題考驗形容詞/副詞的比較級用法。句中出現了關鍵字「than planned」，表示需要一個比較級來比較實際討論時間與原定計畫時間。A) late 是原級副詞或形容詞，不適用於比較句型。B) latest 是最高級，通常前面會加the，且不與than連用。C) later 是late的比較級副詞，意指「比…更晚」，與「than planned」（比原計畫更晚）完美搭配，語意通順。D) lateness 是名詞，語法上不符合此處需要副詞來修飾動詞「discussed」的需求。因此，正確答案為C。","translation":"因為幾位委員會成員被耽擱了，所以會計報告將會比原定計畫更晚在今天的會議上討論。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_108_307","book":11,"part":5,"qNum":108,"stem":"According to the revised schedule, the manufacturing conference will begin at 9:00 A.M. ______ 8:00 A.M.","options":["A) now","B) when","C) due to","D) instead of"],"answer":"D","explanation":"【文法解析】正確答案是D) instead of。這個介系詞片語表示「取代、代替」或「而不是」，完美符合題目中「根據修改後的時程表」所暗示的時間變更。會議將於上午9:00開始，取代了原定的上午8:00。A) now 是一個時間副詞，無法在此句型中連接兩個時間點並表達替換關係。B) when 是一個從屬連接詞或疑問副詞，用於引導時間子句或詢問時間，不適用於此語境。C) due to 是一個介系詞片語，表示「因為、由於」，用來解釋原因，而非表達時間的替代關係。","translation":"根據修改後的時程表，製造業會議將於上午9:00開始，而不是上午8:00。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_109_308","book":11,"part":5,"qNum":109,"stem":"While the station is undergoing repair, the train will proceed ______ Cumberland without stopping.","options":["A) aboard","B) through","C) quickly","D) straight"],"answer":"B","explanation":"正確答案是B) through。此句描述火車在車站維修期間，將「不經停地」通過Cumberland。動詞「proceed」後接介系詞「through」表示「穿過、經過」某地，完美符合火車不停站地穿越Cumberland的情境。A) aboard（在…上；上船/火車）通常用於表示登上交通工具，不適用於表示「經過」一個地點。C) quickly（快速地）和D) straight（直接地）皆為副詞，描述動作的方式，而非表示與地點的空間關係。若要使用副詞，則需要額外的介系詞（例如：proceed quickly *past* Cumberland），單獨使用會造成文法錯誤。因此，B) through 作為介系詞，是唯一能正確表達火車「穿過」Cumberland而不停靠的選項。","translation":"當車站正在維修時，火車將不停站地穿過坎伯蘭。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_110_309","book":11,"part":5,"qNum":110,"stem":"Dr. Morales, a geologist from the Environmental Institute, plans to study the soil from the mountains ______ Caracas.","options":["A) out","B) next","C) onto","D) around"],"answer":"D","explanation":"「around」表示「在…周圍、附近」，最符合山脈與城市之間的地理關係，意指環繞加拉加斯的群山。其他選項：「out」單獨使用不合語法；「next」需搭配「to」形成「next to」（在…旁邊），但語意上不如「around」貼切；「onto」表示「到…上面」，語意不通，故選D。","translation":"莫拉萊斯博士，一位來自環境研究所的地質學家，計畫研究加拉加斯周圍山區的土壤。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_111_310","book":11,"part":5,"qNum":111,"stem":"If you have already signed up for automatic payments, ______ no further steps are required.","options":["A) even","B) additional","C) then","D) until"],"answer":"C","explanation":"此題為典型的條件句型「If..., then...」。當「if」子句提出一個條件時，「then」通常用來引導主句，表示該條件成立後的結果或推論，語意為「如果...，那麼...」。因此，選項C) then 最符合句意與文法結構，表示「如果你已經註冊了自動付款，那麼就不需要進一步的步驟了」。選項A) even (甚至) 不符語法，無法在此引導結果；選項B) additional (額外的) 是形容詞，無法連接子句；選項D) until (直到) 表示時間，不適用於此條件句的結果。","translation":"如果你已經註冊了自動付款，那麼就不需要進一步的步驟了。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_112_311","book":11,"part":5,"qNum":112,"stem":"Confident that Mr. Takashi Ota was ______ more qualified than other candidates, Argnome Corporation hired him as the new vice president.","options":["A) much","B) very","C) rarely","D) along"],"answer":"A","explanation":"正確答案是 A) much。在比較級結構中，如「more qualified than」，我們常用副詞「much」來強調比較的程度，表示「大大地更...」或「遠遠更...」。選項 B) very 用於修飾原級形容詞（如 very qualified），不能直接修飾比較級。選項 C) rarely 是頻率副詞，表示「很少」，語意不符。選項 D) along 是介系詞或副詞，文法上不適用於此。因此，much 是唯一能正確修飾比較級「more qualified」的詞。","translation":"亞格諾姆公司確信大田隆先生比其他候選人「遠遠更」有資格，因此聘請他擔任新的副總裁。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_113_312","book":11,"part":5,"qNum":113,"stem":"Poleberry Local Marketplace takes pride in carrying only ______ processed dairy products from the region.","options":["A) nature","B) natures","C) natural","D) naturally"],"answer":"D","explanation":"【文法解析】此題考驗詞性辨識。句子的結構是「only ______ processed dairy products」。其中，「dairy products」是名詞片語，「processed」是過去分詞作形容詞，修飾「dairy products」。因此，空格處需要一個詞來修飾形容詞「processed」，說明「加工」的方式。副詞才能修飾形容詞，故應選副詞「naturally」。選項D) naturally (天然地) 是一個副詞，用來修飾形容詞 processed (加工的)，表示「以天然方式加工的」。選項A) nature (自然，名詞) 和 B) natures (自然，名詞複數) 都是名詞，不能修飾形容詞。選項C) natural (天然的，形容詞) 不能修飾另一個形容詞「processed」來表達「天然地加工」。","translation":"Poleberry 當地市集以只販售該地區天然加工的乳製品為榮。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_114_313","book":11,"part":5,"qNum":114,"stem":"All of Molina Language Institute's ______ have three or more years of experience and a valid teaching credential.","options":["A) instructed","B) instruction","C) instructing","D) instructors"],"answer":"D","explanation":"本題考驗詞性與語意。空格前有所有格「Molina Language Institute's」，表示空格處需要一個名詞作為其所有物或相關人員。空格後的主動詞是「have」，表示主語必須是複數且能「擁有」經驗和證照。A) instructed 是動詞的過去式或過去分詞，不適合做主語。B) instruction 是名詞，意為「教學」或「指示」，但「教學」本身無法擁有經驗，語意不符。C) instructing 是動名詞或現在分詞，意為「教導的行為」，同樣無法擁有經驗。D) instructors 是複數名詞，意為「指導者、教師」，符合語意，指「Molina語言學院的所有教師」都具備經驗和證照，且與動詞「have」的複數形式一致。因此，D是正確答案。","translation":"Molina語言學院的所有教師都擁有三年或三年以上經驗，並持有有效的教學證書。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_115_314","book":11,"part":5,"qNum":115,"stem":"The restaurant critic for the Montreal Times ______ the food at Corban's Kitchen as affordable and authentic.","options":["A) ordered","B) admitted","C) described","D) purchased"],"answer":"C","explanation":"【文法解析】本題考驗動詞與上下文的搭配。句型為「主詞 + 動詞 + 受詞 + as + 形容詞」，表示「將受詞描述為某種狀態或特質」。選項 C) described (描述) 最符合語意。餐廳評論家的職責就是「描述」食物的特色，因此「描述食物為平價且道地」是完全合理的用法。選項 A) ordered (點餐/命令) 不符語意，不能說「點餐食物為平價」。選項 B) admitted (承認) 語意不合，通常用於承認錯誤或事實，且句型不符。選項 D) purchased (購買) 語意不合，不能說「購買食物為平價」。故正確答案為 C。","translation":"蒙特婁時報的餐廳評論家將 Corban's Kitchen 的食物描述為平價且道地。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_116_315","book":11,"part":5,"qNum":116,"stem":"The Merrywood Shop will hold a sale in January to clear out an ______ of holiday supplies.","options":["A) excess","B) overview","C) extra","D) opportunity"],"answer":"A","explanation":"正確答案為 (A) excess。句子的語境是商店在一月舉辦特賣會，目的是「清出」節慶用品。動詞片語「clear out」表示清除或賣光存貨。因此，空格處需要一個名詞來表示「過多的、剩餘的」節慶用品。\n(A) excess (名詞) 意為「過剩、過量」，與「an ______ of」形成慣用語「an excess of...」，表示「過多的...」，完全符合語境。\n(B) overview (名詞) 意為「概要、概觀」，不符合語意。\n(C) extra (形容詞/名詞) 作名詞時通常指「額外的事物」，但「an extra of...」並非慣用搭配，且語意上不如「excess」精確表達「過剩」。\n(D) opportunity (名詞) 意為「機會」，語意完全不符。","translation":"梅利伍德商店將於一月舉辦特賣會，以清出過剩的節慶用品。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_117_316","book":11,"part":5,"qNum":117,"stem":"Zoticos Clothing, Inc., has acquired two other retail companies as part of a plan to expand ______ Europe and Asia.","options":["A) each","B) into","C) here","D) already"],"answer":"B","explanation":"【文法解析】\n本題考查動詞 \"expand\" 後接介系詞的用法。當 \"expand\" 表示將業務或影響力擴展到新的區域或市場時，常搭配介系詞 \"into\" 來表示「擴展到……裡面/進入……」。因此，\"expand into Europe and Asia\" 意指「擴展到歐洲和亞洲市場」。\n\n選項 A) \"each\" 是代名詞或限定詞，不適合在此處引導地點。\n選項 C) \"here\" 是地方副詞，表示「在這裡」，不能用來連接具體的地點名稱 \"Europe and Asia\"。\n選項 D) \"already\" 是時間副詞，表示「已經」，與句意和文法結構不符。\n\n故選 B) \"into\"，完整表達了公司計劃將業務擴展至歐洲和亞洲的意圖。","translation":"Zoticos 服飾公司已收購另外兩家零售公司，作為將業務擴展至歐洲和亞洲計畫的一部分。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_118_317","book":11,"part":5,"qNum":118,"stem":"According to the city planning director, Adelaide's old civic center must be ______ demolished before construction on a new center can begin.","options":["A) completely","B) defectively","C) plentifully","D) richly"],"answer":"A","explanation":"「completely」是正確答案，表示「完全地」。此句意指舊的市民中心必須被「完全地」拆除，新的建設才能開始，語意上最為合理。若未完全拆除，新工程將無法進行。「defectively」（有缺陷地）表示拆除工作有瑕疵，不符合語境。「plentifully」（豐富地）和「richly」（豐富地、奢華地）皆不適用於修飾「拆除」這個動作，因此為錯誤選項。","translation":"根據城市規劃總監的說法，阿得雷德的舊市民中心必須在新的中心開始建設之前被完全拆除。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_119_318","book":11,"part":5,"qNum":119,"stem":"An accomplished skater ______, Mr. Loewenstein also coaches the world-champion figure skater Sara Krasnova.","options":["A) he","B) him","C) himself","D) his"],"answer":"C","explanation":"正確答案是 C) himself。此題考驗代名詞的用法。句首的「An accomplished skater」是「Mr. Loewenstein」的同位語，用來描述他的身份或特點。在此結構中，使用反身代名詞「himself」可以加強語氣，強調「Mr. Loewenstein 本身就是一位技藝高超的滑冰選手」。這表示他不僅是教練，自己也具備此項技能。A) he 是主格代名詞，若使用會造成語法錯誤，無法與同位語結構結合。B) him 是受格代名詞，不適用於此處的強調語氣。D) his 是所有格代名詞或所有格形容詞，表示「他的」，語意不符。因此，C) himself 最能精準表達句子的強調意味，使語意完整且自然。","translation":"身為一位技藝精湛的滑冰選手，羅文斯坦先生同時也執教世界冠軍花式滑冰選手莎拉·克拉斯諾娃。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_120_319","book":11,"part":5,"qNum":120,"stem":"Sefu Asamoah is an innovative architect who is ______ the traditional approach to constructing space-efficient apartment buildings.","options":["A) challenge","B) challenging","C) challenged","D) challenges"],"answer":"B","explanation":"此題考驗動詞時態與語態。句中「who is ______」的結構，動詞「is」後方需接現在分詞（V-ing）構成現在進行式，或過去分詞（V-ed）構成被動語態。選項A) challenge (原型動詞) 和 D) challenges (第三人稱單數現在式) 皆無法直接接在「is」之後，故錯誤。選項C) challenged (過去分詞) 若為被動語態，則表示「Sefu Asamoah 被挑戰」，但句中「the traditional approach」是挑戰的對象，而非主詞，因此語意不符。選項B) challenging (現在分詞) 構成現在進行式「is challenging」，表示Sefu Asamoah正在主動「挑戰」傳統方法，語法正確且符合「創新建築師」的角色設定。","translation":"Sefu Asamoah 是一位創新的建築師，他正在挑戰建造節省空間公寓大樓的傳統方法。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_121_320","book":11,"part":5,"qNum":121,"stem":"Because of ______ regarding noise, the hotel manager has instructed the landscaping staff to avoid operating equipment before 9:30 A.M.","options":["A) complaints","B) materials","C) opponents","D) symptoms"],"answer":"A","explanation":"正確答案為 (A) complaints。句子的語境是「關於噪音」以及飯店經理指示員工「避免在上午9點30分之前操作設備」，這清楚表明有顧客對噪音感到不滿並提出投訴。「complaints」意為「投訴、抱怨」，與上下文完美契合，表示「因為關於噪音的投訴」。(B) materials (材料) 與噪音問題無關。(C) opponents (對手) 指的是反對者，雖然顧客可能反對噪音，但「complaints」是表達不滿的直接且恰當的詞彙，且「opponents regarding noise」語法不通順。(D) symptoms (症狀) 通常指疾病或問題的跡象，不適用於描述「關於噪音」的情況。","translation":"因為關於噪音的投訴，飯店經理已指示園藝人員避免在上午9點30分之前操作設備。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_122_321","book":11,"part":5,"qNum":122,"stem":"For 30 years, Big Top Prop Company has been the premier ______ of circus equipment for troupes around the world.","options":["A) providing","B) provision","C) provider","D) provides"],"answer":"C","explanation":"【文法解析】本題考查詞性辨析。空格前有冠詞「the」和形容詞「premier（首要的）」，表示空格處需要填入一個名詞來修飾。空格後接介系詞「of」，形成「the premier ______ of...」的結構，通常指「...的首要提供者/供應商」。\nA) providing 是動名詞或現在分詞，不符合句意，公司是「提供者」而非「提供這個動作」。\nB) provision 是名詞，指「提供」的行為或「供應品」，但語意上公司是「提供者」，而非「提供」本身。\nC) provider 是名詞，指「提供者、供應商」，最符合句意，表示這家公司是馬戲團設備的首要供應商。\nD) provides 是動詞，不符合文法結構，不能放在冠詞和形容詞之後。","translation":"30年來，Big Top Prop 公司一直是全球馬戲團設備的首要供應商。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_123_322","book":11,"part":5,"qNum":123,"stem":"Chris Cantfield was ______ the outstanding candidates considered for the Thomas Award for exceptional police service.","options":["A) on","B) among","C) during","D) up"],"answer":"B","explanation":"【文法解析】\n正確答案為 B) among。此字表示「在…之中」，用於指某人或某物是某一群體或多個事物中的一員。題目中，Chris Cantfield 是「傑出候選人」群體中的一員，因此 \"was among the outstanding candidates\" 意指他名列於這些傑出候選人之中，語意最為恰當。\nA) on 通常表示「在…上面」、「關於」或「在…日期」，不適用於此語境。\nC) during 表示「在…期間」，用於時間概念，而 \"candidates\" 是人，非時間，故不適用。\nD) up 有多種用法，如「向上」、「完成」等，但單獨使用 \"up\" 無法表達「在…之中」的含義，不符合句意。","translation":"克里斯．坎特菲爾德是獲考慮角逐湯瑪斯傑出警務服務獎的傑出候選人之一。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_124_323","book":11,"part":5,"qNum":124,"stem":"Please instruct employees with questions concerning the new payroll policy to contact ______ or Ms. Singh directly.","options":["A) my","B) mine","C) me","D) I"],"answer":"C","explanation":"此題考驗代名詞的正確使用。空格位於動詞 \"contact\" 之後，作為其受詞。動詞的受詞必須使用受格代名詞。選項 A) \"my\" 是所有格形容詞，後面需接名詞，不能單獨作受詞。選項 B) \"mine\" 是所有格代名詞，表示「我的東西」，雖是代名詞但在此處語意不符，且不能作動詞 \"contact\" 的直接受詞來指代人。選項 D) \"I\" 是主格代名詞，用作主詞，不能作受詞。選項 C) \"me\" 是受格代名詞，正是動詞 \"contact\" 所需的受詞形式，表示「聯絡我」。因此，C 是唯一正確答案。","translation":"請指示對新薪資政策有疑問的員工直接聯絡我或辛格女士。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_125_324","book":11,"part":5,"qNum":125,"stem":"Although the author ______ presents the purchase of real estate as a safe investment, she later describes times that it might be risky.","options":["A) highly","B) afterward","C) quite","D) initially"],"answer":"D","explanation":"本題考驗時間副詞的選擇。句中「Although...」表示轉折，對比了作者「起初」將房地產描述為安全投資，與「之後」說明其風險。選項D) initially (起初地、最初地) 完美地與句子的後半部分「she later describes...」(她之後描述...) 形成時間上的對比，強調了作者觀點的轉變。選項A) highly (高度地) 和 C) quite (相當地) 是程度副詞，修飾動詞，但無法表達時間上的對比。選項B) afterward (之後、後來) 雖然是時間副詞，但語意上與「initially」相反，且與句中「later」形成語意上的重複或衝突，不符合句子的邏輯轉折。因此，D是最佳答案。","translation":"儘管作者起初將房地產的購買呈現為一項安全的投資，她之後卻描述了它可能具有風險的時候。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_126_325","book":11,"part":5,"qNum":126,"stem":"The research released by Henford Trust ranked automobile companies according to sales ______ and financial position.","options":["A) performed","B) performing","C) performance","D) performer"],"answer":"C","explanation":"此題考驗詞性判斷與平行結構。句中「according to」後方接的是評比的依據，我們看到「sales ______ and financial position」，其中「financial position」是一個名詞片語。為了保持平行結構，空格處也必須填入一個名詞，與「sales」結合形成一個名詞片語，共同作為評比的標準。\nA) 「performed」是動詞的過去式或過去分詞，詞性不符。\nB) 「performing」是現在分詞或動名詞。雖然動名詞是名詞，但「sales performing」語意不通，我們需要的是「銷售表現」這個概念，而非「銷售正在執行」。\nD) 「performer」是指「執行者、表演者」，語意不符。\nC) 「performance」是名詞，意為「表現、績效」。因此，「sales performance」（銷售表現/績效）是常見的搭配詞，與「financial position」（財務狀況）形成完美的平行結構，作為排名公司的兩項依據。","translation":"Henford Trust 發布的研究根據銷售表現和財務狀況對汽車公司進行了排名。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_127_326","book":11,"part":5,"qNum":127,"stem":"An insightful ______ in the Boston Daily Post suggests that offering opportunities for professional development is a valuable method of motivating employees.","options":["A) editorial","B) novel","C) catalog","D) directory"],"answer":"A","explanation":"本題需選出一個名詞，能與「insightful（有見地的）」搭配，並在報紙中「提出建議」。\n\n(A) editorial (社論)：社論通常刊登於報紙，旨在提出具洞察力的觀點或建議，完全符合語境。\n(B) novel (小說)：小說雖可具洞察力，但通常不刊登於日報以「提出建議」，且其形式與內容不符。\n(C) catalog (目錄)：目錄用於列舉商品或服務，不具備「提出建議」的功能。\n(D) directory (名錄/指南)：名錄或指南提供資訊列表，亦不具備「提出建議」的功能。\n\n因此，(A) editorial 是唯一正確選項。","translation":"《波士頓每日郵報》一篇富有洞察力的社論指出，提供專業發展機會是激勵員工的寶貴方法。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_128_327","book":11,"part":5,"qNum":128,"stem":"The Web site advises customers to review their orders carefully as it is difficult to make changes ______ an order is submitted.","options":["A) following","B) once","C) right away","D) by means of"],"answer":"B","explanation":"正確答案B) once為從屬連接詞，意指「一旦…就；當…時」，用來連接兩個子句，表示時間上的先後關係。此處表示「一旦訂單提交後，就難以更改」。選項A) following是介系詞，不能直接接子句。C) right away是副詞片語，D) by means of是介系詞片語，兩者皆無法作為連接詞使用，故不符文法與語意。","translation":"該網站建議顧客仔細檢查他們的訂單，因為一旦訂單提交後，就難以進行修改。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_129_328","book":11,"part":5,"qNum":129,"stem":"Well-known journalist Kent Moriwaki published a book in May ______ a compilation of quotes from interviews with various artists.","options":["A) featuring","B) featured","C) feature","D) features"],"answer":"A","explanation":"【分詞用法】空格修飾前面的名詞 a book，說明這本書的內容。featuring（現在分詞）表示「以…為特色、收錄」，a book featuring a compilation = 一本收錄彙編的書，為主動分詞修飾名詞。B) featured 為過去分詞但語意不符、C) feature 為原形動詞、D) features 為動詞，均不符，故選A。","translation":"知名記者 Kent Moriwaki 於五月出版了一本書，收錄了他與各藝術家訪談的語錄彙編。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og11_p5_130_329","book":11,"part":5,"qNum":130,"stem":"______ delays in the entryway construction, the Orchid Restaurant in Chongqing will reopen and provide an alternative entrance until all work is complete.","options":["A) Furthermore","B) Assuming that","C) Regardless of","D) Subsequently"],"answer":"C","explanation":"正確答案是 C) Regardless of。這個片語意為「儘管、不顧」，用來表達儘管有某種情況或障礙，某事仍會發生。句中提到「入口施工延誤」，但餐廳「仍將重新開放並提供替代入口」，這顯示出延誤並未阻止餐廳的重開，而是餐廳不顧延誤仍按計畫進行。因此，Regardless of 完美表達了這種「不顧」或「儘管」的語氣，後面接名詞片語 (delays)。\n\nA) Furthermore（此外）用於添加額外資訊，不符句中的轉折關係。\nB) Assuming that（假設）引導條件句，表示在某種假設下會發生什麼，與句意不符，因為延誤是既定事實而非假設。\nD) Subsequently（隨後）表示時間上的順序，與句子的邏輯關係無關。","translation":"儘管入口施工有所延誤，重慶的蘭花餐廳仍將重新開業並提供替代入口，直到所有工程完成。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_101_330","book":12,"part":5,"qNum":101,"stem":"Busan Cosmetics is pleased to ______ Jin-Sook Kim, a new team member in product development.","options":["A) welcoming","B) welcome","C) welcomed","D) welcomes"],"answer":"B","explanation":"本題考驗動詞不定詞 (infinitive) 的用法。句型 \"be pleased to do something\" 意為「很高興做某事」。在 \"to\" 之後，必須接動詞的原形 (base form)。\n選項 A) \"welcoming\" 是現在分詞 (V-ing)，不符合 \"to\" 後接原形的規則。\n選項 C) \"welcomed\" 是過去式或過去分詞，亦不符合。\n選項 D) \"welcomes\" 是第三人稱單數現在式動詞，同樣不符合。\n只有選項 B) \"welcome\" 是動詞原形，能正確地與 \"to\" 構成不定詞片語 \"to welcome\"，表示「很高興歡迎」。因此，B 是正確答案。","translation":"釜山化妝品公司很高興歡迎 Jin-Sook Kim，一位產品開發部門的新團隊成員。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_102_331","book":12,"part":5,"qNum":102,"stem":"The seminar will be attended ______ professionals in the food service industry.","options":["A) of","B) over","C) as","D) by"],"answer":"D","explanation":"【文法解析】此題考驗被動語態的用法。句子的主語是「The seminar」（研討會），動詞「will be attended」是被動語態（將被參加）。在被動語態中，執行動作的「行為者」（agent）通常會用介系詞「by」來引導。因此，「professionals in the food service industry」（餐飲服務業的專業人士）是參加研討會的行為者，應使用「by」來表示「由...參加」。\n\n其他選項：\nA) 「of」通常表示所有、部分或來源，不適用於引導被動語態的行為者。\nB) 「over」通常表示在上方、超過或結束，與此語境不符。\nC) 「as」通常表示作為、如同或身分，不適用於引導被動語態的行為者。\n故正確答案為 D) by。","translation":"該研討會將由餐飲服務業的專業人士參加。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_103_332","book":12,"part":5,"qNum":103,"stem":"The Human Resources Department will ______ request that employees update their personal contact information for the company's records.","options":["A) occasionally","B) previously","C) recently","D) lately"],"answer":"A","explanation":"「will request」是未來式動詞片語，表示將會發生的動作。選項B) previously (以前地)、C) recently (最近地) 和 D) lately (最近地) 都指過去發生的事情，與未來式不符。選項A) occasionally (偶爾地) 表示「有時候、不時地」，可以修飾未來式動詞，表示某動作將會偶爾發生。因此，A是唯一符合語意和時態的選項，表示人資部門將會偶爾要求員工更新資料。","translation":"人力資源部將會偶爾要求員工更新他們的個人聯絡資訊，以供公司記錄使用。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_104_333","book":12,"part":5,"qNum":104,"stem":"All staff members should log in to their time and labor ______ daily to record their hours worked.","options":["A) accounts","B) accounted","C) accountant","D) accountable"],"answer":"A","explanation":"正確答案為 A) accounts。此處需要一個名詞來完成「time and labor ______」這個複合名詞片語，指員工登入以記錄工時的系統或平台。「accounts」在此指「帳戶」或「系統」，符合語境。B) accounted 是動詞的過去式或過去分詞，不符文法。C) accountant 是「會計師」，指人，不符語意。D) accountable 是形容詞「應負責的」，不符文法結構。","translation":"所有員工都應該每天登入他們的工時與勞務帳戶，以記錄他們的工作時數。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_105_334","book":12,"part":5,"qNum":105,"stem":"The Humson Company has just started a lunchtime fitness program, and employees are encouraged to ______.","options":["A) win","B) order","C) collect","D) join"],"answer":"D","explanation":"【文法解析】正確答案為 D) join。動詞 \"join\" 意為「加入、參加」，與 \"a lunchtime fitness program\" (午餐時間健身計畫) 形成自然且符合語意的搭配，表示鼓勵員工參與這個健身計畫。A) \"win\" (贏得) 通常指在比賽中獲勝，但鼓勵員工參與計畫的重點是參與而非獲勝，且「贏得計畫」語意不通。B) \"order\" (訂購、命令) 與健身計畫的語境完全不符。C) \"collect\" (收集) 亦與健身計畫無關。因此，鼓勵員工「加入」健身計畫，\"join\" 是最恰當的選擇。","translation":"Humson 公司剛啟動了一個午餐時間的健身計畫，並鼓勵員工加入。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_106_335","book":12,"part":5,"qNum":106,"stem":"To enroll in any course, either complete the online form ______ register in person at the Greerson Learning Center.","options":["A) if","B) and","C) or","D) but"],"answer":"C","explanation":"本題考查關聯連接詞「either... or...」的固定搭配，表示「或者...或者...」，用來連接兩個對等的選項。句中「either complete the online form」與「register in person」是並列的兩種報名方式，故需用「or」連接，表示二選一。其他選項「if」、「and」、「but」皆不符合「either」的搭配用法，也無法表達句中的選擇關係。","translation":"若要報名任何課程，請填寫線上表格，或者親自到格里爾森學習中心註冊。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_107_336","book":12,"part":5,"qNum":107,"stem":"Mr. Yamagata is prepared to assist Ms. Hahn's clients while ______ conducts a training seminar in New York.","options":["A) hers","B) she","C) herself","D) her"],"answer":"B","explanation":"本題考查代名詞的用法。空格位於從屬連接詞 \"while\" 之後，動詞 \"conducts\" 之前，因此需要一個主格代名詞來作從屬子句的主詞。選項 A) \"hers\" 是所有格代名詞，不能作主詞。選項 C) \"herself\" 是反身代名詞，通常作受詞或加強語氣，不能單獨作主詞。選項 D) \"her\" 是受格代名詞或所有格形容詞，也不能作主詞。只有選項 B) \"she\" 是主格代名詞，符合文法結構，可作動詞 \"conducts\" 的主詞，表示「當她進行...時」。因此 B 為正確答案。","translation":"山形先生已準備好協助哈恩女士的客戶，而她將在紐約主持一場培訓研討會。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_108_337","book":12,"part":5,"qNum":108,"stem":"Please return the signed copy of the ______ agreement to the apartment manager's office in the enclosed envelope.","options":["A) rental","B) rentable","C) rented","D) rents"],"answer":"A","explanation":"此題考驗形容詞的選擇與搭配。空格後為名詞 \"agreement\" (協議)，因此需要一個形容詞來修飾它。\nA) rental：可作形容詞，意為「租賃的、出租的」。\"rental agreement\" 是非常常見且固定的搭配，指「租賃協議」或「租賃合約」，語意完全符合。\nB) rentable：形容詞，意為「可供租賃的」。雖然是形容詞，但 \"rentable agreement\" 並非慣用搭配，協議本身並非「可被租賃」的。\nC) rented：過去分詞作形容詞，意為「已租賃的」。\"rented agreement\" 語意不通，協議本身不會是「被租賃」的狀態。\nD) rents：名詞複數或動詞第三人稱單數現在式。兩者皆無法修飾名詞 \"agreement\"。\n故正確答案為 A。","translation":"請將簽署好的租賃協議副本放入隨附的信封中，並交還給公寓經理辦公室。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_109_338","book":12,"part":5,"qNum":109,"stem":"Employees who are affiliated with Corman Corporation will be seated ______ the third row of the auditorium.","options":["A) except","B) to","C) among","D) in"],"answer":"D","explanation":"【文法解析】本題考查介系詞的用法。句子中「will be seated ______ the third row」表示「將被安排坐在第三排」。當我們描述某人或某物在一個空間、一個區域或一個排隊位置內部時，通常使用介系詞「in」。因此，「in the third row」意指「在第三排裡」。\n\n選項 A) except (除了…之外) 不符合語意。\n選項 B) to (到、往) 表示方向或目的地，不適用於表示「在…裡面」的位置。\n選項 C) among (在…之中) 通常用於指在人群或多個事物之間，不適用於表示坐在某個「排」裡面。\n\n綜合判斷，D) in 是最符合語法和語意的選項。","translation":"與Corman Corporation相關的員工將被安排坐在禮堂的第三排。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_110_339","book":12,"part":5,"qNum":110,"stem":"Yesterday's festival featured some of the most ______ dancers that the Palace Theater has ever hosted.","options":["A) live","B) liveliness","C) lively","D) livelier"],"answer":"C","explanation":"【文法解析】此題考驗詞性辨識與形容詞的用法。句中「most ______ dancers」需要一個形容詞來修飾名詞「dancers」，並與「most」構成最高級形式。選項A) live 雖然是形容詞，但通常指「活著的」或「現場的」，不符合描述舞者表演「生動活潑」的語境。選項B) liveliness 是名詞，詞性不符。選項D) livelier 是形容詞「lively」的比較級，但句中已有最高級標誌「most」，應搭配形容詞原級「lively」或直接使用最高級「liveliest」，故「most livelier」為錯誤用法。選項C) lively 是一個形容詞，意為「活潑的、生動的」，儘管以-ly結尾，但它就是形容詞，完美符合語意與文法結構，描述舞者充滿活力。","translation":"昨天的慶典呈現了一些皇宮劇院有史以來最活潑生動的舞者。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_111_340","book":12,"part":5,"qNum":111,"stem":"Fulsome Flowers' delivery vans must be returned promptly to the store ______ the scheduled deliveries have been completed.","options":["A) once","B) soon","C) often","D) usually"],"answer":"A","explanation":"正確答案是 (A) once。「Once」在此作為從屬連接詞，意為「一旦…就」或「當…完成後」。它引導一個時間子句，表示送貨車輛必須在預定送貨任務「完成後」立即歸還，邏輯上非常合理，符合主句「必須立即歸還」的時序要求。\n(B) soon 是一個副詞，意為「很快地」，不能引導子句。若要表達時間關係，需搭配介系詞如「soon after」。\n(C) often 和 (D) usually 都是頻率副詞，意為「經常」和「通常」，用於描述動作發生的頻率，不符合本句表達「在某事件發生後」的時序關係。因此，(A) once 是唯一符合文法和語意的選項。","translation":"Fulsome Flowers 的送貨車輛在預定的送貨任務完成後，必須立即歸還給店鋪。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_112_341","book":12,"part":5,"qNum":112,"stem":"To ensure stability and safety, it is important to follow the instructions ______ when assembling the office bookshelves.","options":["A) exactly","B) exact","C) exactness","D) exacting"],"answer":"A","explanation":"此題考驗詞性辨識。空白處修飾動詞片語「follow the instructions」（遵循指示），說明「如何」遵循指示。A) exactly 是副詞，意為「精確地、確切地」，修飾動詞 follow，表示「精確地遵循」。這符合語意，確保穩定與安全需要精確地執行指示。B) exact 是形容詞，意為「精確的」，修飾名詞，不能直接修飾動詞。C) exactness 是名詞，意為「精確性」，不能修飾動詞。D) exacting 也是形容詞，意為「嚴格的、要求高的」，通常用來形容任務或人，不適合描述遵循指示的方式。因此，副詞 exactly 是唯一正確選項。","translation":"為確保穩定與安全，組裝辦公室書架時，務必精確地遵循指示。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_113_342","book":12,"part":5,"qNum":113,"stem":"At the Podell Automotive plant, Ms. Krystle ______ workers who install rebuilt engines in vehicles.","options":["A) conducts","B) explains","C) invests","D) oversees"],"answer":"D","explanation":"「Oversees」意指「監督、管理」，與句中「Ms. Krystle」作為主管的角色，以及「workers」作為被管理者的關係完全符合，表示Krystle女士監督負責在車輛中安裝翻新引擎的工人。A) 「conducts」通常指「執行、引導（活動、實驗）」，不能直接接「workers」。B) 「explains」意指「解釋」，通常接解釋的內容，而非直接接「workers」。C) 「invests」意指「投資」，通常後面會接「in」再接投資的對象，不能直接接「workers」。因此，D是唯一在語意和用法上都正確的選項。","translation":"在Podell汽車工廠，Krystle女士監督負責在車輛中安裝翻新引擎的工人。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og12_p5_114_343","book":12,"part":5,"qNum":114,"stem":"Yakubu Logistics will expand the warehouse loading area in preparation for an ______ in shipping activity.","options":["A) increased","B) increase","C) increases","D) increasingly"],"answer":"B","explanation":"本題考查詞性。句中「an ______ in shi
