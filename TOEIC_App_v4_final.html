<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f3ef">
<title>TOEIC OG 題庫練習系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f3ef;
  --cd: #ffffff;
  --p: #2a7c76;
  --pd: #1f5e59;
  --pl: #e8f5f3;
  --ac: #c4873b;
  --acl: #fdf3e7;
  --ok: #2e8b57;
  --okl: #edf7f0;
  --ng: #c9463d;
  --ngl: #fdf0ef;
  --tx: #1a1a1a;
  --tm: #777;
  --bd: #e2dfd8;
  --fn: 'DM Sans','Noto Sans TC',sans-serif;
  color-scheme: light;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:var(--fn);min-height:100vh;overflow-x:hidden}
button,select,input{font-family:var(--fn)}
a{color:inherit;text-decoration:none}
.container{max-width:780px;margin:0 auto;padding:28px 20px 60px}
.narrow{max-width:560px;margin:0 auto}
.wide{max-width:1000px;margin:0 auto;padding:28px 20px 60px}
.card{background:var(--cd);border-radius:14px;padding:22px 24px;border:1px solid var(--bd);box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card-hover{cursor:pointer;transition:all .2s}
.card-hover:hover{border-color:var(--p);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.08)}
.btn{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid var(--bd);background:var(--cd);color:var(--tx);display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--p);color:var(--p)}
.btn.primary{border-color:var(--p);background:var(--p);color:#fff}
.btn.primary:hover{background:var(--pd);border-color:var(--pd)}
.btn.accent{border-color:var(--ac);background:var(--ac);color:#fff}
.btn.accent:hover{filter:brightness(1.05)}
.btn.danger{border-color:var(--ng);background:var(--ng);color:#fff}
.btn.sm{padding:6px 14px;font-size:13px}
.btn.lg{padding:13px 28px;font-size:16px;border-radius:10px}
.btn:disabled{opacity:.45;cursor:not-allowed}
#nav{position:sticky;top:0;z-index:100;background:rgba(245,243,239,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:0 20px}
.nav-inner{max-width:780px;margin:0 auto;display:flex;align-items:center;gap:4px;height:52px;overflow-x:auto;scrollbar-width:none}
.nav-inner::-webkit-scrollbar{display:none}
.nav-tab{padding:6px 14px;border-radius:7px;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;background:none;border:none;color:var(--tm)}
.nav-tab:hover{color:var(--tx);background:var(--bd)}
.nav-tab.active{color:var(--p);background:var(--pl);font-weight:600}
.nav-logo{font-size:15px;font-weight:800;color:var(--p);margin-right:8px;white-space:nowrap;letter-spacing:-.3px}
.progress-bar{height:3px;background:var(--bd);border-radius:2px;overflow:hidden;margin-bottom:20px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--ac));border-radius:2px;transition:width .4s}
.option-btn{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:9px;border:1.5px solid var(--bd);background:var(--cd);cursor:pointer;text-align:left;font-size:15px;color:var(--tx);transition:all .15s;line-height:1.5;width:100%}
.option-btn:hover:not(.locked){border-color:var(--p);background:var(--pl)}
.option-btn.selected{background:var(--pl);border-color:var(--p)}
.option-btn.correct{background:var(--okl);border-color:var(--ok);color:var(--ok)}
.option-btn.wrong{background:var(--ngl);border-color:var(--ng);color:var(--ng)}
.option-btn.locked{cursor:default}
.option-circle{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;flex-shrink:0;font-size:12px;font-weight:700;border:1.5px solid var(--bd);color:var(--tm);transition:all .15s}
.option-circle.sel{background:var(--p);color:#fff;border-color:var(--p)}
.option-circle.ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.option-circle.ng{background:var(--ng);color:#fff;border-color:var(--ng)}
.badge{font-size:11px;font-weight:700;color:#fff;background:var(--p);padding:2px 8px;border-radius:4px;display:inline-block;letter-spacing:.3px}
.badge.ac{background:var(--ac)}
.badge.ok{background:var(--ok)}
.badge.ng{background:var(--ng)}
.badge.gray{background:var(--tm)}
.word-popup{position:fixed;z-index:9999;background:#fff;border:1px solid var(--bd);border-radius:10px;padding:14px 18px;max-width:280px;box-shadow:0 8px 32px rgba(0,0,0,.12);color:var(--tx);animation:fadeIn .2s ease-out;pointer-events:none}
.word-popup .word-head{font-size:16px;font-weight:700;color:var(--p);margin-bottom:4px}
.word-popup .word-pos{font-size:11px;color:var(--tm);font-style:italic;margin-bottom:6px}
.word-popup .word-def{font-size:13px;line-height:1.6;margin-bottom:6px}
.word-popup .word-ex{font-size:12px;color:var(--tm);line-height:1.5;padding:6px 10px;background:var(--pl);border-radius:6px;border-left:2px solid var(--p)}
.cw{cursor:pointer;border-bottom:1px dotted rgba(42,124,118,.35);transition:color .1s}
.cw:hover{color:var(--p)}
.explanation{margin-top:16px;padding:16px;border-radius:10px}
.explanation.ok{background:var(--okl);border:1px solid rgba(46,139,87,.2)}
.explanation.ng{background:var(--acl);border:1px solid rgba(196,135,59,.25)}
.trans-block{margin-top:8px;padding:10px 14px;background:var(--pl);border-radius:8px;font-size:13px;line-height:1.8;color:#555;white-space:pre-wrap;border-left:3px solid var(--p)}
.stat-bar{height:6px;background:var(--bd);border-radius:3px;overflow:hidden}
.stat-fill{height:100%;border-radius:3px;transition:width .6s}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}
.modal{background:var(--cd);border-radius:16px;padding:28px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px;color:var(--p)}
.drop-zone{border:2px dashed var(--bd);border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg)}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--p);background:var(--pl)}
.split-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
.split-left{position:sticky;top:72px;max-height:calc(100vh - 90px);overflow-y:auto;padding-right:4px}
.passage-text{font-size:15px;line-height:1.85;color:#333}
.vocab-card{perspective:600px}
.vocab-inner{position:relative;width:100%;transform-style:preserve-3d;transition:transform .5s}
.vocab-inner.flipped{transform:rotateY(180deg)}
.vocab-front,.vocab-back{backface-visibility:hidden;border-radius:12px;padding:32px;text-align:center}
.vocab-front{background:var(--cd);border:1px solid var(--bd)}
.vocab-back{background:var(--pl);border:1px solid rgba(42,124,118,.25);position:absolute;inset:0;transform:rotateY(180deg)}
.timer{font-size:13px;font-weight:600;color:var(--tm);padding:4px 12px;border-radius:6px;background:var(--bg);border:1px solid var(--bd)}
.timer.warn{color:var(--ac);border-color:var(--ac);background:var(--acl)}
.timer.danger{color:var(--ng);border-color:var(--ng);background:var(--ngl)}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .25s ease-out}
.slide-in{animation:slideIn .25s ease-out}
.spinner{width:18px;height:18px;border:2px solid var(--bd);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
.divider{height:1px;background:var(--bd);margin:20px 0}
.empty-state{text-align:center;padding:60px 20px;color:var(--tm)}
.empty-icon{font-size:48px;margin-bottom:16px}
.chip-group{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:5px 12px;border-radius:20px;border:1.5px solid var(--bd);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;background:var(--cd);color:var(--tm)}
.chip:hover{border-color:var(--p);color:var(--p)}
.chip.active{border-color:var(--p);background:var(--p);color:#fff}
input[type=number],input[type=text],input[type=password],select{padding:8px 12px;border-radius:8px;border:1.5px solid var(--bd);background:var(--cd);color:var(--tx);font-size:14px;outline:none;transition:border-color .15s;width:100%}
input[type=number]:focus,input[type=text]:focus,input[type=password]:focus,select:focus{border-color:var(--p)}
textarea{padding:12px;border-radius:8px;border:1.5px solid var(--bd);background:var(--cd);color:var(--tx);font-size:14px;outline:none;resize:vertical;width:100%;transition:border-color .15s}
textarea:focus{border-color:var(--p)}
label{font-size:13px;font-weight:600;color:var(--tm);margin-bottom:4px;display:block}
.form-row{margin-bottom:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500;z-index:9998;animation:fadeIn .25s;pointer-events:none}
/* Batch progress */
.batch-progress{background:var(--pl);border:1px solid rgba(42,124,118,.2);border-radius:10px;padding:16px;margin-top:12px}
.batch-bar{height:8px;background:var(--bd);border-radius:4px;overflow:hidden;margin:8px 0}
.batch-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--ac));border-radius:4px;transition:width .3s}
/* AI Generate */
.generate-card{background:linear-gradient(135deg,var(--pl),#fdf8f0);border:1px solid rgba(42,124,118,.2);border-radius:14px;padding:22px 24px}
@media(max-width:640px){
  .container{padding:16px 14px 56px}
  .wide{padding:16px 14px 56px}
  .card{padding:16px}
  .split-layout{grid-template-columns:1fr}
  .split-left{position:relative;top:0;max-height:none}
  h1{font-size:26px!important}
  .grid3{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}
}
@media(max-width:400px){.grid4{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

  <div class="nav-inner">
    <span class="nav-logo">📚 TOEIC OG</span>
    <button class="nav-tab active" onclick="showPage('home')" id="tab-home">首頁</button>

<script>
// ============================================================
// DATA STORE
// ============================================================
const DB_KEY = 'toeic_og_db';
let DB = loadDB();

// 內嵌題庫（479題，含完整詳解）
const EMBEDDED_QUESTIONS = [{"id":"og1_p5_101_0","book":1,"part":5,"qNum":101,"stem":"Ms. Iwata handed out copies of the agenda that ______ had printed for the meeting.","options":["A) hers","B) her","C) she","D) herself"],"answer":"C","explanation":"題目中，\"that ______ had printed for the meeting\" 是一個關係子句，用來修飾前面的名詞 \"agenda\"。在關係子句中，\"had printed\" 是動詞，因此空格處需要一個主格代名詞來作動詞的主詞。\nA) \"hers\" 是所有格代名詞，表示「她的東西」，不能作主詞。\nB) \"her\" 是受格代名詞或所有格形容詞，不能作主詞。\nC) \"she\" 是主格代名詞，表示「她」，符合作動詞主詞的語法要求。\nD) \"herself\" 是反身代名詞，通常作受詞或強調語氣，不能單獨作動詞的主詞。\n因此，正確答案是 C) she。","translation":"岩田女士分發了她為會議印製的議程副本。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_102_1","book":1,"part":5,"qNum":102,"stem":"The food ______ for the conference must be sent to the caterer by Friday at 5:00 P.M.","options":["A) order","B) group","C) profit","D) lesson"],"answer":"A","explanation":"正確答案為 A) order。「food order」意指「食物訂單」，與句中「為會議準備」及「必須送交餐飲承辦商」的語境完全吻合。整句表達的是會議的食物訂單必須在指定時間前送出。其他選項如 B) group（群組）、C) profit（利潤）和 D) lesson（課程/教訓）皆無法與「food」形成合理搭配，也不符合句子的邏輯意義。","translation":"為會議準備的食物訂單必須在週五下午五點前送交餐飲承辦商。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_103_2","book":1,"part":5,"qNum":103,"stem":"The product review says that the Cozy Days space heater is ______ to warm up than similar products.","options":["A) slowest","B) slower","C) slowed","D) slowing"],"answer":"B","explanation":"本題考點為形容詞的比較級。句中出現了關鍵詞「than」，表示正在進行比較。當句子中出現「than」時，我們需要使用形容詞的比較級形式來表達「比…更…」。選項B)「slower」是形容詞「slow」的比較級，意為「更慢」，與「than similar products」（比同類產品）完美搭配，形成「slower than」（比…更慢）的比較結構。選項A)「slowest」是最高級，通常前面會有「the」，且用於三者或三者以上的比較，不與「than」連用。選項C)「slowed」是動詞的過去式或過去分詞，不能直接用於此處的比較結構。選項D)「slowing」是動詞的現在分詞，表示正在進行的動作或作形容詞，也不符合比較級的語法要求。","translation":"產品評論說，Cozy Days 電暖器比同類產品暖機更慢。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_104_3","book":1,"part":5,"qNum":104,"stem":"Employees from San Jose International will arrive in Alajuela tomorrow for ______ first training session.","options":["A) they","B) their","C) them","D) theirs"],"answer":"B","explanation":"此題考驗代名詞的用法。空格後方接的是名詞片語「first training session」（第一次訓練課程），因此需要一個所有格形容詞來修飾這個名詞片語，表示「他們的」訓練課程。\nA) `they` 是主格代名詞，不能修飾名詞。\nB) `their` 是所有格形容詞，表示「他們的」，符合語法，用來修飾後方的名詞片語。\nC) `them` 是受格代名詞，不能修飾名詞。\nD) `theirs` 是所有格代名詞，本身就包含名詞意義（例如：their training session = theirs），因此不能再修飾名詞。\n故正確答案為 B。","translation":"來自聖荷西國際機場的員工將於明天抵達阿拉胡埃拉，參加他們的第一次訓練課程。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_105_4","book":1,"part":5,"qNum":105,"stem":"To apply for a driving permit, you must ______ two forms of identification.","options":["A) meet","B) work","C) show","D) ride"],"answer":"C","explanation":"【文法解析】正確答案為 (C) show。在此情境中，\"show\" 意指出示、展示，符合申請駕照時需要「出示」兩種身份證明文件的語意。這是常見且正確的搭配用法。\n(A) meet 意為「符合」或「遇見」。雖然可以說「符合要求 (meet requirements)」，但不能直接「符合身份證明文件」。\n(B) work 意為「工作」或「運作」，與身份證明文件無關，語意不通。\n(D) ride 意為「騎乘」，與本題情境完全不符。\n因此，(C) show 是唯一能完整表達「出示身份證明文件」的正確動詞。","translation":"要申請駕照，你必須 ______ 兩種身份證明文件。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_106_5","book":1,"part":5,"qNum":106,"stem":"Sales of Seviana Cosmetics have ______ improved since the new marketing campaign began last quarter.","options":["A) steady","B) steadily","C) steadiest","D) steadied"],"answer":"B","explanation":"本題考查詞性。句子的結構為「Sales... have ______ improved...」，其中「have improved」是現在完成式動詞片語，表示「已經改善」。空格處需要一個詞來修飾動詞「improved」，說明改善的方式或程度。\n選項 A) steady 是形容詞，意為「穩定的」，修飾名詞，不適用於修飾動詞。\n選項 B) steadily 是副詞，意為「穩定地」，修飾動詞「improved」，表示「穩定地」改善，語法和語義上都符合。\n選項 C) steadiest 是形容詞的最高級，意為「最穩定的」，修飾名詞，不適用。\n選項 D) steadied 是動詞的過去式或過去分詞，意為「使穩定」，若要作為動詞，會是「have steadied」，但句中已有主要動詞「improved」，因此不能再放一個動詞。故正確答案為 B) steadily。","translation":"自從上個季度新的行銷活動開始以來，Seviana Cosmetics 的銷售額一直穩定地有所改善。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_107_6","book":1,"part":5,"qNum":107,"stem":"Most applicants to Shim Accounting Services have completed a ______ internship at the company headquarters.","options":["A) clear","B) present","C) taken","D) paid"],"answer":"D","explanation":"此題考驗詞彙搭配與語意理解。空格前有不定冠詞 \"a\"，後接名詞 \"internship\"，因此空格處需填入一個形容詞來修飾 \"internship\"。\nA) \"clear\" (清楚的) 不適合修飾實習，語意不通。\nB) \"present\" (目前的；在場的) 雖然是形容詞，但與 \"completed\" (已完成的) 語意衝突，且不符上下文。\nC) \"taken\" (被拿走的；被佔用的) 是動詞 take 的過去分詞，在此作為形容詞修飾 internship 時，語意不自然，且不構成常見的搭配。我們不會說 \"a taken internship\"。\nD) \"paid\" (有薪的；已支付的) 是動詞 pay 的過去分詞，在此作形容詞，形成常見且合理的詞組 \"paid internship\" (有薪實習)。這表示應徵者在公司總部完成了有薪實習，語意完全符合。因此，D是最佳答案。","translation":"大多數向 Shim 會計服務公司申請的應徵者，都已在公司總部完成了一份有薪實習。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_108_7","book":1,"part":5,"qNum":108,"stem":"Each Beehive Crafts Supply customer may redeem ______ coupon per visit.","options":["A) alone","B) one","C) first","D) once"],"answer":"B","explanation":"正確答案為 (B) one。此題考驗對數量詞的理解。句中「coupon」是單數可數名詞，需要一個數量詞來修飾。選項 (B)「one」作為數字，意指「一個」，完美符合語境，表示每位顧客每次可兌換「一張」優惠券，符合常見的限制條款用法。\n選項 (A)「alone」是形容詞或副詞，意為「獨自的」，不能修飾名詞「coupon」來表示數量。\n選項 (C)「first」是序數詞，意為「第一個」，若用在此處，語意會變成「兌換第一張優惠券」，而非限制數量為「一張」，不符合語境。\n選項 (D)「once」是副詞，意為「一次」，用來修飾動詞或表示頻率，不能修飾名詞「coupon」。因此，只有 (B) 能正確表達「每位顧客每次可兌換一張優惠券」的限制。","translation":"Beehive Crafts Supply 的每位顧客每次光臨可兌換一張優惠券。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_109_8","book":1,"part":5,"qNum":109,"stem":"Dietrich Dentistry asks patients to provide 24-hour notice to cancel a scheduled ______ .","options":["A) appointment","B) involvement","C) requirement","D) investment"],"answer":"A","explanation":"正確答案為 (A) appointment。在牙科診所的情境中，病人會「預約 (schedule an appointment)」看診，因此當需要取消時，取消的對象就是這個「預約」。(B) involvement (參與) 不適用於預約看診，你不會「預約參與」。(C) requirement (要求) 是指必須遵守的條件，而非可被預約或取消的事項。(D) investment (投資) 雖然看牙可能是一種健康投資，但其本身不是被「預約」或「取消」的對象。因此，(A) appointment 最符合語境，指病人與診所排定的看診時間。","translation":"迪特里希牙科診所要求病患若要取消已排定的預約，需提前24小時告知。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_110_9","book":1,"part":5,"qNum":110,"stem":"The building inspection has been postponed until next week ______ that the electrical work can be completed.","options":["A) also","B) when","C) than","D) so"],"answer":"D","explanation":"正確答案是 D) so。「so that」是一個常見的從屬連接詞片語，表示「以便、為了讓」或「結果是」，用來引導目的子句。在本句中，建築檢查被延後，其目的是為了讓電氣工程能夠完成，因此「so that」完美地表達了這個目的。A) also 是一個副詞，表示「也、此外」，不能與 that 構成表示目的的連接詞片語。「also that」在英文中並非標準用法。B) when 是一個從屬連接詞，表示「當…時候」，引導時間子句。它不能與 that 構成表示目的的連接詞片語，也不符合句子的語義。C) than 是一個連接詞或介系詞，用於比較句型，表示「比…」。它不能與 that 構成表示目的的連接詞片語，語義上也不合適。","translation":"建築檢查已延期至下週，以便電氣工程能夠完成。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_111_10","book":1,"part":5,"qNum":111,"stem":"Mr. Carson ______ all the arrangements for the company retreat next month.","options":["A) having made","B) to make","C) making","D) will make"],"answer":"D","explanation":"【文法解析】本題考查動詞時態與形式。句中出現時間副詞「next month」（下個月），明確指出動作將發生在未來，因此需要使用未來式動詞。選項 D)「will make」是簡單未來式，表示「將會做」，語法結構為 will + 動詞原形，完全符合句子的時態和主語 Mr. Carson。\n\n選項 A)「having made」是完成分詞片語，不能單獨作為句子的主要動詞。選項 B)「to make」是不定詞，通常表示目的或跟隨特定動詞，也不能作為句子的主要動詞。選項 C)「making」是現在分詞，若要作為主要動詞，需搭配助動詞形成進行式（例如：is making），單獨出現則語法不完整。因此，D 是唯一正確且符合語意的選項。","translation":"卡森先生將會為下個月的公司員工旅遊安排所有事宜。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_112_11","book":1,"part":5,"qNum":112,"stem":"The cafeteria in Morris Hall offers ______ breakfast and lunch for Arai and Ramos associates.","options":["A) complimentary","B) accountable","C) replaced","D) secured"],"answer":"A","explanation":"本題考驗詞彙選擇。句中需要一個形容詞來修飾「breakfast and lunch」，說明這些餐點的性質。A) complimentary 意為「免費的；贈送的」，這與公司或機構為其員工或合作夥伴提供餐點的情境非常吻合，表示這些餐點是無償提供的。B) accountable 意為「應負責任的」，通常用來形容人或組織，不適合修飾餐點。C) replaced 意為「被替換的」，語意不符，無法說明餐點的種類或性質。D) secured 意為「被確保的；被固定的」，在此語境下不合適，無法表達餐點的供應方式。因此，選擇 A) complimentary 最能完整且合理地表達「Morris Hall 的自助餐廳為 Arai 和 Ramos 的員工提供免費的早餐和午餐」。","translation":"Morris Hall 的自助餐廳為 Arai 和 Ramos 的員工提供免費的早餐和午餐。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_113_12","book":1,"part":5,"qNum":113,"stem":"Visitors to Kensington Corporation must obtain guest passes ______ the security office prior to entering the facility.","options":["A) upon","B) from","C) toward","D) between"],"answer":"B","explanation":"【文法解析】\n本題考查介系詞的正確使用。句意為肯辛頓公司的訪客必須從保全辦公室取得訪客通行證。選項B) \"from\" 表示「來自」或「從…取得」，完美符合動詞 \"obtain\"（取得）與地點 \"the security office\"（保全辦公室）之間的關係，指明通行證的來源。選項A) \"upon\" 意為「在…之上」或「緊接著」，在此語境不合適，不能說「在保全辦公室之上」取得。選項C) \"toward\" 意為「朝向」，表示方向，而非取得物品的來源。選項D) \"between\" 意為「在…之間」，通常用於兩個或多個事物之間，且在此語境下文法與語意皆不通。因此，\"from\" 是唯一正確的選擇。","translation":"肯辛頓公司的訪客必須在進入設施前，先從保全辦公室取得訪客通行證。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_114_13","book":1,"part":5,"qNum":114,"stem":"Tachibana Pharmaceuticals' new method of ______ chemical solutions will increase efficiency in the laboratory.","options":["A) combine","B) combinations","C) combining","D) combines"],"answer":"C","explanation":"【文法解析】本題考查介系詞後接詞類。句中的「of」是一個介系詞，介系詞後面必須接名詞或動名詞（gerund）。\n選項C) combining 是一個動名詞，表示「結合」這個動作，符合「method of + 動名詞」的結構，意指「…的方法」。因此，「method of combining chemical solutions」意為「結合化學溶液的方法」，語法和語義上都正確。\n選項A) combine 是動詞原形，不能直接接在介系詞「of」之後。\n選項B) combinations 是名詞，但「method of combinations」語義不通順，我們需要的是「結合」這個動作的方法，而非「結合物」的方法。\n選項D) combines 是第三人稱單數動詞，也不能直接接在介系詞「of」之後。","translation":"立花製藥公司結合化學溶液的新方法將會提高實驗室的效率。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_115_14","book":1,"part":5,"qNum":115,"stem":"Lexino Publisher's dictionary database allows users to search for entries in ______ languages.","options":["A) multiplied","B) multiplying","C) multiples","D) multiple"],"answer":"D","explanation":"【文法解析】正確答案是 D) multiple。Multiple 是一個形容詞，意為「多個的」、「多種的」，用來修飾後面的複數名詞 languages（語言），表示該資料庫支援搜尋多種語言的詞條，語意上最為恰當。A) multiplied 是動詞 multiply 的過去分詞，意為「被乘的」、「倍增的」，不符合語境。B) multiplying 是動詞 multiply 的現在分詞，意為「正在倍增的」，也不符合語境。C) multiples 是一個名詞，意為「倍數」，不能直接修飾名詞 languages，因此錯誤。","translation":"Lexino 出版社的字典資料庫允許使用者以______語言搜尋詞條。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_116_15","book":1,"part":5,"qNum":116,"stem":"No one is permitted on the factory floor ______ proper safety gear.","options":["A) following","B) regarding","C) unless","D) without"],"answer":"D","explanation":"【文法解析】正確答案為 D) without。「without」在此表示「沒有…就不能」，形成「沒有適當安全裝備，任何人都不得進入工廠樓層」的語意，符合題目表達條件限制的邏輯。A) following (在…之後) 不符語意。B) regarding (關於) 不符語意。C) unless (除非) 後面通常接子句或動名詞片語，單接名詞片語「proper safety gear」在此文法上不正確。","translation":"沒有適當的安全裝備，任何人都不得進入工廠樓層。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_117_16","book":1,"part":5,"qNum":117,"stem":"Heidt Used Appliance Store guarantees that your purchase will arrive in working ______ .","options":["A) condition","B) conditional","C) conditionally","D) conditioned"],"answer":"A","explanation":"【文法解析】本題考查詞性與慣用語的應用。句中「in working ______」需要一個名詞來完成片語，表示商品送達時的狀態。\nA) condition (名詞)：是正確答案。「in working condition」是一個常見的慣用語，意指「在良好運作狀態下」或「功能正常」，完全符合語意，表示商店保證商品送達時是可正常使用的。\nB) conditional (形容詞)：意為「有條件的」，不能放在「working」後形成有意義的片語。\nC) conditionally (副詞)：意為「有條件地」，此處需要名詞而非副詞。\nD) conditioned (動詞過去分詞/形容詞)：意為「受制約的」或「經過訓練的」，與「working」搭配不符語意，也無法形成正確的片語。\n因此，正確答案為 A。\n","translation":"海德二手電器行保證您購買的商品送達時將處於可正常運作的狀態。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_118_17","book":1,"part":5,"qNum":118,"stem":"______ Ms. Park appreciated the job offer from Seon Advisory Group, she declined the opportunity because she would have to relocate.","options":["A) Now that","B) Only if","C) While","D) Whether"],"answer":"C","explanation":"【文法解析】正確答案是 C) While。While 在此句中作為從屬連接詞，表達「儘管、雖然」之意，用來連接兩個具有對比或讓步關係的子句。句子的前半部分表示 Ms. Park「欣賞」這份工作機會，而後半部分則表示她「拒絕」了，因為需要搬遷。While 完美地呈現了這種「雖然…但是…」的語氣。A) Now that 表示「既然、由於」，引導原因，不符合句子的轉折關係。B) Only if 表示「唯有當…才」，引導條件，不符合語意。D) Whether 表示「是否」，引導名詞子句或表示選擇，不符合句子的讓步關係。","translation":"儘管 Ms. Park 很欣賞 Seon Advisory Group 提供的工作機會，但她拒絕了這個機會，因為她將不得不搬遷。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_119_18","book":1,"part":5,"qNum":119,"stem":"The convention center is located on Market Street, directly ______ Glenview Shopping Center.","options":["A) opposite","B) among","C) apart","D) nearby"],"answer":"A","explanation":"【文法解析】\n正確答案為 (A) opposite。Opposite 表示「在…對面」或「與…相對」，精確描述了會議中心與Glenview購物中心隔著Market Street相對而立的位置關係，符合「直接在…」的語境。這是一個常見且精準的介系詞，用於表達兩個地點隔著街道或空間相對。 \n(B) among 意為「在…之中」，通常用於三者或三者以上的事物之間，不適用於兩個特定地點的關係。\n(C) apart 意為「分開地」或「相距」，通常指距離上的分離，或與 from 連用（apart from），不適合表達「直接在…對面」的空間關係。\n(D) nearby 意為「在附近」，雖然地點接近，但「directly nearby」語意重複且不如 opposite 精準地指出「正對面」的關係。因此，(A) 是最符合語意和文法的選項。","translation":"會議中心位於市場街上，就在格倫維購物中心的正對面。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_120_19","book":1,"part":5,"qNum":120,"stem":"______ a small festival celebrating the town's heritage, the Clarytown Celebration has become one of the biggest annual events in the area.","options":["A) Origin","B) Originate","C) Originated","D) Originally"],"answer":"D","explanation":"【副詞修飾句子】空格在句首修飾整個句子，需要副詞。Originally（原本地、起初）為副詞，符合文意「原本只是小型節慶的 Clarytown Celebration，現已發展成大型活動」。A) Origin（名詞）、B) Originate（動詞）、C) Originated（過去式動詞）均非副詞，不能修飾句子，故選D。","translation":"原本只是慶祝該鎮文化遺產的小型節慶，Clarytown Celebration 如今已發展成為該地區最大的年度活動之一。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_121_20","book":1,"part":5,"qNum":121,"stem":"______ of the management team include improving productivity and reducing annual expenditures.","options":["A) Priority","B) Prioritizing","C) Priorities","D) Prioritized"],"answer":"C","explanation":"題目需要一個複數名詞作為主詞，以搭配複數動詞「include」。選項A「Priority」是單數名詞，不符。選項B「Prioritizing」是動名詞，通常視為單數，且語意不符。選項D「Prioritized」是過去分詞，不能直接作主詞。選項C「Priorities」是複數名詞，表示「管理團隊的優先事項」，語意和文法皆正確，故為正解。","translation":"管理團隊的優先事項包括提高生產力及減少年度開支。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_122_21","book":1,"part":5,"qNum":122,"stem":"______ employees affected by changes to Linerex Corporation's health plan should watch the online presentation.","options":["A) Every","B) Much","C) Those","D) Which"],"answer":"C","explanation":"【代名詞用法】空格後接名詞 employees，需要可修飾名詞的限定詞。Those（那些）可作代名詞或限定詞，those employees affected = 那些受影響的員工，語意通順。A) Every 後需接單數名詞、B) Much 修飾不可數名詞、D) Which 用於疑問句或關係子句，均不符合，故選C。","translation":"所有受 Linerex 公司健康計畫變更影響的員工，應於本月底前聯繫人力資源部門。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_123_22","book":1,"part":5,"qNum":123,"stem":"Senior human resources personnel need to ______ at least two training events this year to be eligible for a bonus.","options":["A) have hosted","B) be hosted","C) have been hosted","D) hosting"],"answer":"A","explanation":"【完成式時態】need to 後接原形動詞，選項皆為完成式或被動式。主詞 Senior HR personnel（人力資源人員）是主動舉辦訓練活動，非被動被舉辦，排除B、C。have hosted（現在完成式主動）表示「已舉辦過」，符合「本年度至少需主持兩場訓練活動」之意，故選A。","translation":"高級人力資源人員今年需至少主持兩場培訓活動。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_124_23","book":1,"part":5,"qNum":124,"stem":"Aomori Agriculture Solutions specializes in increasing crop yields ______ the development of better farming techniques.","options":["A) because","B) through","C) previous","D) although"],"answer":"B","explanation":"【文法解析】正確答案是 (B) through。(B) through 是一個介系詞，表示「透過…方式」或「藉由…手段」。句子的語意是「Aomori Agriculture Solutions 專精於透過發展更好的耕作技術來提高作物產量」，因此 (B) 最符合句意與文法，說明了提高產量的方法。 (A) because 和 (D) although 都是連接詞，後面需要連接一個完整的子句（包含主詞和動詞），但題目空格後接的是名詞片語「the development of better farming techniques」，故不適用。(C) previous 是一個形容詞，表示「先前的」，後面需要修飾一個名詞，無法作為連接詞或介系詞來連接句子的兩個部分。","translation":"青森農業解決方案公司專精於透過發展更好的耕作技術來提高作物產量。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_125_24","book":1,"part":5,"qNum":125,"stem":"Chae Media, Inc., plans to ______ the renovation of its publishing house in Seoul.","options":["A) send away for","B) move forward with","C) take back from","D) watch out for"],"answer":"B","explanation":"【文法解析】正確答案是B) move forward with。這個片語的意思是「著手進行；推進」，與句中「Chae Media公司計劃______其位於首爾的出版社翻修工程」的語境完美契合，表示公司打算開始或繼續進行翻修計畫。A) send away for 意為「函購；訂購」，不適用於翻修工程。C) take back from 意為「從…取回；從…收回」，語意不符。D) watch out for 意為「提防；留意」，通常指警惕某事或某人，與此處的計畫執行無關。","translation":"Chae Media公司計劃______其位於首爾的出版社翻修工程。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_126_25","book":1,"part":5,"qNum":126,"stem":"The marketing team at Bescura Cars has created a series of ______ humorous commercials, designed to appeal to younger consumers.","options":["A) economically","B) exactly","C) deliberately","D) patiently"],"answer":"C","explanation":"此題考驗副詞的語意選擇。空格前為不定冠詞a series of，後為形容詞humorous和名詞commercials，因此空格處需填入一個副詞來修飾形容詞humorous。選項C) deliberately (刻意地，故意地) 最符合語境，表示這些廣告是「刻意地幽默」，旨在達成吸引年輕消費者的目的。選項A) economically (經濟地，節省地) 不符語意，幽默感無法用經濟來衡量。選項B) exactly (精確地，確切地) 雖是副詞，但「精確地幽默」語意不通順，無法表達其策略性。選項D) patiently (有耐心地) 語意完全不符，幽默感與耐心無關。","translation":"Bescura汽車的行銷團隊製作了一系列刻意幽默的廣告，旨在吸引年輕消費者。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_127_26","book":1,"part":5,"qNum":127,"stem":"Programmers at Ulrich-Ahn Company are responsible for ensuring that software conforms to the ______ system standards.","options":["A) establish","B) established","C) establishing","D) establishes"],"answer":"B","explanation":"【文法解析】空格前有定冠詞「the」，後有名詞「system standards」，因此需要一個形容詞來修飾。選項B「established」是過去分詞，在此作形容詞修飾名詞片語「system standards」（系統標準），表示「已建立的」或「既定的」標準，語意最為恰當，指軟體需符合已設定好的標準。選項A「establish」是動詞原形，選項D「establishes」是動詞第三人稱單數現在式，兩者皆不能直接修飾名詞。選項C「establishing」是現在分詞，若作形容詞，表示「正在建立的」標準，語意不符。","translation":"Ulrich-Ahn 公司的程式設計師負責確保軟體符合既定的系統標準。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_128_27","book":1,"part":5,"qNum":128,"stem":"Pour the cake batter into the pan and shake gently if the batter is ______ distributed.","options":["A) unevenly","B) undeniably","C) unwillingly","D) unknowingly"],"answer":"A","explanation":"【文法解析】本題考驗副詞的選擇與語意理解。空格後方的「distributed」是過去分詞作形容詞，修飾主詞「the batter」，因此空格處需要一個副詞來修飾「distributed」。句子的語境是「將麵糊倒入烤盤，如果麵糊______分佈，則輕輕搖晃。」搖晃的動作通常是為了讓物體分佈均勻。\nA) unevenly (不均勻地)：符合語境，如果麵糊不均勻分佈，就需要搖晃使其均勻。\nB) undeniably (不可否認地)：語意不符，麵糊分佈與「不可否認」無關。\nC) unwillingly (不情願地)：語意不符，麵糊沒有意志，不會「不情願地」分佈。\nD) unknowingly (不知情地)：語意不符，麵糊沒有意識，不會「不知情地」分佈。\n因此，A是唯一符合邏輯和語法的選項。","translation":"將蛋糕麵糊倒入烤盤，如果麵糊分佈不均勻，則輕輕搖晃。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_129_28","book":1,"part":5,"qNum":129,"stem":"Geneto Technology uses three ______ of laboratory accuracy to ensure consistent results.","options":["A) indicators","B) indicate","C) indicating","D) indicated"],"answer":"A","explanation":"【文法解析】此題考驗詞性判斷。句中「three」為數詞，後面需要接一個可數名詞的複數形式，以構成「數詞 + 名詞」的結構。選項A) \"indicators\" 是名詞「指標」的複數形式，符合文法結構，表示「三種實驗室精確度的指標」。選項B) \"indicate\" 是動詞原形，不符合名詞需求。選項C) \"indicating\" 是現在分詞，通常作動詞的一部分或形容詞，不能直接跟在數詞後作主要名詞。選項D) \"indicated\" 是過去分詞，通常作動詞的一部分或形容詞，同樣不符合名詞需求。因此，正確答案為A。","translation":"Geneto Technology 使用三種實驗室精確度的指標，以確保結果的一致性。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og1_p5_130_29","book":1,"part":5,"qNum":130,"stem":"The financial figures released by Tsai and Wu International ______ only to expenses from the month of July.","options":["A) organize","B) ponder","C) correspond","D) subscribe"],"answer":"C","explanation":"正確答案是 (C) correspond。「correspond to」是一個常見的動詞片語，意指「與...相符；與...一致」。句子的主詞是「The financial figures」（財務數據），後面的「only to expenses from the month of July」表示這些數據「只與七月份的開銷」有關或相符。因此，「財務數據與七月份的開銷相符」是符合邏輯且文法正確的表達。\n(A) organize (組織) 通常後面接直接受詞，或表示組織某事，不與「to expenses」搭配。\n(B) ponder (沉思、仔細考慮) 通常接直接受詞或與「on/over」搭配，不與「to expenses」搭配。\n(D) subscribe (訂閱；同意) 雖然有「subscribe to」的用法，但通常指訂閱服務或同意某個觀點，財務數據不能「訂閱」或「同意」開銷，語意不合。","translation":"蔡氏與吳氏國際公司發布的財務數據僅與七月份的開銷相符。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_101_30","book":2,"part":5,"qNum":101,"stem":"_______ the Chiba office nor the Nagoya office is hiring.","options":["A) Both","B) But","C) Either","D) Neither"],"answer":"D","explanation":"本題考查的是固定搭配的「相關連接詞」（correlative conjunctions）。句中的關鍵字是「nor」，它與「neither」形成固定的詞組「neither A nor B」，表示「A和B兩者皆不」。因此，選項D) Neither是唯一正確的答案，意指千葉辦公室和名古屋辦公室都沒有在招募員工。選項A) Both應與「and」搭配（Both A and B），且後接複數動詞。選項B) But是轉折連接詞，不與nor搭配。選項C) Either應與「or」搭配（Either A or B）。","translation":"千葉辦公室和名古屋辦公室都沒有在招募員工。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_102_31","book":2,"part":5,"qNum":102,"stem":"Mr. Aromdee will prepare a dish from _______ hometown of Bangkok.","options":["A) he","B) his","C) him","D) himself"],"answer":"B","explanation":"本題考驗代名詞的正確使用。空格後方是名詞「hometown」（家鄉），需要一個所有格形容詞來修飾，表示「某人的家鄉」。選項 (B) 「his」是所有格形容詞，意指「他的」，用來指代「Mr. Aromdee」，因此「his hometown」意為「他的家鄉」，語法正確且符合語意。選項 (A) 「he」是主格代名詞，(C) 「him」是受格代名詞，兩者都不能直接修飾名詞。選項 (D) 「himself」是反身代名詞，通常用於強調或當主詞與受詞相同時，不能用來修飾名詞。","translation":"Aromdee 先生將準備一道來自他家鄉曼谷的菜餚。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_103_32","book":2,"part":5,"qNum":103,"stem":"Korean Star Airlines offers daily nonstop flights _______ London and Busan.","options":["A) aboard","B) onto","C) up","D) between"],"answer":"D","explanation":"正確答案是 D) between。此題考驗介系詞的用法。「between... and...」是一個常見的固定搭配，表示「在…與…之間」，用於連接兩個地點、時間或事物。題目中提到航班往返於「London」和「Busan」兩個城市，因此「between London and Busan」意指「往返倫敦與釜山之間」的航班，語意最為恰當。A) aboard 意為「在船上、飛機上」，通常指人或物在交通工具內，不適用於連接兩個地點。B) onto 意為「到…上面」，表示移動到某物表面，語意不符。C) up 意為「向上」，表示方向，與此處語境無關。故 D 是唯一正確選項。","translation":"大韓星空航空提供每日往返倫敦與釜山的直飛航班。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_104_33","book":2,"part":5,"qNum":104,"stem":"Mr. Hirose _______ at Seventh Street Financial five years ago.","options":["A) works","B) worked","C) working","D) will work"],"answer":"B","explanation":"「five years ago」明確指出動作發生在過去且已完成，因此需使用過去簡單式。選項B) worked (過去簡單式) 正確表達了此意。選項A) works 是現在簡單式，不符時間點；選項C) working 是現在分詞，需搭配助動詞且不符句型；選項D) will work 是未來簡單式，與過去時間點矛盾。","translation":"廣瀨先生五年前在第七街金融公司工作。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_105_34","book":2,"part":5,"qNum":105,"stem":"_______ of the new employees were able to attend the orientation.","options":["A) Most","B) Other","C) Else","D) Another"],"answer":"A","explanation":"正確答案是 A) Most。 \"Most\" 是一個量詞，常用於 \"Most of + the/所有格 + 複數名詞\" 的結構，表示「大部分的…」。題目中的 \"Most of the new employees\" 意指「大部分的新進員工」，語法正確且語意通順，與後面的複數動詞 \"were\" 一致。選項 B) \"Other\" 作為形容詞時，通常直接修飾名詞（如 \"other employees\"），不能接 \"of the\"；作為代名詞時應為 \"others\"。選項 C) \"Else\" 是副詞，通常跟在不定代名詞或疑問詞之後，不能用於此結構。選項 D) \"Another\" 意為「另一個」，用於單數可數名詞之前，不能接 \"of the + 複數名詞\"。因此，只有 \"Most\" 符合句子的語法和語意。","translation":"大部分新進員工都能夠參加迎新會。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_106_35","book":2,"part":5,"qNum":106,"stem":"A loud beeping _______ indicates that the copy machine has not been closed securely.","options":["A) sound","B) sounds","C) sounding","D) sounded"],"answer":"A","explanation":"本題需要一個名詞來完成複合名詞片語「beeping _______」，形成「嗶嗶聲響」。選項A) sound 是單數名詞，恰好符合「A loud beeping sound」的結構，表示「一個響亮的嗶嗶聲」。選項B) sounds 是複數名詞，與前面的不定冠詞「A」不符。選項C) sounding 是現在分詞，在此無法作為名詞使用，會造成語法錯誤。選項D) sounded 是動詞的過去式或過去分詞，不能作為名詞填入此處。因此，正確答案為A。","translation":"一個響亮的嗶嗶聲響表示影印機沒有關緊。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_107_36","book":2,"part":5,"qNum":107,"stem":"Please _______ our Web site to find unique recipes made with Hahm food products.","options":["A) come","B) go","C) visit","D) take"],"answer":"C","explanation":"正確答案是 (C) visit。動詞「visit」意為「拜訪、參觀」，用於網站時，表示「瀏覽、造訪」某個網站，語意最為恰當且自然。例如：「visit a website/page」。(A) come 和 (B) go 通常用於實體地點的移動，且若要用於網站，通常需要搭配介系詞「to」（如：go to our website），但題目中沒有介系詞，因此不符文法。直接說「come our website」或「go our website」皆不正確。(D) take 意為「拿取、帶走」，與瀏覽網站的語意完全不符。因此，(C) visit 是唯一能正確且流暢表達「請瀏覽我們的網站」的選項。","translation":"請瀏覽我們的網站，以找到使用Hahm食品產品製作的獨特食譜。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_108_37","book":2,"part":5,"qNum":108,"stem":"Due to construction delays on Maplewood Avenue, employees will _______ need to find alternate routes.","options":["A) probable","B) probably","C) probability","D) probabilities"],"answer":"B","explanation":"此題考驗詞性辨識。句子的結構為「employees will _______ need to find...」，其中「will」是助動詞，「need」是主要動詞。在助動詞與主要動詞之間，通常需要一個副詞來修飾動詞或動詞片語，表示動作的方式、程度或可能性。選項A) probable 是形容詞，意為「很可能的」，用來修飾名詞，不符合此處修飾動詞的需求。選項B) probably 是副詞，意為「很可能地、大概」，恰好能修飾動詞「need」，表示員工「很可能」需要尋找替代路線。選項C) probability 是名詞，意為「可能性、機率」。選項D) probabilities 是名詞複數。因此，只有副詞probably能正確填入空格，使句意和文法結構完整。","translation":"由於楓木大道施工延誤，員工將很可能需要尋找替代路線。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_109_38","book":2,"part":5,"qNum":109,"stem":"Bilto miniature model planes contain hundreds of small parts and must be assembled with ______ .","options":["A) contact","B) level","C) care","D) amount"],"answer":"C","explanation":"正確答案是 C) care。「with care」是一個常見的片語，意指「小心地、謹慎地」，用來描述組裝含有數百個小零件的微型模型飛機時所需的態度和方式，語意上非常貼切。選項 A) contact (接觸) 不符合語境，組裝並非「用接觸」來完成。選項 B) level (水平；程度) 在此句中無法構成有意義的片語來描述組裝方式。選項 D) amount (數量) 則是指數量，與組裝的「方式」無關，因此不正確。此題考驗考生對片語搭配及語境理解的能力。","translation":"Bilto微型模型飛機含有數百個小零件，必須小心地組裝。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_110_39","book":2,"part":5,"qNum":110,"stem":"The _______ image on this month's magazine cover is credited to Marlot Images.","options":["A) creative","B) creatively","C) creating","D) creativity"],"answer":"A","explanation":"此題考驗詞性辨識。句中「image」是名詞，前方需要一個形容詞來修飾它，說明「image」的特質。選項A)「creative」是形容詞，意為「有創意的」，修飾名詞「image」恰當，形成「有創意的圖片」。選項B)「creatively」是副詞，用來修飾動詞、形容詞或其他副詞，不能直接修飾名詞。選項C)「creating」是動詞現在分詞，在此語境下不合適，因為圖片本身不是「正在創造」什麼。選項D)「creativity」是名詞，不能用來修飾另一個名詞，除非形成複合名詞，但「creativity image」不符合語意。因此，正確答案為A。","translation":"本月雜誌封面上那張有創意的圖片，其版權歸屬於 Marlot Images。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_111_40","book":2,"part":5,"qNum":111,"stem":"Participation this year was the largest _______ in the history of the Securitas conference.","options":["A) totally","B) ever","C) soon","D) hardly"],"answer":"B","explanation":"【文法解析】本題考驗副詞的用法。句子中出現了最高級形容詞「the largest」（最大的），通常會搭配副詞「ever」來強調「史上最…」或「有史以來最…」。因此，「the largest ever in the history」意指「史上最大規模的」。\n\n選項 A) totally (完全地) 不適合修飾最高級形容詞，語意不通。選項 C) soon (很快地) 指的是未來時間，與句子的過去式動詞「was」和描述歷史的語境不符。選項 D) hardly (幾乎不) 帶有否定意味，與「the largest」的肯定語氣相矛盾，故不正確。","translation":"今年參與人數是Securitas會議史上最多的一次。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_112_41","book":2,"part":5,"qNum":112,"stem":"Ms. Fields is not able to travel from New York to Buenos Aires _______ sufficient notice.","options":["A) inside","B) except","C) about","D) without"],"answer":"D","explanation":"【文法解析】正確答案是D) without。「without + 名詞」表示「沒有…的情況下」或「缺乏…」，在此句中形成一個條件子句，意指「若沒有充足的通知」。因此，「Ms. Fields is not able to travel... without sufficient notice.」表示費爾茲女士若沒有收到充足的通知，便無法從紐約前往布宜諾斯艾利斯，語意通順且符合邏輯。A) inside（在…裡面/期間）不適用於「notice」；B) except（除了…之外）會使語意變成「除了充足的通知之外，她都無法旅行」，與原意不符；C) about（關於/大約）無法表達此處所需的條件關係。","translation":"費爾茲女士若沒有充足的通知，便無法從紐約前往布宜諾斯艾利斯。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_113_42","book":2,"part":5,"qNum":113,"stem":"Yuvaves Transit Company drivers should have their vehicles inspected ______ .","options":["A) rather","B) annually","C) quite","D) highly"],"answer":"B","explanation":"本題考查副詞的語義和用法。句子結構為「should have their vehicles inspected ______」，空白處需要一個副詞來修飾動詞 inspected，說明檢查的頻率或方式。選項 (B) annually 意為「每年地，一年一次」，完美符合車輛應定期檢查的語境，表示車輛應每年檢查一次。選項 (A) rather 和 (C) quite 都是程度副詞，意為「相當地，頗」，通常修飾形容詞或副詞，不適合修飾動詞 inspected 來表達頻率。選項 (D) highly 意為「高度地，非常」，雖然是副詞，但「高度地檢查」語意不通順，且不符合車輛定期檢查的常規要求。因此，(B) annually 是唯一正確且語意合理的選項。","translation":"Yuvaves 運輸公司的司機應該每年檢查他們的車輛。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_114_43","book":2,"part":5,"qNum":114,"stem":"Cell Choice marketers are _______ to become familiar with competitors' products and advertising.","options":["A) encourage","B) encourages","C) encouraged","D) encouraging"],"answer":"C","explanation":"本題考查動詞的語態和形式。句子的主語是「Cell Choice marketers」（Cell Choice 行銷人員），是複數名詞，且後面接「are」（be動詞），表示需要一個分詞來構成被動語態或主動語態。後面的「to become familiar with...」是不定詞片語，常與被動語態「be encouraged to do something」搭配，表示「被鼓勵去做某事」。\n\n選項C) encouraged 是動詞的過去分詞，與「are」結合形成被動語態「are encouraged」，意為「被鼓勵」。這符合語境，即行銷人員被鼓勵去熟悉競爭對手的產品和廣告。\n\n選項A) encourage 是動詞原形，不能直接接在「are」之後。\n選項B) encourages 是第三人稱單數現在式，不符合主語「marketers」（複數）且不能接在「are」之後。\n選項D) encouraging 是現在分詞，若使用「are encouraging」則表示主語「marketers」正在主動鼓勵他人，語意不符。行銷人員是「被鼓勵」去熟悉產品，而非主動鼓勵。\n\n因此，正確答案是C。","translation":"Cell Choice 行銷人員被鼓勵去熟悉競爭對手的產品和廣告。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_115_44","book":2,"part":5,"qNum":115,"stem":"The customer service department has seen a _______ decrease in the number of complaints over the past year.","options":["A) dramatic","B) polite","C) frequent","D) different"],"answer":"A","explanation":"【文法解析】正確答案是 A) dramatic。Dramatic 意指「顯著的、戲劇性的」，用來形容「減少 (decrease)」時，表示減少的幅度很大且引人注目，與句中客服部門投訴數量「大幅減少」的語境相符，暗示服務品質有顯著改善。B) polite (有禮貌的) 形容人的行為舉止，無法修飾「減少」的程度。C) frequent (頻繁的) 形容事情發生的頻率，與減少的幅度無關。D) different (不同的) 形容差異性，不適用於描述減少的程度或性質。因此，A 是唯一能精確表達文意的選項。","translation":"在過去一年裡，客服部門的投訴數量顯著減少。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_116_45","book":2,"part":5,"qNum":116,"stem":"The financial review board has stated that no budget proposal may _______ ten pages.","options":["A) excessive","B) excess","C) exceeding","D) exceed"],"answer":"D","explanation":"【文法解析】本題考驗情態助動詞 (modal verb) 的用法。句中的「may」是一個情態助動詞，其後必須接動詞原形 (base form of the verb)。\n\n選項 D) 「exceed」是動詞原形，意為「超過」，符合「may + 動詞原形」的文法結構，使句子表達「不得超過」的含義，語意通順。\n\n選項 A) 「excessive」是形容詞，意為「過度的、過多的」，不能直接跟在情態助動詞後。\n選項 B) 「excess」是名詞，意為「過量、過度」，也不能直接跟在情態助動詞後。\n選項 C) 「exceeding」是動名詞或現在分詞，不能直接跟在情態助動詞後作為句子的主要動詞。","translation":"財務審查委員會已聲明，任何預算提案都不得超過十頁。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_117_46","book":2,"part":5,"qNum":117,"stem":"As president, Ms. Min made great efforts to _______ a productive environment at Chae Investment Corporation.","options":["A) process","B) estimate","C) establish","D) participate"],"answer":"C","explanation":"本題考查動詞詞義辨析。句子的語境是閔女士作為總裁，努力「建立」一個高效的工作環境。「to」後面需要接動詞原形，且該動詞需能與「a productive environment」搭配。A) process (處理、加工) 通常指對數據、文件或材料進行處理，不適用於「建立環境」。B) estimate (估計) 指對數量、價值等進行估算，與「建立環境」的語意不符。C) establish (建立、創立) 意指將某物（如組織、系統、規則或環境）穩固地建立起來，與「建立一個高效的環境」完美契合。D) participate (參與) 為不及物動詞，常與介詞 in 連用 (participate in something)，不能直接接名詞作受詞。因此，C選項「establish」最符合句意。","translation":"作為總裁，閔女士在蔡氏投資公司為建立一個高效的環境付出了巨大的努力。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_118_47","book":2,"part":5,"qNum":118,"stem":"The city council will meet tomorrow to field questions from _______ concerning the new water tower.","options":["A) resident","B) residents","C) residences","D) residential"],"answer":"B","explanation":"正確答案為 (B) residents。介系詞 \"from\" 後面需要接名詞。選項 (A) resident 是單數名詞，若要使用，前方通常需有冠詞 (e.g., a resident)。選項 (B) residents 是複數名詞，符合語法，且「市議會回答來自居民的問題」語意通順合理。選項 (C) residences 指的是「住宅、住所」，雖然是名詞，但語意上不合理，因為住宅本身不會提問。選項 (D) residential 是形容詞，意為「居住的、住宅的」，不能直接放在介系詞 \"from\" 後面作受詞。因此，(B) residents 是唯一在文法和語意上都正確的選項。","translation":"市議會將於明日開會，回答來自居民關於新水塔的問題。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_119_48","book":2,"part":5,"qNum":119,"stem":"Cruz-Alva Oil provides _______ priced solutions for all your energy needs.","options":["A) competing","B) competition","C) competitive","D) competitively"],"answer":"D","explanation":"正確答案為 D) competitively。此題考驗詞性判斷。句中「priced solutions」的「priced」是過去分詞作形容詞，修飾名詞「solutions」。在「_______ priced」的結構中，需要一個副詞來修飾形容詞「priced」，表示「以競爭性的方式定價」。因此，副詞「competitively」是唯一正確的選項，意指「具有競爭力地定價」。\nA) competing 是現在分詞作形容詞，意為「競爭中的」，不能修飾形容詞「priced」。\nB) competition 是名詞，不能修飾形容詞。\nC) competitive 是形容詞，意為「有競爭力的」，若直接修飾「solutions」則為「competitive solutions」，但在此處需修飾「priced」，故不合適。","translation":"Cruz-Alva Oil 為您所有的能源需求提供價格具競爭力的解決方案。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_120_49","book":2,"part":5,"qNum":120,"stem":"Southenic Electronics' technicians are on hand 24 hours a day _______ you can be at ease knowing help is always available.","options":["A) because of","B) so","C) everything","D) until"],"answer":"B","explanation":"本題考查連接詞的用法。句子由兩個獨立子句組成：「Southenic Electronics' technicians are on hand 24 hours a day」（Southenic Electronics 的技術人員全天候待命）和「you can be at ease knowing help is always available」（您可以放心，知道隨時都有協助）。第二個子句是第一個子句的結果或目的。\n\n選項 A) \"because of\" 是一個介系詞片語，後面應接名詞、代名詞或動名詞，而非一個完整的子句，故不符。\n選項 B) \"so\" 是一個對等連接詞，表示「因此、所以」，用來連接兩個獨立子句，表達因果關係，完全符合句意：因為技術人員全天候待命，所以您可以放心。\n選項 C) \"everything\" 是一個代名詞，不能作為連接詞使用。\n選項 D) \"until\" 是一個從屬連接詞，表示「直到…為止」，強調時間點，不符合句子的因果邏輯關係。\n\n因此，正確答案是 B。","translation":"Southenic Electronics 的技術人員全天候待命，因此您可以放心，知道隨時都有協助。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_121_50","book":2,"part":5,"qNum":121,"stem":"Strong strategic-thinking _______ and sharp marketing instincts are important qualities for a successful product manager.","options":["A) skills","B) findings","C) realities","D) approximations"],"answer":"A","explanation":"正確答案為 A) skills。題目中「strategic-thinking _______」需要一個名詞來描述「策略性思考」的具體能力或方面。A) skills (技能) 與「strategic-thinking」形成常見且自然的搭配「strategic-thinking skills」（策略性思考技能），指一個人具備的策略規劃與分析能力，這正是成功產品經理所需的重要特質。B) findings (發現、研究結果) 不符語境，因為思考本身不是「發現」。C) realities (現實、實際情況) 雖然與思考相關，但「strategic-thinking realities」並非指一種個人能力或特質。D) approximations (近似值、估計) 則完全不符合語意。因此，只有 A) skills 能完整且邏輯地表達句子的意思。","translation":"強大的策略性思考能力和敏銳的市場直覺，是成功產品經理的重要特質。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_122_51","book":2,"part":5,"qNum":122,"stem":"______ of city buses will attend a training session on new vehicles in the coming months.","options":["A) Operations","B) Operators","C) Operate","D) Operating"],"answer":"B","explanation":"此題考驗詞性與語意理解。句子的主詞需要一個名詞，且該名詞必須能執行「參加訓練課程」的動作。\nA) Operations (營運、操作) 是名詞，但「營運」無法參加訓練，語意不符。\nB) Operators (操作員、駕駛員) 是複數名詞，指操作機器或系統的人。此處指「市區公車的駕駛員或操作人員」，他們能參加訓練課程，符合語意與文法，是正確答案。\nC) Operate (操作) 是動詞，不能作主詞。\nD) Operating (操作中、操作的) 是動名詞或現在分詞。雖然動名詞可作主詞，但「公車的操作」無法參加訓練，且語意不如「操作員」自然合理。","translation":"市區公車的駕駛員（或操作人員）將在未來幾個月內參加一場關於新車輛的訓練課程。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_123_52","book":2,"part":5,"qNum":123,"stem":"Renovations on the top floor of the Melaka Building are set to _______ after the elevators are installed in early August.","options":["A) expire","B) construct","C) commence","D) arrange"],"answer":"C","explanation":"正確答案為 (C) commence。句子的語境是「馬六甲大樓頂樓的翻修工程預計在電梯安裝後_______」。動詞 commence 意為「開始、著手」，與 are set to (準備要、預計要) 搭配，表示工程即將啟動，語意最為恰當。選項 (A) expire (到期、失效) 不適用於工程。選項 (B) construct (建造) 雖然與工程相關，但「翻修工程預計建造」語意重複且不自然，通常會說「工程開始建造」或「工程開始」。選項 (D) arrange (安排) 則是指「安排某事」，而非工程本身會「安排」。因此，commence 是最符合邏輯和語法的選擇。","translation":"馬六甲大樓頂樓的翻修工程預計在八月初電梯安裝完成後開始。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_124_53","book":2,"part":5,"qNum":124,"stem":"At Ben Flores Blinds, first-time customers can benefit from _______ rates of 30 percent off.","options":["A) introducing","B) introductions","C) introduced","D) introductory"],"answer":"D","explanation":"正確答案 D) introductory 是一個形容詞，意為「介紹性的、初步的」。在此修飾名詞「rates」（費率），表示「為新客戶提供的介紹性費率」，與句中「first-time customers」（首次顧客）的語境完美契合。A) introducing 是動詞現在分詞，通常作動詞或形容詞，但「introducing rates」語意不通。B) introductions 是名詞複數，不能直接修飾名詞。C) introduced 是動詞過去分詞，作形容詞時意為「被引進的」，語意上不如「introductory」精確表達「首次顧客專享」的含義。","translation":"在Ben Flores Blinds，首次顧客可以享有三折的介紹性費率優惠。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_125_54","book":2,"part":5,"qNum":125,"stem":"______ your return has been received, a refund will be issued to your account within three business days.","options":["A) In order that","B) Instead","C) Now that","D) Meanwhile"],"answer":"C","explanation":"【文法解析】本題考查連接詞的用法。句子由兩個子句組成：「your return has been received」（您的退貨已收到）和「a refund will be issued...」（將發放退款）。這兩個子句之間存在因果關係：因為退貨已收到，所以會發放退款。選項C) \"Now that\" 是一個複合連接詞，意為「既然；由於現在」，用來引導原因狀語子句，表示某種新情況的發生導致了後續的結果，完全符合句意。選項A) \"In order that\" 意為「為了；以便」，引導目的狀語子句，語意不符。選項B) \"Instead\" 意為「反而；代替」，是副詞，不能直接連接兩個子句。選項D) \"Meanwhile\" 意為「同時」，是副詞，表示時間上的並行，也不能直接連接兩個子句，且語意不符。因此，正確答案為C。","translation":"既然您的退貨已收到，退款將在三個工作天內發放到您的帳戶。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_126_55","book":2,"part":5,"qNum":126,"stem":"Last year, Entertainment Azusa, Inc., and Sohn Multimedia decided that _______ their expertise and resources would increase profits for both organizations.","options":["A) combining","B) combined","C) combines","D) combine"],"answer":"A","explanation":"【文法解析】此題考驗動名詞作為子句主詞的用法。句中「decided that」引導一個名詞子句，該子句的主詞需要是一個名詞或名詞片語。選項A) combining 是一個動名詞 (gerund)，動名詞片語「combining their expertise and resources」在此作為名詞子句的主詞，意指「結合他們的專業知識和資源這件事」，語法結構完整且語意通順。選項B) combined 是動詞的過去式或過去分詞，無法單獨作為子句主詞。選項C) combines 是動詞的現在式，D) combine 是動詞原形，兩者皆為有限動詞，不能直接充當子句的主詞。因此，A是唯一正確答案。","translation":"去年，Azusa娛樂公司和Sohn多媒體公司決定，結合他們的專業知識和資源將會增加兩個組織的利潤。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_127_56","book":2,"part":5,"qNum":127,"stem":"Before the laboratory carts can be used to transport _______ materials, technicians must wipe all exposed surfaces with a disinfectant cloth.","options":["A) vague","B) passive","C) sensitive","D) demonstrative"],"answer":"C","explanation":"正確答案是 (C) sensitive。句中提到在運送材料前，技術人員必須用消毒布擦拭推車表面，這暗示了所運送的材料對環境變化或污染非常「敏感」。例如，生物樣本、特定化學品或精密儀器都屬於敏感材料，需要避免污染以維持其完整性或功能。選項 (A) vague (模糊的)、(B) passive (被動的) 和 (D) demonstrative (示範性的/感情外露的) 皆不符合語境，無法解釋為何需要進行消毒的預防措施。因此，(C) sensitive 最能精確描述這類需要特別保護的材料。","translation":"在實驗室推車用於運送敏感材料之前，技術人員必須用消毒布擦拭所有暴露的表面。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_128_57","book":2,"part":5,"qNum":128,"stem":"As the publication date of the sequel to the controversial novel approaches, public _______ is growing exponentially.","options":["A) anticipation","B) anticipatory","C) anticipated","D) anticipate"],"answer":"A","explanation":"【文法解析】此題考驗詞性。空格前有形容詞 'public'（公眾的），空格後有動詞 'is growing'（正在增長），因此空格處需要填入一個名詞作為句子的主詞。選項A 'anticipation' 是名詞，意為「期待、預期」，與 'public' 結合形成「公眾的期待」，語意及文法皆符合。選項B 'anticipatory' 是形容詞，選項C 'anticipated' 是動詞的過去分詞或形容詞，選項D 'anticipate' 是動詞原形，三者皆不適合在此處作名詞使用。故正確答案為A。","translation":"隨著這本具爭議性小說續集的出版日期逼近，公眾的期待正呈指數級增長。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_129_58","book":2,"part":5,"qNum":129,"stem":"For the duration of Ms. Dernal's leave, her corporate and private accounts will be overseen by Jian Wu and David Dembo, _______.","options":["A) respectively","B) almost","C) likewise","D) even"],"answer":"A","explanation":"正確答案為A) respectively。此字為副詞，表示「分別地；各自地」，用於指出前面提及的兩組或多組事物之間存在一對一的對應關係，且順序與提及的順序一致。句中提到「公司帳戶和私人帳戶」將由「吳健和David Dembo」監督，使用respectively能清楚表明公司帳戶由吳健監督，私人帳戶由David Dembo監督。B) almost (幾乎) 是程度副詞，不符合語意。C) likewise (同樣地；也) 表示方式相同或附加，不適用於建立對應關係。D) even (甚至；即使) 是強調副詞，亦不符合句子的邏輯。","translation":"在Dernal女士休假期間，她的公司帳戶和私人帳戶將分別由吳健和David Dembo監督管理。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og2_p5_130_59","book":2,"part":5,"qNum":130,"stem":"Improvements in irrigation technology throughout the region were followed by _______ gains in corn production.","options":["A) proportionally","B) proportional","C) proportioning","D) proportions"],"answer":"B","explanation":"本題考查詞性。空格後方是名詞「gains」（增長），因此空格處需要一個形容詞來修飾這個名詞。\nA) proportionally 是副詞，修飾動詞、形容詞或副詞，不能直接修飾名詞。\nB) proportional 是形容詞，意為「成比例的」，用來修飾名詞「gains」非常恰當，表示玉米產量的增長與灌溉技術的改善成比例。\nC) proportioning 是動詞的現在分詞形式，在此句中不能作為形容詞修飾「gains」，因為「gains」本身並非在執行「proportioning」（分配比例）的動作。\nD) proportions 是名詞的複數形式，不能用來修飾另一個名詞。\n因此，正確答案為形容詞 B) proportional。","translation":"該地區灌溉技術的改進之後，玉米產量也隨之獲得了成比例的增長。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_101_60","book":3,"part":5,"qNum":101,"stem":"Duray Airlines offers delicious food and beverage _______.","options":["A) fees","B) answers","C) options","D) tasks"],"answer":"C","explanation":"本題考驗詞彙搭配與語意理解。空格前有「delicious food and beverage」（美味的食物和飲料），空格後需要一個名詞來完整表達航空公司的服務內容。選項C) options（選擇、選項）是最佳答案，因為「food and beverage options」是一個常見且自然的搭配，表示航空公司提供多樣化的餐飲選擇。選項A) fees（費用）不符語意，航空公司提供的是餐飲本身，而非「餐飲費用」。選項B) answers（答案）和D) tasks（任務）則完全不相關，無法與「food and beverage」搭配。","translation":"杜雷航空提供美味的餐飲選擇。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_102_61","book":3,"part":5,"qNum":102,"stem":"The Oakshore region _______ large numbers of young professionals.","options":["A) was attracted","B) has been attracted","C) attracting","D) attracts"],"answer":"D","explanation":"本題考查動詞的語態與時態。句子的主詞是「The Oakshore region」（奧克郡地區），為單數名詞。從語意來看，地區是「吸引」年輕專業人士，而非被吸引，因此應使用主動語態。\n\nA) 「was attracted」是過去簡單被動語態，表示「被吸引」。語意不符，地區通常是吸引人而非被吸引。\nB) 「has been attracted」是現在完成被動語態，同樣表示「被吸引」。語意不符。\nC) 「attracting」是現在分詞，若要構成完整的動詞片語，前面需有助動詞（如 is/was attracting）。單獨使用會使句子缺乏主要動詞，語法不完整。\nD) 「attracts」是現在簡單主動語態，符合主詞單數第三人稱動詞加s的規則。它表示一個地區的普遍特徵或事實，即「吸引」大量年輕專業人士。語法和語意皆正確，為最佳答案。","translation":"奧克郡地區吸引了大量年輕專業人士。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_103_62","book":3,"part":5,"qNum":103,"stem":"The sales report is due tomorrow, so please finish it ______ .","options":["A) easily","B) quickly","C) certainly","D) truly"],"answer":"B","explanation":"本題考驗副詞的語意搭配。句中提到「銷售報告明天到期 (due tomorrow)」，這表示時間緊迫，需要盡快完成。因此，選項 (B) \"quickly\"（迅速地、快速地）最符合語境，表示應在短時間內完成報告。選項 (A) \"easily\"（容易地）指不費力地完成，與時間壓力無關。選項 (C) \"certainly\"（當然地、肯定地）表示無疑地完成，雖然也希望報告能完成，但它沒有直接回應「明天到期」的時間限制。選項 (D) \"truly\"（真正地、誠實地）則語意不符，無法修飾「完成」這個動作。綜合判斷，只有 \"quickly\" 能恰當地表達因時間壓力而需要加速完成的語意。","translation":"銷售報告明天到期，所以請盡快完成。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_104_63","book":3,"part":5,"qNum":104,"stem":"Referring to the _______ in the user's manual will help you to identify the parts of the workbench.","options":["A) illustrate","B) illustrator","C) illustration","D) illustrated"],"answer":"C","explanation":"「the _______」後方需要一個名詞來完成片語。A) illustrate 是動詞，表示「圖解、說明」，不符合文法結構。B) illustrator 是名詞，指「繪圖者、插畫家」，但在語境中，手冊裡提供的是「圖解」而非「人」，故不合適。C) illustration 是名詞，表示「圖解、插圖」，放在「the」之後，語意上指「參考使用者手冊中的圖解」，完全符合文法和語境。D) illustrated 是動詞的過去式或過去分詞，也可作形容詞「附有插圖的」，若作形容詞，其後需有名詞修飾，單獨使用不符合本句結構。因此，C) illustration 為正確答案。","translation":"參考使用者手冊中的圖解，將有助於您辨識工作臺的零件。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_105_64","book":3,"part":5,"qNum":105,"stem":"No more than four passengers are permitted in _______ taxi operated by the Halligan Company.","options":["A) any","B) all","C) some","D) such"],"answer":"A","explanation":"正確答案為 A) any。此句表達一項普遍規則或限制，適用於該公司營運的「每一輛」計程車。在否定句或表示普遍性、限制性的語境中，\"any\" 常與單數可數名詞連用，強調「任何一輛」或「每一輛」。選項 B) all 需接複數名詞 (all taxis)；選項 C) some 表示「一些」，不符普遍規則語境；選項 D) such 通常需搭配冠詞 (such a taxi) 或接複數名詞，且語意不符。","translation":"霍利根公司營運的任何計程車，載客量不得超過四名乘客。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_106_65","book":3,"part":5,"qNum":106,"stem":"Sales of the Moro Camera dropped by 3 percent _______ the last quarter.","options":["A) down","B) well","C) and","D) during"],"answer":"D","explanation":"正確答案是 D) during。During 是一個介系詞，表示「在…期間」，用來引導時間片語，說明某事件發生的時間點或持續的期間。在此句中，「during the last quarter」意指「在上一季期間」，完美地解釋了銷售額下降的時間點。選項 A) down 是一個副詞或介系詞，通常表示「向下」或「沿著」，不適合用來引導時間片語。選項 B) well 是一個副詞或形容詞，表示「好地」或「健康地」，與時間概念無關。選項 C) and 是一個對等連接詞，用於連接兩個對等的詞、片語或子句，不能作為介系詞引導時間片語。因此，只有 during 能正確地連接動詞片語「dropped by 3 percent」與時間片語「the last quarter」。","translation":"Moro相機的銷售額在上一季下降了3%。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_107_66","book":3,"part":5,"qNum":107,"stem":"The newest branch of the library is located _______ Pine Street, directly across from the post office.","options":["A) into","B) among","C) until","D) on"],"answer":"D","explanation":"【文法解析】\n正確答案是 D) on。在英文中，當我們要表達某個地點「位於某條街道上」時，慣用的介系詞是 \"on\"。例如 \"on Pine Street\" 或 \"on Main Street\"。這是一個表示地理位置的固定用法。\n\nA) into 表示「進入…裡面」，通常用於描述動作或方向（例如 \"walk into the room\"），不適用於靜態的地理位置描述。\nB) among 表示「在…之間、在…之中」，用於指在多個事物或人群之間（例如 \"among the trees\"），不適用於單一街道的定位。\nC) until 表示「直到…為止」，是時間介系詞，與空間位置無表達關聯。\n\n因此，根據英文介系詞的慣用搭配，D) on 是唯一正確的選項，用來指明地點位於某條街道上。","translation":"圖書館最新的分館位於松樹街上，就在郵局的正對面。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_108_67","book":3,"part":5,"qNum":108,"stem":"The property manager must ensure that renters understand _______ rental agreement.","options":["A) their","B) they","C) theirs","D) them"],"answer":"A","explanation":"此題空格後為名詞片語「rental agreement」（租賃協議），因此空格處需要一個「所有格形容詞」來修飾該名詞，表示「誰的」租賃協議。\nA) 「their」是所有格形容詞，表示「他們的」，與句中主詞「renters」（租戶，複數）一致，語意上指租戶自己的租賃協議，故為正確答案。\nB) 「they」是主格代名詞，用作主詞，不能修飾名詞。\nC) 「theirs」是所有格代名詞，用來取代名詞片語，不能直接修飾名詞（例如：The agreement is theirs.）。\nD) 「them」是受格代名詞，用作動詞或介系詞的受詞，不能修飾名詞。\n因此，只有所有格形容詞「their」符合文法及語意要求。","translation":"物業經理必須確保租戶理解他們的租賃協議。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_109_68","book":3,"part":5,"qNum":109,"stem":"______ Ms. Bai was not available to lead the board meeting, she was able to find a replacement.","options":["A) Although","B) Whether","C) Instead","D) Accordingly"],"answer":"A","explanation":"「Although」（儘管）是一個從屬連接詞，用來引導一個表示讓步的子句，表示儘管前一個事實存在，後一個事實仍然發生，形成對比。在此句中，儘管白女士無法主持會議，她卻成功找到了替代人選，兩者之間存在讓步關係，故A為正解。「Whether」（是否）用於引導表示選擇或不確定的子句，不符合語意。「Instead」（反而、代替）是副詞，通常用於表示替代或轉折，不能直接引導從屬子句，且語意不符。「Accordingly」（因此、相應地）是副詞，表示結果或一致性，不符合讓步的邏輯關係。","translation":"儘管白女士無法主持董事會議，她還是成功找到了一位替代人選。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_110_69","book":3,"part":5,"qNum":110,"stem":"Once staff has had training in the new accounting software, they will be prepared to work _______.","options":["A) independent","B) independently","C) independency","D) independence"],"answer":"B","explanation":"此題考驗詞性辨識。句子的結構為「they will be prepared to work _______」，其中「work」是動詞。我們需要一個詞來修飾動詞「work」，說明他們將如何工作。選項A) independent 是形容詞，用來修飾名詞，故不符。選項B) independently 是副詞，用來修飾動詞、形容詞或其他副詞，完美地描述了「work」的方式，意指「獨立地」。選項C) independency 和 D) independence 都是名詞，分別指「獨立性」或「獨立的狀態」，不能用來修飾動詞。因此，正確答案是副詞B) independently，表示員工在受訓後將能「獨立地」工作。","translation":"一旦員工接受了新會計軟體的培訓，他們就能準備好獨立地工作。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_111_70","book":3,"part":5,"qNum":111,"stem":"Nuts from Quintana Orchards can be a _______ source of vitamins and minerals for a nutritious diet.","options":["A) long","B) various","C) rich","D) careful"],"answer":"C","explanation":"正確答案是 (C) rich。「rich source」是一個非常常見且自然的搭配詞，意指「豐富的來源」或「富含…的來源」。在此句中，它完美表達了昆塔納果園的堅果能提供大量維生素和礦物質的特性，符合「營養均衡飲食」的語境。 (A) long (長的) 不適用於形容「來源」的豐富程度或品質。 (B) various (多樣的) 通常用來形容種類，例如「various types of vitamins」，而不是「a various source」。若要表達多樣性，應說「a source of various vitamins」。 (D) careful (小心的) 則完全不符合語意，因為「來源」本身無法「小心」。因此，(C) rich 是唯一能正確且自然地描述堅果作為營養來源的選項。","translation":"來自昆塔納果園的堅果，可以成為均衡飲食中維生素和礦物質的_______來源。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_112_71","book":3,"part":5,"qNum":112,"stem":"To maintain the Cheerbrew coffeemaker properly, wipe it with a _______ sponge after each use.","options":["A) moist","B) moistens","C) moistly","D) moisten"],"answer":"A","explanation":"此題考驗詞性辨識。句型為 \"wipe it with a _______ sponge\"，其中 \"sponge\" 是名詞，前面需要一個形容詞來修飾它。\nA) \"moist\" 是形容詞，意為「潮濕的」，符合修飾名詞 \"sponge\" 的語法，形成「一塊濕海綿」。\nB) \"moistens\" 是動詞「弄濕」的第三人稱單數現在式，不能修飾名詞。\nC) \"moistly\" 是副詞「潮濕地」，用來修飾動詞、形容詞或另一個副詞，不能直接修飾名詞。\nD) \"moisten\" 是動詞原形「弄濕」，也不能修飾名詞。\n因此，只有形容詞 \"moist\" 能正確填入空格，使句子語法正確且語意完整。","translation":"為了正確保養 Cheerbrew 咖啡機，每次使用後請用一塊濕海綿擦拭。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_113_72","book":3,"part":5,"qNum":113,"stem":"Research shows that an online marketing strategy is vital for survival in the _______ competitive athletic shoe market.","options":["A) skillfully","B) increasingly","C) accidentally","D) meaningfully"],"answer":"B","explanation":"本題考驗副詞修飾形容詞的能力與語意理解。空格處需要一個副詞來修飾形容詞「competitive」（競爭激烈的）。\nA) skillfully（巧妙地）修飾競爭不合語境。\nB) increasingly（越來越地）表示競爭程度不斷加劇，使「increasingly competitive」（競爭日益激烈）完美符合「vital for survival」（對生存至關重要）的語境，因為市場競爭越激烈，就越需要新的策略來生存。\nC) accidentally（偶然地）和 D) meaningfully（有意義地）修飾競爭皆不符合句意。因此，B是最佳答案。","translation":"研究顯示，在競爭日益激烈的運動鞋市場中，線上行銷策略對於生存至關重要。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_114_73","book":3,"part":5,"qNum":114,"stem":"Tomorrow's session will train participants on _______ to prepare containers for overseas shipments.","options":["A) what","B) how","C) that","D) then"],"answer":"B","explanation":"【文法解析】此題考驗動詞「train」後接介系詞「on」再搭配疑問詞不定詞片語的用法。正確答案B) how，形成「how to + 動詞原形」的結構，表示「如何做某事」或「做某事的方法」。句中「train participants on how to prepare containers」意指「訓練參與者如何準備貨櫃」，語意完整且符合邏輯。A) what，雖然「what to + 動詞原形」也是一種結構，但在此處「what to prepare containers」語意不通，因為「containers」是準備的對象，而非疑問詞「what」所指的內容。C) that 和 D) then 皆無法與「to prepare」形成正確的文法結構，故為錯誤選項。","translation":"明天的課程將訓練參與者如何準備用於海外運輸的貨櫃。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_115_74","book":3,"part":5,"qNum":115,"stem":"Applications received _______ the October 15 deadline will not be processed.","options":["A) after","B) already","C) while","D) often"],"answer":"A","explanation":"正確答案是 A) after。此句需要一個介系詞來表示「收到申請」與「截止日期」之間的時間關係。「after」意為「在…之後」，完整表達了「在10月15日截止日期之後收到的申請將不予處理」的邏輯，語意通順且符合文法。選項 B) already 是副詞，表示「已經」，不能作為介系詞連接動詞與名詞片語。選項 C) while 是從屬連接詞，意為「當…的時候」，後面需接子句或動名詞片語，不能直接接名詞片語「the October 15 deadline」。選項 D) often 是頻率副詞，意為「經常」，不符合句子的語意需求。","translation":"在10月15日截止日期之後收到的申請將不予處理。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_116_75","book":3,"part":5,"qNum":116,"stem":"Customers expressed dissatisfaction with the cost of the phone, but complaints about the user interface were relatively ______ .","options":["A) rarest","B) rare","C) rarity","D) rarely"],"answer":"B","explanation":"本題考查詞性。句子的結構是「complaints about the user interface were relatively ______」。其中「were」是連綴動詞，其後應接形容詞或名詞片語來描述主詞「complaints」。副詞「relatively」修飾其後的形容詞。選項B「rare」是形容詞，意為「稀少的、罕見的」，符合「連綴動詞 + 副詞 + 形容詞」的結構，表示「相對罕見」。選項A「rarest」是最高級形容詞，但句中沒有比較對象且缺乏定冠詞「the」，不適用。選項C「rarity」是名詞，不能直接跟在「relatively」之後修飾主詞。選項D「rarely」是副詞，不能用來描述主詞的狀態。因此，正確答案是B。","translation":"顧客對手機的價格表示不滿，但關於使用者介面的投訴則相對較少。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_117_76","book":3,"part":5,"qNum":117,"stem":"Tickets to the museum's special exhibit may be ordered in advance on the Web site _______ purchased upon arrival.","options":["A) or","B) for","C) where","D) since"],"answer":"A","explanation":"A) \"or\" 是正確答案，因為它用於連接兩個平行的選擇或替代方案。句子中提到購票方式有兩種：「可以在網站上提前預訂」或「可以在抵達時購買」。這兩個選項是並列的，表示顧客可以選擇其中一種方式。B) \"for\" 通常表示原因、目的或對象，不適用於連接並列的替代方案。C) \"where\" 是關係副詞，引導地點子句，不符合此處連接動作的語境。D) \"since\" 通常表示原因（因為）或時間（自從），也不適用於表示選擇。","translation":"博物館特展的門票可以在網站上提前預訂，或者在抵達時購買。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_118_77","book":3,"part":5,"qNum":118,"stem":"Two water-quality studies, which _______ last week, reflect the hard work of the Water Resource Council to keep local water clean.","options":["A) were released","B) were being released","C) had released","D) had been releasing"],"answer":"A","explanation":"【文法解析】本題考查關係子句中的動詞時態與語態。句子的主語是「Two water-quality studies」（兩項水質研究），而「which」指代這些研究。由於研究是「被發布」的，而非主動發布，因此動詞必須使用被動語態。時間副詞「last week」（上週）明確指出動作發生在過去，且已完成，故應使用過去簡單被動語態。選項A)「were released」是過去簡單被動語態，符合「last week」和被動語態的要求。選項B)「were being released」是過去進行被動語態，表示過去某時正在進行的動作，與「last week」通常指已完成動作的語境不符。選項C)「had released」和D)「had been releasing」均為主動語態，且時態不符，故錯誤。","translation":"兩項水質研究，這些研究上週發布，反映了水資源委員會為保持當地水質清潔所做的辛勤工作。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_119_78","book":3,"part":5,"qNum":119,"stem":"______ the efforts of cycling enthusiasts, the proposal to resurface bicycle paths in County Kildare was defeated yesterday.","options":["A) Throughout","B) Besides","C) Despite","D) Versus"],"answer":"C","explanation":"【文法解析】本題考驗介系詞的語義與用法。句中「自行車愛好者的努力」與「提案被否決」是兩個相反的結果，因此需要一個表示「儘管、雖然」的介系詞來連接。C) Despite (儘管、雖然) 正確，它引導名詞片語 (the efforts of cycling enthusiasts)，表示儘管有這些努力，結果卻不如預期。A) Throughout (遍及、在…期間) 表示時間或空間的範圍，不符合語意。B) Besides (除了…之外) 表示附加或排除，不符合語意。D) Versus (對抗、與…相對) 通常用於比較或對立的雙方，如比賽或法律案件，不適用於此處的讓步語氣。因此，C) Despite 是唯一能表達句中轉折語氣的正確選項。","translation":"儘管自行車愛好者們付出了努力，但愛爾蘭基爾代爾郡重新鋪設自行車道的提案昨天仍被否決了。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_120_79","book":3,"part":5,"qNum":120,"stem":"Crum Carpeting's profits have risen _______ since the company introduced a new environmentally friendly carpet line.","options":["A) steadiness","B) steadying","C) steadily","D) steadied"],"answer":"C","explanation":"【文法解析】此題考驗詞性判斷。句中「have risen」是動詞片語，表示利潤「已經上升」。我們需要一個詞來修飾這個動詞，說明利潤上升的方式或狀態。選項中：\nA) steadiness 是名詞（穩定性），不能修飾動詞。\nB) steadying 是動詞（使穩定）的現在分詞或動名詞，在此不能作為副詞修飾動詞。\nD) steadied 是動詞的過去式或過去分詞，通常作形容詞或動詞的一部分，不能修飾動詞「risen」。\nC) steadily 是副詞（穩定地），恰好能修飾動詞「risen」，表示利潤「穩定地上升」。因此，C為正確答案。","translation":"Crum Carpeting的利潤自從公司推出新的環保地毯系列以來，已經穩定地上升。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_121_80","book":3,"part":5,"qNum":121,"stem":"Glideline Technologies _______ in archiving records and retrieving lost data.","options":["A) consists","B) interests","C) inspects","D) specializes"],"answer":"D","explanation":"正確答案是 D) specializes。「specialize in」是一個常見且正確的搭配詞組，意指「專精於某領域或技能」。題目描述 Glideline Technologies 公司在「歸檔記錄和找回遺失資料」方面的能力，因此「專精於」最符合語境，表示該公司在此領域具有專業知識和服務。\nA) consists：「consist in」意指「在於、存在於」，通常用於說明事物的本質或主要構成，而非公司提供的服務或專長，語意不符。\nB) interests：動詞「interest」意指「使…感興趣」，通常是及物動詞，用法不符。若要表達公司對某事有興趣，應為「is interested in」。\nC) inspects：「inspect」意指「檢查」，通常直接接檢查的對象，不會搭配「in」來表示專長領域。","translation":"Glideline Technologies 專精於歸檔記錄和找回遺失資料。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_122_81","book":3,"part":5,"qNum":122,"stem":"The mayoral candidates are competing for television _______.","options":["A) having exposed","B) exposed","C) expose","D) exposure"],"answer":"D","explanation":"本題考查詞性。介系詞 \"for\" 後面需要接名詞或名詞片語。A) \"having exposed\" 是完成分詞片語，通常作形容詞或副詞，不作名詞。B) \"exposed\" 是過去分詞，作形容詞（如：被暴露的）或動詞的一部分，不作名詞。C) \"expose\" 是動詞原形，意為「揭露、使暴露」，在此句中不符合語法結構，也非所需的名詞意義。D) \"exposure\" 是名詞，意為「曝光、揭露、接觸」，在此指「在電視上露面、獲得電視宣傳的機會」。與 \"television\" 結合形成 \"television exposure\"，意指「電視曝光度」或「電視宣傳」，完美符合句意：「市長候選人正在爭奪電視曝光機會」。因此，D是正確答案。","translation":"市長候選人正在爭奪電視曝光機會。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_123_82","book":3,"part":5,"qNum":123,"stem":"Employees should submit time sheets by noon today _______ the payroll office can distribute paychecks on schedule.","options":["A) so that","B) in order to","C) that is","D) in case of"],"answer":"A","explanation":"【文法解析】\n本題考驗連接詞的用法。「so that」是一個連接詞片語，表示「以便；為了讓」，引導目的子句，說明主句行為的目的或結果。題目中，員工提交工時表的目的是「為了讓薪資部門能按時發放薪水」，因此「so that」完美符合語意與文法結構。\n選項B「in order to」後方必須接原形動詞，不能接子句（主詞+動詞），故錯誤。選項C「that is」表示「換句話說；也就是說」，用於解釋說明，不符本題目的關係。選項D「in case of」是介系詞片語，後方須接名詞或動名詞，表示「萬一發生…」，語意不符。","translation":"員工應在今天中午前提交工時表，以便薪資部門能按時發放薪水。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_124_83","book":3,"part":5,"qNum":124,"stem":"Suburban residents are _______ in favor of expanding Highway 589 to relieve traffic congestion.","options":["A) overwhelm","B) overwhelmingly","C) overwhelming","D) overwhelms"],"answer":"B","explanation":"本題考查詞性。句子的結構為「主詞 + be動詞 + 副詞 + 介系詞片語 (作形容詞用)」。空格後方的「in favor of」是一個介系詞片語，在此句中作為形容詞使用，修飾主詞「Suburban residents」，表示「支持」或「贊成」。因此，空格處需要一個副詞來修飾這個形容詞片語，表示「支持的程度」。選項B)「overwhelmingly」是副詞，意為「壓倒性地、絕大多數地」，用來修飾「in favor of」恰當，表示郊區居民「絕大多數都支持」擴建公路。選項A)「overwhelm」是動詞原形；C)「overwhelming」是形容詞；D)「overwhelms」是動詞第三人稱單數現在式，這三者都無法修飾形容詞片語，故皆為錯誤答案。","translation":"郊區居民絕大多數都支持擴建589號公路，以緩解交通擁堵。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_125_84","book":3,"part":5,"qNum":125,"stem":"Business travel is _______ for Shawton Associates by Young-Pyo Kim at Wright Air Transit.","options":["A) equipped","B) attributed","C) coordinated","D) concurred"],"answer":"C","explanation":"本題考驗動詞語意與被動語態的搭配。句中提到商務旅行由「Wright Air Transit」（萊特航空運輸公司）的「Young-Pyo Kim」（金永杓）負責，暗示此人正在安排或管理旅行事宜。\n(C) \"coordinated\" 意為「協調；安排」，符合由航空公司人員負責安排商務旅行的語境，形成「商務旅行被協調/安排」的被動語態，語意通順。\n(A) \"equipped\" 意為「裝備」，商務旅行本身不會被裝備。\n(B) \"attributed\" 意為「歸因於」，通常用於將某事歸因於某人或某原因，不適用於安排旅行。\n(D) \"concurred\" 意為「同意」，通常指人同意某事，商務旅行不會同意。\n因此，(C) 是唯一正確且語意通順的選項。","translation":"蕭頓聯合公司的商務旅行由萊特航空運輸公司的金永杓負責協調。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_126_85","book":3,"part":5,"qNum":126,"stem":"Most models of the Remagine laptop computer now come with a _______ keyboard.","options":["A) removability","B) remove","C) removable","D) remover"],"answer":"C","explanation":"此題考驗詞性判斷。句中「a _______ keyboard」的結構顯示，空白處需要一個形容詞來修飾名詞「keyboard」（鍵盤）。\nA) removability 是名詞，意為「可移除性」，不能用來修飾另一個名詞。\nB) remove 是動詞，意為「移除」，詞性不符。\nC) removable 是形容詞，意為「可移除的」，恰好能修飾名詞「keyboard」，形成「可拆卸鍵盤」之意，使句意完整且文法正確。\nD) remover 也是名詞，意為「移除者」或「移除劑」，詞性不符。\n因此，正確答案為 C。","translation":"Remagine筆記型電腦的大多數型號現在都配備了可拆卸鍵盤。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_127_86","book":3,"part":5,"qNum":127,"stem":"With the recent surge in electronic sales, industry analysts are anticipating that the device-to-person _______ will soon surpass earlier predictions.","options":["A) division","B) fraction","C) part","D) ratio"],"answer":"D","explanation":"「device-to-person _______」此結構表示「設備與人之間的關係」。在這種「X-to-Y」的比較語境中，「ratio」是唯一正確且慣用的詞彙，意指「比率、比例」。它精確地表達了設備數量與人數之間的量化關係，例如每人擁有的設備數量。選項A)「division」意為「除法」或「部門」，不適用於此處的比較關係。選項B)「fraction」意為「分數」或「小部分」，通常指整體的一部分，而非兩個獨立實體之間的比例。選項C)「part」意為「部分」，語意上無法表達設備與人之間的數值關係。因此，只有「ratio」能完整且正確地傳達句子的意思，即預期每個人擁有的設備數量將會增加。","translation":"隨著近期電子產品銷售的激增，產業分析師預計設備與人之間的比例將很快超越先前的預測。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_128_87","book":3,"part":5,"qNum":128,"stem":"In response to consumer complaints, assembly instructions for the model 481 bookshelf have been ______ .","options":["A) acknowledged","B) estimated","C) controlled","D) simplified"],"answer":"D","explanation":"本題考驗詞彙語意與上下文理解。句子為被動語態 \"have been ______\"，需要一個過去分詞。根據句首「In response to consumer complaints」（回應消費者投訴），以及主詞「assembly instructions」（組裝說明），最合理的動詞是「簡化」。消費者投訴組裝說明，通常是因為說明太複雜或難以理解，因此將其「簡化」(simplified) 是最符合邏輯的回應。A) acknowledged (承認、確認) 不符語意，說明被承認不代表解決問題。B) estimated (估計) 不適用於說明。C) controlled (控制) 語意不符，說明被控制與解決投訴無關。因此，D) simplified (簡化) 是唯一正確選項。","translation":"為了回應消費者的投訴，型號481書架的組裝說明已______。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_129_88","book":3,"part":5,"qNum":129,"stem":"Choose an _______ sized air conditioner for your company's needs, as larger models use more energy.","options":["A) affirmatively","B) appropriately","C) unexpectedly","D) extensively"],"answer":"B","explanation":"【文法解析】本題考驗副詞的選擇。句子的空白處需要一個副詞來修飾形容詞「sized」，表示選擇空調尺寸的方式。句子的後半部「as larger models use more energy」（因為較大型號會消耗更多能源）提供了關鍵線索，暗示選擇尺寸時應考慮效率與需求。\n\n選項 B) appropriately (適當地、恰當地) 最符合語境。選擇「appropriately sized」（尺寸適當的）空調，才能符合公司的實際需求，避免能源浪費。\n\n選項 A) affirmatively (肯定地) 不符合語意，通常用於表達同意或肯定。\n選項 C) unexpectedly (出乎意料地) 不符合語意，選擇空調尺寸應是經過考量而非意外的。\n選項 D) extensively (廣泛地、大量地) 不符合語意，不能用來修飾「sized」以表達尺寸的合適性。","translation":"請為貴公司的需求選擇一台尺寸_______的空調，因為較大型號會消耗更多能源。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og3_p5_130_89","book":3,"part":5,"qNum":130,"stem":"Owing to his knowledge of historic buildings, Luis Harmon was _______ to lead the Main Street Restoration Project.","options":["A) persuasion","B) persuasively","C) persuaded","D) persuading"],"answer":"C","explanation":"【文法解析】本題考點為動詞的被動語態。句子結構為「主詞 + be動詞 + 過去分詞 (V3) + to不定詞」，表示主詞「Luis Harmon」是「被說服」去做某事。選項C) persuaded 是動詞 persuade 的過去分詞，符合被動語態「was persuaded」的結構，意指「被說服」。根據句意，Luis Harmon 因為他對歷史建築的知識，所以「被說服」去領導修復計畫，語法和邏輯皆正確。\n\n選項A) persuasion 是名詞，不能直接接在be動詞後形成被動語態。選項B) persuasively 是副詞，修飾動詞、形容詞或副詞，不能直接接在be動詞後形成被動語態。選項D) persuading 是現在分詞，若用「was persuading」會形成過去進行式（主動語態），表示Luis Harmon 正在說服別人，與句意「他被說服」不符。","translation":"由於他對歷史建築的知識，路易斯·哈蒙被說服領導了主街修復計畫。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_101_90","book":4,"part":5,"qNum":101,"stem":"Most of our clients are _______ about the prospect of our showroom moving to a larger space.","options":["A) exciting","B) to excite","C) excites","D) excited"],"answer":"D","explanation":"正確答案是 D) excited。此處需要一個形容詞來描述主詞 \"Most of our clients\" 的感受。當描述人感到某種情緒時，我們通常使用動詞的過去分詞作為形容詞，例如 \"be excited\" (感到興奮)。因此，\"are excited about\" 表示客戶對某事感到興奮。\nA) exciting 是現在分詞，用來描述「令人興奮的」事物，而非人的感受。例如，\"an exciting prospect\" (一個令人興奮的前景)。客戶本身不是「令人興奮的」，而是「感到興奮的」。\nB) to excite 是不定詞，不符合句子的文法結構。\nC) excites 是動詞的第三人稱單數現在式，若使用此選項，句子會變成 \"clients excites about...\"，文法上不通，且語意不符，因為句子需要一個形容詞來修飾主詞，而非另一個動詞。","translation":"我們大部分的客戶對於我們的展示間將搬遷到更大的空間感到興奮。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_102_91","book":4,"part":5,"qNum":102,"stem":"______ their review of the documents, Ms. Oliveira will make changes to the paperwork.","options":["A) After","B) Now","C) Soon","D) Next"],"answer":"A","explanation":"正確答案是A) After。此題考驗介系詞的用法。空格後接名詞片語「their review of the documents」，表示「在他們審閱文件之後」。介系詞After能引導名詞片語，表達時間上的先後順序，完美符合句意：先審閱文件，然後Oliveira女士才會修改文書。選項B) Now、C) Soon、D) Next皆為時間副詞，不能直接接名詞片語。它們通常用於句首修飾整個句子（例如：Now, ...; Soon, ...; Next, ...）或修飾動詞，因此在文法上不符合本題的結構。只有After能作為介系詞引導名詞片語，表達「在...之後」的含義。","translation":"在他們審閱文件之後，Oliveira女士將會修改文書作業。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_103_92","book":4,"part":5,"qNum":103,"stem":"Contact technical support for any needed _______ with software issues.","options":["A) assist","B) assistant","C) assisted","D) assistance"],"answer":"D","explanation":"此題考驗詞性辨識。句中「for any needed _______」結構，「needed」為形容詞（過去分詞作形容詞），修飾其後的名詞。因此，空格處應填入名詞。選項D「assistance」是名詞，意為「協助、幫助」，符合語意「任何所需的協助」。選項A「assist」是動詞，意為「協助」；選項C「assisted」是動詞的過去式或過去分詞，兩者皆不符名詞需求。選項B「assistant」雖然是名詞，但指「助理、助手」（人），而非「協助」這個行為或事物本身，語意不合。故選D。","translation":"若有任何軟體問題需要協助，請聯繫技術支援。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_104_93","book":4,"part":5,"qNum":104,"stem":"Willington Hair Salon will be open _______ weekend starting in May.","options":["A) every","B) from","C) enough","D) since"],"answer":"A","explanation":"【文法解析】正確答案為 (A) every。「every weekend」表示「每個週末」，用來描述一個從五月開始的規律性、重複性事件，符合句意。 (B) from 是一個介系詞，通常表示「從…開始」，例如「from May」（從五月開始），但不能直接修飾單數名詞「weekend」形成「from weekend」。 (C) enough 意為「足夠的」，通常修飾名詞時，若名詞可數則需用複數形式（如「enough weekends」），且語意不符。 (D) since 意為「自從」，通常用於現在完成式，表示從過去某個時間點持續到現在，不適用於描述未來的重複性事件。","translation":"Willington 美髮沙龍將從五月開始，每個週末營業。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_105_94","book":4,"part":5,"qNum":105,"stem":"When accessing _______ billing statement online, be sure to look for new discount offers.","options":["A) yourselves","B) yours","C) your","D) you"],"answer":"C","explanation":"正確答案為 (C) your。此處需要一個所有格形容詞來修飾名詞片語「billing statement」（帳單）。「your」是「你/你們的」的意思，作為所有格形容詞，置於名詞前表示所屬關係，符合語法。\n(A) yourselves 是反身代名詞，用於強調或當主詞與受詞相同時，不能直接修飾名詞。\n(B) yours 是所有格代名詞，意為「你的/你們的東西」，本身就包含名詞概念，不能再接名詞。例如：「This is yours.」\n(D) you 是主格或受格代名詞，也不能直接修飾名詞。\n因此，只有「your」能正確地修飾「billing statement」，形成「你的帳單」。","translation":"當您線上查詢您的帳單時，務必留意新的折扣優惠。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_106_95","book":4,"part":5,"qNum":106,"stem":"The work shifts at Stella's Confectionary are eight hours long and _______ a 30-minute break for lunch.","options":["A) prepare","B) release","C) assemble","D) include"],"answer":"D","explanation":"正確答案是 (D) include。此句描述Stella's Confectionary的工作班次，其長度為八小時，並且「包含」30分鐘的午餐休息時間。動詞 include (包含、包括) 最能精確表達班次與休息時間之間的組成關係，即休息時間是班次的一部分，是班次內容的組成項目。其他選項皆不合適：(A) prepare (準備) 不符合班次作為主語的語境，班次不會「準備」休息；(B) release (釋放、發布) 意思不符，班次不會「釋放」休息；(C) assemble (組裝、集合) 通常指將零件組合成整體，不適用於描述班次與休息時間的關係。","translation":"Stella's Confectionary的工作班次長達八小時，並包含30分鐘的午餐休息時間。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_107_96","book":4,"part":5,"qNum":107,"stem":"The timer on the lamp is designed to turn it off _______ to reduce energy use.","options":["A) automatic","B) automatically","C) automated","D) automate"],"answer":"B","explanation":"【文法解析】\n本題需要填入一個詞來修飾動詞片語「turn it off」（關閉它）。動詞需要副詞來修飾，說明動作如何發生。\n\n*   **B) automatically (副詞)**：意為「自動地」，修飾動詞片語「turn it off」，表示檯燈會「自動地」被關閉，符合語意及文法結構。\n*   **A) automatic (形容詞)**：意為「自動的」，用來修飾名詞，例如「an automatic timer」（一個自動計時器），不能修飾動詞。\n*   **C) automated (形容詞/過去分詞)**：意為「自動化的」，通常修飾名詞，例如「an automated system」（一個自動化系統），不能修飾動詞。\n*   **D) automate (動詞)**：意為「使…自動化」，此處句子結構已完整，不需要再填入一個動詞，且語法上不符合。","translation":"檯燈上的計時器設計成會自動關閉檯燈，以減少能源消耗。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_108_97","book":4,"part":5,"qNum":108,"stem":"Employees who will be commuting to the Foster Street facility should request parking permits _______ the end of the month.","options":["A) under","B) against","C) along","D) before"],"answer":"D","explanation":"【文法解析】本題考查介系詞的選擇，以表達正確的時間關係。選項D) \"before\" 意為「在…之前」，與時間片語「the end of the month」（月底）結合，完美表達了申請停車許可證的截止期限是在月底之前。這符合要求員工在特定日期前完成某事的語境。選項A) \"under\" 通常表示「在…之下」（空間）或「在…情況下」（條件），不適用於表示時間截止點。選項B) \"against\" 表示「反對」、「對抗」或「倚靠」，與時間截止點無關。選項C) \"along\" 表示「沿著」（空間）或「一同」，也不適用於表示時間截止點。因此，只有\"before\"能正確傳達句子的意思。","translation":"將通勤至福斯特街設施的員工，應在月底前申請停車許可證。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_109_98","book":4,"part":5,"qNum":109,"stem":"Our Italian wool jackets are _______ for many occasions, from a formal dinner to a casual evening with friends.","options":["A) to suit","B) suitably","C) suitable","D) suit"],"answer":"C","explanation":"本題考查動詞 \"be\" 後接詞性。句中 \"are\" 為連綴動詞，其後應接主詞補語來描述主詞 \"Our Italian wool jackets\"。選項 (C) \"suitable\" 是形容詞，意為「合適的、適宜的」，用作主詞補語，完美描述夾克「適合」多種場合。選項 (A) \"to suit\" 是不定詞，在此不符語意及文法結構，不能直接描述主詞的性質。選項 (B) \"suitably\" 是副詞，不能直接置於連綴動詞 \"are\" 之後作為主詞補語。選項 (D) \"suit\" 是動詞原形或名詞，不能直接置於 \"are\" 之後作為主詞補語。因此，(C) \"suitable\" 是唯一正確答案。","translation":"我們的義大利羊毛夾克適合多種場合，從正式晚宴到與朋友的休閒夜晚皆宜。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_110_99","book":4,"part":5,"qNum":110,"stem":"Dale Department Store will have a special sale on jewelry _______ before the holidays.","options":["A) sensitively","B) extremely","C) immediately","D) figuratively"],"answer":"C","explanation":"C) immediately (立即地) 是正確答案。作為副詞，它修飾介系詞片語 \"before the holidays\"，表示珠寶特賣會將在假期「之前」立即舉行，也就是「緊接在假期前」。\"Immediately before\" 是一個常見的搭配，用來強調時間上的緊密性。A) sensitively (敏感地) 意指以敏感的方式，與特賣會的時間點無關，語意不符。B) extremely (極度地) 是一個程度副詞，通常用來修飾形容詞或其他副詞以加強語氣，但「extremely before」並非慣用表達，無法傳達「緊接在...之前」的意思。D) figuratively (比喻地) 意指以比喻的方式，與實際的特賣會時間點無關，語意不符。","translation":"戴爾百貨公司將在假期前夕舉辦一場特別的珠寶特賣會。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_111_100","book":4,"part":5,"qNum":111,"stem":"Mr. Hobbes _______ a sincere interest in a long-term career at Lassen Bank.","options":["A) expressed","B) pointed","C) arranged","D) studied"],"answer":"A","explanation":"【文法解析】本題考驗動詞與名詞的搭配（collocation）。正確答案A) expressed (表達) 與 interest (興趣) 形成常見的片語「express interest」，意指「表達興趣」。霍布斯先生「表達了」對在拉森銀行長期職涯的真誠興趣，語意通順。B) pointed (指出) 通常用於「point out something」，而非直接搭配 interest。C) arranged (安排) 用於安排事件或細節，不適用於抽象的「興趣」。D) studied (研究) 則是用於研究學科或情況，不能直接「研究興趣」。因此，A) expressed 是唯一符合語意和習慣用法的選項。","translation":"霍布斯先生對在拉森銀行的長期職涯表達了真誠的興趣。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_112_101","book":4,"part":5,"qNum":112,"stem":"The carpet in the lobby of the Chiang Mai Opera House will be replaced with material _______ is easier to maintain.","options":["A) what","B) where","C) that","D) this"],"answer":"C","explanation":"C是正確答案，因為此處需要一個關係代名詞來引導形容詞子句，修飾前面的名詞「material」。關係代名詞「that」可以用來指物，並在子句中作主詞（that is easier to maintain），語法結構完整且意義正確。\nA) 「what」是複合關係代名詞，本身包含先行詞，意為「所…的事物」，通常引導名詞子句，不能修飾其前的名詞「material」。\nB) 「where」是關係副詞，用來指地點，而「material」是材料，並非地點，故不適用。\nD) 「this」是指示代名詞或指示形容詞，不能引導關係子句，語法上不符。","translation":"清邁歌劇院大廳的地毯將被替換成一種更容易維護的材料。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_113_102","book":4,"part":5,"qNum":113,"stem":"Hunt's Gift Shop carries a wide selection of ______ , including the Swinnville Daily News and West
