":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_116_465","book":16,"part":5,"qNum":116,"stem":"Mr. Jones has requested some landscaping equipment, ______ a lawnmower and a tree trimmer.","options":["A) Including","B) Concerning","C) Extending","D) Practicing"],"answer":"A","explanation":"【文法解析】此題考驗選詞的語意與用法。空格前提到「一些園藝設備」，空格後列舉了「一台割草機和一台修樹機」，這兩者是前述設備的具體例子。選項A) Including (包括) 正是用來引導或列舉屬於某個較大類別的具體項目，語意完全符合。選項B) Concerning (關於、有關) 表示主題或內容，若填入則變成「關於割草機和修樹機的園藝設備」，語意不通。選項C) Extending (延伸、提供) 和D) Practicing (練習、實踐) 在此語境下皆不合適，無法表達列舉設備的關係。因此，A是唯一正確答案。","translation":"瓊斯先生已經要求了一些園藝設備，包括一台割草機和一台修樹機。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_117_466","book":16,"part":5,"qNum":117,"stem":"The Howee conference room had a projector and a table that can ______ fit 10 people.","options":["A) Comfort","B) Comfortable","C) Comfortably","D) Comforting"],"answer":"C","explanation":"本題考查詞性。空格前有助動詞 \"can\"，空格後有動詞 \"fit\"，因此空格處需要一個副詞來修飾動詞 \"fit\"，說明「如何容納」10人。選項 A) \"Comfort\" 是名詞，意為「舒適、安慰」，不能修飾動詞。選項 B) \"Comfortable\" 是形容詞，意為「舒適的」，修飾名詞，不能修飾動詞。選項 C) \"Comfortably\" 是副詞，意為「舒適地、寬敞地」，正好可以修飾動詞 \"fit\"，表示「可以舒適地容納」10人，語意及文法皆符合。選項 D) \"Comforting\" 是形容詞或現在分詞，意為「令人感到安慰的」，語意不符且不能修飾動詞 \"fit\"。因此，正確答案為 C。","translation":"Howee 會議室有一台投影機和一張可以舒適地容納10人的桌子。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_118_467","book":16,"part":5,"qNum":118,"stem":"We urge employees to be ______ of visitors in their areas when discussing confidential matters.","options":["A) Awake","B) Actual","C) Aware(be aware of)","D) Apparent"],"answer":"C","explanation":"【文法解析】正確答案為C) Aware。 \"be aware of\" 是一個固定搭配，意指「留意、察覺到」或「意識到」。題目要求員工在討論機密事項時，必須「留意」周遭的訪客，以確保資訊安全和機密性，因此C選項最符合語境。\n\nA) Awake 意指「清醒的」，通常用於描述生理狀態，不與 \"of\" 搭配表示「留意某人」。\nB) Actual 意指「實際的、真實的」，用來描述事物的本質，不適用於此語境。\nD) Apparent 意指「明顯的、顯而易見的」，或「表面上的」，與「留意」的意思不符，且不與 \"of\" 構成此類搭配。","translation":"我們敦促員工在討論機密事項時，要留意他們區域內的訪客。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_119_468","book":16,"part":5,"qNum":119,"stem":"Customers have found the Heron typeface(字體) to be ______ the most successful fonts(字體) available.","options":["A) Through","B) Inside","C) Among","D) Between"],"answer":"C","explanation":"【文法解析】正確答案為 C) Among。「Among」用於指稱某物或某人是「一群」事物或人中的一員，且這群事物或人通常為三個或以上。題目中提到「the most successful fonts available」（現有最成功的字體們），這顯然是一個複數群體，因此「to be among the most successful fonts」表示Heron字體是其中之一，語意完全符合。錯誤選項 A) Through 表示「穿過」或「透過某種方式」，不適用於此語境。錯誤選項 B) Inside 表示「在...內部」，通常指物理空間的內部，不適用於抽象的「一群字體」概念。錯誤選項 D) Between 通常用於指「在兩者之間」，但題目中的「fonts」是複數，暗示數量多於兩個，故不合適。","translation":"顧客們發現Heron字體是現有最成功的字體之一。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_120_469","book":16,"part":5,"qNum":120,"stem":"The mayor plans to meet with the local small business owners ______ secure(get) their votes for the next election.","options":["A) In an effort to(努力去)","B) So long as","C) Because","D) Now that"],"answer":"A","explanation":"【文法解析】\n本題考驗連接詞與片語的用法，特別是表達「目的」的結構。\n\nA) \"In an effort to\" 是一個固定片語，意為「為了努力達成某事」，後面必須接動詞原形 (to-infinitive)。此處 \"to secure\" 正是動詞原形，完美表達市長會面的目的，即「為了努力爭取」選票，語法與語意皆符合。\n\nB) \"So long as\" 是連接詞，意為「只要、倘若」，引導條件子句，後面需接完整子句 (主詞+動詞)，而非單一動詞 \"secure\"。\n\nC) \"Because\" 也是連接詞，意為「因為」，引導原因子句，後面同樣需接完整子句 (主詞+動詞)。\n\nD) \"Now that\" 亦是連接詞，意為「既然、由於」，引導原因子句，後面也需接完整子句 (主詞+動詞)。\n\n因此，只有 A 選項的結構能正確連接空格後的動詞原形，並表達出句子的目的性。\n\n【單字補充】\n* secure (v.): 獲得、確保\n* vote (n.): 選票","translation":"市長計畫與當地小企業主會面，以努力爭取他們在下次選舉中的選票。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_121_470","book":16,"part":5,"qNum":121,"stem":"City council members ______ on whether there should be an increase in the local sales tax.","options":["A) Differ","B) Different","C) Differently","D) Difference"],"answer":"A","explanation":"【文法解析】本題考驗考生對詞性的理解與應用。句子的主詞是「City council members」（市議會成員），後面需要一個動詞來構成完整的句意。選項 A) Differ 是一個動詞，意為「意見不同、有分歧」，與主詞「members」的複數形式相符，且「differ on + 議題」是常見的搭配，表示在某議題上意見相左，完全符合語境。選項 B) Different 是形容詞，不能直接作句子的主要動詞。選項 C) Differently 是副詞，修飾動詞、形容詞或副詞，也不能作句子的主要動詞。選項 D) Difference 是名詞，意為「差異」，同樣不能作句子的主要動詞。因此，只有 A) Differ 能正確且合理地填入句中。","translation":"市議會成員對於是否應該增加地方銷售稅意見不一。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_122_471","book":16,"part":5,"qNum":122,"stem":"The planned expansion of the sales territory(領土) into the northern sector was canceled after a ______ study.","options":["A) Crowded","B) Numerous","C) Familiar","D) Detailed"],"answer":"D","explanation":"正確答案為D) Detailed。「Detailed study」意指「詳盡的研究」，這與句子中「計畫被取消」的結果邏輯相符。一項詳盡的研究通常會深入分析所有層面，可能因此發現潛在問題或風險，進而導致計畫被取消。A) Crowded (擁擠的) 用於形容空間或人群，不適用於形容「研究」。B) Numerous (許多的) 用於形容數量，雖然可以說「numerous studies」，但此處是「a ______ study」，且其意義與計畫取消無直接關聯。C) Familiar (熟悉的) 不足以解釋為何計畫會被取消。一個熟悉的研究並不會必然導致計畫終止。因此，D是唯一能提供合理語義連結的選項。","translation":"銷售領土向北部地區擴張的計畫，在經過一項______研究後被取消了。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_124_472","book":16,"part":5,"qNum":124,"stem":"We at Monies deliver your items as soon as possible to you ______ you are.","options":["A) When","B) If","C) Whenever","D) Wherever"],"answer":"D","explanation":"【文法解析】正確答案是 D) Wherever。此句意為「我們 Monies 會盡快將您的物品送達給您，無論您身在何處。」\"Wherever you are\" 是一個常見的片語，表示「無論你在哪裡」，強調送貨服務的廣泛性與便利性，符合物流公司承諾盡速送達的語境，即無論顧客身處何地，都能收到貨物。\n\nA) When (當...的時候) 和 C) Whenever (無論何時) 都是時間副詞，不符合句中「to you ______ you are」所表達的空間概念。B) If (如果) 表示條件，雖然文法上可以接「if you are available」，但單獨的「if you are」在此句中無法完整表達送貨地點的語意，且不如 \"wherever\" 自然流暢地表達「送達你所在的地方」。","translation":"我們 Monies 會盡快將您的物品送達給您，無論您身在何處。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_125_473","book":16,"part":5,"qNum":125,"stem":"If you are a group of ten or more people, you are ______ for a discount.","options":["A) Eligible","B) Abundant","C) Immediate","D) Proper"],"answer":"A","explanation":"正確答案為 (A) Eligible。Eligible 意指「有資格的、符合條件的」，在此句中，表示如果人數達到十人或以上，就有資格獲得折扣，語意完全符合。此詞常用於描述符合特定條件以獲得某種權利或優惠。\n(B) Abundant 意為「豐富的、大量的」，通常用來形容數量多，而非資格，不適用於此。\n(C) Immediate 意為「立即的、即刻的」，與獲得折扣的資格無關。\n(D) Proper 意為「適當的、合宜的」，雖然有「適合」的意味，但相較於 eligible 專指符合特定條件而有權利或資格，eligible 更精確地表達了「符合獲得折扣的條件」這一層意思。因此，(A) 是最佳選擇。","translation":"如果你們是十人或十人以上的團體，你們就有資格獲得折扣。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_126_474","book":16,"part":5,"qNum":126,"stem":"The old washing machine was expensive, yet it was ______.","options":["A) Creative","B) Appropriate","C) Efficient","D) Fast"],"answer":"C","explanation":"本題考驗連接詞yet所表達的轉折語氣。yet表示「然而、卻」，前後語句應呈現對比。題目指出洗衣機「很貴」，通常昂貴的電器會被期待有良好的性能。因此，空格處應填入一個與「昂貴」所預期的優點相反的詞。\n(C) Efficient (有效率的) 最符合語境。一台昂貴的洗衣機卻「沒有效率」，形成強烈對比，意指它可能耗水、耗電或洗不乾淨，不符合其價格應有的表現。\n(A) Creative (有創意的) 不適用於形容洗衣機的功能。\n(B) Appropriate (合適的) 語意不夠精準，一台洗衣機是否合適與其價格的對比性不強。\n(D) Fast (快速的) 雖然是性能之一，但「效率」是更全面且更常與電器性能及價格掛鉤的衡量標準，因此C選項更為恰當。","translation":"那台舊洗衣機很貴，然而它卻______。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_127_475","book":16,"part":5,"qNum":127,"stem":"10 centimeters of rain fell in Hampton in the month of May, ______ was an unprecedented(前所未見的) record for precipitation(降雨) in the area.","options":["A) Which","B) Where","C) Whether","D) When"],"answer":"A","explanation":"【文法解析】此題考驗關係代名詞的用法。空格後方的子句「was an unprecedented record...」需要一個主詞。選項A) Which 可以引導一個非限定關係子句，用來指稱前面整個句子的內容（即「五月份漢普頓降下10公分雨量」這件事），並在關係子句中作主詞。因此，\"which\" 在此表示「這件事」。選項B) Where 指地點，C) Whether 引導名詞子句表示「是否」，D) When 指時間，三者皆無法在語法和語義上正確連接並作為主詞，故A為正解。","translation":"五月份，漢普頓降下了10公分的雨量，這對該地區來說是前所未有的降雨紀錄。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_128_476","book":16,"part":5,"qNum":128,"stem":"A report released ______ Olina Inc. indicates that sales of energy-efficient appliances have improved Adramatically.","options":["A) Than","B) By(後常接人跟公司)","C) Off","D) As"],"answer":"B","explanation":"正確答案是 (B) By。「released by + 組織/公司/人」是一個非常常見且正確的被動語態結構，用來表示某事物是由哪個組織、公司或個人發布或完成的。此處的 Olina Inc. 是一家公司，因此「released by Olina Inc.」明確指出該報告是由 Olina 公司發布的，語意完全符合。選項 (A) Than 用於比較句型，例如「more than」或「less than」，在此處語法不通。選項 (C) Off 通常表示「離開」、「脫離」或「關閉」，不適用於表示發布者。選項 (D) As 意為「作為」、「如同」或「因為」，若使用「released as Olina Inc.」則語意變成「以 Olina 公司的身份發布」，這不符合報告是由公司發布的語境。因此，(B) 是唯一正確的選項。","translation":"一份由 Olina 公司發布的報告指出，節能電器的銷售額已大幅改善。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_129_477","book":16,"part":5,"qNum":129,"stem":"When deciding ______ office upgrades to recommend, please keep the department budget in mind.","options":["A) What","B) Few","C) Why","D) This"],"answer":"A","explanation":"【疑問詞引導名詞子句】deciding 後接名詞子句作受詞，空格引導該子句。what（什麼）引導名詞子句 what office upgrades to recommend = 要推薦哪些辦公室升級項目，語意完整。B) Few（少數，形容詞/代名詞）、C) Why（為何，副詞）語意不符、D) This（這個，指示代名詞）不能引導名詞子句，故選A。","translation":"在決定要推薦哪些辦公室升級項目時，請將部門預算納入考量。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og16_p5_130_478","book":16,"part":5,"qNum":130,"stem":"Because top secret(最高機密) engeering processes are used in this facility, ______ without a security badge will be admitted.","options":["A) No one","B) Nowhere","C) Their own","D) Each other"],"answer":"A","explanation":"本題考驗代名詞的選擇。句子的主幹是「______ without a security badge will be admitted.」，需要一個主詞。選項A) \"No one\" (沒有人) 作為主詞，表示「沒有任何沒有安全識別證的人會被允許進入」，語意上完全符合前句「因為此設施使用最高機密工程程序」的邏輯，強調嚴格的門禁管制。選項B) \"Nowhere\" (沒有任何地方) 是地方副詞，不能作主詞。若要使用，句子結構會是倒裝句。選項C) \"Their own\" (他們自己的) 是所有格代名詞或形容詞片語，不能單獨作主詞，且語意不符。選項D) \"Each other\" (彼此) 是相互代名詞，表示兩者或多者之間的關係，不適用於此句語境。因此，只有 \"No one\" 能正確填入，使句意完整且合乎邏輯。","translation":"因為此設施使用最高機密工程程序，所以沒有安全識別證的人將不被允許進入。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"}];

function loadDB() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (raw) {
      const db = JSON.parse(raw);
      if (!db.questions || db.questions.length === 0) {
        db.questions = EMBEDDED_QUESTIONS;
        localStorage.setItem(DB_KEY, JSON.stringify(db));
      }
      return db;
    }
  } catch(e){}
  return {
    questions: EMBEDDED_QUESTIONS,
    mistakes: {},
    history: [],
    vocabSeen: {},
    settings: { timerDefault: true, geminiKey: '' }
  };
}

function saveDB() {
  try { localStorage.setItem(DB_KEY, JSON.stringify(DB)); } catch(e) {
    showToast('⚠️ 儲存失敗，localStorage 空間可能已滿');
  }
}

// Migrate old DB that might not have settings.geminiKey
if (!DB.settings) DB.settings = { timerDefault: true, geminiKey: '' };
if (!DB.settings.geminiKey) DB.settings.geminiKey = '';

// ============================================================
// GEMINI API
// ============================================================
function getGeminiKey() {
  return DB.settings.geminiKey || '';
}

async function callGemini(prompt, jsonMode = false) {
  const key = getGeminiKey();
  if (!key) throw new Error('請先在設定頁面輸入 Gemini API Key');

  const model = 'gemini-2.5-flash';
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;

  const body = {
    contents: [{ parts: [{ text: prompt }] }],
    generationConfig: {
      temperature: 0.3,
      maxOutputTokens: jsonMode ? 1024 : 512
    }
  };

  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || `API 錯誤 ${res.status}`);
  }

  const data = await res.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  return text;
}

async function callGeminiJSON(prompt) {
  const text = await callGemini(prompt, true);
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

// HELPERS

function genId() { return 'q_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }
function getQuestion(id) { return DB.questions.find(q => q.id === id); }
function recordMistake(qid) {
  if (!DB.mistakes[qid]) DB.mistakes[qid] = { count: 0, lastWrong: null, history: [] };
  DB.mistakes[qid].count++;
  DB.mistakes[qid].lastWrong = new Date().toISOString();
  DB.mistakes[qid].history.push(new Date().toISOString());
  saveDB();
}
function removeMistake(qid) { delete DB.mistakes[qid]; saveDB(); }
function addVocab(word, def, pos, ex) {
  if (!DB.vocabSeen[word]) DB.vocabSeen[word] = { def:'', pos:'', ex:'', seenCount:0, lastSeen:null };
  if (def) DB.vocabSeen[word].def = def;
  if (pos) DB.vocabSeen[word].pos = pos;
  if (ex) DB.vocabSeen[word].ex = ex;
  DB.vocabSeen[word].seenCount++;
  DB.vocabSeen[word].lastSeen = new Date().toISOString();
  saveDB();
}
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// PAGE ROUTING
// ============================================================
let currentPage = 'home';
function showPage(page) {
  document.querySelectorAll('[id^="page-"]').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('page-' + page);
  if (el) el.style.display = 'block';
  const tab = document.getElementById('tab-' + page);
  if (tab) tab.classList.add('active');
  currentPage = page;
  window.scrollTo(0,0);
  switch(page) {
    case 'home': renderHome(); break;
    case 'browse': renderBrowse(); break;
    case 'practice': renderPractice(); break;
    case 'mistakes': renderMistakes(); break;
    case 'vocab': renderVocab(); break;
    case 'stats': renderStats(); break;
    case 'aigen': renderAIGen(); break;
    case 'import': renderImport(); break;
    case 'settings': renderSettings(); break;
  }
}

function toggleKeyVisibility() {
  const input = document.getElementById('geminiKeyInput');
  input.type = input.type === 'password' ? 'text' : 'password';
}

function saveGeminiKey() {
  const key = document.getElementById('geminiKeyInput').value.trim();
  if (!key) { showToast('請輸入 API Key'); return; }
  if (!key.startsWith('AIza')) { showToast('⚠️ Key 格式不正確，應以 AIza 開頭'); return; }
  DB.settings.geminiKey = key;
  saveDB();
  showToast('✅ API Key 已儲存');
  renderSettings();
}

function clearGeminiKey() {
  DB.settings.geminiKey = '';
  saveDB();
  renderSettings();
  showToast('Key 已清除');
}

async function testGeminiKey() {
  const key = document.getElementById('geminiKeyInput').value.trim();
  if (!key) { showToast('請先輸入 Key'); return; }
  // Temporarily save for test
  const oldKey = DB.settings.geminiKey;
  DB.settings.geminiKey = key;

  const resultEl = document.getElementById('keyTestResult');
  resultEl.innerHTML = '<span class="spinner"></span> 測試中...';

  try {
    const result = await callGemini('Say "OK" only.');
    if (result) {
      resultEl.innerHTML = '<span style="color:var(--ok)">✅ 連線成功！Key 有效</span>';
      DB.settings.geminiKey = key;
      saveDB();
    }
  } catch(e) {
    resultEl.innerHTML = `<span style="color:var(--ng)">❌ 連線失敗：${e.message}</span>`;
    DB.settings.geminiKey = oldKey;
  }
}

  const q = getQuestion(id);

        return `<div style="padding:8px 12px;border-radius:7px;font-size:14px;background:${isAns?'var(--okl)':'var(--bg)'};border:1px solid ${isAns?'var(--ok)':'var(--bd)'};color:${isAns?'var(--ok)':'var(--tx)'}">

async function genSingleExplanation(id) {
  const q = getQuestion(id);
  if (!q) return;
  if (!getGeminiKey()) { showToast('請先設定 Gemini API Key'); showPage('settings'); return; }

  showModal(`<div class="modal-title">生成詳解中...</div><div style="text-align:center;padding:20px"><span class="spinner"></span></div>`);

  try {
    const result = await generateExplanation(q);
    q.explanation = result.explanation || '';
    q.translation = result.translation || '';
    saveDB();
    showToast('✅ 詳解已生成');

  } catch(e) {
    showModal(`<div class="modal-title">生成失敗</div><p style="color:var(--ng)">${e.message}</p><button class="btn" style="margin-top:16px" onclick="closeModal()">關閉</button>`);
  }
}

  const idx = practiceConfig.parts.indexOf(p);
  if (idx > -1) { if (practiceConfig.parts.length > 1) practiceConfig.parts.splice(idx,1); }

  updatePracticePreview();
}

function toggleBook(b, el) {
  const idx = practiceConfig.books.indexOf(b);
  if (idx > -1) practiceConfig.books.splice(idx,1);
  else practiceConfig.books.push(b);
  el.classList.toggle('active', practiceConfig.books.includes(b));
  updatePracticePreview();
}

function updatePracticePreview() {
  let qs = DB.questions.filter(q=>practiceConfig.parts.includes(q.part));
  if (practiceConfig.books.length) qs = qs.filter(q=>practiceConfig.books.includes(q.book));
  const count = Math.min(qs.length, practiceConfig.count||qs.length);
  const el = document.getElementById('practicePreview');
  if (el) el.innerHTML = `<div class="card" style="background:var(--pl);border-color:rgba(42,124,118,.2);padding:12px 16px;font-size:13px;color:var(--p);font-weight:600">預計出題：${count} 道（題庫符合：${qs.length} 道）</div>`;
}

function startPractice(part) {
  practiceConfig.parts=[part]; practiceConfig.books=[]; practiceConfig.count=part===5?30:20;
  startPracticeFromConfig();
}

function startPracticeFromConfig() {
  let qs = DB.questions.filter(q=>practiceConfig.parts.includes(q.part));
  if (practiceConfig.books.length) qs = qs.filter(q=>practiceConfig.books.includes(q.book));
  if (!qs.length) { showToast('沒有符合條件的題目'); return; }
  qs = shuffle(qs).slice(0, practiceConfig.count||qs.length);
  startQuiz(qs, practiceConfig.timer);
}

function startMistakeReview() {
  const mistakeIds = Object.keys(DB.mistakes);
  if (!mistakeIds.length) { showToast('目前沒有錯題'); return; }
  const qs = mistakeIds.map(id=>getQuestion(id)).filter(Boolean);
  startQuiz(shuffle(qs), practiceConfig.timer);
}

function startSingleQ(id) {
  const q = getQuestion(id);
  if (q) startQuiz([q], false);
}

// ============================================================
// QUIZ ENGINE
// ============================================================
let quizState = { questions:[], current:0, answers:{}, startTime:null, timerInterval:null, elapsed:0, useTimer:true };

function startQuiz(questions, useTimer=true) {
  quizState = { questions, current:0, answers:{}, startTime:Date.now(), timerInterval:null, elapsed:0, useTimer };
  questions.forEach(q=>quizState.answers[q.id]=null);
  document.querySelectorAll('[id^="page-"]').forEach(el=>el.style.display='none');
  document.getElementById('page-quiz').style.display='block';
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  window.scrollTo(0,0);
  if (useTimer) quizState.timerInterval = setInterval(()=>{ quizState.elapsed++; updateTimer(); }, 1000);
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const q = quizState.questions[quizState.current];
  const total = quizState.questions.length;
  const current = quizState.current;
  const answered = quizState.answers[q.id];
  const progress = ((current+(answered?1:0))/total)*100;
  const el = document.getElementById('page-quiz');
  const isPassage = q.part>=6 && q.passage;

  el.innerHTML = `
    <div style="max-width:780px;margin:0 auto;padding:0 20px">
      <div class="progress-bar" style="margin-top:16px;margin-bottom:0">
        <div class="progress-fill" style="width:${progress}%"></div>
      </div>
    </div>
    <div class="${isPassage?'wide':'container narrow'} fade-in">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:8px">
          <button class="btn sm" onclick="confirmExitQuiz()">← 離開</button>
          <span style="font-size:13px;color:var(--tm);font-weight:600">${current+1} / ${total}</span>
          <span class="badge">OG${q.book} P${q.part}</span>
          ${q.isAI?'<span class="badge ac">AI題</span>':''}
        </div>
        <div id="timerDisplay" class="timer" style="${quizState.useTimer?'':'display:none'}">0:00</div>
      </div>
      ${isPassage ? renderPassageLayout(q,[],answered) : renderSingleQuestion(q, answered)}
      <div style="display:flex;gap:8px;margin-top:20px;flex-wrap:wrap">
        ${current>0?`<button class="btn" onclick="quizNav(-1)">← 上一題</button>`:''}
        ${answered!==null ? (current<total-1 ? `<button class="btn primary" onclick="quizNav(1)">下一題 →</button>` : `<button class="btn primary" onclick="finishQuiz()">完成練習 ✓</button>`) : ''}
      </div>
    </div>`;
  makeClickableWords();
  updateTimer();
}

function renderSingleQuestion(q, answered) {
  return `
    <div class="card">
      <p class="passage-text" id="qStem" style="margin-bottom:20px;font-size:16px;line-height:1.7">${q.stem}</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${q.options.map((opt,i)=>{
          const letter='ABCD'[i];
          let cls='';
          if(answered!==null){cls='locked';if(letter===q.answer)cls+=' correct';else if(letter===answered)cls+=' wrong';}
          else if(answered===letter)cls='selected';
          return `<button class="option-btn ${cls}" onclick="selectAnswer('${q.id}','${letter}')">
            <span class="option-circle ${answered!==null?(letter===q.answer?'ok':letter===answered?'ng':''):(answered===letter?'sel':'')}">${letter}</span>
            <span>${opt.replace(/^[A-D]\)\s*/,'')}</span>
          </button>`;
        }).join('')}
      </div>
      ${answered!==null ? renderExplanation(q, answered) : ''}
    </div>`;
}

function renderPassageLayout(q, groupQs, answered) {
  return `
    <div class="split-layout">
      <div class="split-left">
        <div class="card">

}

function renderExplanation(q, chosen) {
  const correct = chosen === q.answer;
  const hasExp = !!q.explanation;
  const hasKey = !!getGeminiKey();
  return `
    <div class="explanation ${correct?'ok':'ng'}">
      <div style="font-weight:700;margin-bottom:4px">${correct?'✅ 正確！':'❌ 答錯了'} 正確答案：${q.answer}</div>
      ${hasExp ? `
        <div style="margin-top:10px">
          <div style="font-size:13px;font-weight:600;color:var(--tm);margin-bottom:4px">📖 解析</div>
          <p style="font-size:14px;line-height:1.7">${q.explanation}</p>
        </div>` : (hasKey ? `
        <div style="margin-top:10px">
          <button class="btn sm accent" onclick="genExplanationInQuiz('${q.id}')">✨ AI 生成詳解</button>
        </div>` : '')}
    </div>
    ${q.translation?`<div class="trans-block">${q.translation}</div>`:''}`;
}

async function genExplanationInQuiz(qid) {
  const q = getQuestion(qid);
  if (!q) return;
  const btn = event.target;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 生成中...';
  try {
    const result = await generateExplanation(q);
    q.explanation = result.explanation || '';
    q.translation = result.translation || '';
    saveDB();
    renderQuizQuestion();
  } catch(e) {
    showToast('生成失敗：' + e.message);
    btn.disabled = false;
    btn.innerHTML = '✨ AI 生成詳解';
  }
}

async function generateExplanation(q) {
  const optText = q.options.map((o,i)=>`${String.fromCharCode(65+i)}) ${o.replace(/^[A-D]\)\s*/,'')}`).join('  ');
  const prompt = `你是TOEIC英文教師，請為以下Part 5題目提供詳細解析。

題目：${q.stem}
選項：${optText}
正確答案：${q.answer}

請輸出純JSON（不要markdown符號）：
{"explanation":"【文法解析】說明正確答案的原因，以及其他三個選項為何錯誤，用繁體中文，約100-150字","translation":"題目的完整繁體中文翻譯"}`;

  return await callGeminiJSON(prompt);
}

function selectAnswer(qid, letter) {
  if (quizState.answers[qid]!==null) return;
  quizState.answers[qid]=letter;
  const q = getQuestion(qid);
  if (q && letter!==q.answer) recordMistake(qid);

}

function quizNav(dir) {

function updateTimer() {
  const el = document.getElementById('timerDisplay');

  const s=quizState.elapsed, m=Math.floor(s/60), ss=String(s%60).padStart(2,'0');

  el.className='timer'+(s>1800?' danger':s>900?' warn':'');
}

  const acc=Math.round(correct/total*100);
  DB.history.push({ date:new Date().toISOString(), part:[...new Set(qs.map(q=>q.part))], total, correct, elapsed:quizState.elapsed, qids:qs.map(q=>q.id) });

  renderVocabQuiz();
}

function renderVocabQuiz() {

      <button class="btn danger lg" onclick="vocabAnswer(false)">✗ 不會</button>
      <button class="btn primary lg" onclick="vocabAnswer(true)" style="background:var(--ok);border-color:var(--ok)">✓ 會了</button>
    </div>`:`<div style="text-align:center;color:var(--tm);font-size:14px">點擊卡片查看中文意思</div>`}
  </div>`;

function renderStats() {

        </div>`).join('')}
    </div>
    <div class="card" style="margin-bottom:20px">
      <div style="font-weight:700;margin-bottom:12px">近 ${trend.length} 次正確率趨勢</div>
      <div style="display:flex;align-items:flex-end;gap:6px;height:80px">
        ${trend.map(acc=>`

          </div>`).join('')}
      </div>

    <div class="card">
      <div style="font-weight:700;margin-bottom:12px">練習記錄（最近 20 次）</div>
      <div style="display:flex;flex-direction:column;gap:6px">

async function startAIGen() {
  if (!getGeminiKey()) { showToast('請先設定 Gemini API Key'); return; }

  const resultEl = document.getElementById('aiGenResult');
  resultEl.innerHTML = `
    <div class="card" style="text-align:center;padding:30px">
      <span class="spinner"></span>
      <div style="margin-top:12px;color:var(--tm);font-size:14px">Gemini 生成中，請稍候...</div>
      <div style="font-size:12px;color:var(--tm);margin-top:4px">約需 10~20 秒</div>
    </div>`;

  const topicLabel = grammarTopics.find(t => t.key === aiGenConfig.topic)?.label || '綜合';

  // Get 3 OG examples for few-shot
  const examples = shuffle(DB.questions.filter(q => q.part === 5 && !q.isAI)).slice(0, 3);
  const examplesText = examples.map((q, i) => {
    const opts = q.options.map((o,j) => `${String.fromCharCode(65+j)}) ${o.replace(/^[A-D]\)\s*/,'')}`).join(' / ');
    return `範例${i+1}：${q.stem}\n選項：${opts}\n答案：${q.answer}`;
  }).join('\n\n');

  const diffDesc = ['','初級（基礎文法）','初中級（常見考點）','中級（標準TOEIC）','中高級（較難）','高級（挑戰題）'][aiGenConfig.difficulty];

  const prompt = `你是TOEIC Part 5出題專家。請根據以下真實OG題目的風格，生成${aiGenConfig.count}道仿真練習題。

考點：${topicLabel}
難度：${diffDesc}

真實OG題目風格參考：
${examplesText}

要求：
1. 題目必須是完整英文句子，挖空用______表示
2. 四個選項設計要有迷惑性，錯誤選項要像是可能正確的
3. 商業情境（辦公室、會議、客戶、報告等）
4. 只有唯一正確答案

請輸出純JSON陣列（不要markdown）：
[
  {
    "stem": "完整題目句子（含______）",
    "options": ["A) 選項A", "B) 選項B", "C) 選項C", "D) 選項D"],
    "answer": "正確答案字母(A/B/C/D)",
    "explanation": "繁體中文解析（說明為何選此答案，其他選項為何錯）",
    "translation": "題目中文翻譯"
  }
]`;

  try {
    const result = await callGeminiJSON(prompt);
    if (!Array.isArray(result) || !result.length) throw new Error('生成結果格式錯誤');

    // Convert to app format and save
    const newQs = result.map((q, i) => ({
      id: genId(),
      book: 0,
      part: 5,
      qNum: i + 1,
      stem: q.stem || '',
      options: q.options || [],
      answer: q.answer || 'A',
      explanation: q.explanation || '',
      translation: q.translation || '',
      tags: [topicLabel],
      groupId: null,
      passage: null,
      isAI: true,
      addedAt: new Date().toISOString().slice(0,10)
    }));

    // Show preview
    resultEl.innerHTML = `
      <div class="card" style="margin-bottom:12px;background:var(--okl);border-color:rgba(46,139,87,.2)">
        <div style="font-weight:700;color:var(--ok);margin-bottom:4px">✅ 生成完成！${newQs.length} 道題目</div>
        <div style="font-size:13px;color:var(--tm)">預覽前3題，確認後可加入題庫練習</div>
      </div>
      ${newQs.slice(0,3).map((q,i)=>`
        <div class="card fade-in" style="margin-bottom:10px">
          <div style="display:flex;gap:6px;margin-bottom:8px">
            <span class="badge ac">AI題</span>
            <span style="font-size:11px;color:var(--tm)">${topicLabel}</span>
          </div>
          <p style="font-size:14px;line-height:1.6;margin-bottom:10px">${q.stem}</p>
          <div style="display:flex;flex-direction:column;gap:4px">
            ${q.options.map((opt,j)=>{
              const letter='ABCD'[j];
              const isAns=letter===q.answer;
              return `<div style="padding:6px 10px;border-radius:6px;font-size:13px;background:${isAns?'var(--okl)':'var(--bg)'};border:1px solid ${isAns?'var(--ok)':'var(--bd)'};color:${isAns?'var(--ok)':'var(--tx)'}">
                ${opt}${isAns?' ✓':''}
              </div>`;
            }).join('')}
          </div>
          ${q.explanation?`<div style="margin-top:8px;font-size:12px;color:var(--tm);padding:8px;background:var(--pl);border-radius:6px">${q.explanation}</div>`:''}
        </div>`).join('')}
      ${newQs.length > 3 ? `<div style="font-size:13px;color:var(--tm);text-align:center;padding:8px">...還有 ${newQs.length-3} 題</div>` : ''}
      <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
        <button class="btn primary" onclick="saveAIQuestions(${JSON.stringify(newQs).replace(/"/g,'&quot;')})">💾 加入題庫（${newQs.length} 題）</button>
        <button class="btn accent" onclick="startAIQuizFromNew(${JSON.stringify(newQs).replace(/"/g,'&quot;')})">▶ 直接練習</button>
        <button class="btn" onclick="startAIGen()">🔄 重新生成</button>
      </div>`;

  } catch(e) {
    resultEl.innerHTML = `
      <div class="card" style="background:var(--ngl);border-color:rgba(201,70,61,.2)">
        <div style="font-weight:700;color:var(--ng)">❌ 生成失敗</div>
        <div style="font-size:13px;color:var(--tm);margin-top:4px">${e.message}</div>
        <button class="btn sm" style="margin-top:10px" onclick="startAIGen()">重試</button>
      </div>`;
  }
}

function saveAIQuestions(questions) {
  let added = 0;
  questions.forEach(q => {
    if (!DB.questions.find(x => x.id === q.id)) {
      DB.questions.push(q);
      added++;
    }
  });
  saveDB();
  showToast(`✅ 已加入 ${added} 題到題庫`);
  renderAIGen();
}

function startAIQuizFromNew(questions) {
  startQuiz(questions, practiceConfig.timer);
}

function startAIQuiz() {
  const aiQs = shuffle(DB.questions.filter(q => q.isAI));
  if (!aiQs.length) { showToast('沒有 AI 題目'); return; }
  startQuiz(aiQs, practiceConfig.timer);
}

let batchRunning = false;
async function startBatchExplanation(testOnly = false) {
  if (!getGeminiKey()) { showToast('請先設定 Gemini API Key'); return; }
  if (batchRunning) { showToast('批次處理進行中'); return; }

  const targets = DB.questions.filter(q => !q.explanation && q.part === 5);
  const batch = testOnly ? targets.slice(0, 50) : targets;

  if (!batch.length) { showToast('沒有需要生成詳解的題目'); return; }

  batchRunning = true;
  let done = 0, failed = 0;
  const total = batch.length;

  function updateProgress() {
    const pct = Math.round((done + failed) / total * 100);
    const progressEl = document.getElementById('batchProgress');
    if (!progressEl) return;
    progressEl.innerHTML = `
      <div class="batch-progress">
        <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:4px">
          <span>進度：${done + failed} / ${total}</span>
          <span style="color:var(--p)">${pct}%</span>
        </div>
        <div class="batch-bar"><div class="batch-fill" style="width:${pct}%"></div></div>
        <div style="font-size:12px;color:var(--tm);margin-top:4px">
          ✅ 成功 ${done} 題　❌ 失敗 ${failed} 題　⏳ 剩餘 ${total - done - failed} 題
        </div>
        ${done + failed < total ? `<button class="btn danger sm" style="margin-top:8px" onclick="batchRunning=false;showToast('已停止')">停止</button>` : ''}
      </div>`;
  }

  updateProgress();

  // Process in batches of 5 to avoid rate limits
  for (let i = 0; i < batch.length; i += 5) {
    if (!batchRunning) break;
    const chunk = batch.slice(i, i + 5);

    await Promise.all(chunk.map(async q => {
      if (!batchRunning) return;
      try {
        const result = await generateExplanation(q);
        q.explanation = result.explanation || '';
        q.translation = result.translation || '';
        done++;
      } catch(e) {
        failed++;
      }
    }));

    saveDB();
    updateProgress();

    // Rate limit: wait 1 second between batches
    if (i + 5 < batch.length && batchRunning) {
      await new Promise(r => setTimeout(r, 1000));
    }
  }

  batchRunning = false;
  saveDB();

  const progressEl = document.getElementById('batchProgress');
  if (progressEl) {
    progressEl.innerHTML = `
      <div class="batch-progress" style="background:var(--okl);border-color:rgba(46,139,87,.2)">
        <div style="font-weight:700;color:var(--ok)">✅ 批次完成！</div>
        <div style="font-size:13px;color:var(--tm);margin-top:4px">成功 ${done} 題，失敗 ${failed} 題</div>
        <button class="btn primary sm" style="margin-top:8px" onclick="exportAll()">匯出備份</button>
      </div>`;
  }
  showToast(`批次完成：${done} 題詳解已生成`);
}

function handleFileImport(e){const f=e.target.files[0];if(f)readJsonFile(f);}
function readJsonFile(file){const r=new FileReader();r.onload=ev=>processImportData(ev.target.result);r.readAsText(file);}
function importFromText(){const t=document.getElementById('jsonInput').value.trim();if(!t){showToast('請貼上 JSON 資料');return;}processImportData(t);}

function processImportData(text) {
  try {
    let data = JSON.parse(text);
    if (!Array.isArray(data)) data = [data];
    // Handle master JSON format {total, questions:[]}
    if (data.length === 1 && data[0].questions) data = data[0].questions;
    let added=0,skipped=0,errors=[];
    data.forEach((q,i)=>{
      if(!q.stem||!q.options||!q.answer||!q.part){errors.push(`第${i+1}筆：缺少必要欄位`);skipped++;return;}
      if(!Array.isArray(q.options)||q.options.length<2){errors.push(`第${i+1}筆：options需為陣列`);skipped++;return;}
      if(!q.id)q.id=genId();
      if(DB.questions.find(x=>x.id===q.id)){skipped++;return;}
      q.book=q.book||0;q.qNum=q.qNum||0;q.addedAt=q.addedAt||new Date().toISOString().slice(0,10);
      DB.questions.push(q);added++;
    });
    saveDB();
    const msg=`✅ 匯入成功 ${added} 題${skipped?`，略過 ${skipped} 題`:''}`;
    if(errors.length){
      showModal(`<div class="modal-title">匯入完成</div><p style="font-size:14px;margin-bottom:12px">${msg}</p>
        <div style="font-size:13px;color:var(--tm);background:var(--bg);padding:12px;border-radius:8px;max-height:200px;overflow-y:auto">${errors.map(e=>`<div>⚠️ ${e}</div>`).join('')}</div>
        <button class="btn primary" style="margin-top:16px;width:100%" onclick="closeModal();renderImport()">確定</button>`);
    } else { showToast(msg); renderImport(); }
  } catch(e) { showToast('❌ JSON 格式錯誤：'+e.message); }
}

function exportAll(){downloadJSON(DB.questions,'toeic_og_all.json');}
function exportMistakes(){const ids=Object.keys(DB.mistakes);downloadJSON(ids.map(id=>getQuestion(id)).filter(Boolean),'toeic_og_mistakes.json');}
function downloadJSON(data,filename){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);showToast('✅ 已下載 '+filename);
}

function makeClickableWords() {
  ['passageText','qStem'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    el.innerHTML=el.innerHTML.replace(/\b([a-zA-Z]{3,})\b/g,m=>`<span class="cw" onclick="lookupWord('${m}',event)">${m}</span>`);

}

let popupTimeout;
async function lookupWord(word, e) {
  const popup=document.getElementById('wordPopup');
  const known=DB.vocabSeen[word.toLowerCase()];
  popup.style.display='block';
  popup.innerHTML=`<div style="color:var(--tm);font-size:13px">查詢中...</div>`;
  positionPopup(e);
  if(known&&known.def){showWordPopup(word,known.def,known.pos,known.ex);return;}
  if(!getGeminiKey()){showWordPopup(word,'（請先設定 Gemini Key）','','');return;}
  try {
    const prompt=`Define the English word "${word}". Reply ONLY with JSON (no markdown): {"def":"繁體中文意思","pos":"詞性(n./v./adj./adv.等)","ex":"English example sentence"}`;
    const result=await callGeminiJSON(prompt);
    addVocab(word.toLowerCase(),result.def,result.pos,result.ex);
    showWordPopup(word,result.def,result.pos,result.ex);
  } catch(err) {
    showWordPopup(word,'（查詢失敗）','','');
  }
}

function showWordPopup(word,def,pos,ex) {
  const popup=document.getElementById('wordPopup');
  popup.innerHTML=`
    <div class="word-head">${word}</div>
    ${pos?`<div class="word-pos">${pos}</div>`:''}
    <div class="word-def">${def}</div>
    ${ex?`<div class="word-ex">${ex}</div>`:''}
    <div style="margin-top:8px;font-size:11px;color:var(--tm)">✓ 已加入單字本</div>`;
  clearTimeout(popupTimeout);
  popupTimeout=setTimeout(()=>{popup.style.display='none';},4000);
}

function positionPopup(e) {
  const popup=document.getElementById('wordPopup');
  const vw=window.innerWidth,vh=window.innerHeight;
  let x=(e?.clientX||vw/2)+10,y=(e?.clientY||vh/2)+10;
  if(x+280>vw)x=vw-290;
  if(y+150>vh)y=y-160;
  popup.style.left=x+'px';popup.style.top=y+'px';
}

document.addEventListener('click',e=>{
  const popup=document.getElementById('wordPopup');
  if(!e.target.classList.contains('cw')&&popup.style.display!=='none')popup.style.display='none';
});
