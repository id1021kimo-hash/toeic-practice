 Bay Monthly.","options":["A) publication","B) publications","C) publish","D) published"],"answer":"B","explanation":"本題考查名詞的單複數形式。句型「a wide selection of + Noun」表示「多種多樣的……」。當「selection of」後接可數名詞時，該名詞通常需使用複數形式，以符合「選擇多樣」的語意。題目中，逗號後列舉了兩個具體的例子：「the Swinnville Daily News」和「West Bay Monthly」，這些都是報紙或雜誌的名稱，屬於可數名詞。因此，空格處應填入可數名詞的複數形式。選項A) publication 是單數名詞，不符合語意；選項B) publications 是複數名詞，符合「多種選擇」且後有複數例子的語境；選項C) publish 是動詞，選項D) published 是動詞的過去式或過去分詞作形容詞，兩者皆不符合介系詞of後需接名詞的文法結構。故選B。","translation":"亨特禮品店販售各式各樣的______，包括《斯溫維爾日報》和《西灣月刊》。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_114_103","book":4,"part":5,"qNum":114,"stem":"Engineers in the Welber Machine Factory in Cologne work to correct minor flaws in the designs of _______ drilling systems.","options":["A) confused","B) complex","C) informative","D) cautious"],"answer":"B","explanation":"【文法解析】此題考驗形容詞的語義選擇。空格後方的「drilling systems」為名詞，需填入一個形容詞來修飾。A) confused (感到困惑的) 和 D) cautious (謹慎的) 通常用來形容人或有意識的實體，不適用於系統。C) informative (提供資訊的) 語意不符，系統的「設計缺陷」通常與其複雜度有關，而非資訊性。B) complex (複雜的) 最符合語境，複雜的鑽孔系統容易出現設計上的小缺陷，需要工程師修正。","translation":"科隆的威爾伯機械工廠的工程師們致力於修正_______鑽孔系統設計中的微小缺陷。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_115_104","book":4,"part":5,"qNum":115,"stem":"If the plumbing problem ______ , we recommend that you contact the product manufacturer.","options":["A) to persist","B) was persisting","C) persists","D) persistence"],"answer":"C","explanation":"【文法解析】\n正確答案是C) persists。\n這是一個第一類條件句（Type 1 Conditional），用於描述未來可能發生的情況及其結果。在「if」子句中，我們使用簡單現在式（Simple Present Tense）來描述條件，即使該條件是針對未來而言。主句則使用簡單現在式、未來式或祈使句來表達結果或建議。此處「we recommend」是現在式建議，因此「if the plumbing problem persists」是正確的搭配。\n\nA) to persist 是不定詞，不能直接作為子句的動詞。\nB) was persisting 是過去進行式，與主句的現在式建議不符，不構成邏輯合理的條件句。\nD) persistence 是名詞，不能作為動詞使用。","translation":"如果水管問題持續存在，我們建議您聯繫產品製造商。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_116_105","book":4,"part":5,"qNum":116,"stem":"You will receive a _______ e-mail from the Nicoya Hotel verifying your travel plans within two hours of making your reservation.","options":["A) sponsor","B) confirmation","C) margin","D) permit"],"answer":"B","explanation":"正確答案為 (B) confirmation。句中提到預訂後會收到一封「驗證旅行計畫」的電子郵件，而 \"confirmation e-mail\" (確認信) 正是用來驗證或確認某事，與上下文語意完全吻合，是常見的搭配詞。 (A) sponsor (贊助者/贊助) 不符合語境，電子郵件本身不是贊助者，也不是贊助行為。 (C) margin (邊緣/利潤) 在此無任何意義，無法修飾 e-mail。 (D) permit (許可證) 指官方許可文件，雖然有時會透過郵件發送，但「驗證旅行計畫」的核心功能更符合 \"confirmation\" 而非 \"permit\"。因此，(B) 是最精確且自然的選擇。","translation":"你將在預訂後兩小時內收到尼科亞飯店寄來的一封_______電子郵件，以驗證你的旅行計畫。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_117_106","book":4,"part":5,"qNum":117,"stem":"Move-It Storage provides a variety of container sizes to help store belongings ______ .","options":["A) compact","B) compactly","C) compacted","D) compacting"],"answer":"B","explanation":"【文法解析】本題的空白處需要一個副詞來修飾動詞片語「store belongings」（存放物品），說明物品被存放的方式。選項 B) compactly 是副詞，意指「緊密地、不佔空間地」，完美地描述了如何儲存物品，使句子語意完整且符合文法。選項 A) compact 是形容詞，修飾名詞，不能直接修飾動詞。選項 C) compacted 是過去分詞，可作形容詞，意指「被壓實的」，但在此處語意不符，且不能修飾動詞。選項 D) compacting 是現在分詞，可作形容詞，意指「正在壓實的」，同樣不符合語意和文法需求。因此，選擇副詞 compactly 最為恰當。","translation":"Move-It 倉儲提供多種尺寸的儲物櫃，以幫助客戶緊密地存放物品。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_118_107","book":4,"part":5,"qNum":118,"stem":"The new plant director, Ha-Jae Cheon, will be _______ for reducing the maintenance costs at the Tamarindo facility.","options":["A) fortunate","B) possible","C) senseless","D) responsible"],"answer":"D","explanation":"正確答案為 (D) responsible。片語 \"be responsible for + V-ing\" 意為「對…負責」，符合句意「新廠長將負責降低維護成本」。(A) fortunate (幸運的) 不與 \"for + V-ing\" 連用表達負責。(B) possible (可能的) 通常用於 \"It is possible for someone to do something\" 結構，不適用於此。(C) senseless (無意義的) 語意不符，且用法不搭。","translation":"新廠長千河載將負責降低塔馬林多廠的維護成本。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_119_108","book":4,"part":5,"qNum":119,"stem":"Leffert's Market will close two hours earlier _______ usual next Tuesday.","options":["A) than","B) but","C) above","D) when"],"answer":"A","explanation":"【文法解析】\n本題考查比較級的用法。「earlier」是形容詞「early」的比較級形式，表示「更早」。當我們比較兩者時，通常會使用「比較級形容詞/副詞 + than」的結構。因此，「earlier than usual」意為「比平常更早」。\n選項 A) than：正確。用於完成比較級結構，表示「比...」。\n選項 B) but：連接詞，表示轉折或對比，不適用於此處的比較語境。\n選項 C) above：介系詞，表示「在...之上」，與時間或程度的比較無關。\n選項 D) when：連接詞，表示「當...的時候」，引導時間子句，不適用於此處的比較結構。\n故選 A。","translation":"Leffert's Market 將於下週二比平常提早兩小時關門。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_120_109","book":4,"part":5,"qNum":120,"stem":"Caldwell Computers accepts returns _______ products have not been removed from the packaging.","options":["A) in order that","B) such as","C) in case","D) as long as"],"answer":"D","explanation":"正確答案是D) as long as。這個片語是從屬連接詞，意為「只要；在…條件下」，用來引導條件子句。句子的意思是，Caldwell 電腦公司接受退貨，但前提是產品尚未從包裝中取出。這明確表達了接受退貨的條件。A) in order that 意為「為了以便」，表示目的，不符合語境。B) such as 意為「例如」，用於列舉，文法上不能連接兩個子句，且語意不符。C) in case 意為「以防萬一；如果發生」，通常表示預防措施或可能性，與此處「只要符合某條件就接受」的語氣不同。此處是直接的條件限定，而非預防。","translation":"Caldwell 電腦公司接受退貨，只要產品尚未從包裝中取出。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_121_110","book":4,"part":5,"qNum":121,"stem":"Until last month Kanyan, Inc., _______ farming equipment for CEK Agriculture.","options":["A) manufacturing","B) manufactured","C) is manufacturing","D) was manufactured"],"answer":"B","explanation":"【文法解析】本題的關鍵在於時間副詞片語「Until last month」（直到上個月）。這個片語明確指出一個動作在過去某個時間點（上個月）之前一直持續或發生，但之後可能已經停止或改變。因此，我們需要一個過去式動詞來描述這個情況。\n\n選項 A) manufacturing：這是現在分詞，不能單獨作為句子的主要動詞，需要搭配助動詞。\n選項 B) manufactured：這是簡單過去式動詞，完美符合「Until last month」所指示的過去時間點之前發生的動作。它表示Kanyan公司在過去一直從事製造，直到上個月為止。\n選項 C) is manufacturing：這是現在進行式，表示動作正在發生，與「Until last month」的過去時間點衝突。\n選項 D) was manufactured：這是過去被動語態。句子的主詞 Kanyan, Inc. 是一家公司，它應該是「製造」設備的主動執行者，而不是「被製造」的對象，因此語態錯誤。","translation":"直到上個月，Kanyan公司都為CEK農業公司製造農業設備。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_122_111","book":4,"part":5,"qNum":122,"stem":"Sign up now for deals available _______ to Platinum members of the Bordner Gym Club.","options":["A) exclusively","B) financially","C) relatively","D) productively"],"answer":"A","explanation":"本題考驗副詞的語意和用法。句子的核心是「deals available _______ to Platinum members」，意指「優惠僅限於白金會員」。\nA) exclusively：意為「專屬地，獨家地」，修飾 available，表示這些優惠「僅」提供給白金會員，語意完全符合，強調了會員資格的限制性。\nB) financially：意為「財務上地」，與優惠的「可用性」無關，語意不通。\nC) relatively：意為「相對地」，句中沒有比較對象，且無法表達優惠的獨特性。\nD) productively：意為「有成效地，生產性地」，與優惠的提供方式不符，語意不通。\n因此，exclusively 是唯一能正確表達「優惠僅限於特定會員」的副詞。","translation":"立即註冊，即可享有Bordner健身俱樂部白金會員專屬優惠。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_123_112","book":4,"part":5,"qNum":123,"stem":"The printers sold by Mitaka Innovations at a discounted price are of _______ quality to those sold elsewhere.","options":["A) equivalencies","B) equivalent","C) equivalently","D) equivalence"],"answer":"B","explanation":"本題考驗詞性辨析。句型「be of + adj. + noun」表示「具有某種...特質/性質」。空格後為名詞「quality（品質）」，因此空格處需要一個形容詞來修飾「quality」。\nA) equivalencies 是複數名詞，不符合修飾名詞的語法。\nB) equivalent 是形容詞，意為「同等的、相等的」，放入句中形成「of equivalent quality」，表示「具有同等品質」，語意和語法皆正確，並與後方的「to those sold elsewhere」形成比較。\nC) equivalently 是副詞，不能修飾名詞「quality」。\nD) equivalence 是名詞，意為「相等、等同」，不能直接修飾名詞「quality」。\n因此，正確答案為B。","translation":"三鷹創新以折扣價出售的印表機，其品質與在其他地方出售的印表機品質相同。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_124_113","book":4,"part":5,"qNum":124,"stem":"In addition to a salary, Inquell Insurance associates are paid a _______ based on a percentage of sales.","options":["A) commission","B) promotion","C) donation","D) permission"],"answer":"A","explanation":"【文法解析】正確答案為 A) commission。題目指出 Inquell 保險公司的員工除了薪水之外，還會根據銷售百分比獲得報酬。Commission (佣金) 正是業務人員依據銷售額或交易量所獲得的報酬，完全符合「based on a percentage of sales (根據銷售百分比)」的語境。選項 B) promotion (晉升；促銷) 指的是職位提升或產品推廣，與金錢報酬的性質不符。選項 C) donation (捐款) 是指捐贈給慈善機構的款項，與員工薪酬無關。選項 D) permission (允許；許可) 則是指同意或授權，與支付報酬的概念完全無關。因此，從語意和商業詞彙的搭配來看，commission 是唯一正確的選擇。","translation":"除了薪水之外，Inquell 保險公司的員工還會根據銷售百分比獲得一筆佣金。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_125_114","book":4,"part":5,"qNum":125,"stem":"Aeronamic Footwear guarantees delivery within ten business days, _______ merchandise may arrive even more quickly.","options":["A) beside","B) if","C) although","D) whenever"],"answer":"C","explanation":"【文法解析】本題考查連接詞的選擇，以表達句子的邏輯關係。句子的前半部「Aeronamic Footwear保證在十個工作天內送達」，後半部「商品甚至可能更快抵達」。這兩部分之間存在著一種讓步或對比關係：雖然保證最遲十天，但實際情況可能更好。選項C) \"although\" (儘管、雖然) 正確表達了這種讓步語氣，表示「儘管保證十天內，但商品可能更快抵達」。選項A) \"beside\" 是介系詞，意為「在...旁邊」，不符合句意和文法結構。選項B) \"if\" (如果) 表示條件，但此處並非條件句。選項D) \"whenever\" (無論何時) 表示時間，不符合句子的讓步關係。","translation":"Aeronamic 鞋業保證在十個工作天內送達，儘管商品甚至可能更快抵達。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_126_115","book":4,"part":5,"qNum":126,"stem":"At the meeting on June 4, Ms. Srisati will _______ all misunderstandings surrounding the new phone system.","options":["A) look out","B) check in","C) clear up","D) take off"],"answer":"C","explanation":"正確答案為 (C) clear up。片語 \"clear up\" 意指「澄清、解決（問題或誤解）」，與題目中「所有關於新電話系統的誤解 (all misunderstandings)」完美搭配，表示 Srisati 女士將在會議上釐清這些誤解。其他選項皆不符合語境：(A) look out 意為「小心、留意」；(B) check in 意為「報到、登記入住」；(D) take off 意為「起飛、脫下（衣物）」。因此，(C) clear up 是唯一能使句子語義完整且正確的選項。","translation":"在6月4日的會議上，Srisati女士將會澄清所有關於新電話系統的誤解。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_127_116","book":4,"part":5,"qNum":127,"stem":"With the new Web site enhancements, Hill Street Design customers will be able to view a _______ of recent purchases.","options":["A) voucher","B) coupon","C) summary","D) payment"],"answer":"C","explanation":"【文法解析】本題考查詞彙的語義搭配。句子的語境是「顧客將能夠查看近期購買的_______」。選項C) summary 意為「摘要、總結」，與「近期購買的摘要」完美契合，指顧客可以在網站上看到他們最近購買商品的簡要列表或概覽，這是網站常見的功能。選項A) voucher 和 B) coupon 都指「憑證、折價券」，通常用於折扣或兌換，與「近期購買的憑證/折價券」語意不符。選項D) payment 意為「付款」，雖然與購買相關，但「近期購買的一個付款」語意不通順，顧客通常會查看「付款紀錄」而非「一個付款」。因此，C) summary 是唯一符合語境和邏輯的答案。","translation":"隨著新的網站功能強化，Hill Street Design 的顧客將能夠查看近期購買的摘要。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_128_117","book":4,"part":5,"qNum":128,"stem":"The executive team of Trannelin Industries is determining _______ divisions will transfer to the West Coast next year.","options":["A) any","B) none","C) each","D) which"],"answer":"D","explanation":"此題空格處需引導一個名詞子句，作為動詞「determining」（決定）的受詞。「which」作為疑問詞，能引導名詞子句，表示「哪一些」或「哪個」，在此修飾「divisions」，意指「決定哪些部門」。A) any 通常用於否定句、疑問句或條件句，不適合引導此類名詞子句。B) none 是代名詞，不能修飾名詞「divisions」。C) each 是單數，不能修飾複數名詞「divisions」。因此，D) which 是唯一正確選項。","translation":"Trannelin 工業的執行團隊正在決定明年哪些部門將轉移到西海岸。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_129_118","book":4,"part":5,"qNum":129,"stem":"The Fitzton Gallery has been the _______ promoter of the arts in Worthington, sponsoring numerous public events.","options":["A) precise","B) separate","C) certain","D) primary"],"answer":"D","explanation":"【文法解析】本題考查形容詞的語義辨析。正確答案 D) primary 意為「主要的、首要的」，與句中「贊助眾多公共活動」的語境完美契合，表示費茲頓畫廊是沃辛頓地區推廣藝術最重要、最主要的機構。A) precise 意為「精確的」，不符合畫廊作為推廣者的角色。B) separate 意為「分開的、獨立的」，與句意不符，無法表達其主導地位。C) certain 意為「確定的、某個」，雖然可以修飾名詞，但在這裡無法表達畫廊在推廣藝術方面的重要性或主導地位。因此，D) primary 是唯一能準確表達句意的選項。","translation":"費茲頓畫廊一直是沃辛頓地區藝術的_______推廣者，贊助了無數的公共活動。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og4_p5_130_119","book":4,"part":5,"qNum":130,"stem":"The travel agent was able to obtain flights for the conference speakers _______ the last-minute request.","options":["A) aboard","B) despite","C) aside","D) beyond"],"answer":"B","explanation":"正確答案是B) despite。Despite是一個介系詞，表示「儘管、雖然」，用來連接兩個有對比或讓步關係的子句或片語。句中旅行社業務員「能夠取得機票」與「最後一刻的請求」形成對比，意指業務員克服了時間緊迫的困難。A) aboard（在…上）、C) aside（在旁邊）、D) beyond（超越）皆不符合語意。","translation":"旅行社業務員儘管接到最後一刻的請求，仍能為會議發言人取得機票。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_101_120","book":5,"part":5,"qNum":101,"stem":"This discounted train ticket is _______ only at certain times of the day.","options":["A) valid","B) validate","C) validating","D) validation"],"answer":"A","explanation":"【文法解析】本題考驗詞性選擇。句型為「主詞 + be動詞 + _______」，此處需要一個形容詞來描述主詞「This discounted train ticket」（這張折扣火車票）的狀態。A) valid 是形容詞，意為「有效的、合法的」，符合語意，表示車票在特定時段有效。B) validate 是動詞原形，不能直接接在be動詞後。C) validating 是現在分詞，若作動詞，表示「正在驗證」，但車票是被驗證的對象，而非主動驗證者；若作形容詞，語意不符。D) validation 是名詞，意為「驗證、生效」，不能用來修飾或描述車票的狀態。因此，A) valid 是唯一正確且符合語法的選項。","translation":"這張折扣火車票僅在一天中的特定時段有效。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_102_121","book":5,"part":5,"qNum":102,"stem":"To participate in the Advantage Discount program, _______ the registration form on our Web site.","options":["A) reply","B) inquire","C) complete","D) apply"],"answer":"C","explanation":"正確答案為 (C) complete。「Complete the form」是英文中非常常見的搭配詞（collocation），意指「填寫表格」或「完成表格」。在此語境中，為了參與折扣計畫，必須「填寫」網站上的註冊表格，因此 (C) complete 最為恰當。\n\n(A) reply 意為「回覆」，通常用於回覆訊息或問題，不能直接搭配「表格」。\n(B) inquire 意為「詢問、查詢」，通常搭配介系詞如「about」或「for」，不能直接搭配「表格」。\n(D) apply 意為「申請」，通常搭配介系詞「for」（例如：apply for a program），雖然是申請計畫，但動詞不能直接作用於「表格」，而是「填寫表格以申請」。","translation":"若要參與優惠折扣計畫，請在我們的網站上_______註冊表格。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_103_122","book":5,"part":5,"qNum":103,"stem":"Ms. Srisati is unavailable today _______ she is flying to Mumbai.","options":["A) because","B) how","C) regarding","D) sooner"],"answer":"A","explanation":"【文法解析】正確答案為 A) because。because 是一個從屬連接詞，用來引導表示原因或理由的子句。句中「Srisati女士今天無法出席」的原因是「她要飛往孟買」，因此使用 because 來連接兩個子句，表達因果關係，語意通順且符合文法。\n\n其他選項：\nB) how 是一個連接詞或副詞，表示方式或方法，不適用於表達原因。\nC) regarding 是一個介系詞，意為「關於、有關」，後面應接名詞或名詞片語，不能直接連接一個完整的子句。\nD) sooner 是一個副詞，意為「更早、更快」，無法作為連接詞來連接兩個子句並表達原因。","translation":"Srisati女士今天無法出席，因為她要飛往孟買。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_104_123","book":5,"part":5,"qNum":104,"stem":"The contract _______ states that the tenants must renew their rental-property agreement by March 1.","options":["A) clear","B) clearly","C) clearer","D) cleared"],"answer":"B","explanation":"【文法解析】本題考驗詞性辨識。句子的主詞是「The contract」（合約），動詞是「states」（聲明、規定）。我們需要一個詞來修飾動詞「states」，說明合約「如何」聲明或規定。修飾動詞的詞必須是副詞。選項B)「clearly」是副詞，意為「清楚地、明確地」，符合語法和語義，表示合約明確地規定了某事。選項A)「clear」是形容詞，修飾名詞，不能修飾動詞。選項C)「clearer」是形容詞的比較級，也不適用。選項D)「cleared」是動詞的過去式或過去分詞，在此處不合語法。","translation":"合約中明確規定，租戶必須在3月1日前續簽其租賃物業協議。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_105_124","book":5,"part":5,"qNum":105,"stem":"Aiko Arts plans to host a reception _______ the artist, Remco Koeman.","options":["A) except","B) for","C) off","D) into"],"answer":"B","explanation":"【文法解析】\n正確答案為 (B) for。在此句中，\"for\" 用來表示「為…而舉辦」或「獻給…」。Aiko Arts 計劃舉辦一場招待會，其目的是「為了」藝術家 Remco Koeman。因此，\"host a reception for someone\" 是非常常見且正確的搭配，表示招待會的對象或目的。\n(A) except 意為「除了…之外」，表示排除，語意不符。\n(C) off 意為「離開」、「從…掉落」或「關閉」，在此語境中不合適，無法表達招待會的對象。\n(D) into 意為「進入…之中」或「變成…」，無法表達招待會的對象或目的，語意不通。","translation":"Aiko Arts 計劃為藝術家雷姆科·庫曼舉辦一場招待會。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_106_125","book":5,"part":5,"qNum":106,"stem":"Unfortunately, replacing the copy machine will cost more than _______ had anticipated.","options":["A) we","B) us","C) our","D) ours"],"answer":"A","explanation":"「than」在此作為連接詞，引導一個比較子句。子句「_______ had anticipated」需要一個主詞來執行動詞「had anticipated」的動作。選項 (A) \"we\" 是主格代名詞，能作為子句的主詞，形成「we had anticipated」，語法正確且語意完整。選項 (B) \"us\" 是受格代名詞，不能作為主詞。選項 (C) \"our\" 是所有格形容詞，後面必須接名詞，不能單獨作主詞。選項 (D) \"ours\" 是所有格代名詞，雖然可以作主詞，但其語意為「我們的（東西/人）」，在此不符合「我們預期」的語境。因此，(A) \"we\" 是唯一正確的選擇。","translation":"不幸的是，更換這台影印機的費用將會比我們預期的還要高。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_107_126","book":5,"part":5,"qNum":107,"stem":"Your Polytonics e-mail account will be set up _______ you arrive on your first day.","options":["A) at","B) around","C) until","D) before"],"answer":"D","explanation":"【連接詞時間副詞】空格引導時間副詞子句。before（在…之前）符合文意：「在你第一天到職之前，電子郵件帳號就會設置好」。A) at（介系詞，非連接詞）、B) around（介系詞）、C) until（直到…才）表示持續到某時間點，語意不符，故選D。","translation":"您的 Polytonics 電子郵件帳號將在您第一天報到之前設置完畢。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_108_127","book":5,"part":5,"qNum":108,"stem":"Oaza Electronics worked _______ with our team to facilitate the development of the computerized training system.","options":["A) hardly","B) nearly","C) closely","D) relatively"],"answer":"C","explanation":"本題考驗副詞的語意與搭配。句中描述Oaza Electronics與我方團隊合作，以促進電腦化訓練系統的開發。A) hardly 意為「幾乎不」，語意上與「促進開發」不符。B) nearly 意為「幾乎」，通常指程度或時間上的接近，不適合修飾「合作方式」。C) closely 意為「密切地、緊密地」，「work closely with」是常見的搭配詞，表示雙方緊密合作，完全符合句意。D) relatively 意為「相對地」，通常修飾形容詞或副詞，表示比較關係，不適合單獨修飾動詞「worked with」。因此，C) closely 是最佳答案，表示Oaza Electronics與我方團隊密切合作。","translation":"Oaza Electronics 與我們的團隊密切合作，以促進電腦化訓練系統的開發。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_109_128","book":5,"part":5,"qNum":109,"stem":"Financial adviser Jenna Sotulo helps professionals devise a _______ for managing their finances.","options":["A) prediction","B) gesture","C) strategy","D) request"],"answer":"C","explanation":"【文法解析】本題考驗詞彙選擇。句中提到財務顧問Jenna Sotulo協助專業人士「devise a _______ for managing their finances」（設計一個管理財務的______）。選項A) prediction（預測）不符語境，財務顧問是協助規劃而非預測。選項B) gesture（手勢）與財務管理無關。選項D) request（請求）亦不合適，財務顧問是提供方案而非請求。選項C) strategy（策略、策略性計畫）最符合文意，意指為達成特定目標而設計的行動計畫。財務顧問正是幫助客戶制定有效的財務管理策略。因此，C為正確答案。","translation":"財務顧問珍娜·索圖洛協助專業人士制定一套管理財務的策略。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_110_129","book":5,"part":5,"qNum":110,"stem":"Each employee must coordinate with management so that _______ time off can be properly scheduled.","options":["A) alone","B) individual","C) isolating","D) separated"],"answer":"B","explanation":"【文法解析】正確答案B) individual為形容詞，意指「個人的、個別的」，與time off搭配，表示「每個員工各自的休假」，語意最為通順，符合題目中「每位員工」需協調排假的情境。A) alone意指「獨自的、單獨的」，通常修飾人或物，而非休假。C) isolating意指「使孤立的」，語意不符。D) separated意指「分開的、分離的」，不適用於此語境。","translation":"每位員工都必須與管理階層協調，以便能妥善安排個人的休假時間。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_111_130","book":5,"part":5,"qNum":111,"stem":"The cost of building Juniper High Towers exceeded the contractor's original _______ by over £5,000.00.","options":["A) estimating","B) estimate","C) estimated","D) estimator"],"answer":"B","explanation":"題目中「the contractor's original _______」需要一個名詞來完成所有格片語。A) estimating 是動名詞，指「估計的行為」，不符語意。B) estimate 是名詞，指「估計值、預算」，符合文意，表示承包商最初的預算金額。C) estimated 是動詞的過去分詞，作形容詞用，但後面缺少被修飾的名詞。D) estimator 是名詞，指「估價師」，語意不符。故選 B。","translation":"建造杜松高塔的成本超出了承包商最初的估計，金額超過了5,000英鎊。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_112_131","book":5,"part":5,"qNum":112,"stem":"At Links Fine Meats, we pride _______ on providing the highest-quality products on the market.","options":["A) oneself","B) yourselves","C) itself","D) ourselves"],"answer":"D","explanation":"題目主詞為「we」（我們），動詞「pride」後需接反身代名詞，以指回主詞。因此，與「we」相對應的反身代名詞是「ourselves」。選項A) oneself 是指「一個人自己」，選項B) yourselves 是指「你們自己」，選項C) itself 是指「它自己」，皆不符合主詞「we」。故選D) ourselves。","translation":"在Links Fine Meats，我們以提供市面上最高品質的產品為傲。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_113_132","book":5,"part":5,"qNum":113,"stem":"______ he is usually quiet around the office, Mr. Heineman is known for his witty and engaging public speeches.","options":["A) Although","B) Otherwise","C) Despite","D) Instead"],"answer":"A","explanation":"【文法解析】\n正確答案是A) Although。Although是一個從屬連接詞，用於引導一個讓步子句，表示「儘管、雖然」。它後面必須接一個完整的子句（主詞+動詞），與主要子句形成對比或讓步關係。題目中「he is usually quiet around the office」是一個完整的子句，因此Although符合文法結構。\nB) Otherwise是副詞或對等連接詞，表示「否則」或「在其他方面」，不適合連接兩個對比的子句。\nC) Despite是介系詞，後面必須接名詞、名詞片語或動名詞，不能直接接子句。若要使用，需改為「Despite the fact that...」或「Despite his usual quietness...」。\nD) Instead是副詞，表示「代替、反而」，通常用於句首或句中，表示替代或轉折，但不能像Although一樣引導讓步子句。","translation":"儘管他在辦公室通常很安靜，海涅曼先生卻以他機智風趣且引人入勝的公開演講而聞名。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_114_133","book":5,"part":5,"qNum":114,"stem":"Ancient Chitimacha baskets are _______ featured in the Louisiana Museum of Archeology.","options":["A) prominent","B) prominently","C) prominence","D) prominences"],"answer":"B","explanation":"題目中，空白處位於動詞 \"are\" 和過去分詞 \"featured\" 之間。在 \"be 動詞 + 過去分詞\" 構成的被動語態結構中，修飾過去分詞（在此處作用類似形容詞或動詞）的詞應為副詞。選項 A \"prominent\" 是形容詞，修飾名詞；選項 C \"prominence\" 和 D \"prominences\" 均為名詞，不能修飾動詞或形容詞。唯有選項 B \"prominently\" 是副詞，意為「顯著地、突出地」，用來修飾 \"featured\"（被展示的方式），表示這些籃子在博物館中被顯著地展出。因此，B 是正確答案。","translation":"古老的奇蒂馬查籃子在路易斯安那考古博物館中被顯著地展出。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_115_134","book":5,"part":5,"qNum":115,"stem":"______ tea and coffee are available in the lobby for all guests of the Farrison Hotel.","options":["A) Compliment","B) To compliment","C) Complimented","D) Complimentary"],"answer":"D","explanation":"正確答案D) Complimentary是形容詞，意為「免費的；贈送的」，用來修飾名詞「tea and coffee」，語意完全符合。A) Compliment是名詞或動詞，B) To compliment是不定詞片語，兩者皆無法修飾名詞。C) Complimented是過去分詞，雖然可作形容詞，但「被讚美的茶和咖啡」語意不通，不符情境。","translation":"法里森飯店的所有住客都可以在大廳享用免費的茶和咖啡。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_116_135","book":5,"part":5,"qNum":116,"stem":"______ representatives of Light Cloud Airlines, flights are rarely overbooked.","options":["A) As opposed to","B) In addition to","C) According to","D) Prior to"],"answer":"C","explanation":"正確答案為C) According to。此片語意為「根據…所說/所言」，用來引述消息來源。句子表示「根據光雲航空的代表所說，航班很少超賣」。A) As opposed to (與…相反) 用於對比；B) In addition to (除了…之外) 用於補充；D) Prior to (在…之前) 用於時間順序。這三者皆不符合語意，無法表達資訊來源。","translation":"根據光雲航空的代表所說，航班很少超賣。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_117_136","book":5,"part":5,"qNum":117,"stem":"Mr. Krause will reorganize the supply room _______ the cabinets are delivered.","options":["A) overall","B) due to","C) once","D) soon"],"answer":"C","explanation":"本題考查連接詞的用法。句子結構為「主句 + 連接詞 + 從句」，需要一個能引導時間狀語從句的連接詞。選項C) once 作為從屬連接詞，意為「一旦…就…」或「當…的時候」，完美表達了「櫥櫃送達後，克勞斯先生就會重新整理儲藏室」的先後順序關係。選項A) overall 是副詞，意為「總體而言」，無法連接兩個子句。選項B) due to 是介系詞片語，意為「由於」，後面應接名詞或名詞片語，而非一個完整的子句。選項D) soon 也是副詞，意為「很快地」，同樣無法連接兩個子句。因此，C是唯一正確答案。","translation":"克勞斯先生將會在櫥櫃送達後，重新整理儲藏室。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_118_137","book":5,"part":5,"qNum":118,"stem":"By completing employee-satisfaction surveys anonymously, workers can more _______ state their concerns about the workplace.","options":["A) wholly","B) openly","C) favorably","D) laboriously"],"answer":"B","explanation":"本題考查副詞語義。句中提到「匿名地」(anonymously) 完成員工滿意度調查，其目的在於讓員工能「更坦率地」表達他們對工作場所的擔憂。選項B) openly (坦率地、公開地) 最符合語境，因為匿名保護讓員工敢於說出真實想法。A) wholly (完全地)、C) favorably (有利地)、D) laboriously (費力地) 皆不符合匿名調查的意圖或句意。","translation":"透過匿名完成員工滿意度調查，員工可以更坦率地表達他們對工作場所的擔憂。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_119_138","book":5,"part":5,"qNum":119,"stem":"The final blueprints must _______ by Ms. Ito after the final draft is produced.","options":["A) approve","B) be approved","C) approving","D) to approve"],"answer":"B","explanation":"此題考驗情態助動詞 (modal verb) 後的動詞形式，以及被動語態的應用。「must」是情態助動詞，其後應接動詞原形。句中「The final blueprints」（最終藍圖）是主詞，但藍圖無法自行「批准」，而是需要被「批准」，因此應使用被動語態。被動語態的結構為「be + 過去分詞 (past participle)」。結合情態助動詞與被動語態，正確形式為「must + be + 過去分詞」。選項B)「be approved」符合此結構。選項A)「approve」是動詞原形，但為主動語態；選項C)「approving」是現在分詞，不符合文法；選項D)「to approve」是不定詞，亦不符合情態助動詞後的被動語態結構。故選B。","translation":"最終藍圖必須在最終草稿完成後，由伊藤女士批准。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_120_139","book":5,"part":5,"qNum":120,"stem":"This sewing workshop is ideal for beginner tailors _______ professionals who would like to refresh their knowledge.","options":["A) but","B) either","C) as well as","D) additionally"],"answer":"C","explanation":"【文法解析】正確答案是 C) as well as。「as well as」意為「以及」、「和…一樣好」，用於連接兩個並列的成分，表示「除了…之外，還有…」。在此句中，它完美地表達了這個縫紉工作坊不僅適合初學裁縫師，也適合想溫故知新的專業人士，語意上是包容且並列的關係。A) but 是一個表示轉折或對比的連接詞，語意不符。B) either 通常用於「either...or...」結構，表示「兩者擇一」，不符合同時適合兩者的語境。D) additionally 是一個副詞，意為「此外、另外」，通常用於句首或句中修飾動詞或整個句子，不能直接連接兩個名詞片語。","translation":"這個縫紉工作坊非常適合初學裁縫師，以及想溫故知新的專業人士。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_121_140","book":5,"part":5,"qNum":121,"stem":"All posters and flyers must be removed from the bulletin board _______ 48 hours after the event has occurred.","options":["A) within","B) among","C) unless","D) while"],"answer":"A","explanation":"此題考驗介系詞的用法。句子需要一個介系詞來表達「在...時間之內」完成某事。選項A) within (在...之內) 正確表達了海報和傳單必須在活動結束後的48小時內被移除的時間限制，語意和文法皆符合。選項B) among (在...之中) 通常用於指空間或群體，不適用於時間限制。選項C) unless (除非) 和 D) while (當...時候) 都是連接詞，後面需要接子句，而非單純的時間片語「48 hours after the event has occurred」，因此文法上不符。","translation":"所有海報和傳單必須在活動結束後的48小時內從佈告欄上移除。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_122_141","book":5,"part":5,"qNum":122,"stem":"The _______ technology used in pots by Claypol Housewares keeps the handles from getting too hot to touch.","options":["A) warm","B) frequent","C) unattached","D) innovative"],"answer":"D","explanation":"正確答案是 (D) innovative。\n(D) innovative 意為「創新的、革新的」，用來形容「technology (技術)」非常貼切。句子的語境是描述一種新技術，它能解決鍋具把手過熱的問題，這正符合「創新」的含義，表示這項技術是新穎且有效的解決方案。\n(A) warm 意為「溫暖的」，形容技術不合適，且與「防止把手過熱」的語境相悖。\n(B) frequent 意為「頻繁的」，通常用來形容事件或行為發生的頻率，不能修飾「技術」。\n(C) unattached 意為「未附著的、未連接的」，與句中描述技術的功能無關，語意不通。\n綜合來看，只有 (D) innovative 能正確且合理地描述這種解決問題的新技術。","translation":"Claypol Housewares 應用於鍋具的創新技術，能使把手不至於燙手。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_123_142","book":5,"part":5,"qNum":123,"stem":"There are a number of free Web-based _______ that provide tips for locating information in historical databases.","options":["A) tutorials","B) tutoring","C) tutored","D) tutor"],"answer":"A","explanation":"本題考驗詞性與語意。句首的「There are a number of...」表示主詞需要是可數名詞的複數形式。空格前的「Web-based」是形容詞，修飾空格中的名詞。空格後方的關係子句「that provide tips...」中的動詞「provide」是複數動詞，再次確認空格需填入複數名詞。選項A) tutorials (教學課程、教學軟體) 是可數名詞的複數形式，符合語意，指網路上提供搜尋技巧的教學資源。選項B) tutoring (輔導、教學的行為) 是動名詞，通常作不可數名詞，指「輔導的行為」，不適合用「a number of」修飾，且語意上不如「tutorials」精確。選項C) tutored 是動詞的過去式或過去分詞，不能作句子的主詞。選項D) tutor (家教、導師) 是單數名詞，不符合「a number of」和後方複數動詞「provide」的要求。因此，正確答案為A。","translation":"有許多免費的網路教學課程提供在歷史資料庫中查找資訊的技巧。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_124_143","book":5,"part":5,"qNum":124,"stem":"The person hired must be able to adapt _______ to changes in work assignments and schedules.","options":["A) readies","B) readily","C) readiness","D) ready"],"answer":"B","explanation":"此題考驗詞性辨識。句中 \"adapt\" 為動詞，意為「適應」。空格處需要一個副詞來修飾動詞 \"adapt\"，說明「如何」適應。選項 B) \"readily\" 是一個副詞，意為「輕易地、迅速地、樂意地」，用來修飾動詞 \"adapt\" 恰當，表示「能夠輕易地適應」。選項 A) \"readies\" 是動詞（第三人稱單數現在式）或名詞複數，不符；選項 C) \"readiness\" 是名詞，意為「準備狀態」，不能直接修飾動詞；選項 D) \"ready\" 是形容詞，意為「準備好的」，也不能直接修飾動詞。因此，B 是唯一正確答案。","translation":"被錄用者必須能夠輕易適應工作任務和排程的變化。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_125_144","book":5,"part":5,"qNum":125,"stem":"Organizational behavior specialist Ray Majory believes a good sense of humor in a leader can increase the quality of _______ in the team.","options":["A) declaration","B) statement","C) message","D) communication"],"answer":"D","explanation":"正確答案是 (D) communication。句子的語境是領導者的幽默感能提升團隊中某種「品質」。幽默感能促進團隊成員之間的互動、理解與資訊交流，這些都屬於「溝通」的範疇。「quality of communication」是一個常見且自然的搭配，表示溝通的效率與效果。(A) declaration (聲明)、(B) statement (陳述) 和 (C) message (訊息) 雖然都與資訊傳遞有關，但它們指的是具體的「內容」或「行為」，而非「溝通的過程或整體互動品質」。領導者的幽默感更廣泛地影響團隊的整體溝通氛圍和互動品質，因此 (D) communication 是最恰當的選擇。","translation":"組織行為學家雷·馬約里（Ray Majory）認為，領導者良好的幽默感可以提升團隊中溝通的品質。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_126_145","book":5,"part":5,"qNum":126,"stem":"Portsmouth's agricultural industry has always found ways to _______ itself by growing different crops and finding new markets.","options":["A) reinvest","B) reuse","C) reassess","D) reinvent"],"answer":"D","explanation":"正確答案是 D) reinvent。「reinvent oneself」意指「徹底改造自己」、「重塑自我」，這與題目中「透過種植不同作物和開拓新市場」的描述完美契合，表示該產業不斷創新、轉型以適應環境。A) reinvest（再投資）通常指資金的投入，不符合產業透過改變經營模式來「改造自己」的語境。B) reuse（重複使用）指將現有資源再次利用，但題目強調的是創新與轉型，而非簡單的重複利用。C) reassess（重新評估）指再次審視或評估，雖然產業可能需要評估，但題目描述的是實際的「行動」和「結果」，即透過改變來重塑自己，而非僅僅是評估。因此，D最能表達產業積極求變、開創新局面的意涵。","translation":"普次茅斯的農業一直以來都能透過種植不同作物和開拓新市場來重塑自我。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_127_146","book":5,"part":5,"qNum":127,"stem":"While some countries have made huge investments in the Caribbean lately, others have reduced _______.","options":["A) themselves","B) theirs","C) their","D) they"],"answer":"B","explanation":"正確答案是 (B) theirs。\n(B) theirs 是一個所有格代名詞，意指「他們的（投資）」。在句中，它作為動詞 reduced 的受詞，指涉前文提到的「投資」，語意完整且符合文法，表示「其他國家減少了他們的投資」。\n(A) themselves 是反身代名詞，表示「他們自己」，若填入則變成「其他國家減少了他們自己」，語意不通。\n(C) their 是所有格形容詞，後面必須接名詞（例如 their investments），不能單獨作為動詞的受詞使用。\n(D) they 是主格代名詞，只能作主詞，不能作動詞的受詞。\n因此，(B) theirs 是唯一能正確填入並使句子語意通順且符合文法規範的選項。","translation":"儘管有些國家最近在加勒比海地區投入了巨額資金，但其他國家卻減少了他們的投資。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_128_147","book":5,"part":5,"qNum":128,"stem":"The ethics committee cited the potential benefits of the research project while _______ its high cost.","options":["A) acknowledging","B) to acknowledge","C) has acknowledged","D) acknowledge"],"answer":"A","explanation":"【文法解析】本題考查連接詞「while」引導的簡化副詞子句。當「while」引導的子句其主詞與主要子句的主詞相同時，該子句常會被簡化為「while + 現在分詞（-ing）」的形式，表示同時發生或對比的動作。句中「The ethics committee」是主詞，它「cited」（引述）了潛在利益，同時也「acknowledged」（承認）了高成本。因此，選項A) acknowledging 符合此文法結構，意指「在承認其高成本的同時」。選項B) to acknowledge 是不定詞，不適用於此簡化子句結構。選項C) has acknowledged 是現在完成式，若要使用需有主詞，且不符合簡化子句的用法。選項D) acknowledge 是原形動詞，在此處文法上不正確。","translation":"倫理委員會引述了該研究計畫的潛在益處，同時也承認其高昂的成本。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_129_148","book":5,"part":5,"qNum":129,"stem":"The report describes the environmental impact on lakes and rivers of using _______ energy sources.","options":["A) together","B) hopeful","C) regulatory","D) renewable"],"answer":"D","explanation":"此題考驗詞彙與詞性。空格前有動詞 \"using\"，空格後有名詞片語 \"energy sources\"，因此空格需要一個形容詞來修飾 \"energy sources\"，說明能源的種類。\nA) \"together\" 是副詞，表示「一起」，詞性不符，無法修飾名詞。\nB) \"hopeful\" 是形容詞，表示「有希望的」，語意上不符合「能源」的描述，不合邏輯。\nC) \"regulatory\" 是形容詞，表示「監管的、規定的」，雖然能源可能受監管，但「監管的能源」並非此處語境所指的能源類型，語意不通順。\nD) \"renewable\" 是形容詞，表示「可再生的」，與 \"energy sources\" 結合形成「再生能源 (renewable energy sources)」，語意上完全符合報告描述「使用再生能源對湖泊和河流的環境影響」的語境。故選 D。","translation":"該報告描述了使用再生能源對湖泊和河流造成的環境影響。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og5_p5_130_149","book":5,"part":5,"qNum":130,"stem":"Any decorations on the ceilings or walls must be fully removed, including any material used to _______ them to the surfaces.","options":["A) adhere","B) attract","C) construct","D) sustain"],"answer":"A","explanation":"【文法解析】本題考查動詞詞義辨析。句子的語境是移除天花板或牆壁上的裝飾物，並提及用於將這些裝飾物「_______」到表面上的材料。選項A) adhere 意為「黏附、附著」，完美符合句意，指用於將裝飾品黏附在牆面上的材料。選項B) attract 意為「吸引」，材料是用來固定而非吸引裝飾品。選項C) construct 意為「建造、構成」，材料是用來固定已有的裝飾品，而非建造裝飾品本身。選項D) sustain 意為「維持、支撐」，材料是用來固定，而非維持或支撐裝飾品。因此，最符合語意的選項是A。","translation":"任何在天花板或牆壁上的裝飾物都必須完全移除，包括任何用於將它們黏附到表面上的材料。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_101_150","book":6,"part":5,"qNum":101,"stem":"The Telra Corporation complies with all local and national ______ .","options":["A) regulate","B) regulated","C) regulatory","D) regulations"],"answer":"D","explanation":"D是正確答案，因為句子需要一個名詞作為動詞片語「complies with」（遵守）的受詞。「local and national」是形容詞，用來修飾後面的名詞。「regulations」是複數名詞，意指「規章、條例」，與前面的形容詞搭配，形成「所有地方和國家的規章」，使句意完整且符合文法。A) regulate 是動詞，不符合空格所需的名詞詞性。B) regulated 是動詞的過去式或過去分詞，在此作形容詞，但句子仍缺少一個名詞。C) regulatory 是形容詞，意指「管理的、監管的」，若選C，句子會變成「所有地方和國家的監管的」，後面缺少被修飾的名詞，語意不完整。","translation":"Telra 公司遵守所有地方和國家的規章制度。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_102_151","book":6,"part":5,"qNum":102,"stem":"If you are not satisfied with your purchase _______ CXT Electronics, return it within 30 days for a full refund.","options":["A) to","B) out","C) from","D) along"],"answer":"C","explanation":"正確答案是C) from。介系詞 \"from\" 在此表示來源或出處，意指「從CXT電子公司購買的商品」。因此，\"purchase from CXT Electronics\" 完整表達了商品是從該公司購得的。選項 A) \"to\" 表示方向或目的，不適用於此語境。選項 B) \"out\" 通常表示從內部出來或完成，與句意不符。選項 D) \"along\" 表示沿著或伴隨，也無法表達購買來源。綜合來看，\"from\" 是唯一能正確連接「購買」與「供應商」的介系詞。","translation":"如果您對從CXT電子公司購買的商品不滿意，請在30天內退貨以獲得全額退款。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_103_152","book":6,"part":5,"qNum":103,"stem":"Ms. Anderson has just received her invitation, so we cannot yet confirm whether _______ will attend the end-of-year banquet.","options":["A) she","B) her","C) hers","D) herself"],"answer":"A","explanation":"【文法解析】此題考驗代名詞的正確使用。空格位於連接詞 \"whether\" 之後，且作為動詞 \"will attend\" 的主詞。在英文中，動詞的主詞必須使用主格代名詞。\n選項 A) \"she\" 是主格代名詞，符合作為動詞主詞的語法要求，因此是正確答案。\n選項 B) \"her\" 是受格代名詞或所有格形容詞，不能作為動詞的主詞。\n選項 C) \"hers\" 是所有格代名詞，表示「她的東西」，也不能作為動詞的主詞。\n選項 D) \"herself\" 是反身代名詞，通常用於強調或當主詞與受詞為同一人時，不能直接作為句子的主詞。\n故選 A。","translation":"安德森女士剛收到她的邀請函，所以我們還無法確認她是否會出席年終晚宴。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_104_153","book":6,"part":5,"qNum":104,"stem":"As part of the writing workshop, participants will read their compositions _______ to the group.","options":["A) throughout","B) aloud","C) meanwhile","D) significantly"],"answer":"B","explanation":"正確答案為 (B) aloud。Aloud 是一個副詞，意為「出聲地、大聲地」，用來描述閱讀或說話的方式，表示聲音足以被他人聽到。句子中「participants will read their compositions _______ to the group」意指參與者將會「向小組朗讀他們的作品」，因此需要一個副詞來修飾動詞 read，說明閱讀的方式是出聲的，讓團體能聽到。\n(A) throughout (貫穿始終、在...期間) 不符合語意，無法修飾閱讀方式。\n(C) meanwhile (同時、在此期間) 描述時間關係，而非閱讀方式。\n(D) significantly (顯著地、意義重大地) 描述程度或重要性，不描述閱讀方式。\n故 (B) aloud 最能完整表達句子的意思。","translation":"作為寫作研討會的一部分，參與者將會向小組朗讀他們的作品。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_105_154","book":6,"part":5,"qNum":105,"stem":"Our programmers have benefited from the rigorous _______ required by the company.","options":["A) trainee","B) trains","C) training","D) trained"],"answer":"C","explanation":"【文法解析】此題空白處前方有形容詞「rigorous」（嚴格的），後方有修飾語「required by the company」（公司所要求的），因此空白處需要填入一個名詞。選項C)「training」是動名詞轉化的名詞，意指「訓練」這個過程或活動，與「rigorous」搭配形成「嚴格的訓練」，語意完全符合。選項A)「trainee」指「受訓者」，語意上不符「嚴格的受訓者」。選項B)「trains」是動詞「訓練」的第三人稱單數現在式，或名詞「火車」的複數，皆不符合文法結構與語意。選項D)「trained」是動詞「訓練」的過去分詞，通常作形容詞使用，不能直接作為名詞填入此處。因此，C是唯一正確答案。","translation":"我們的程式設計師們都受益於公司所要求的嚴格訓練。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_106_155","book":6,"part":5,"qNum":106,"stem":"A recent _______ of restaurants across the nation suggests that people are dining out much more frequently.","options":["A) collection","B) cuisine","C) survey","D) supply"],"answer":"C","explanation":"【文法解析】本題考驗詞彙辨析。「A recent _______ of restaurants」需要一個名詞來描述對全國餐廳進行的某種活動，而這個活動的結果是「suggests that people are dining out much more frequently」（顯示人們外出用餐的頻率更高）。選項 (C) survey (調查) 最符合語境，因為「調查」會收集數據並得出結論，例如關於用餐習慣的趨勢。選項 (A) collection (收集品、收藏) 指的是物品的集合，不適用於此。選項 (B) cuisine (烹飪、菜餚) 指的是食物的風格或種類，與句意不符。選項 (D) supply (供應) 指的是供應量，與「建議」用餐頻率的語境不符。因此，(C) survey 是唯一正確的選項。","translation":"一項針對全國餐廳的最新調查顯示，人們外出用餐的頻率高出許多。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_107_156","book":6,"part":5,"qNum":107,"stem":"During the summer, the Clayburgh Museum _______ its hours until 10:00 P.M. on the weekend.","options":["A) extends","B) extending","C) extensions","D) extendable"],"answer":"A","explanation":"這是一個TOEIC Part 5的文法題，主要測試動詞形式的選擇。句子的主詞是單數名詞「the Clayburgh Museum」（克萊伯格博物館），因此需要搭配單數第三人稱動詞。句中「During the summer」表示在夏季期間會發生的常規性或習慣性動作，應使用簡單現在式。\n選項A) \"extends\" 是動詞 \"extend\" 的單數第三人稱現在式，符合主詞和語境。\n選項B) \"extending\" 是現在分詞，不能單獨作為句子的主要動詞，除非前面有助動詞（例如：is extending）。\n選項C) \"extensions\" 是名詞，意為「延伸、擴展」，但句子需要一個動詞來構成謂語。\n選項D) \"extendable\" 是形容詞，意為「可延伸的」，句子需要動詞而非形容詞。\n因此，正確答案是A。","translation":"在夏季期間，克萊伯格博物館會在週末將開放時間延長至晚上10點。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_108_157","book":6,"part":5,"qNum":108,"stem":"After reviewing the latest real-estate reports, Ms. González _______ the sale of the property.","options":["A) replaced","B) invested","C) commented","D) authorized"],"answer":"D","explanation":"【文法解析】正確答案是 D) authorized。動詞 \"authorize\" 意為「授權、批准」，與後方的受詞 \"the sale of the property\" (房產的出售) 形成完美搭配，表示 Ms. González 在審閱房地產報告後，批准了該房產的出售。A) replaced (取代)：通常指取代某物，不適用於「出售」這個動作。B) invested (投資)：通常是「投資於某物」(invest in something)，而不是「投資出售」。C) commented (評論)：通常是「評論某事」(comment on something)，直接接「出售」在文法上不正確。因此，從語意和文法搭配來看，D 是唯一正確的選項。","translation":"在審閱了最新的房地產報告後，González 女士批准了該房產的出售。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_109_158","book":6,"part":5,"qNum":109,"stem":"Atlas Printing _______ can accommodate large orders within 24 hours.","options":["A) general","B) generalize","C) generalized","D) generally"],"answer":"D","explanation":"此題考驗詞性辨識。句子的主語是「Atlas Printing」，動詞片語是「can accommodate」（能夠容納/處理）。空格處需要一個詞來修飾這個動詞片語，表示「通常地」或「一般而言」。\nA) general 是形容詞，修飾名詞，例如「general manager」，不符合句型。\nB) generalize 是動詞，句中已有主要動詞「can accommodate」，不符合。\nC) generalized 是形容詞或動詞的過去分詞，修飾名詞或構成被動語態，不符合。\nD) generally 是副詞，意為「通常地，一般地」，用來修飾動詞片語「can accommodate」，表示Atlas Printing通常具備這種能力。因此，D是正確答案。","translation":"Atlas Printing 通常可以在24小時內處理大量訂單。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_110_159","book":6,"part":5,"qNum":110,"stem":"The Kwon Group employee handbook contains _______ information about payroll, benefits, and terms of employment.","options":["A) every","B) entire","C) whole","D) complete"],"answer":"D","explanation":"【文法解析】正確答案D) complete 是一個形容詞，意為「完整的、詳盡的」，用來修飾不可數名詞 information (資訊) 非常恰當，表示員工手冊包含了關於薪資、福利和僱傭條款的「完整資訊」。A) every 是一個限定詞，必須接單數可數名詞，而 information 是不可數名詞，因此 every information 在文法上是錯誤的。B) entire 和 C) whole 也是形容詞，意為「全部的、完整的」，但它們通常用於修飾單數可數名詞或集體名詞，例如 \"the entire book\" 或 \"the whole story\"。雖然它們的語義與 complete 相似，但與不可數名詞 information 搭配時，\"complete information\" 是更自然、更常見且符合英語習慣的用法。因此，D) complete 是此處的最佳選擇。","translation":"權氏集團的員工手冊包含關於薪資、福利和僱傭條款的完整資訊。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_111_160","book":6,"part":5,"qNum":111,"stem":"Mr. Shim has decided that he will present the figures to the board of trustees _______ rather than appoint someone else to do it.","options":["A) his","B) himself","C) him","D) he"],"answer":"B","explanation":"此題考驗反身代名詞的用法。句中「he will present the figures...」表示主詞「he」將執行「present」這個動作。空格後的「rather than appoint someone else to do it」強調是由主詞本人親自執行，而非委派他人。因此，需要一個反身代名詞來加強語氣，強調主詞「he」親自完成動作。選項B) himself 是「he」的反身代名詞，符合語意。選項A) his 是所有格形容詞，後需接名詞；選項C) him 是受格代名詞，不能用於強調主詞；選項D) he 是主格代名詞，已作為主詞，不能重複。","translation":"沈先生已決定他將親自向董事會提交數據，而不是指派其他人來做這件事。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_112_161","book":6,"part":5,"qNum":112,"stem":"______ he arrived in Indonesia, risk analyst Hoi-Tung Lai has been assessing the spending of Jakarta's middle class.","options":["A) While","B) During","C) Since","D) For"],"answer":"C","explanation":"【文法解析】此題考驗連接詞的用法。主句使用現在完成進行式 (has been assessing)，表示動作從過去某時開始並持續到現在。空格後接一個過去簡單式的子句 (he arrived in Indonesia)，表示一個過去的時間點。選項 C) \"Since\" 作為連接詞時，意為「自從…以來」，正好能連接一個過去時間點的子句，並與主句的現在完成式或現在完成進行式搭配，表示動作從該時間點開始並持續至今。因此 \"Since he arrived...\" (自從他抵達…以來) 語意最為恰當。選項 A) \"While\" 表示「當…的時候」或「雖然」，通常連接兩個同時發生的動作，不符合此處的持續性語境。選項 B) \"During\" 是介系詞，後須接名詞或名詞片語，不能直接接子句 (he arrived)。選項 D) \"For\" 作為連接詞時意為「因為」，或作為介系詞表示「持續一段時間」，皆不符合此處表達「自從某時以來」的語意。","translation":"自從他抵達印尼以來，風險分析師黎海東一直在評估雅加達中產階級的消費情況。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_113_162","book":6,"part":5,"qNum":113,"stem":"Robert Lum is one of the most _______ leaders in the import-export business.","options":["A) persuasive","B) persuade","C) persuasively","D) persuades"],"answer":"A","explanation":"【文法解析】此題考驗形容詞的用法。空格前有最高級修飾語 'most'，後有複數名詞 'leaders'，因此需要一個形容詞來修飾名詞，形成『most + 形容詞 + 名詞』的最高級結構。選項 A) persuasive 是形容詞，意為「有說服力的」，符合語法，能修飾 'leaders'。選項 B) persuade 是動詞原形，選項 D) persuades 是動詞第三人稱單數現在式，兩者皆不能直接修飾名詞。選項 C) persuasively 是副詞，用來修飾動詞、形容詞或其他副詞，而非名詞。因此，只有 A) persuasive 是正確答案，表示 Robert Lum 是進出口貿易中最有說服力的領導者之一。","translation":"Robert Lum 是進出口貿易中最有說服力的領導者之一。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_114_163","book":6,"part":5,"qNum":114,"stem":"Compared with other dairy products, yogurt has remained _______ inexpensive.","options":["A) thoroughly","B) relatively","C) early","D) minimally"],"answer":"B","explanation":"本題考查副詞的語義搭配。句首的「Compared with other dairy products」（與其他乳製品相比）明確指出這是一個比較句。選項B) `relatively` 意為「相對地」，完美契合句子的比較語境，表示優格相較於其他乳製品仍然保持著相對便宜的價格。選項A) `thoroughly` 意為「徹底地、完全地」，強調程度，但與比較語境不符。選項C) `early` 意為「早地」，指時間，語意不通。選項D) `minimally` 意為「最低限度地、極小地」，表示程度很低，若說「最低限度地便宜」語意上不如「相對便宜」來得自然且符合比較情境。因此，`relatively` 是唯一能正確表達「相較之下」概念的選項。","translation":"與其他乳製品相比，優格仍然保持著相對便宜的價格。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_115_164","book":6,"part":5,"qNum":115,"stem":"Please place all orders for new office furniture _______ February 17.","options":["A) despite","B) before","C) inside","D) when"],"answer":"B","explanation":"【文法解析】本題考查介系詞的選擇，句子的語境是要求在某個日期之前完成下訂單的動作。選項B) \"before\" 意為「在…之前」，用來表示時間上的截止期限，與「February 17」（2月17日）搭配，表示必須在2月17日之前下訂單，語意最為恰當。選項A) \"despite\" 意為「儘管」，表示讓步或對比，不符合句意。選項C) \"inside\" 意為「在…裡面」，通常指空間或在某段時間內，但用於特定日期前完成某事，\"before\" 或 \"by\" 更為自然。選項D) \"when\" 是連接詞，引導時間子句，不能直接接日期名詞，因此不適用。","translation":"請在2月17日之前下訂所有新辦公家具的訂單。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_116_165","book":6,"part":5,"qNum":116,"stem":"The Ott Institute designs successful training videos, but the process _______ to take longer than expected.","options":["A) finds","B) shows","C) works","D) tends"],"answer":"D","explanation":"「tends to do sth.」是常見的片語，意指「傾向於、往往會」，用來描述某事物具有某種趨勢或特性。在此句中，表示「這個過程往往會比預期花費更長的時間」，語意通順且符合文法。選項A) finds to...、B) shows to... 和 C) works to... 在此語境下皆不符合慣用搭配。A) finds 通常接名詞或that子句，如 \"finds it difficult to...\"。B) shows 通常接名詞或that子句，如 \"shows that it takes longer...\"。C) works to... 通常表示「努力去做某事」，主詞應為人或組織，而非「過程」本身。因此，D) tends 是唯一正確的選項。","translation":"奧特學院設計出成功的培訓影片，但這個過程往往會比預期花費更長的時間。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_117_166","book":6,"part":5,"qNum":117,"stem":"Two candidates were recently interviewed for the marketing position, and _______ were impressive.","options":["A) some","B) both","C) any","D) either"],"answer":"B","explanation":"【文法解析】本題考查代名詞的選擇。句子的開頭提到「Two candidates」（兩位應徵者），明確指出人數是「兩位」。後面的子句「_______ were impressive」中的動詞「were」是複數，表示主詞也應是複數，且能指代這兩位應徵者。選項B)「both」專門用來指代「兩者都」，完美符合「Two candidates」這個前提，表示兩位應徵者都令人印象深刻。選項A)「some」指「一些」，通常用於數量不確定或部分的情況，不適用於明確指代「全部兩位」。選項C)「any」通常用於否定句、疑問句或條件句中，表示「任何一個」，不符合本句的肯定語氣。選項D)「either」指「兩者之一」，通常搭配單數動詞，且語意上不符「兩者都令人印象深刻」的語境。","translation":"最近有兩位應徵者接受了行銷職位的面試，而兩位都令人印象深刻。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_118_167","book":6,"part":5,"qNum":118,"stem":"If Mr. Itoh is unable to attend the conference in Brasília, then Ms. Gruber will speak in his _______.","options":["A) place","B) purpose","C) concern","D) permission"],"answer":"A","explanation":"正確答案A) place。片語「in one's place」是常見的慣用語，意指「代替某人」或「取代某人的位置」，與題目中Ms. Gruber代替Mr. Itoh發言的情境完全吻合。選項B) purpose、C) concern、D) permission 在此句中皆不符合語意，也無法構成表達「代替」的慣用片語。例如，「in his purpose」或「in his concern」都不是標準用法，而「in his permission」在文法上亦不正確，無法表達替代之意。","translation":"如果伊藤先生無法出席在巴西利亞舉行的會議，那麼格魯伯女士將會代替他發言。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_119_168","book":6,"part":5,"qNum":119,"stem":"We have simplified the bill-paying feature on our secure Web site _______ convenience.","options":["A) above all","B) with some","C) for your","D) by its"],"answer":"C","explanation":"此題考驗介系詞片語的用法。空格後接名詞「convenience」（便利性），句子的語意是「我們簡化了帳單支付功能，是為了提供便利」。\n\n選項 C)「for your」是正確答案。「for your convenience」是一個非常常見且道地的片語，表示「為了您的便利」或「讓您更方便」，完美符合句子的目的性語境。\n\n選項 A)「above all」是一個副詞片語，意為「最重要的是」，通常修飾句子或動詞，不能直接接名詞來表達目的。\n\n選項 B)「with some」中的「with」表示「伴隨」或「擁有」，「with some convenience」語意不符，無法表達簡化的目的。\n\n選項 D)「by its」中的「by」通常表示「透過…方式」或「由…造成」，「by its convenience」無法表達「為了提供便利」的意圖。","translation":"我們已簡化了我們安全網站上的帳單支付功能，以提供您的便利。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_120_169","book":6,"part":5,"qNum":120,"stem":"The rebate offered by Genton Vitamins will expire _______ six months.","options":["A) among","B) within","C) except","D) besides"],"answer":"B","explanation":"【文法解析】正確答案為B) within。此處需要一個介系詞來表示「在某段時間內」或「不超過某段時間」的語意，以說明折扣的有效期限。Within (在…之內) 完美符合此情境，表示折扣將在六個月結束前到期。A) among (在…之中) 通常用於指一群人或物之間，不適用於時間範圍。C) except (除了) 用於排除某事物，與句意不符。D) besides (除了…之外；此外) 表示附加或排除，也不適用於表達時間限制。因此，B是唯一能正確表達「在六個月內到期」的選項。","translation":"Genton 維他命提供的折扣將在六個月內到期。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_121_170","book":6,"part":5,"qNum":121,"stem":"The results of the test are only as meaningful as the quality of the specimen _______ for analysis.","options":["A) submitted","B) submittal","C) submits","D) submitting"],"answer":"A","explanation":"此題考驗動詞形式修飾名詞的能力。「specimen」（樣本）是被提交的，因此需要一個表示被動語態的動詞形式來修飾它。選項 A) \"submitted\" 是動詞 \"submit\" 的過去分詞，在此作為形容詞修飾名詞 \"specimen\"，意指「被提交的樣本」，語法正確且語意通順。選項 B) \"submittal\" 是名詞，不能直接修飾名詞。選項 C) \"submits\" 是動詞現在式，表示主動提交，與語意不符。選項 D) \"submitting\" 是現在分詞，表示主動進行，與語意不符。","translation":"測試結果的意義，僅取決於用於分析的樣本品質。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_122_171","book":6,"part":5,"qNum":122,"stem":"Ms. Nguyen is assigned to oversee _______ television advertising campaigns.","options":["A) indefinite","B) deliberate","C) compound","D) multiple"],"answer":"D","explanation":"正確答案為 D) multiple。「multiple」意為「多個的、多重的」，用來修飾複數名詞「television advertising campaigns」（電視廣告活動）最為恰當，表示阮女士被指派監督「多個」電視廣告活動，符合語境。A) 「indefinite」意為「不確定的、無限期的」，雖然廣告活動的數量可能不確定，但此處更強調她負責的數量是「多於一個」，而非其不確定性。B) 「deliberate」意為「故意的、深思熟慮的」，通常用來形容行為或決策，不適用於描述廣告活動的數量。C) 「compound」意為「複合的、合成的」，指由多個部分組成，不符合此處表達「數量」的語境。因此，D是唯一能精確表達句意的選項。","translation":"阮女士被指派監督多個電視廣告活動。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_123_172","book":6,"part":5,"qNum":123,"stem":"Sales from the Plainlee Organics juice line _______ for less than 25 percent of the company's total revenue.","options":["A) account","B) accounts","C) accounting","D) accountant"],"answer":"A","explanation":"【文法解析】\n本題考查主謂一致和詞性。\n1.  **正確答案 A) account：** 句子主詞為「Sales from the Plainlee Organics juice line」，其中核心主詞是複數名詞「Sales」。因此，動詞必須使用原形動詞「account」來與複數主詞保持一致（主謂一致）。「account for」是一個常見的動詞片語，意為「佔（某個比例或數量）」，在此句中表示「佔據」某個比例，語意完全符合。\n2.  **錯誤選項 B) accounts：** 這是第三人稱單數動詞形式，應用於單數主詞（例如「He accounts」），不符合本句的複數主詞「Sales」。\n3.  **錯誤選項 C) accounting：** 這是動名詞或現在分詞，不能單獨作為句子的主要動詞，除非前面有助動詞（例如「are accounting」）。\n4.  **錯誤選項 D) accountant：** 這是一個名詞，意為「會計師」，不能作為句子的動詞。","translation":"Plainlee Organics 果汁系列的銷售額佔公司總收入的不到25%。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_124_173","book":6,"part":5,"qNum":124,"stem":"Since Alfonso Bastian is such a great _______ to the company, he was promoted to division manager.","options":["A) asset","B) order","C) application","D) opportunity"],"answer":"A","explanation":"正確答案為 (A) asset。句意為「由於 Alfonso Bastian 對公司而言是個極大的資產，他被晉升為部門經理。」(A) asset 指「資產、寶貴的人或物」，符合句中「對公司有極大價值」的語境，表示他對公司貢獻良多，因此獲得晉升。\n(B) order 指「命令、順序、秩序」，「一個極大的秩序」不符合語意，無法解釋晉升的原因。\n(C) application 指「申請、應用」，「一個極大的申請」在此處不合理，不能形容一個人對公司的價值。\n(D) opportunity 指「機會」，雖然機會是正面的，但「Alfonso Bastian 是公司的一個極大機會」語意不通順，無法表達他個人對公司的貢獻或價值，進而導致晉升。故 (A) asset 是最恰當的選擇。","translation":"由於 Alfonso Bastian 對公司而言是個極大的資產，他被晉升為部門經理。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_125_174","book":6,"part":5,"qNum":125,"stem":"The city _______ that all buildings pass an inspection does not apply to historic landmarks.","options":["A) require","B) requires","C) required","D) requirement"],"answer":"D","explanation":"【文法解析】此題考驗句子的主詞結構。句子的主要動詞是「does not apply」（不適用），因此在空格處到「inspection」為止的部分必須構成一個單一的主詞。選項A、B、C皆為動詞形式。若填入動詞，則「The city [動詞] that all buildings pass an inspection」會形成一個完整的子句，無法作為另一個動詞「does not apply」的主詞，會造成句子有兩個主要動詞而缺乏連接詞的錯誤。選項D「requirement」是名詞，填入後形成「The city requirement that all buildings pass an inspection」，其中「requirement」是核心名詞，由「The city」修飾，後接的「that」子句則說明了這個「要求」的具體內容。整個名詞片語作為句子的主詞，使句子結構完整且語意清晰，故D為正確答案。","translation":"城市要求所有建築物通過檢查的規定不適用於歷史地標。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_126_175","book":6,"part":5,"qNum":126,"stem":"To keep an independent contracting license, Ms. Ato must _______ the correct paperwork annually.","options":["A) file","B) conduct","C) announce","D) transform"],"answer":"A","explanation":"正確答案為 (A) file。「file paperwork」是常見的搭配詞，意指「提交文件或文書」，符合題目中為了維持執照而每年必須提交正確文件的語境。(B) conduct (執行、進行) 通常用於活動、研究或會議，例如 \"conduct a survey\" (進行調查)，不適用於文件。(C) announce (宣布) 意指公開聲明，例如 \"announce a decision\" (宣布決定)，與提交文件無關。(D) transform (轉變、改變) 意指徹底改變某物，例如 \"transform a company\" (改造公司)，在此語境中不合邏輯。因此，(A) file 是唯一符合文意和詞語搭配的選項。","translation":"為了維持獨立承包商執照，Ato女士必須每年提交正確的文件。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_127_176","book":6,"part":5,"qNum":127,"stem":"The price quoted by the movers is only an _______ cost and is subject to change.","options":["A) approximately","B) approximate","C) approximating","D) approximation"],"answer":"B","explanation":"正確答案是 B) approximate。此題考驗詞性辨析。句中「an _______ cost」需要一個形容詞來修飾名詞「cost」。\nA) approximately 是副詞，修飾動詞、形容詞或副詞，不能直接修飾名詞。\nB) approximate 是形容詞，意為「大約的、估計的」，符合語意「報價僅為估計成本，可能會變動」。\nC) approximating 是動詞的現在分詞形式，在此句中不適合作為形容詞修飾「cost」，因為它會暗示「成本正在進行估計」的動作，語意不通。\nD) approximation 是名詞，意為「估計值、近似值」。若要使用名詞，句子結構會不同，例如「The price is only an approximation.」或「The price is an approximation of the cost.」。因此，修飾「cost」需用形容詞。","translation":"搬家公司報的價格僅為預估成本，可能會有所變動。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_128_177","book":6,"part":5,"qNum":128,"stem":"Through the years, Ontario Housewares has _______ its commitment to sell only the highest-quality kitchen appliances.","options":["A) linked","B) relieved","C) honored","D) attracted"],"answer":"C","explanation":"正確答案是 C) honored。「honor one's commitment」是常見的搭配詞，意指「履行承諾」或「信守承諾」。句中提到 Ontario Housewares 多年來「信守」其只銷售最高品質廚具的承諾，語意完全符合。A) linked (連結)：通常指將兩事物連結，不適用於「承諾」。B) relieved (減輕、解除)：指減輕負擔或解除責任，與「信守承諾」的語意相反。D) attracted (吸引)：通常指吸引人、注意力或投資，不適用於「承諾」。因此，C) honored 是唯一能使句意通順且符合語法的選項。","translation":"多年來，Ontario Housewares 一直信守其只銷售最高品質廚房電器的承諾。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_129_178","book":6,"part":5,"qNum":129,"stem":"Mr. Mehretu will discuss the _______ of the new payroll policy at the company meeting tomorrow.","options":["A) specifics","B) specifically","C) specifies","D) specific"],"answer":"A","explanation":"本題考查詞性。句中「the _______ of」的結構，明確指出空格應填入一個名詞。選項A) specifics 是複數名詞，意指「具體細節、詳情」，符合句意「討論新薪資政策的具體細節」。選項B) specifically 是副詞，修飾動詞、形容詞或副詞，不適合填入此處。選項C) specifies 是動詞，意指「具體說明」，不符合「the + 名詞 + of」的結構。選項D) specific 是形容詞，意指「具體的」，若要使用需搭配名詞，例如「the specific details」，單獨使用不符文法。因此，A) specifics 是唯一正確答案。","translation":"梅雷圖先生將在明天的公司會議上討論新薪資政策的具體細節。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og6_p5_130_179","book":6,"part":5,"qNum":130,"stem":"The contract must be signed _______ the opening of formal discussions.","options":["A) in order to","B) prior to","C) except for","D) on top of"],"answer":"B","explanation":"【文法解析】本題考查介系詞片語的用法。句子的語境是合約必須在「正式討論開始」這個時間點「之前」簽署。\n\n選項 B) prior to 是一個介系詞片語，意為「在…之前」，後面接名詞或動名詞，完全符合句子的時間邏輯和文法結構，表示簽署動作發生在討論開始之前，因此是正確答案。\n\n選項 A) in order to 意為「為了…」，後面必須接原形動詞，表示目的，不符合本句後接名詞片語「the opening」的文法結構，語意也不符。\n\n選項 C) except for 意為「除了…之外」，表示排除或例外，語意與本句不符。\n\n選項 D) on top of 意為「在…之上」或「除了…之外（還有）」，表示位置或附加，語意與本句不符。","translation":"這份合約必須在正式討論開始之前簽署。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_101_180","book":7,"part":5,"qNum":101,"stem":"Visit our travel section for _______ information about local hotel discounts.","options":["A) helps","B) helpfully","C) helpful","D) helped"],"answer":"C","explanation":"此題考驗詞性判斷。空格後為名詞「information」（資訊），因此空格處需要一個形容詞來修飾它，說明資訊的性質。\nA) 「helps」是動詞（第三人稱單數現在式）或名詞（幫助），詞性不符，無法修飾名詞。\nB) 「helpfully」是副詞，用來修飾動詞、形容詞或其他副詞，不能直接修飾名詞。\nC) 「helpful」是形容詞，意為「有幫助的、有用的」，修飾「information」形成「有用的資訊」，語意通順且符合文法。\nD) 「helped」是動詞的過去式或過去分詞。雖然過去分詞有時可作形容詞，但「helped information」語意不通，資訊本身不會被「幫助」，而是「提供幫助」。因此，C為正確答案。","translation":"請造訪我們的旅遊專區，以獲取關於當地飯店折扣的有用資訊。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_102_181","book":7,"part":5,"qNum":102,"stem":"Ms. Linde congratulated her team for _______ work on the Glenovas campaign.","options":["A) they","B) theirs","C) their","D) those"],"answer":"C","explanation":"此題考驗所有格形容詞的用法。空格後方是名詞「work」，表示需要一個所有格形容詞來修飾它，指出「誰的工作」。選項 (C) \"their\" 是所有格形容詞，意為「他們/牠們的」，能正確修飾名詞 \"work\"，形成「他們的工作」。選項 (A) \"they\" 是主格代名詞，不能修飾名詞。選項 (B) \"theirs\" 是所有格代名詞，表示「他們/牠們的東西」，通常獨立使用，不能放在名詞前修飾。選項 (D) \"those\" 是指示形容詞或指示代名詞，意為「那些」，不具備所有格的意義，且在此語境下無法正確修飾 \"work\"。因此，(C) 是唯一正確答案。","translation":"林德女士祝賀她的團隊在Glenovas活動中的出色表現。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_103_182","book":7,"part":5,"qNum":103,"stem":"Pedro's Printing was started as a family business 32 years ______ .","options":["A) last","B) ago","C) along","D) former"],"answer":"B","explanation":"【文法解析】\n正確答案是B) ago。「ago」用於表示從現在算起，某事件發生在過去多久之前，其結構通常是「數字 + 時間單位 + ago」。題目中的「32 years ago」意指「32年前」，精確地指出事件發生的時間點。\nA) last：通常與時間單位連用，如「last year (去年)」、「last week (上週)」，但不能直接接在「數字 + 時間單位」之後來表示「多久以前」。\nC) along：作為介系詞或副詞，表示「沿著」或「一起」，與時間點的表達無關。\nD) former：是形容詞，意為「以前的」、「前任的」，用來修飾名詞，而非表示時間長度，例如「the former president (前總統)」。","translation":"Pedro's Printing 這家印刷公司是32年______前以家族企業的形式創立的。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_104_183","book":7,"part":5,"qNum":104,"stem":"Applicants for our technical writing position should include a brief writing ______ .","options":["A) style","B) procedure","C) sample","D) approach"],"answer":"C","explanation":"正確答案是 (C) sample。「writing sample」是一個常見的固定搭配，意指「寫作範例」或「作品集」，通常用於求職申請中，讓雇主評估申請者的寫作能力。題目要求申請者「include (附上)」一份簡短的寫作______，因此「寫作範例」最符合語境，是申請技術寫作職位時展現能力的必要文件。\n\n(A) style (風格)：「writing style」指寫作風格，是一種抽象概念，無法作為獨立文件「附上」。風格是透過寫作內容呈現的。\n(B) procedure (程序)：「writing procedure」指寫作步驟或流程，與展示寫作能力無關，也不是求職時會提交的文件。\n(D) approach (方法)：「writing approach」指寫作方法或途徑，與 procedure 類似，同樣不適合作為「附上」的文件。\n因此，只有 (C) sample 能完整且合理地填入句中。","translation":"我們技術寫作職位的申請者應附上一份簡短的寫作範例。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_105_184","book":7,"part":5,"qNum":105,"stem":"Doctors state that it is important to drink water _______ the day.","options":["A) after","B) toward","C) around","D) throughout"],"answer":"D","explanation":"正確答案是 D) throughout。「throughout the day」表示「一整天、在一天當中持續地」，完美表達了醫生建議在一天中的所有時間都應飲水的概念。這個片語強調了動作的持續性或遍及整個時間段，符合健康建議應持續進行的語境。\nA) after 表示「在…之後」，「after the day」語意不通，通常指「一天結束後」。\nB) toward 表示「朝向、接近」，「toward the day」不符合在一天中飲水的語境，通常會說「toward the end of the day」。\nC) around 表示「大約、在…周圍」，「around the day」雖然可能勉強理解為「在一天中的不同時間點」，但不如「throughout the day」精確地表達了「持續一整天」或「遍及整天」的含義，後者更符合健康建議的語氣。因此，D是最佳選擇。","translation":"醫生表示，一整天飲用足夠的水很重要。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_106_185","book":7,"part":5,"qNum":106,"stem":"For senior-level positions, Trimdeco Limited prefers _______ staff from within rather than externally.","options":["A) to be recruited","B) to recruit","C) recruit","D) recruits"],"answer":"B","explanation":"【不定詞用法】prefers 後接不定詞 to V。主詞 Trimdeco Limited（公司）是主動招募員工的一方，故用主動式 to recruit（招募）。A) to be recruited 為被動式，表示公司被招募，語意錯誤。C) recruit 缺少 to、D) recruits 為第三人稱單數動詞，均不符合，故選B。","translation":"對於高階職位，Trimdeco 有限公司傾向於從內部晉升員工，而非向外招募。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_107_186","book":7,"part":5,"qNum":107,"stem":"It is recommended to charge the drill's battery fully _______ using it for the first time.","options":["A) except","B) before","C) within","D) against"],"answer":"B","explanation":"本題考查介系詞的語義和用法。句子表達的是「建議在第一次使用電鑽前，將電池充滿電」。選項B) \"before\" 意為「在…之前」，完美符合語境，表示充電這個動作應發生在第一次使用之前，建立了一個清晰的時間順序。選項A) \"except\" 意為「除了…之外」，若選A則變成「除了使用之外都建議充電」，語意不通。選項C) \"within\" 意為「在…之內」，通常指時間範圍或空間範圍，不適用於此處的動作順序。選項D) \"against\" 意為「反對」或「對抗」，與句意完全不符。因此，\"before\" 是唯一能正確表達「先充電再使用」邏輯關係的選項。","translation":"建議在第一次使用電鑽前，將其電池完全充滿電。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_108_187","book":7,"part":5,"qNum":108,"stem":"Mr. Takahashi was recognized for his _______ achievement in quality control this past year.","options":["A) outstanding","B) interested","C) accepting","D) ready"],"answer":"A","explanation":"正確答案為 (A) outstanding。句子中「Mr. Takahashi was recognized for his _______ achievement」表示高橋先生因其某種成就而受到表揚。此處需要一個能形容「成就」且帶有正面意義的形容詞。(A) outstanding 意為「傑出的、卓越的」，完美符合語境，表示他的成就非常出色，值得肯定。 (B) interested 意為「感興趣的」，通常用來形容人，而非成就本身，語意不通。(C) accepting 意為「接受的、包容的」，與「成就」搭配時語意不符，無法表達成就的品質。(D) ready 意為「準備好的」，用來形容「成就」不恰當，成就通常是已完成的結果，而非「準備好的」。因此，從語意和搭配來看，(A) outstanding 是唯一正確且最符合上下文語境的選項。","translation":"高橋先生因其去年在品質管制方面傑出的成就而受到表揚。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_109_188","book":7,"part":5,"qNum":109,"stem":"Since Jakan Technology ended production of microprocessors, its customers have searched for _______ alternatives.","options":["A) suited","B) suitable","C) suitably","D) suits"],"answer":"B","explanation":"【文法解析】\n題目中，空格後方是名詞「alternatives」（替代方案）。修飾名詞需要使用形容詞。選項B「suitable」是形容詞，意為「合適的、適當的」，用來形容「alternatives」非常貼切，表示客戶正在尋找「合適的替代方案」。因此，B是正確答案。\n選項A「suited」是動詞過去分詞，雖然可作形容詞，但通常用於「be suited for/to...」或「well-suited」等結構，直接修飾名詞時不如「suitable」自然。\n選項C「suitably」是副詞，修飾動詞、形容詞或副詞，不能直接修飾名詞。\n選項D「suits」是動詞（適合）或名詞（西裝），語法上無法修飾名詞「alternatives」。","translation":"自從Jakan科技公司停止生產微處理器以來，其客戶一直在尋找合適的替代方案。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_110_189","book":7,"part":5,"qNum":110,"stem":"See page 30 of the manual _______ a comparison of the recommended wood stains.","options":["A) for","B) off","C) by","D) at"],"answer":"A","explanation":"正確答案為 A) for。「for」在此表示目的或用途，意指「為了」或「以取得」。句子的意思是「請參閱手冊第30頁，以取得推薦木材染色的比較資訊」。其他選項：B) off 表示分離或離開；C) by 表示方式、手段或鄰近；D) at 表示位置或時間點。這些選項在語意上皆不符合句子的目的性語境。","translation":"請參閱手冊第30頁，以比較推薦的木材染色劑。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_111_190","book":7,"part":5,"qNum":111,"stem":"Diners seeking a quick and _______ lunch should find Kimchi Quick a delicious option.","options":["A) economist","B) economical","C) economics","D) economize"],"answer":"B","explanation":"這個題目主要考驗詞性辨識。句中「a quick and _______ lunch」的結構顯示，空格處需要一個形容詞來修飾名詞「lunch」，並與前面的形容詞「quick」形成並列關係。選項A「economist」是名詞，指「經濟學家」，不符。選項C「economics」是名詞，指「經濟學」，不符。選項D「economize」是動詞，意為「節省、節約」，不符。只有選項B「economical」是形容詞，意為「經濟實惠的、節省的」，能與「quick」一同修飾「lunch」，表示「快速又經濟實惠的午餐」。因此，B是正確答案，使句子語意完整且文法正確。","translation":"尋求快速又經濟實惠午餐的顧客，會發現Kimchi Quick是個美味的選擇。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_112_191","book":7,"part":5,"qNum":112,"stem":"The editors of Computer Roundup _______ recognized Fallway Computers for having the best customer service in the area.","options":["A) lightly","B) closely","C) recently","D) moderately"],"answer":"C","explanation":"【文法解析】本題考查副詞的語義搭配。句子的主幹是「編輯們_______表彰了Fallway電腦公司」，空格處需要一個副詞來修飾動詞「recognized」（表彰、認可）。\n\n選項 (C) recently（最近地）表示時間，與「表彰」這個動作搭配非常自然，說明表彰事件發生的時間點，符合語境。例如：「最近表彰了某公司」。\n\n選項 (A) lightly（輕微地、輕率地）表示程度或方式，與「表彰最佳客戶服務」這種正式且重要的認可不符。\n\n選項 (B) closely（密切地、仔細地）通常修飾觀察、檢查等動詞，如「closely observe/examine」，不常用於修飾「recognized」這種表示授予或承認的動詞。\n\n選項 (D) moderately（適度地、中等地）表示程度，與「表彰最佳服務」這種明確的最高榮譽不符，因為「最佳」本身就不是「適度」的。\n\n因此，(C) recently 是唯一語義上最恰當的選項。","translation":"《電腦綜覽》的編輯們最近表彰了Fallway電腦公司，因為他們擁有該地區最佳的客戶服務。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_113_192","book":7,"part":5,"qNum":113,"stem":"When the customer complained about the cold soup, the server _______ and offered to bring a new bowl.","options":["A) behaved","B) asserted","C) apologized","D) excused"],"answer":"C","explanation":"正確答案為 (C) apologized。句中描述顧客抱怨湯是冷的，而服務生「_______」並主動提供一碗新的湯。根據上下文，當顧客提出抱怨時，服務生最恰當的反應是「道歉」(apologized)，然後提供解決方案。這符合服務業處理顧客不滿的標準流程。\n(A) behaved (行為舉止) 語意過於籠統，無法表達服務生處理抱怨的具體動作。\n(B) asserted (堅稱、主張) 指的是堅定地聲明某事，不適用於服務生回應顧客抱怨的情境。\n(D) excused (原諒、為...找藉口) 若指服務生為湯冷找藉口，則與後續提供新湯的積極處理方式不符；若指被原諒，則語意不通。因此，(C) apologized 最符合語境，表達服務生對顧客不滿的適當回應。","translation":"當顧客抱怨湯是冷的時，服務生道了歉並主動提供一碗新的湯。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_114_193","book":7,"part":5,"qNum":114,"stem":"______ the month of September, all online donations will be matched by an anonymous donor.","options":["A) When","B) During","C) While","D) Once"],"answer":"B","explanation":"正確答案是 B) During。\n\n\"During\" 是一個介系詞，表示在某段時間「期間」或「之中」。題目中 \"the month of September\" 是一個表示時間長度的名詞片語，因此需要一個介系詞來引導，說明捐款配對活動將在九月這個月份「期間」進行，語意和文法皆符合。\n\nA) \"When\" 和 C) \"While\" 都是從屬連接詞，通常引導一個子句（包含主詞和動詞），而非直接接名詞片語。雖然 \"when\" 有時可作介系詞，但在此語境中不適用於表示「整個期間」。\nD) \"Once\" 是一個從屬連接詞，表示「一旦…就…」，或作副詞表示「一次」，語意不符且文法結構不對。\n\n因此，只有 \"During\" 能正確地引導時間名詞片語，表達事件發生的時間範圍。","translation":"在九月這個月期間，所有線上捐款都將由一位匿名捐助者進行等額捐贈。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_115_194","book":7,"part":5,"qNum":115,"stem":"Martin Slyeptsov is an _______ guitarist, having won several national awards for his many albums.","options":["A) accomplished","B) efficient","C) unqualified","D) arranged"],"answer":"A","explanation":"正確答案是 A) accomplished。句中提到 Martin Slyeptsov 贏得了「數個全國性獎項」，這表示他是一位技藝高超且成就非凡的吉他手。「accomplished」意指「技藝精湛的；有成就的」，完美符合語境。B) efficient（有效率的）描述的是工作方式，而非成就或技術水平，不符語境。C) unqualified（不合格的）與獲得獎項的語境完全相反。D) arranged（安排好的）則不適用於描述吉他手的特質。因此，A 是最恰當的選項。","translation":"馬丁·斯列普佐夫是一位_______的吉他手，他的多張專輯贏得了數個全國性獎項。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_116_195","book":7,"part":5,"qNum":116,"stem":"Many internal staff have expressed interest in the position, but _______ have the required experience.","options":["A) any","B) few","C) each","D) many"],"answer":"B","explanation":"【文法解析】本題考查連接詞「but」所引導的轉折語氣。前半句提到「許多內部員工表達了興趣」，而「but」表示語氣轉折，暗示後半句的內容與前半句形成對比或限制。選項B)「few」意為「很少、沒幾個」，表示數量稀少，與前半句的「many」形成鮮明對比，即「很多人有興趣，但只有很少人具備所需經驗」，語意通順。選項A)「any」通常用於疑問句、否定句或條件句，不適用於此肯定句語境。選項C)「each」意為「每個」，後接單數動詞，但題目動詞為「have」（複數），故不符文法。選項D)「many」與前半句的「many」語意重複，無法形成轉折，使「but」失去意義。","translation":"許多內部員工都對這個職位表達了興趣，但很少人具備所需的經驗。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_117_196","book":7,"part":5,"qNum":117,"stem":"______ many of the attendees were late because of traffic, the president's presentation began on time.","options":["A) As soon as","B) So that","C) Rather than","D) Although"],"answer":"D","explanation":"正確答案是 D) Although。「Although」是一個從屬連接詞，用來引導一個讓步子句，表示「儘管、雖然」，其後接一個完整的子句，用來表達與主要子句相反或出乎意料的情況。本句中，儘管許多與會者因交通堵塞而遲到，但總統的演講仍準時開始，兩者形成對比，故選「Although」最符合語意。\nA) As soon as 表示「一...就...」，強調時間的緊密性。\nB) So that 表示「為了...；以便...」，強調目的或結果。\nC) Rather than 表示「而不是」，強調選擇或替代。\n這三個選項的語義皆不符合題目中「遲到」與「準時開始」之間的讓步關係。","translation":"儘管許多與會者因交通堵塞而遲到，總統的演講仍準時開始。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_118_197","book":7,"part":5,"qNum":118,"stem":"Over the next three years, Lang Biotech _______ to acquire an additional manufacturing site.","options":["A) to plan","B) planning","C) having planned","D) plans"],"answer":"D","explanation":"【文法解析】本題考查主詞與動詞的一致性以及動詞形式的選擇。「Lang Biotech」是單數主詞，因此需要搭配單數動詞形式。選項 D) 「plans」是動詞「plan」的第三人稱單數現在式，符合主詞「Lang Biotech」的單數形式，且「plan to do something」是常見的片語，表示「計畫做某事」，語意通順。選項 A) 「to plan」是不定詞，不能作為句子的主要動詞。選項 B) 「planning」是現在分詞，若要作為主要動詞，需搭配助動詞形成進行式（例如：is planning）。選項 C) 「having planned」是完成分詞，不能作為主要動詞，且語意上不符，因為這是未來三年的計畫，而非已完成的動作。因此，D) 是唯一正確且符合語法的選項。","translation":"在接下來的三年裡，Lang Biotech 計劃收購一個額外的生產基地。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_119_198","book":7,"part":5,"qNum":119,"stem":"To be considered for the position, applicants must submit a résumé _______ a list of references.","options":["A) even if","B) along with","C) whereas","D) consequently"],"answer":"B","explanation":"正確答案是 (B) along with，意為「連同；以及」，表示除了履歷之外，還需要提交推薦人名單。這符合題目中要求申請者提交兩項文件的語境，語意上最為恰當，表示兩者皆為必要提交項目。\n(A) even if 意為「即使」，引導讓步子句，表示「即使有推薦人名單，也要提交履歷」，語意不通順。\n(C) whereas 意為「然而；卻是」，用於對比兩個事物，但此處並非對比，而是並列關係，故不適用。\n(D) consequently 意為「因此；結果」，表示因果關係，但履歷和推薦人名單之間沒有因果關係，而是並列的提交要求。因此，(B) 是唯一能正確表達「同時提交」概念的選項。","translation":"為了獲得該職位，申請者必須提交一份履歷，連同一份推薦人名單。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_120_199","book":7,"part":5,"qNum":120,"stem":"Reza Realty will provide a full _______ of the commercial properties for sale in Delta City.","options":["A) analyzed","B) analytics","C) analysis","D) analyst"],"answer":"C","explanation":"本題考驗詞性判斷。句中「a full _______」的結構，顯示「full」作為形容詞，其後應接一個名詞。選項 A) analyzed 是動詞的過去式或過去分詞，不符合名詞的需求。選項 D) analyst 意指「分析師」，指人，語意上不符句子的需求，因為公司提供的是「分析」而非「分析師」。選項 B) analytics 雖然是名詞，通常指「分析學」或「分析方法」，且常用於數據分析領域，在此語境中「a full analytics」搭配不自然，不如「a full analysis」常用來指一份完整的報告或檢視。選項 C) analysis 是單數名詞，意指「分析、解析」，與「a full」搭配形成「一份完整的分析」，語意和文法皆最為恰當，表示 Reza Realty 將提供一份關於商業物業的完整分析報告。","translation":"Reza Realty 將提供一份關於 Delta City 待售商業物業的完整分析報告。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_121_200","book":7,"part":5,"qNum":121,"stem":"The main speaker, Ms. Kelli Sun, _______ to conclude her speech at 8:00 P.M. tonight.","options":["A) expect","B) expecting","C) to expect","D) is expected"],"answer":"D","explanation":"【文法解析】\n正確答案 D) is expected 採用了被動語態 (be + past participle)。此句的主詞 \"Ms. Kelli Sun\" 是「被預期」要完成某事，而非主動「預期」某事。常見的被動結構為 \"Subject + be + expected + to + V\"，表示主詞被期待做某事，符合句意與語法。\nA) expect 錯誤，因為主詞 \"Ms. Kelli Sun\" 是單數，動詞應使用第三人稱單數形式 \"expects\"。\nB) expecting 錯誤，分詞不能單獨作為句子的主要動詞，需要助動詞 (例如：is expecting)。\nC) to expect 錯誤，不定詞不能作為句子的主要動詞。","translation":"主要發言人凱莉·孫女士預計今晚八點結束她的演講。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_122_201","book":7,"part":5,"qNum":122,"stem":"There has been a significant _______ in traffic in the center of town since the opening of the David Bridge.","options":["A) reduction","B) admission","C) election","D) placement"],"answer":"A","explanation":"【文法解析】本題考查詞彙的語義和搭配。句子的語境是「大衛橋開通後，市中心的交通量發生了顯著的_______」。\n\nA) reduction (減少、降低)：指數量或程度的下降。一座新橋的開通通常會分流交通，導致市中心的車流量「顯著減少」，這與句意完全吻合。「significant reduction in traffic」是常見且自然的搭配。\n\nB) admission (入場許可；承認)：在此語境下不合邏輯，無法描述交通量的變化。\n\nC) election (選舉)：與交通狀況無關。\n\nD) placement (放置；佈置)：指物品的位置或安排，無法描述交通量的增減。\n\n因此，正確答案為 A) reduction，表示交通量顯著減少。","translation":"自從大衛橋開通以來，市中心的交通量顯著地減少了。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_123_202","book":7,"part":5,"qNum":123,"stem":"Routine maintenance of equipment _______ improves workplace safety and efficiency.","options":["A) measure","B) measurement","C) measurable","D) measurably"],"answer":"D","explanation":"此題考驗詞性辨識。句子的結構為「主詞 (Routine maintenance of equipment) + _______ + 動詞 (improves) + 受詞 (workplace safety and efficiency)」。空格位於動詞 \"improves\" 之前，因此需要一個副詞來修飾動詞，說明「如何」改善。選項 A) measure 是名詞或動詞，B) measurement 是名詞，C) measurable 是形容詞，它們都不能直接修飾動詞。選項 D) measurably 是副詞，意為「可衡量地、顯著地」，用來修飾動詞 \"improves\"，表示「例行設備維護可衡量地改善工作場所安全與效率」。因此，D 是唯一正確的選項。","translation":"設備的例行維護可衡量地改善工作場所的安全與效率。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_124_203","book":7,"part":5,"qNum":124,"stem":"When we get _______ from the Stades Group, we will inform the management team about the schedule change.","options":["A) allowance","B) construction","C) confirmation","D) substance"],"answer":"C","explanation":"正確答案為 (C) confirmation。句子的意思是「當我們從Stades集團收到『確認』後，我們就會通知管理團隊有關行程變更的事宜。」在此語境中，\"get confirmation from...\" (從...獲得確認) 是最合理且符合邏輯的搭配，表示在收到正式確認或核准後才能進行下一步行動。 (A) allowance (津貼；允許) 不符合語意，因為這裡不是指金錢或許可。 (B) construction (建造；結構) 與行程變更無關。 (D) substance (物質；實質) 也不符合語意，因為這裡需要的是一種訊息或批准。因此，(C) confirmation 完美填補了空白，使句子意義完整且流暢。","translation":"當我們從Stades集團收到確認後，我們就會通知管理團隊有關行程變更的事宜。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_125_204","book":7,"part":5,"qNum":125,"stem":"Ms. Singh remembers her days as a sales assistant at Tyron Labs very ______ .","options":["A) fonder","B) fond","C) fondly","D) fondness"],"answer":"C","explanation":"【文法解析】此題考驗詞性辨析。句子的結構為「主詞 + 動詞 + 受詞 + 副詞」。空格前有副詞修飾語「very」，表示程度，因此空格處需要一個副詞來修飾動詞「remembers」（回憶），說明她「如何」回憶那些日子。\n\n選項 C) fondly 是一個副詞，意為「深情地；懷念地」，用來修飾動詞「remembers」非常恰當，表示她非常懷念地回憶。\n\n選項 A) fonder 是形容詞或副詞的比較級，意為「更喜歡的/更深情地」，但「very fonder」是不正確的用法。\n選項 B) fond 是一個形容詞，意為「喜歡的；深情的」，形容詞修飾名詞，不能直接修飾動詞「remembers」。\n選項 D) fondness 是一個名詞，意為「喜愛；鍾愛」，名詞不能用來修飾動詞。\n\n因此，正確答案為 C) fondly，構成「very fondly」，表示「非常懷念地」。","translation":"辛格女士非常懷念她在泰隆實驗室擔任銷售助理的日子。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_126_205","book":7,"part":5,"qNum":126,"stem":"A potential merger with Porter-Renwick Enterprises is currently being _______ by the board of directors.","options":["A) considered","B) supposed","C) reflected","D) assumed"],"answer":"A","explanation":"本題考查動詞詞義辨析。句子採用被動語態結構「is currently being _______ by...」，主語是「A potential merger」（潛在合併案），執行者是「the board of directors」（董事會）。董事會對於合併案的職責是評估、討論並做出決策。\nA) considered (考慮)：最符合語境，董事會正在仔細「考慮」這項合併案。\nB) supposed (假定、認為應該)：通常用於「be supposed to」（應該）或「suppose that」（假設），不適用於董事會處理合併案的語境。\nC) reflected (反映)：意為「顯示、反映」，合併案本身不會被董事會「反映」，而是董事會的決定可能「反映」其立場。\nD) assumed (假設、承擔)：意為「認為理所當然」或「承擔責任」，合併案是重大決策，不會被董事會「假設」或「理所當然地接受」。因此，A是唯一正確選項。","translation":"與Porter-Renwick企業的潛在合併案目前正由董事會考慮中。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_127_206","book":7,"part":5,"qNum":127,"stem":"Tengku Data Security ensures a company's _______ with all established regulations.","options":["A) compliance","B) compliantly","C) complies","D) comply"],"answer":"A","explanation":"本題考查詞性。句子的結構為「Tengku Data Security ensures a company's _______ with all established regulations.」。在「a company's」（所有格）之後，需要一個名詞來作其修飾對象，並作為動詞ensures的受詞。選項A) compliance 是名詞，意為「遵守、符合」，與後面的介系詞片語「with all established regulations」形成「遵守所有既定法規」的完整語意，語法和語義皆正確。選項B) compliantly 是副詞，選項C) complies 是動詞（第三人稱單數現在式），選項D) comply 是動詞原形，這三者皆不能在所有格之後作名詞使用，故皆為錯誤答案。","translation":"Tengku 資料安全確保公司遵守所有既定法規。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_128_207","book":7,"part":5,"qNum":128,"stem":"The respondents to the passenger satisfaction survey are _______ of the total passenger population.","options":["A) creative","B) current","C) intermediate","D) representative"],"answer":"D","explanation":"正確答案是 D) representative。此句意指「乘客滿意度調查的受訪者，應能_______全體乘客人口」。在統計學和市場調查中，受訪者（respondents）必須「有代表性」（representative）才能讓調查結果有效且能推論至整體母體（total population）。片語「representative of」意為「…的代表、有代表性的」。\nA) creative（有創意的）不符合語境，受訪者是否創意與其代表性無關。\nB) current（目前的）雖然受訪者是當前的，但「current of」在此處不構成合理搭配，且無法表達樣本與母體之間的關係。\nC) intermediate（中間的）指程度或階段，與樣本代表性無關。\n因此，D) representative of 是唯一能表達樣本能反映整體母體特徵的正確選項。","translation":"乘客滿意度調查的受訪者，是全體乘客人口的_______。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_129_208","book":7,"part":5,"qNum":129,"stem":"______ the plastic packaging arrives today, we cannot make the delivery on time.","options":["A) Mostly","B) At least","C) No more","D) Unless"],"answer":"D","explanation":"本題考查連接詞的語義和用法。句子的結構為「______ 條件子句, 結果子句」。結果子句「we cannot make the delivery on time」表示「我們無法準時交貨」，是一個負面結果。條件子句「the plastic packaging arrives today」是「塑膠包裝今天到貨」。\n選項 D) Unless 是一個從屬連接詞，意為「除非；如果不」，引導一個條件子句。將 Unless 放入句中，形成「除非塑膠包裝今天到貨，否則我們無法準時交貨」，語義通順，符合邏輯。\n選項 A) Mostly 是副詞，意為「主要地，大部分地」，不能引導條件子句。\n選項 B) At least 是副詞片語，意為「至少」，不能引導條件子句。\n選項 C) No more 是副詞片語，意為「不再」，也不能引導條件子句。\n因此，D是唯一正確答案。","translation":"除非塑膠包裝今天到貨，否則我們無法準時交貨。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og7_p5_130_209","book":7,"part":5,"qNum":130,"stem":"Heper Industry employees are _______ for expenses when using their personal cars for business purposes.","options":["A) reimbursed","B) restored","C) recovered","D) reassigned"],"answer":"A","explanation":"正確答案為 (A) reimbursed。Reimburse 指「報銷、償還（費用）」，符合員工因公務使用私人車輛而獲得費用補償的情境。句子採用被動語態「are reimbursed for expenses」，意指「員工因費用而獲得報銷」，語意完整且自然，是商務英語中常見的表達方式。\n(B) restored 意為「恢復、修復」，通常指恢復原狀或修復物品，不適用於費用。\n(C) recovered 意為「恢復、找回、收回」，雖然 recover expenses 有「收回費用」之意，但在此被動語態中，「員工被收回費用」語意不通，且若指公司收回成本，通常是 \"expenses are recovered\"，而非 \"employees are recovered for expenses\"。\n(D) reassigned 意為「重新分配、調職」，與費用無關，語意完全不符。因此，(A) 是唯一正確且符合語境的選項。","translation":"赫伯工業的員工在因公使用私人車輛時，其費用將獲得報銷。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_101_210","book":8,"part":5,"qNum":101,"stem":"The number of flights to the South Pacific offered by Eastal Air is _______.","options":["A) growing","B) grown","C) growth","D) grow"],"answer":"A","explanation":"本題考驗動詞形式的選擇。句子的主詞是單數的「The number of flights」（航班數量），動詞為「is」，因此後方需要一個能與「is」搭配的詞來描述主詞的狀態或動作。\nA) 「growing」是現在分詞，與「is」結合形成現在進行式「is growing」，表示「正在增加」，語意上指航班數量持續上升，符合語境且文法正確。\nB) 「grown」是過去分詞。若要表達完成式，應為「has grown」；若為被動語態「is grown」，則語意不符，航班數量不會「被成長」。\nC) 「growth」是名詞，不能直接跟在「is」後面作為動詞補語來描述「數量正在增加」的動作。\nD) 「grow」是動詞原形，不能直接跟在「is」後面形成正確的動詞結構。\n因此，正確答案為A。","translation":"Eastal Air 提供飛往南太平洋的航班數量正在增加。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_102_211","book":8,"part":5,"qNum":102,"stem":"Wilsen University has a _______ ranked medical school with state-of-the-art facilities.","options":["A) lightly","B) rapidly","C) highly","D) shortly"],"answer":"C","explanation":"【文法解析】\n正確答案是 C) highly。「highly」是一個副詞，意為「在很大程度上」或「非常」，用來修飾形容詞「ranked」，表示該醫學院排名很高，在學術界享有盛譽。「highly ranked」與句中「state-of-the-art facilities」（最先進的設施）形成語義上的呼應，共同描繪一所頂尖的醫學院。\nA) lightly 意為「輕微地、不嚴重地」，「lightly ranked」表示排名不高或不被重視，與句意不符。\nB) rapidly 意為「迅速地」，描述速度，不適用於形容「排名」的程度。\nD) shortly 意為「不久、很快」，描述時間，與句意不符。\n因此，C) highly 是唯一能正確表達醫學院高排名的選項。","translation":"威爾森大學擁有一所排名很高的醫學院，配備最先進的設施。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_103_212","book":8,"part":5,"qNum":103,"stem":"Rather than asking an assistant for help, Ms. Pham responded to the director's request _______.","options":["A) her","B) herself","C) hers","D) her own"],"answer":"B","explanation":"此題考驗反身代名詞的用法。句子的主語是Ms. Pham，而句首的「Rather than asking an assistant for help」（而不是請助理幫忙）暗示Ms. Pham是親自完成動作。因此，需要一個反身代名詞來強調主語「Ms. Pham」自己執行了「回應總監要求」這個動作。選項B) herself 正是Ms. Pham的反身代名詞，表示「她本人、她自己」，完美符合語意。選項A) her 是受格代名詞，語法不符；選項C) hers 是所有格代名詞，表示「她的東西」，語意不通；選項D) her own 表示「她自己的」，通常用於強調所有權或與名詞連用，此處不適用。","translation":"Ms. Pham沒有請助理幫忙，而是親自回應了總監的要求。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_104_213","book":8,"part":5,"qNum":104,"stem":"Camilla Lowenson _______ all marketing accounts for Akembe Fashion's Paris office.","options":["A) handles","B) trains","C) reflects","D) concerns"],"answer":"A","explanation":"正確答案是 A) handles。句子的主詞是單數名詞 \"Camilla Lowenson\"，因此需要一個第三人稱單數現在式動詞。從語意上來看，\"handle accounts\" 意指「負責處理或管理帳戶」，這與句子中「負責 Akembe Fashion 巴黎辦公室的所有行銷帳戶」的語境完全吻合。選項 B) trains (訓練) 不適用，因為我們不會「訓練帳戶」。選項 C) reflects (反映) 也不合適，因為我們不會「反映帳戶」。選項 D) concerns (關於、涉及) 在此語境下不符合動詞的主動用法，我們不會說「某人涉及帳戶」來表達管理之意。因此，A 是唯一在文法和語意上都正確的選項。","translation":"卡蜜拉·羅文森負責處理 Akembe Fashion 巴黎辦公室的所有行銷帳戶。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_105_214","book":8,"part":5,"qNum":105,"stem":"Mr. Risley credited his team for the _______ of the popular software program.","options":["A) develop","B) developer","C) developed","D) development"],"answer":"D","explanation":"此題考驗對詞性及介系詞片語結構的理解。「for the _______ of...」是關鍵。冠詞「the」後面必須接名詞。A) develop 是動詞原形，不能直接接在「the」之後。B) developer 是名詞，指「開發者」，但語意上，團隊被歸功的是「軟體程式的開發過程」，而非「開發者」本身。如果填 developer，句子會變成「團隊被歸功於軟體程式的開發者」，語意不通。C) developed 是動詞過去式或過去分詞，也不能直接接在「the」之後。D) development 是名詞，指「發展、開發過程」。填入後形成「the development of the popular software program」（熱門軟體程式的開發），語意完整且符合文法，表示團隊因其開發工作而受到讚揚。","translation":"瑞斯利先生將這款熱門軟體程式的開發歸功於他的團隊。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_106_215","book":8,"part":5,"qNum":106,"stem":"The _______ candidate is someone with strong communication skills.","options":["A) ideal","B) deep","C) constant","D) intensive"],"answer":"A","explanation":"正確答案為 A) ideal (理想的)。句子描述的是一位擁有強大溝通技巧的「理想」候選人，符合語意，表示這是最符合期望的候選人。B) deep (深的) 通常指深度或深刻，不適用於形容候選人的特質。C) constant (持續的) 指不變或不斷，與候選人的技能描述無關。D) intensive (密集的) 指集中或加強，不符語境。","translation":"那位_______的候選人是個擁有強大溝通技巧的人。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_107_216","book":8,"part":5,"qNum":107,"stem":"Thorsten Electronics' sales figures have risen _______ every month this year.","options":["A) progress","B) progressive","C) progressing","D) progressively"],"answer":"D","explanation":"本題考驗詞性判斷。句子的結構為「主詞 + 動詞 (have risen) + 副詞」。動詞 \"risen\" (上升) 需要一個副詞來修飾，說明銷售額「如何」上升。\nA) \"progress\" 是名詞（進步）或動詞（進步），不能修飾動詞。\nB) \"progressive\" 是形容詞（漸進的），修飾名詞，不能直接修飾動詞 \"risen\"。\nC) \"progressing\" 是現在分詞，可作形容詞或動詞的一部分（如進行式），但在此不能作為修飾動詞的副詞。\nD) \"progressively\" 是副詞，意為「逐漸地、穩步地」，恰好修飾動詞 \"risen\"，表示銷售額每月都「穩步上升」。因此，D是正確答案。","translation":"Thorsten 電子公司的銷售額今年以來每月都穩步上升。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_108_217","book":8,"part":5,"qNum":108,"stem":"While Dr. Merino is away _______ vacation, her patients will be seen by Dr. Wolf.","options":["A) in","B) of","C) on","D) from"],"answer":"C","explanation":"【文法解析】\n正確答案為 (C) on。'on vacation' 是一個固定的英文片語，意指「在度假中」或「休假中」。這是表達某人正在休假狀態的標準用法，屬於介系詞與名詞的慣用搭配。\n\n(A) in vacation 不正確，雖然 'in' 可以表示在某個時期內，但與 'vacation' 搭配時，習慣上不使用 'in' 來表達「在度假中」。\n(B) of vacation 不正確，'of' 通常表示所有格、部分或來源，不適用於此處表達狀態。\n(D) from vacation 不正確，'from' 表示「來自」或「從…離開」，與句中表達「在度假期間」的意思不符。因此，選擇 'on' 最符合語法習慣，表達Dr. Merino正在休假這個狀態。","translation":"當Merino醫生外出度假期間，她的病患將由Wolf醫生看診。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_109_218","book":8,"part":5,"qNum":109,"stem":"The J & S Foundation is honoring three individuals _______ have implemented successful community programs.","options":["A) whichever","B) whose","C) whoever","D) who"],"answer":"D","explanation":"正確答案是 D) who。此題考驗關係代名詞的用法。句子的結構為「The J & S Foundation is honoring three individuals _______ have implemented successful community programs.」。空白處需要一個關係代名詞來引導一個修飾「three individuals」（三位人士）的關係子句。在關係子句「_______ have implemented successful community programs」中，動詞「have implemented」需要一個主詞。\n\n(D) who：是關係代名詞，用於指稱人，並在關係子句中作主詞，完全符合語法。它指代「three individuals」。\n(A) whichever：用於指稱事物或從一組選項中選擇，不適用於指稱人且作主詞。\n(B) whose：是所有格關係代名詞（其…的），表示「…的」，但此處需要的是主詞，而非所有格。\n(C) whoever：是複合關係代名詞，意為「任何一個…的人」，通常用於沒有明確先行詞的情況，或引導名詞子句。此處已有明確的先行詞「three individuals」，故不適用。","translation":"J & S 基金會正在表彰三位實施了成功社區計畫的人士。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_110_219","book":8,"part":5,"qNum":110,"stem":"Katib Boulos has over 30 years of experience in event planning and is particularly skilled at _______ banquets.","options":["A) considering","B) managing","C) treating","D) answering"],"answer":"B","explanation":"【文法解析】正確答案是 B) managing。句中提到 Katib Boulos 在活動策劃方面有超過30年的經驗，並且「特別擅長於_______ 宴會」。在活動策劃的語境下，「managing」（管理、籌辦、組織）宴會是最符合邏輯且恰當的動詞，表示他有能力組織、協調和執行宴會活動。A) considering（考慮）宴會，不符合「擅長執行」的語境。C) treating（對待、處理）宴會，語意不通順，通常用於對待人或處理問題。D) answering（回答）宴會，完全不符合文意。因此，\"skilled at managing banquets\" 意指「擅長籌辦宴會」，完美契合句子的專業背景。","translation":"Katib Boulos 在活動策劃方面擁有超過30年的經驗，尤其擅長籌辦宴會。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_111_220","book":8,"part":5,"qNum":111,"stem":"Pinckney tools are _______ well made that they are guaranteed to last for decades.","options":["A) so","B) such","C) as","D) just"],"answer":"A","explanation":"正確答案是 A) so。此題考驗「so...that...」句型，表示「如此...以至於...」的因果關係。句中「well made」是形容詞片語，修飾主詞工具的品質。「so」用來修飾形容詞或副詞，引導後面的結果子句「that they are guaranteed to last for decades」。\n選項 B) such 用於「such a/an + 形容詞 + 名詞 + that...」的結構，後面必須接名詞片語，不符合此處「well made」的用法。\n選項 C) as 主要用於比較句型（as...as）或表示「如同、因為」，不適用於此強調程度並引導結果的語境。\n選項 D) just 意為「僅僅、正好」，無法與「that」構成表示程度與結果的句型。因此，A 是唯一正確選項。","translation":"Pinckney 工具製造得如此精良，以至於它們保證可以使用數十年。","tags":[],"groupId":null,"passage":null,"addedAt":"2025-01-01"},{"id":"og8_p5_112_221","book":8,"part":5,"qNum":112,"stem":"If you should decide to discontinue your mobile-phone plan with PQ
